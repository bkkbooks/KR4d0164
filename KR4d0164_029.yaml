body:
  text: 相山集卷二十九宋王之道撰墓志孫宜人墓志亡妻富春孫氏曽大父守宗大父倚父祉皆髙尚不求聞逹其先避五季亂自和之烏江徙居巢之麞牙今二百有餘嵗矣父字無悔世所謂善人君子也凡三娶秦氏張氏魏氏夫人蓋秦出也生十七年而曽大父許字我眀年秦氏亡逮外除始來歸溫柔靜恭承順舅姑兢兢然惟恐不及事無巨細必禀而後敢為未嘗自専與諸姑處常怡顔下氣若見所畏者不浪笑語歸王氏二十年而豫游上庠者十年雖風雨寒暑疾病家人不見其有兒女戚戚之態尤勤於婦功非夜分不寐嘗謂豫曰使為學如此取官何足道哉豫以是知自勉獲與兄弟輩登進士第吾家無為之軒車號大族無慮數百口咸以夫人為賢建炎三年冬豫官歷陽將泛舟還里中屬金人圍合肥王善陷巢豫弟彥逢侍雙親浮家避地江山至泥汊適相遇太夫人喜曰兒婦歸吾無憂矣四年賊盜遍江之南北豫始與里人保胡避山初太夫人有翻胃之疾至是寢劇以五月三日卒於山之所苃夫人後太夫人之卒四十五日而疾七十三日而終年始三十八當夫人之屬纊李伸擁兵數十萬攻豹子山甚急遣人求援胡避以夫人之喪未果行眀日而豹子陷衆皆泣且言曰微夫人我曹殆不免不然一不成而萬有餘喪嗚呼哀哉夫人死無憾矣以一死活十萬人之命而獲從太夫人於地下有是二事吾又何哭焉生三男曰薳曰蘧曰邁二女曰寅曰申將以紹興四年十一月某日葬於麞牙之西三里曰帶漁河之原為之銘云宜壽而夭世所不曉以一易萬孰多孰少帶漁之原山水環繞豫亦老矣之死同兆故李公孝先墓志惟李氏世家隴西唐末避黃巢亂徙於饒之樂平公其樂平人也諱忠字孝先姿表偉岸遇事有膽略方志學里有健訟者誣引乃翁部將怒追逮甚急公慨然曰為人子而不能免父母於難非孝也先追吏詣郡請代父對有罪不辭郡將嘉其意從之果白其妄當與弟姪異産縱所取曰吾不汝多少肥瘠較也當是時饒人聞其風老者莫不願得以為子少壯者莫不願得以為兄弟靖康元年春金人冦京師郡有勤王之舉責縣備餉餫令徐時孚按籍勉其里之雄於財者助軍公戶最下弗及聞遽謂其子常曰兹正卜式所謂賢者宜效死節有財者宜輸之之秋今詔求直言叩閽非吾事也汝其疏時政得失生民利病與平日所嘗語汝者獻之以遂吾願家有百斛贏吾當盡輸為里人倡故一時靳者化之而樂平在六邑號先辦常眀年上書數萬言陳足食兵計天語賞歎下有司施行且官之九品建炎二年春桂仲正叛建康合張勝衆三萬陷當塗破建德掠石門入利陽凶焰益逼令趙子木聞常長於畫有意事功盡以柯嶺十四寨委常統之使拒賊常謀於公不數日而兵備修飭至不得犯百里為安三年夏李大刀連劉文舜潰黨屠毁境上逺邇震動公聚里人諭曰賊有必避者險也彼所可擊者散也有是二利而不為非勇也衆壯其言相與控扼要害請常董其役常為設方略俘馘幾盡所屬上其功於朝常用是遷承務郎為無為縣令公性識通敏少雖以家責奪舉子之學而於經傳多所貫綜閒居養生閲岐伯仲景之書遂妙於用藥南方信禨雖至父母癘疫子弃不敢侍里中有蹈此者公責以大義且曰冬傷於寒春必病瘟理也爾乃不問醫而問巫愚亦甚矣故時有疫則必家至與之善劑日候其安否其貧不能自存與死無以自葬者皆悉力營給之惡俗為變公尤喜賔客第之東有堂曰仁壽為公燕集之地每與所過從觴詠歌舞繼日不厭且樂於周人之急婚嫁親戚故舊之孤為多平生論事不直不置故於言無所茍人有爭者曲直勝負不質之有司而以公言為證晚年與人語多及瞿𣆀之教觀其所為真若有道者也始淮西更李伸張琪之變千里蕭條亭舍不煙及常得邑無為或難之公曰事君不擇地而安忠也作詩以督其行戒之曰拊循凋瘵要在不擾故常到官用公之言而稱治豫嘗追和東坡所贈王慶源詩遺之云慶源老人骨已朽愛民似子當今無其政事可知也公後數月往覘焉入其境喜見顔面曰吾無憂矣已而里人思公悉遣子弟趣公歸公笑而與之俱以眀年紹興四年二月戊子終於仁壽堂人為流涕享年七十有七曽大父某父某皆隱德不仕娶范氏以賢淑聞子男二人長黨早世次常舉進士女三人葉正奭余汝舟徐時舉其壻也而歸葉余者先公卒孫男五人女四人曽孫男五人女四人諸孫如師心師回師尹皆好學有立蓋公之餘慶也公有别墅在舍南靜理鄉桂林原山林清逺公至則忘歸嘗命常曰吾沒當葬於此常將以五年二月甲子如公所卜葬焉無為豫鄉里也往獲庇常之政而公常與吾翁游日談佛老至相得也今常不逺千里走介抵書以友生王珏狀公之行來乞豫銘義不可辭銘曰孝悌在人兮墉有基基隆墉厚兮何時隳忠於奉上兮孝所移發憤偷財兮富兒疑子常獻書兮誰授之嘉謀讜論兮帝所竒殱走潰叛兮功可欺柯嶺峩峩兮思者悲南方惡俗兮多信禨里閭一變兮莫敢違作堂仁壽兮花木菲客至不醉兮無庸歸撫孤周急兮人爭依如石藴玉兮山增輝子孫秀發兮家之肥桂林遺芳兮追平韋故武節大夫陳文叟墓志文叟諱師良泉之晉江人曾祖贊隱德不耀祖察以叔父中奉大夫某贈正奉大夫父照以公貴纍贈武經大夫公志尚豪邁逈出一時輩流中奉才之謂當以材武進㑹詔下郡國立武學以三舍法取士公慨然曰郭汾陽顧不足慕耶何切切章句為遂由舍法取貢於上庠中宣和五年武舉異等補某官調泗州旴𣅿縣尉次楚州鹽城縣巡檢遷其官充御營左將軍幹辦官次贑州排岸遷某官充兩浙路都巡檢使次紹興府兵馬都監次平江府常熟縣福山巡檢初公從韓宣撫世忠軍㑹行在陳攻取大計韓喜謂得公晚苗傳之變公以戰多超轉數秩先是樞密李公與公為布衣交洎登西府薦公有専對材堪奉使絶域一時士論翕然推重公自福山歸西興之所舍不復有仕意以武節大夫致仕平生好作詩晚年詩益工每一篇出識者服其筆力閒居宴坐焚香誦經深於性理無所滯礙於所舍之西偏名其堂曰隨緣自號隨緣居士以紹興二十九年冬十月辛亥考終於正寢享年七十有二安人黃氏賢淑能循法度子四人曰求已保義郎前鎮江府常州巡轄斥堠曰求志新眀州指使曰求俊承節郎新潭州指使蓋皆以功賞延之典奏也曰求忠應進士舉孫三人某某某孫女三人俱幼求已蓋吾弟刪定彥逢之壻也將以今年某月某日葬公於紹興府蕭山縣之湘湖南越王城之書為參知政事詔有司寵其先世於是贈皇考故朝奉大夫之道為太子少師閲月上踐阼覃及天下加贈太子太師四月遷知樞密院事贈少師眀年拜樞密使加贈太師樞使罷政還故鄉周視松檟乃謀刻其先德於墓之碑而以其辭屬袤於是太師之薨蓋二十有五年矣曩建炎間敵犯江浙長淮千里莽為盜區握兵者畏避不敢戰有城者遁逃不能守太師以一書生率數千烏合之衆保胡避山水抗羣賊區區一隅之地東有張琪南有邵青西有李成北有李伸合其兵數十萬環布四境磨牙有毒卒不能吞噬使一方之民仰視俯育脫死鋒刃公之力也不幸忤觸權臣才不究於用而遺慶所鍾乃在其子樞使既致位二府為時名臣而公贈官一品榮耀身後非隂德之報歟袤待罪史官方裒次建炎以來故事如公言議風烈法所當載故不敢辭而為之銘按公字彥猷無為人曽祖諱用和隱德不仕祖諱原本缺字贈太保考韓竒纍贈太傅曽祖妣馮氏祖妣于氏原葬有日求已遣人致懇於婦翁以前福州福清令黃童行狀來乞銘彥逢將無以為壻之意寓書有請於豫豫頃年以視彥逢於西興之官舍獲識文叟其後彥逢既以猶子妻求已遂聫姻婭豫每赴調至臨安文叟聞豫來必攜具涉江相過清談終日而去如是者非一今公云亡豫以逺官斂不得撫其棺葬不得臨其穴若銘又何敢辭銘曰生於泉葬於越前湖後城流長岡崒
