body:
  text: 相山集卷十一宋王之道撰七言律詩江南道中江回山崦兩三家招颭東風酒斾斜羸馬送曛行自急峭寒欺客晚還加日邉鴈足應傳信竹外梅梢合放花指㸃東城歸路窵一川流水閙棲鴉隱靜道中馬頭聊復問諸塗東指宣城百里餘水外山屏供步障道傍蛙吹接行車青歸栁色浮烟裏紅入花光過雨初春意似同人意好此行那患食無魚寄余元明對月令人憶子年别來重見望舒圓閒中情性南無界物外光隂小有天連喜得官如得句慣看乘馬似乘船朝回共醉知何日凖擬春衣當酒錢寄孫次卿歸來啜菽得無愁但覺官身不自由敢倩雙魚傳尺素要知一日似三秋射陽别後從新辟幽谷公餘獲勝遊尚憶龍盤分袂處五更殘月在山頭次韻髙守無隱苦熱鬱蒸還起炮車雲旱氣方隆雨未能應念開幬來白鳥故成灑酒聚青蠅南皮痛飲君當繼北牖髙眠我獨醒人仰郡侯清可倚暑中真是一條氷用東坡贈朝新城韻呈朱烏江偶然來賦瓦梁行亂後欣聞醉客聲村戍火明人指路江城風靜夜鳴鉦對牀聽雨他時念撥火哦詩此意清聞說魚軒還枳里先生應合暫歸耕和連聖舉呈張彥智公望巖巖映廣東曲江重見舊家風威行草木霜爭肅春到湖山雪自融至喜此心魚鳥共去思前日吏民同從今不復憂兵火却敵如公笑語中次韻伯逺運幹見寄善鄰雖幸借餘光終愧陳臻問發棠官栁又驚眉拂翠宫梅應喜額塗黃江湖得計還相造道義論交付兩忘多謝乾坤容長物許乘春意到文昌次彥時兄苦旱韻斗粟衡門且自安老來筋力厭辛酸官遊動是三年别邂逅應容一笑歡荷浦珠聫秋露溢稻田龜坼暑風乾昨朝溪足捎新雨已覺羸軀怯夜寒次韻沈元吉兵火後初食羊時難盆甑久無羶夢寐何郎食萬錢一臠乍驚肥羜美五紽應喜敝裘全好從牛炙論蓴菜堪笑河魨詠栁綿彈鋏得魚良不惡先生何用鄙烹鮮次韻陳勉仲二首蜂喜春晴競出籠雪明籬腳眼看融栁條借日還金色梅萼因風動玉容窺牖數聲禽度曲過庭千字鴈書空青氈笑指吾家物芳草無邉一望中十載窮愁鳥出籠春來天意似通融得書故舊頗相憫上疏朝廷應見容開府莫辭金帛盡犂庭當冀祲氛空廟堂素定平戎䇿不待文淵在目中次韻張進彥見寄二首坐想雲烟走筆端夜哦佳製老忘寒一時思致追長慶千載風流識建安接武尚稽班玉筍昻霄終合待金鑾自憐衰退無新語捧腹還君醉眼看鼻息齁齁盡日眠從他兒輩競嘲邉那知問對成中說自得逍遙喜內篇雪裏書來簷噪鵲燈前詩就鼎凝煙中郎去後人難繼漫詫柯亭富笛椽次韻同舍李支使夢與二首三紀橋門過隙光醉吟曽共晚風凉舊遊何在已蕪沒前好欲言空感傷重對詩囊開錦繡要看談麈落氷霜苕溪此去如相憶雙鯉時應寄一行短短燈檠便且光看書猶記感秋凉飄零未遂襟期逺遲暮徒驚嵗月傷初喜嫩荷青直蓋不知新竹粉儲霜相從益覺交情篤時擲隋珠到我行次韻周子嘉詠雪勢凌風力鬭清嚴徹骨尤非老病堪凍蠡夜回千首北寒梅朝放一枝南扁舟底事方行役販履何人正立談江上别來勞夢寐相寬猶喜見詩三詠雪白榆風起匝天來透隙穿簾醉眼開氈襯庭階茸妥貼帶盤山徑玉縈回根行萬國將宜麥香動千林獨放梅閒把銀杯評栁絮始知謝女亦非才和彥時兄臘雪六首不耕何敢嘆無囷多謝先生早見傾望嵗比同傷再潦逢年今共快三霙光凝夜旦千山曉勢合髙卑萬壑平坐想袁安門未掃洛陽誰復念孤惸一洗乾坤不動塵瑶臺銀闕鬭清新齊腰欲究安心法乘興當為訪戴人曄曄寒江歸釣艇丁丁虛谷動樵斤二詩逺比幽蘭勝擊節懸知衆所賓敢以簞瓢傲廪囷撇醅聊復笑還傾為言空腹朝搜句不覺寒窗夜集霙澤浹寰區成地富光生蓬蓽見天平預占有嵗從今始廊廟何憂不及惸瑶林交映出風塵便覺寒門氣象新莫訝忩前羣噪鵲須憐江上有歸人拋甎已喜來荆璞斫堊無勞運郢斤坐擁紅金饒大嚼一時髙㑹幕中賓厭聞飢雀噪空囷猶喜茅齊未遽傾屑玉豈勞青女送飛花聊混白雲霙預占嵗稔矜祥舊不擇貧家荷施平早晚林梢掛寒日為回和氣慰饑惸舉首西風漫障塵清無纎翳六花新謝庭擬似吟飛絮洛浦飄颻見麗人漏箭不知樓外曉觥籌先發坐中春兔園盛集應難繼空想當時主與賓次韻孫興宗梅花厭浥庭柯雨未乾乍晴天氣午猶寒傳來多謝新詩寄接得翻愁病眼看漫想素粧嫌粉涴須憐青子著枝酸和羮有日君知否老大心腸只自寬次韻董令升梅花花前樽酒㵼尖泥痛飲仍欣客到齊竹外一枝青更好水邉踈影動還迷醉醒正值微風入酬唱何妨素魄低聞說歸舟陽羡去應容酌别為烹雞詠梅示魏吉老孤芳常恐百花知桃李紛紛亦强追照雪精神應自喜逼人風味不吾虧幽香隱約留衣袂踈影玲瓏鑒硯池欲識東君好消息夜來青鳥宿南枝次方正叔知縣韻僕今年六十有三竊觀正叔贈陳甥述懷詩有感豫心併和二首奉呈年踰六十我何堪心曲因君得縱談閲史舊嘗疑夏五參禪今遂薦前三飲闌却怪清樽惡飢甚猶憐糲食甘交態物情何足較邇來爐鼎興方酣水滿陂塘麥滿村路逢田父和長言題詩懶作蠅頭字貰酒愁看犢鼻褌芳草藉青迷野徑逺山橫翠入柴門道衡骨朽無人繼卿相誰能預識溫和張詠老知縣照蔀輝輝碧夜光貧兒那復苦悲凉得魚始信筌無用斫堊終期鼻不傷我類槁苖猶缺雨君同修竹飽經霜詩成病眼昏加澀欲寫還憂細作行臘梅和次韓韻一枝橫亞竹梢黃宫樣新翻半額粧閒淡似宜冬後日清癯應怯夜來霜生憎丹臉嬌含酒巧妬氷肌冷透香取蠟為花緣底事浪吟空發少年狂可憐風骨肖梅英試問東君曷似生正色不從朱粉涴耐寒猶怪雪霜輕論交薝蔔君為勝投社酴醿我更清縱美詎能齊衆口漫言異日許調羮夏月自六安舟行還安豐灔灔溪流漲渌波乍晴天氣自清和露梢抽翠交新竹風葉翻紅颭嫩荷水外逺山晨霧重道傍佳樹午隂多頭旋更苦舟搖兀說與篙師住得麼和州得旨移粟宣城舟中和何希淵韻轍魚應怪决江流千里重為疊嶂遊頗慣黑甜相對美可無赤糙為寬憂干戈在眼心還折勳業何時鬢早秋已辦賣刀歸買犢不妨多種白江州沙窩道中疊疊青山處處溪溪聲淙玉潄玻瓈懸知菊水人難老可信桃源路易迷山嶺梅花迎客笑路傍松蓋與雲齊寒林昨夜微經雨新跡分明過虎蹄遡流入柵江久客心腸怯遡洄不堪官事緊相催踏霜人去繵風吼衝浪舟行岸凍開雪盡野梅紅剪臘春回溪水緑生苔窮愁好逐殘年盡三日元正與泰來春殘次韻張叔元亂紅狼籍紫苔斑簾捲東風雨腳殘蜀酒漸宜消晝永單衣猶覺怯朝寒玲瓏有客雙搖轡矍鑠何人一據鞍芍藥酴醿晴更好勸君休作夢中看次韻徐伯逺木芙蓉千林搖落見孤芳銷得詩人賦拒霜髙壓菊花還獨步靜窺池水試新粧自憐衰病追歡懶忽覩騷吟引興長何必採江重比並佳名艷色正相當次韻子厚弟小春偶成强插梨花做小春風前詩思有餘清路逢野老那知姓耳聽幽禽自喚名嵗晚山林松檜色天寒關塞鼓鞞聲枕流潄石君無笑我欲巖居學子荆次韻程德逺登清淮樓西望中原懶轉頭十年空見水東流塗山漫想諸侯㑹濠上聊追二子遊大劔長刀秋正擾淡烟踈雨暮還愁誰能不討清河朔誓楫當期祖豫州秋興八首追和杜老湖外干戈半緑林湖邉葭薍晚森森風霾未放逺山出嵐氣又連凄日隂世亂且同吟嘯樂時來終快掃除心天寒况是開爐近應有佳人賦藁砧巉巖石壁半欹斜茅栗叢中菊漸華風裏斷鴻書帶草山頭飛葉漢浮槎柂樓索莫吟秋笛戍火青熒咽暮笳爭似漁翁最蕭散晚來和月卧蘆花雲影曚曨日灑暉金湖西畔晚隂微漁舟繚繞青山去楓葉追隨白鳥飛摩詰家風非世有淵明心性與時違近來病瘠連詩瘦翻愛西臺字樣肥轆轤世態一枰棊銷得秋來宋玉悲舒嘯可無元亮意哦詩如見少陵時江湖於我還蕭散田舍從他笑重遲異域故人今在否青燈牢落夜相思翠壁蒼崖水外山山頭茅舍兩三間夜窗明月來臨卷晝户清風為啓關霞綺障秋驚老眼酒紅潮面發衰顔集英一夢如今覺猶憶當時曉趂班逺水西來抱鹿頭山前草木帶霜秋黃花雅意撩詩興紅葉端能寄别愁日月奔馳雙轉轂江湖漂蕩一輕鷗干戈未戢中興沸蹴被空懷祖豫州勳業休煩付考功此生終待老山中宦情薄似賢人酒詩思清於少女風秋雨養肥桑耳白溪流濯出栁鬚紅不堪世路頻磽確四十蕭然秃鬢翁迢迢山勢去委蛇林木東頭見荻陂踈竹依巖秋迸筍病桑經火雨生枝草侵藥種多難辨土撥松苖欲自移照眼誰家幾枝橘出籬丹實正離離送許判官志仁同安許志仁與豫比郡聲迹相聞紹興八年夏始于武林獲有一面之幸而未欵也前賈茂德將命淮東志仁方待次澧陽以文字見傾蓋若舊遂聫轡還無為今荗德復使江面而澧陽闕在數月間茂德自南昌遣舟來迎子方幸承教遽爾語離不勝悵然因志仁有春晚偶成佳句輒嗣韻贈之是行猶及豫章春聞說逢迎有故人傾蓋為君殊快意摻袪令我重傷神向陽花木初開葉得雨蛟龍已轉身江上新晴應更好緑楊如幄草如茵送董令升舍人歸朋溪二首西掖歸來鬢未華著書論字當生涯撑腸何止五千卷溢篋定踰三十車秋露青黃新種橘春風紅紫舊栽花東還貪逐朋溪樂只恐金鑾詔草麻仙舟東去訪金華歌徹驪駒向水涯試問玉堂司鳯詔何如蓬島駕雲車雨餘翠篠初翻籜風暖丹葵欲放花天氣清和行色好江南江北半桑麻送劉元發歸鄱陽次其韻杖藜千里訪茅茨來赴當年一笑期白髮我徒悲老大青山君尚記艱危夜聽髙論因忘寐晝味新詩可療飢冬日迎長殊可愛何妨去國少遲遲送淮西轉運判官李彥恢還朝江頭旗影㺯青紅似說朝天四牡東抱病不容攀轡勒送行那復遣兒童田均稅斂千年利福及瘡痍九郡同此去定知還禁近從來隂德報宜豐送徐次公罷厯陽任歸三衢聞說家書賦鶺鴒歸歟難弟見難兄接聫本作二年調解印俄成千里行故國一犁春雨足長江三板暮潮平爛柯况是神仙宅招隱詩成好寄聲送徐季公運幹罷任羈栖無奈老而窮又見徐卿馬首東快意一時荷葉雨增明千里稻花風髙材合在雲霄上勝處能忘澗壑中法護相從如問我為言蹤跡與君同送端溪尉張逹城挈家南歸年時蕭寺雪初晴聞道君來眼倍明送别又看秋欲去論交還感蓋初傾帆張須水秋潮漲路入鉛山晚翠橫快向端溪從吏隱歸來穩步上蓬瀛送江致逺歸建昌翩然歸興不吾留應為髙堂念逺逰數日語離良作惡幾時書到得無愁白沙翠竹千山晚朱實黃花萬里秋後夜西風茅店月醉吟應不費冥搜房陵秋日新詩來處自房州已及瓜時嘆滯留曽望碧雲頻送目又驚紅葉再敲秋千山不隔清風逺兩地應同素月流游刃似君誠利器只今無復見全牛中秋和彥立兄韻悼伯父仲球月華秋氣共清圓千古佳時句一聫節物傷心還惙惙山光經雨自涓涓潢池兵火今方熾溝壑飢羸正可憐怊悵去年人已矣亂離誰復問招延
