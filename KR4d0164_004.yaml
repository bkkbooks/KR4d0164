body:
  text: 相山集巻四宋王之道撰七言古詩信陽和同官喜雨韻欲識農夫田作苦乆雨禱晴晴禱雨禱晴得雨雨得晴此患到今傳自古苾芬非是蕭蘭馨誠心一發通三靈文昌俗吏亦何者乃能致雨興雷霆爾來旱氣爞爞熱夜望天涯電光掣原田嘉穀半焦黄何獨枯魚濡涸轍忽然一雨洗瘴昬珠玉無邊難價論坐令愁嘆變歡抃千巖萬壑江流奔從今不厭商羊舞十日一犂均下土漏邦寒儉酒味醨且磑新茶其分乳庭前花草還青葱想見黍稌紛芄芄吾君早晚復疆宇屢豐將見追元豐天人大扺常相即人若必天天可必願修人事格天心天若不從非所恤泰亨自復先朋來時通端不憂塵埃新詩要非所宜辱敢以木李酬瓊瑰六年無蓄號不足菜色定應縁半菽要令汸暴似海岳豈但河沙論秉斛炎天赫日當流金去國多年思轉深只今淮北望霓切須煩伊傅資商霖次韻子厚弟喜雨行贈趙守端質我生畏暑如畏焚奈此歲旱風塵昏十年廢放卧巖壑名雖八品身黎元恒暘乞雨雨乞霽雨轉為淫暘轉熾不知此理果何如每訝天心異人意去年避地還家園蒿萊滿目髙侵天秋陽肆虐冬益甚涉春陂澤皆平川邇來焦稿遍區宇黄金融液膠流弩趙侯日為疲瘵憂應怪魯書三不雨天人大抵常相資顧我録録傷無竒鬻漿苦涼屠苦熱敢望屏翳從招麾聖主東巡羣后覲萬里江淮方水運折衝禦侮賴親賢何獨為霖福斯郡精誠昭格吾誰欺頃間禱雨人所知忽然簷溜瀉河漢數聲霹靂轟相隨公堂六月清無暑旋磑龍團試分乳官曹相賀復何言且戒農夫築場圃小人托庇安村墟獲同野老歌而呼願公玉帶懸金魚奉報得雨禾生稃霏霏不厭沾衣裾稍晴欲自躬犂鋤斯民食足吾其俱何妨把酒仍觀書酬潘縣尉縣尉逺遺佳篇奬與過當而其中見及亡友錢子全王堯明二公皆俊人非碌碌者不幸相繼死矣埋玉樹於土中使人情不能巳輒用韻書謝堯明文采燦星宿子全道義髙金玉傷哉二子不可見墓上悲風號拱木逢君論友話偶及令我呑聲為渠哭因渠感君不我鄙逺寄錦囊詩一軸有如貝闕羅珠璣東攫西拏厭吾欲又如康衢走騏驥朝越暮燕惟爾逐匹夫獲罪坐懷璧誰使夜光衝蔀屋仲尼知本故稱水請看懸崖瀉飛瀑我從二子方弱冠俛仰三終同轉轂壯年登第今巳老碌碌無竒堪齒録羨君節操似松筠雪裏髙標仍絶俗巳將義命等窮途肯為身名强榮辱髙情慷慨憐衰晚妙句縱横丐膏馥開緘反復讀數過骨竦毛森頭觳觫施隆報蔑君勿誚明月輕投得魚目人生遇合㑹有日行矣鳴騶入空谷燮調元化坐廟堂長使斯民歌鼓腹贈淮西運幹徐伯逺伯逺得印於予里人楊德潤其文曰東海開國楊自其先侍講與南昌潘延之游印盖延之所遺而故常侍徐公舊物也從潘入楊凡六十年至是復歸徐氏亦異事也為作詩以紀之云嗟予偃伏淮南村十年不踐公侯門誰令金印入魂夢平章六字承君恩左手人頭右手印此理未可輕易論丈夫盖棺事始定擒戎㑹使來稱藩争如徐子擅騷雅筆力豪縱今文園楊君收印六十載細觀制作同新翻為言常侍故家物其先得自南昌潘珠還合浦有時節餘慶未艾鍾仍昆子今得之類摘鵲此貺重可輕璵璠便當凖擬佩三印併與文安遺子孫和王覺民梅花詩覺民寄示梅花詩有强拙者屬和之意予衰也豈能與諸公争豪取其填塞章句可也梅花似是東君客漏洩春風犯寒坼冰肌玉骨照雙泉應為孤根借泉脉先生狂得次公醒詩思藹藹飄晴雲為憐老拙有舊分俾預勝賞沾清芬我時被酒酒初透香撲鼻端曽一嗅别來飛雪往未能想見精神愈髙痩西湖處士真詩仙東坡老人所推先豈知此花自竒絶神助妙語相争妍浪言投李報瓊玖牛後何如作鷄口我今無物報投瓊木李雖輕聊藉手先生標致良可人此詩不減花娉婷相當欹枕初得句夜興冠坐如驚霆願君追作淮夷雅換取公卿重文價嗟予衰矣不復論但欲髙門容駟馬沈湯輔隠軒詩小隠山林大朝市夫子命軒良有意仕途捷徑固無取泉石膏肓亦猶次不知朝隠誰得之我恐曼倩為近似公卿百執各有職豈容妄隠但充位古人禄仕所不免意在全身近於智莊周梅福此其流吏隠之名可無愧沈君有弟今休文咳唾成章數千字恥從舉子事進取逸韻髙情寓吟醉乃兄宦達方强仕翠竹停鸞想風致君侯才業伯仲間退以求名名亦遂方今堯舜理四海巖穴彈冠求自試朝廷既治羣吏肅何處堪為隠者地不如市隠最得䇿大勝山林自憔悴花源繚繞轉紅緑竹洞深沉入幽䆳我聞此風頗健羨圖成未可日月冀他時儻作江西游兄曰能來訪予季大梁食李有感呈彦時兄葵花巳過荷花繁南風入户清而温擔頭有李初入眼令人引脰懷家園三年為客在兩處李熟未果登清樽翻思整冠誠可樂何苦鑚核輒不存急宜買冰致凝凜全勝汲井供潺湲小床方簟嚼春雪一實自可輕璵璠扁舟行逐東南犇回首稻粱江上村相歡孰若弟與昆古來唱和須箎塤用子藺韻賦九日小酌春日歸來忽重九潦旱相仍歲無有庭前巖桂獨青青此意於人亦良厚欲酬佳節拚一醉㑹有白衣來送酒須㬰殽核第羅列無蟹猶空把螯手坐來靈雨灑珠璣洗出湖山競髙秀三公在望無百里咫尺銀屏擁其後三公銀屏盖無為南北山也長篇落紙箭離筈大白浮醪簷注溜細看黄菊與紅茱想像年時還話舊登髙何必須人扶我有笻杖頗堅痩明朝寫出醉中語牽帥不知誰唱首春晚書懷十年萍梗三到吳走俗未暇觀西湖是行信歩至湖上水光山色開天壺㳺人雜遝半羅綺一徑不憚穿雲紆歸來神思頓清發詩中寫出錢塘圖張侯妙語何所似青玉為案黄金鋪要當聨轡事幽討邂逅得句相招呼東坡巳死不可作因君對景還嗟吁水僊配食竟莫舉但見舊隠環菰蒲山間有寺過三百終期徧走參能儒還家兒輩若問我庶免不知空囁嚅和劉春卿夏日閔旱次韻何人夜作秋蟲號吟詩坐對山月髙想當龍門奪錦袍從臣拱手看揮毫衡茅咫尺臨江臯浮光灔灔翻金濤滿帆何處乗風艘千山過眼同犇逃不防鱠鯉兼炰羔酒酣起舞如飛猱醉中往往笑成咷一時輩流籍湜翺嗟予蹇剥意欎陶七年坐困山林牢邇來天旱地不毛釡魚薪蟻何嗷嗷誰能讀詩夜焚膏只益心蓬増目蒿丈人純白羞桔橰終日抱甕忘其勞今春屬國紛旗旄兩淮供億争鳴鼛干戈載戢弓其弢此行輔弼環蕭曹藁街佇見懸酋豪買牛賣劍犢賣刀我雖不飲當潄醪堆盤況有瑶池桃鹿鳴㑹賦嘉賔敖予衰尚可追風騷過集湖德濟廟用趙尉亷留題韻示周欽夫程彦游秋陽汎汎流清暉帆腹不張旂脚垂靈祠輪奐湖之麋水天一色成玻瓈西軒爽塏髙不危憑欄下瞰羣山卑鬼神亮我心無欺風濤縱險夫何疑區區犇走勞驅馳和光未免世俗隨相逢一笑聊伸眉明朝摻袂還東之蕭曹有節未見竒往往樵牧相鄙夷吾生傾否㑹有時窮愁過眼無足悲次韻張文伯喜雨新詩句句堪流傳令人讀之神凜然孟君巳死不可見如公筆力今無前天生百穀養萬姓暄潤稍闕功難全江城秋旱望一溉斯民窮極伊誰憐滂沱忽澍三尺雨稿苗厭厭藨緜緜不知何以遽得此有賢太守方承宣焚香黙禱辭未絶精誠已格髙髙天油雲垂布若可攬沾濡車盖初言旋西成指日多黍稌頌歌未負賡豐年豚蹄盂酒謝神貺鼓腹一笑非予偏和董令升喜雨用前韻夜聽簷聲翻急雨想見膏潤均率土先生休戚共斯民憂在惔焚非憚暑人情類被饑所移我爾相忘自甘苦寧從禱旱身暴日肯對驅蝗歌侑俎用心何獨追老杜大庇寒儒歡廣宇要令匹夫被惠澤上致吾君堯舜數嗟予糞朽伏邱壑尺短寸長無足取洊䝉珠玉過稱揚丈夫殆以氣相許次韻畢少董游西湖西湖春晚未全熱湖上山光互明滅往來冠盖競駢闐斷續笙簫共伊咽我憐湖山山見憐波間湧出佳人鈿太真一去不復返圓荷萬㸃臙脂錢船頭美眄珠的皪不必洞房深處覔忽然相值更相呼嫩藍衫子山争碧腸斷騷人一軸詩細看煙栁想腰肢明年我亦西湖去遲日光風二月時西湖遊次韻趙見燭山鎮在越澤在吳東南形勢憑江湖不知弱水竟何處恍若員嶠連方壺海門潮至飛雪湧天竺雨過遥青紆十年不見看愈好正復妙筆那能圖蒼松揺風翠盖偃芳草藉地柔茵鋪僧舍朝遊恣登覽酒樓夕醉争歌呼朅來俛仰春又曉對花無語空長吁作詩既非拙者事强欲寫書編澤蒲偉哉得志佐明主進退百辟稱鴻儒應憐伺候犇走輩終日趦趄仍囁嚅天寶歌和魏定公文次韻連昌宫中馬為樂一時舞馬黄金絡君王養欲臣養文忠鯁漫多寧救藥嗷嗷萬國風中船檣傾柂壞夫何言潼闗莫拒范陽賊傷哉天廐空連錢翠華西去遥指蜀應念霓裳舊家曲六軍敢怒誰敢呵馬足空汚太真肉始皇布漆徒堅城元海斬木徒輕兵驅魚驅雀强鸇獺乃使後世䝉佳聲亂離每憶昇平日忽對新詩重嗟泣望仙花草自春秋怊悵六龍歸未得和江和仲司理喜雨天憐轍鮒噓殘濕震奮雷霆起幽蟄清風入夜送雨來大慰焦枯望霓急新詩如雨雨未休相對自可忘為憂東臯秋稔想多秫預期劇飲無論籌老蟾宿畢君知否欲煩更問東家丘我今已具西歸舟㑹見扶桑升赤虬鹿泉居士王覺民頗有杜子美不徹之惱和東坡憶梅韻箴其膏肓鹿泉居士身若槁不慣看花夢顛倒桐廬有客燕新昬妄託嬌癡重伊惱凍雲垂地雪欲落斷雁呌羣天尚早一枝何處寄春來便覺寒窻自華好瓊瑶萬里眼界淨咫尺前村莫輕掃留將青女伴孤芳長向茅齋照衰老先生才思老不進寤寐池塘見春草對花酌酒祝東君煩把窮通問蒼昊次韻胡德輝松軒時乞兵戍淮伐蛟生得鬚髯蒼隠然為屋分三梁廣寒恍若東西廂清風入座衣披猖蕭蕭終日聲奏篁一洗鄭衞無伊涼嗟予頑鈍鐵石腸時危命蹇甘皇皇江城正苦夏烈日淮甸巳懼秋飛霜緑尊翠杓且徑醉喜與夫子參翺翔平生邱壑老増劇夢想朝露珠璣香何時元戎北渡森旗章料敵制勝一一盡所長鷄羣野鶴看昻昻大柿行丙辰夏秋雖足雨百穀與蔬果皆凋耗不豐惟柿特大異常歲昔所未見夫大柿大事也其為國家之祥乎其掃清强敵迎還兩宫之兆乎䤋豫梟麟盖不足道也作大柿行以歌之君不見鄭䖍學書晚彌篤歲收柿葉貯三屋興來寢食兩俱忘但覺毛公老而秃又不見梓人造車度羣木木中無火柿所獨舊言盖軫象乾坤須信斡旋歸一軸美哉此果有常德結實何曽問荒熟霜餘萬顆綴寒林下視黄柑類奴僕牛心取象庶彷彿熨斗得名何凂瀆火乾既許暖闗膈冰冷當知解煩燠今年夏秋足時雨盡道和氣鍾百穀西成僅得十之五亦見陰陽有盈縮就中朱實繁且大照野煌煌駭人目較之常歲逺不侔正似㪷勝難趂斛國家運厄困强敵一紀於兹事弓韣空庭喋血在今年我已不疑何更卜禾和鞋諧古云䜟大柿之祥天下福請賡繼伐獻吾君王者功成四方服秋日苦雨和子厚弟韻烟欝濕薪費挑撥可堪餘瀝濺如潑吹霞弄日語縱工正恐詩人類迂濶屋角蕭蕭霜葉鳴夜静亂我糟床聲詩成欲寫輒復已鄰雞犯早催天明贈曽桑中彈琴春寒沍連冬春雪深數尺千門擁瓊瑰跬歩燕越隔朝來有情意淡日透雲隙殷勤貴公子訪我跨龍脊登堂笑不休為言督詩責君嘗許我詩俛仰歲三易至今猶未償無乃言遂食我老苦健志百不記六七公子誠有意何吝話疇昔昔也君過我我方事琴厯嘗為陽春弄次第長短側君乎鍾子期此舉不輕擲聞之思茫然彷彿見擘趯我有朱絲絃塵埃乆侵蝕試煩一再鼓助我毛頴力公子不我拒抱琴枕雙膝須㬰扣商絃當春變秋律凉風着草木離離盡成實我貧人不知陋巷家四壁何幸空乏中登此黍與稷但恐時令乖瘡痍至生疾公子其反是叩角夾鍾激不然總四絃命宫以調適坐令景風與慶雲為福為祥遍方國
