body:
  text: 相山集卷二宋王之道撰五言古詩次韓子雲白蓮韻金縷不相稱紈素新裁衣坐令時世粧屏跡從招揮施粉定太白増分却成肥須知氷雪肌秋月揚明輝來從姑射山一洗百念非何煩障青綾髙談解郎圍亭亭翠盖中老眼省見稀揺風自披拂照水相因依傍觀慎無前恐犯丞相威不如太華巔食藕家翠㣲追和元㣲之春餘遣興示王覺民物態有榮悴時令互消長墮身名利場魚鳥在羅網豈無金屈巵聴此石方響殘花日晴隂落絮風下上春事雖已闌餘芳尚堪賞我有臨溪亭疎櫺為君敞青青小荷錢雅與水相養狂吟醉題壁縱步懶扶杖仰止李謫仙筆端走羣象九原不可作夜夢見精爽栖栖亦固矣君子坦蕩蕩相期醉酴醿偕來衆無鞅九江解舟順風追和張文潛朝來轉西風天巧借吾便解維湓江口去若絃上箭水光漾朝曦過浪掣驚電周旋謝神貺冠坐敢不變斯須走四驛俛仰驀二縣誰知久㽞滯一旦乃適願吾聞信由中溪毛可羞薦咄哉和氏璞底事待三獻亨否自有時時亨百無譴雷聲在淵黙若訥故大辨千巖與萬壑左右供几硯落㠶風亦止璧月熨江練花洞浮渡竟何處欲游未能游夢寐金谷巖神往形獨㽞異哉城市中芳菲自春秋長紅雜團緑結成巖穴幽怡顔堂人生無百年半被憂患苦其間開口笑一月僅四五誰能盻庭柯怡然見眉宇積財不得用真是守錢虜蒸紅亭桃源果何處溪流出殘紅忽然見桃花灼灼揺春風蒸成日邉霞髙吟思無窮史佐才讀書堂我聞輪人扁妙解書中義當其聴讀書黙識聖人意忽然釋椎鑿有問發兹秘雖云聖人語糟粕豈精粹齊侯詰其說無說當致死請以斵輪觀固入要非易不徐仍不疾心手在相契是中有數存非言所能既扁也亦何人所得乃至此固知斯道在天下本無二觀君榜斯堂令我端拜議想見堂中書填箱溢巾笥縱橫三萬巻一覧悉能記左右逢其原下筆不能綴我昔攝東城君時尚童穉如聞侍先公往矣江之涘﨑嶇三十載於此忽相值出示諸公詩圭璧爛庭瑞君家依水竹亭臺繚幽䆳作堂於其間讀書乃其事嗜好與人殊可以見君志明年冠羣英先正秘書字題王亦顔清心閣湖光浩無際逺與列岫并風澄烟霧開炯若鏡靣平髙人對萬變寸田常黙耕擾擾亦何為豈容方寸攖有時鑒湖光愛其静而明那知水是物心清物還清徘徊不忍去傑閣指顧成閣成何所喜畫棟連朱甍大江西南來羣山東北橫江山不待招宛轉趨簷楹諏度多暇日登臨有餘情論文一樽酒對客手自傾酒闌復徜徉觀書㺯潁泓使人之意消鄙吝何由萌嗟予頑鈍姿栖栖亦勞生從今事疏瀹永守清心盟追和韋蘇州詩呈周守敦義并序癸亥五月兀坐逆旅中讀韋蘇州郡齋雨中與諸文士燕集詩玩味兵衛森畫㦸宴寢凝清香之句不能自已輙用韻書呈敦義知府舎人年兄以丐䋲削江城五月雨千里荷花香清風吹葛衣鈴齋有餘凉日晏吏卒散槐隂掃髙堂歸來欲偃仰歎息不敢康設醴致佳客論交到相忘髙文如大烹未慣染指嘗何當侍函文獲賦蔓草章君方扶揺摶我獨蓬蒿翔生平一壑美未見北海洋願言承至教雖老當自强寄題魯如晦需堂魯僖有賢裔家在吳江東宏詞與奥學浩渺江無窮魁然棟梁姿久困荆棘中抱能未施邦殆與張籍同人皆盲於心我目昏不矇而君乃勇退奉祠環堵宫築圃號通隠花竹羅青紅郡山湧其前湖光湛冲瀜日哦松菊間志氣驕王公客來醉需堂飲食霑奴童嗟予老且倦齒豁仍頭童田蕪未能歸慚愧通隠翁題李夢發知足齋荀卿重無禍老氏貴不辱不辱非暫榮無禍乃長福咄哉名利場甚矣身世梏得侯方丏公懐金未忘玉經營蛾赴火犇走蝇嗜肉方當從後摶寧復念前覆李斯悲黄犬揚雄誚丹轂二者倘胥失萬此亦何足是理甚易知允蹈君所獨使人之意銷豈止我心服不貪子罕寶屬厭女寛腹庶幾聞髙風將遂變流俗夏日雨霽郊行次韻劉春卿皇天久不雨既雨晴亦好食已得從容偕行石城道桑麻光似潑山林淨如澡蒼苔長緑髮嫩竹揺翠葆離離實攅椅䔩䔩花褪棗風梢水中蒲烟葉湖外草新秧良可喜勃然見興槁老農競耘耔出作恨不早誰家列午餉蔬筍雜鮮薧田頭立婦子栁下坐翁媪寧能擇豐甘放筯等一掃旁觀猶快意想見慰傾倒嗟予少力穯自取宦遊惱何當賦歸來鬚髪巳華皓次韻陳勉仲登羣山觀十年放江湖親朋益疎散不知跬步間游覽有竒觀因君寄新詩心目益悽斷東城俯荻洲下有魚鳥亂想見江南山終日對書案小立笻杖倚兀坐葛巾岸髙情渺雲外竑議涉唐漢嗟予衰且老兒軰逼婚冠豈復敢言詩觀詩重增歎舂容來大軸玩味起頑懦窮愁欲誰知富貴當自斷探虎愧吕䝉思鱸抗張翰别來能幾時鬢髪暗凋換養成杜甫懶甘作元結漫何當遂拂衣疲馬解韁絆卜隣大期東擕酒日相看題龍舒天祚宫玉虹亭山祇不愛寶傾寫白玉霙秋陽正炎赫噴薄爭清明我疑石韜玉白虹貫巖泓源源自何來萬古風雷聲聞蟬和彦時兄浮光我家尉近處惟髙安嘗欲為親擇敢作非意干憶昔從東來飛雪凌羈單青春不可挽明月裁齊紈三釡竟何地一囊今屢殚我有醉翁吟試從徽外彈古人骨已朽知音果哉難攣拳抱枝蟬未露先號寒緬想江南山瓊梳碧成攅僧牕開南薫俯仰天地寛詩成有佳句往往勝得官贈筆工栁之庠我昔丞歴陽好筆得栁生維時習治久羣盜方縱橫生售數毛頴一一簡擇精作字可人意為我供筆耕不知二十年天下乃復平爾貧技不售我困功無成布衫負篛笠羸然過柴荆我老廢讀書無意游管城千錢與斗米聊爾餉此行歸家飽妻子一笑嘲彭亨送彦立兄遊太學以恩袍草色動為韻鼠腊要非玉箎聲偶先塤窮通一生事早晚焉足論行行欲何之闊步登金門有意韓淮隂報讎如報恩西風曉飛霜獵獵吹征袍丁寧顧婢語肯效兒女曹舉鞭問長安詩海今誰豪我欲從之遊痛飲歌離騷文章我家勃人喚腹為藁隨行載中書所至得揮掃新詩如秋月皎皎清更好恵連有佳夢池塘遍春草梅花破朝寒似欲壯行色駸駸小驪駒回首便數驛一鶚在雲路鷙鳥空累百從令馬賓王不是新豐客君子贈以言古人重相送大梁在何許我心欲飛動兄才如青錢萬選仍萬中行矣喜冬晴北方地多凍題璋老清閟軒予暇日過吉祥愛其竹徘徊不忍去長老璋公方葺小室丐名於予因誦退之筍添南堦竹日日成清閟之語取清閟二字以名之後五年嵗在壬申三月既望璋訪予索詩不辭為賦此詩典午接曹氏其風扇浮虚當時波浪從髙談乃其餘竹誠松栢流一日不可無子猷為此語千古誰能渝堂堂韓退之議論荀揚徒詠竹美清閟長篇載諸書吉祥在無為隠若西南隅我来過梅雨新竹環精廬風梢弄蒼筤日影穿扶疎髙標挺直節勁特凌萬夫道人謂予言吾方葺吾居公其為吾名要令與實符清閟退之詠是軒良不孤何當對此君搜吟更躊躇和魯如晦喜雨我本山中人當暑玩泉石髙吟清風朝長嘯明月夕前年徙江城舴艋劣容席是時暑雨過黃流没青荻城中無置錐僦舎至三易邇来成小築風月得相覓執熱想飛瀑白練掛蒼壁頓從釡甑中令我獲蘓息尤憐昨夜雨洒濯有餘力假山幽人愛九華胷臆富岩竇疊石談笑頃忩間列逺岫一拳儻興雲其功等髙秀君看負山者盍亦備兹冦栁徑我笑陶彭澤門栽五株栁栁成復自號清隂亦何有豈如兩分行一徑入花藪白氊春盡時青障雨晴後古松老松如蛟龍氣奪百萬軍根蟠蒼崖石梢拂青天雲山神䕶野火地主訶樵斤魁然棟梁材為之獻吾君白蓮池白蓮如玉人髙潔謝脂澤圓荷作翠盖掩映秋水碧小亭日相對無言倚輕䇿種橘或言千樹橘貴可比封君先生種橘意此計何足云珍絶色香味解酲有餘勲次韻王山甫春日出郊探梅倚竹有佳人天寒玉肌温永懐經年别及此春日暄幽閒誰與娱依依映丘樊計臺二三友才高工撥繁幕府公事退聫鑣出郊原城南富卉木勝處陳家園東風發萌芽栁眼暗若昏昨宵一陣雨清爽到乾坤植杖芳草徑繫馬枯桑根觀梅不忍去錯爼羅金樽主人笑揖客徘徊倚朱門指麾羣兒輩薪水相撫存隣婦抹紅粧来覘攀籬援酒酣詩思逸筆力華旗搴薑鹽芼蕪菁絶勝瓠葉幡蕭然出塵姿飄飄欲騰掀桃李分當避蜂蝶那敢喧誰能移將歸栽培擁髙垣要令百種花俯伏争趨犇不煩頻出游正恐嘲短轅太簇初應律飛霙尚翩翩何妨醉瑶舟大嚼供炮燔手撚一枝春吟笑窮曛暾可憐廊廟具沉滯三家村和羮似不晩作詩與招魂對雪和子厚弟四首凍雲不成雨巧作白玉霙寒光僣曉色報我東忩明起来撥殘灰煖酒手自傾多謝麴居士於人殊有情前村不多地坐覺阻且長梅花應已開鼻觀来清香天公愛衰朽古木敲鳴璫僵僕巧耐寒氷柱生承漿青腰夜種玉不見稠與稀將軍欲何往滹沱正流澌軟火燒黃精我爾寧苦飢行行復行行舌在請勿疑瑶林我家風銀色佛世界泠泠一川水淙玉潄寒瀬敲氷往得魚撥凍自挑菜山居果如此冷暖任交態和沈元吉與唐用崔乞菊黃花如幽人别來心念之邂逅適我願詎可無一辭緬懐東籬㳺舊與西風期乞我三百株爛醉風前杯休文有佳裔咳唾成新詩把玩乞菊章頗愧前篇非寄言崔藍田捨之復誰貽和魏桐城題三瀑泉贈湯洞卿犇霆響空山飛連掛絶壁毛髮忽森竪精神共英特平生丘壑姿至此意頗適何必逰九華龍眠自尤物雨雹碎晴峰珠璣㵼石壁勢增九軍勇氣壓百夫特先生我輩人一見願自適壯哉三瀑泉表表塵外物題雙峰磨院瀑布烈日氷雪皎淡烟玉虹明誰云真珠簾要之亦强名我來少躊躇一洗塵埃清便欲覓千斛為壓歸裝輕予紹興三十二年夏四月三日行部至山中時月上人方入山十有八日旋披荆棘立數椽以居其徒明年改元隆興夏六月二日再過山而堂室粗備且於雲母泉側創為茅亭使往来觀者得以駐足而酌甘誠可嘉也時巴陵尉臨川李克仁髙宻劉孝傑華容尉權三衢徐二譽在焉子􅀢侍行去年入山時孟夏暑猶薄来觀雲母泉隂崖坐盤礴老禪披荆榛經營始興作山空斤斧響丁丁振林壑俛仰恰周星炎赫若凌薄昨朝發岳陽東風怒還惡驚濤送輕舟十里沙頭落投凉不待曉肩輿上磽确僧徒笑相迎此意安可却髙亭䕃白茅羣峰峙青廓偕行二三子臨泉一杯酌呼僮㵸石鼎煮湯旋和藥誰令俗士駕急去能不怍因成數句語聊發後来噱
