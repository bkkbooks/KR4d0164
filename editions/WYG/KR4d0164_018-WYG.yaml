body:
  text: 相山集巻十八宋王之道撰詩餘江城子和彦時兄新篁初上籜龍披緑隂稀緑隂稀墻外石榴花放兩三枝裙摺絳紗還半皺追徃事惜佳期流鶯嬌姹燕雙飛雨晴時雨晴時盧橘攅金梅子更紅肥濁酒一杯從徑醉家縱逺夢中歸江城子追和東坡雪詞寒光凌亂六花纎巧穿簾不鳴簷十里黄壚遙望辨青帘玉樹參差何處覔吟雪曲撚霜髯坐來令我看無厭擬名鹽試嘗甜飛入深潭應照老蛟潜三白預占來嵗稔良可喜更何嫌千秋嵗追和秦少游山前湖外初日浮雲退荷氣馥槐隂碎葵花紅障錦萱草青垂帶誰得似黄鸝求友新成對憶昔東門㑹千古同傾蓋人已逺歌如在銀鉤雖可漫琬琰終難改愁浩蕩臨風令我思淮海千秋嵗張文伯生日曉霜初肅秋色團芳菊榴轉紫橘猶緑昨朝吹㡌㑹未快登臨目湏信道兵厨凖擬三千斛采采香盈掬汎汎紛浮玉紅袖捧清歌逐何妨傾坐客共獻長生祝歸去好北門夜引金蓮燭千秋嵗鄭帥清卿生日熈熈臺上秋色増清壯和氣溢祥煙颺淮山供雜爼湖水浮新釀人共仰貔貅坐擁詩書將簫鼔聲嘹亮珠卒環相向廻妙舞遲妍唱競斟長命斚同試滄溟量鋒車徃東歸遂繼華原相千秋嵗伯母劉氏生日薫風散霧簾幕清無暑萱草徑荷花塢幽香浮几席秀色侵庭廡㣲雨過緑楊枝上珠成縷雙燕飛還語似慶良辰遇釃美酒烹肥羜何妨歡且醉共作斑衣舞人競報蟠桃已實君知否千秋嵗彦時教授兄生日金風玉宇庭院新經雨香有露清無暑溪光揺几席嵐翠横樽爼烘笑語佳時聊復鄉人聚門外荷花浦秋到花無數紅鱠鯉青浮醑何妨文字飲更得江山助從此去蒲輪入佐中興主水調歌頭追和東坡湖上有佳色黄菊傲霜秋一尊相屬談詠彼此得無愁何處鱸魚初薦錯爼金虀㸃膾令我憶東州雙鷺帶斜日飛下白蘋洲晩風勁吹殘酒襲破裘故人俱在江左底事獨淹留歸去草堂侵夜一㸃青熒火得句可忘憂欲識無窮意終日倚城樓水調歌頭用王冲之韻贈僧定淵敗屋擁破衲驚颷漫颼飀不離當處人見擁篲上籃游彈指九州四海浪説其來雲聚其去等風休莫作袈裟看吾道貫聃丘齊生死同寵辱冺春秋髙名厚利𦕈若天地一蜉蝣閒舉前人公案試問把鋤空手何似步騎牛㑹得箇中語凈土在閻浮水調歌頭對月詞斜陽明薄暮急雨霽凉秋弱雲狼藉晩來風起席捲更無留天外老蟾髙掛皎皎寒光照水金璧共沉浮賔主一時傑傾動庾公樓度銀漢漙玉露勢欲流不妨吟賞坐擁紅袖舞還謳暗祝今宵素魄助我清才逸氣穩歩上瀛洲欲識瀛洲路雄據六鼇頭水調歌頭秦夀之生日暑雨濕脩竹凉吹入髙簷鷺洲鍾阜如畫霽色為儂纎檻外藕花無數裝㸃休祥嘉應不覺有秋炎謫仙墮人世香霧鬰重簾富才藝強記覧三萬籖湏信公侯有種道義自相漸此去腰金佩玉回視依蓮泛水嵗月亦何淹稱觴還戲綵無惜醉厭厭水調歌頭趙帥聖用生日顥氣遍寰宇風露逼衣裘中秋昨夜明月千里滿西樓人道當年今日海上騎鯨仙客乘興下瀛洲雅志在扶世來佐紫宸逰廟堂上湏早計要嘉謀牙床錦帳三嵗江北歎淹留好在蟹螯如臂判取兵厨百斛與客醉瑶舟待得蟠桃熟相約訪浮丘水調歌頭張文伯生日瓊樹掛初日珠箔捲清霜夜來溪上㣲雨佳節過重陽共慶當年此際曽見天麟協夢華閥掛蓬桑人作魯侯祝俾爾夀而臧保疲瘵旌德善致吉祥㑹看報政朝夕芝檢趣㣲黄不藉靈丹九轉不用蟠桃三竊源逺自流長願借滄溟富斟酌薦瑶觴滿江紅和張守仲及送孔純老守歴陽竹馬來迎留不住寸心如結歴湖湏塢相望近同吳越闕里風流今未减此行報政看期月已騐康沂富國千古曽無别多謝潤霑枯轍令我神思清發聞新命歡浹兩邦情愜明日西風帆捲席髙檣到處旌麾列忽相思我當徃誰謂三墪隔滿庭芳代人上髙太尉時在太學蔡水西來于門南峙天波擁入華楹芝蘭爭秀難弟遇難兄欲説隨龍雨露慶千載河海初清良辰好榴花照眼緑栁隱啼鶯君恩隆厚賜氷桃火棗來自蓬瀛正值霧横玉篆泉瀉金鯨四坐香和酒泛對妙舞絃索鏗鍧椿難老年年今日論報祝長生滿庭芳雙蓮堂翠蓋千重青錢萬疊雨餘緑漲銀塘藕花無數髙下鬭芬芳渾似華清賜浴温泉滑洗出真香何妨更合歡連理髙壓萬芝祥風流賢太守當年奏瑞盛事名堂好是琉璃地上一片宫粧况有薫風解愠流霞泛絲竹成行依蓮暇聨珠唱玉應不愧金相滿庭芳和元發弟秋日對酒露溢金莖風翔玉宇嫩凉初霽秋容山殽野蔌聊快一尊同正值大田多稼臨卭隘酒客憧憧追隨處杯盤狼藉野草䕃長松新詞何所似金聲應鐸玉氣騰虹時來終宦逹休怨蒼穹顧我蹉跎老矣颯素髮衰態龍鍾心猶壯㑹看文度獨歩大江東滿庭芳送秦夀之雪霽風温霜銷日暖一時笑語烘春草堂何幸四座德星鄰聊借紅粧侑爵蘭膏膩髙髻盤雲清歌妙貫珠餘韻猶振畫梁塵熈朝卿相種扁舟東去入侍嚴宸憶當年擢桂連見三秦休説參軍俊逸應難過開府清新從今去八州都督端不困無津滿庭芳伯父仲球生日紫角初繁青裳正好充閭清露飄香懸弧何早烏轡上扶桑試問椿齡幾許踰萬計纔滿三章佳辰樂林塘増氣菡蓞擁紅粧稱觴人共慶盤中白李來自華陽説壺中日月特地舒長定見霜毫换緑天薦祉家慶延昌情千萬辭慳思窘聊獻滿庭芳滿庭芳和富憲公權餞别歌徹驪駒酒斟醽醁㠶檣髙映城樓繡衣携具開宴話離愁兩岸橙黄橘緑一行雁幾㸃沙鷗情千萬相看無語送我上孤舟悠悠冬向晩梅花潜暖隨處香浮奈長亭飲散無計淹留歸路淮山百舍空夢想連嵗清游煩雙鯉頻將尺素來徃寄江流漢宫春雪詞歡動江城快風聲震地雲勢頺山半年不雨玉霙來溉冬乾飄飄弱絮雜簷花飛上賔筵䟱林表數行征雁翺翔欲下清灣何處梅梢㸃白弄横斜踈影竹外溪邊天寒日暮含香脉脉無言朱唇玉頰映碧梧峙鵠停鸞最好是携壺挈榼相期同醉霜天慶清朝追和鄭毅夫及第後作曉日􅊮墀春風黄繖天顔咫尺清光恩袍初賜一時玉質金相濟濟滿庭鴛鷺月卿映日尹星郎鳴鞘逺錦韀歸路醉舞醒狂追隨寳津瓊苑看穿花㡌側拂柳鞭長臨流夾徑參差緑䕃紅芳燕罷西城向晚歌呼笑語溢平康休相惱爭揭踈簾半出新粧醉蓬萊追和東坡重九呈彦時兄對黄蘆卧雨蒼雁横秋江天重九千載淵明信風流稱首吟繞東籬白衣何處誰復當年守藍水清遊龍山勝集怳然依舊茰實嫩紅菊團餘馥付與佳人比妍爭嗅一曲婆娑看舞腰縈柳舉世紛紛名利逐罕遇笑來開口慰我寂寥酬君酩酊不容無酒宴春臺追和張子野韻贈陳徳甫侍妾翠竹扶踈丹葵隱映緑窻朱户縈廻簾捲蝦鬚清風時自南來題輿好客筵開儼新粧深出雲街歌珠纍貫一時傾坐全勝腰雷金猊裊碧玉兕浮紅令傳三杏情寄雙梅樓頭漏促籠紗暗落花煤錦里遺音憶當年曽賦春臺醉蓬萊歸歟無寐想餘韻徘徊宴山亭和張文伯海棠㣲雨斑斑暈濕海棠漸覺胭脂紅褪遲日短垣嬌怯和風揺曵一成春困玉軟酴酥扶不起晚粧慵整愁恨對佳時媚景可堪重省曽約小桃新燕有蜂媒蝶使為傳芳信西蜀杜郎東坡蘇老道也道應難盡一朶風流雅稱上鳳翹雲鬢相映眉拂黛梅腮弄粉勝勝慢和劉春卿有懷金溪凌雲氣節貫日精忠艱難未許心灰芳酒一尊對君聊為君開要識治安非晚樂得新賢賦臺萊愁似雪喜青天萬里曉霽春回湏信赤繩繫足朱衣㸃頭終在休歎淹徊梅實槐花看看便是相催座上觥籌交錯玉山峙莫遣停盃濡湏好儻他時富貴猶冀重來勝勝慢和張文伯木犀菊團封緑蓮萼凋紅蕭然獨見芳姿短墻髙榭踈筠怪石偏宜香遍秋風到處㣲雨過清露零時花隂下稱牋毫唱和杖屨追隨曷似江頭竹外凌霜犯雪嵗晩爭竒夕賞朝吟勸秋莫放離披細看石楠玉茗葉縱似風韻輸伊最好處擁新粧臨鑑碧溪勝勝慢送彦逢弟赴官西興時冬至日用劉春卿韵魯雲書瑞周日迎長曉占緹室飛灰玉勒朝天千門禁鑰齊開簾捲扇分雉尾香風逺人到蓬萊霞觴滿萬年獻祝宫殿昭回况有金甌名姓任名逺蕭散無自徘徊門外鋒車又連鳳詔相催酒到莫辭頻舉聴清歌一闋傾盃功成日五湖煙月堪賦歸來石州慢和董令升嵗除磔攘送寒燔烈興嵗又頌堯歴青藹燒㾗緑浮風皺暖回春色天地交泰時當傾否五鬼休相厄何妨笑倚東風一飲杯三百長憶苻堅入冦功髙晉室無如安石義槩雄心輙莫等閒抛擲蓋壤聲名鼎彛勲業朋谿雖好未放終閒逸喈喈黄鳥更看壺中春日石州慢和趙見獨書事見獨善鼔琴天逈樓髙日長院靜琴聲幽咽昵昵恩情切切言語似傷離别子期何處漫髙山流水又逐新歌徹彷彿江上移舟聽琵琶凄切休説春寒料峭夜來花桞弄風揺雪大錯因誰算不翅六州鐡波下雙魚雲中乘雁嗣音無計空歎初謀拙但願相逢同心再綰重結念奴嬌和張文伯重陽前雨黄花照眼對西風庭檻為渠凝佇凖擬登髙酬一醉底事晩來㣲雨蟋蟀聲中芭蕉葉上怎得爭如許龍山何處無言暗想煙樹湏知天意隨人重陽晴未晩不煩頻訴幸有兵厨三萬斛足助賞心歡趣千里江山兩行珠翠端為騷人付層樓飛觀應容老子追歩念奴嬌和魯如晦中秋碧天無際乍雨清煙靄風開雲月人在南樓劇談勝詠擁碧油旌節銀闕騰輝氷輪駕彩顥氣資髙潔大星不見更容螢火明滅湏煩翠杓瓊杯華牋象管與我酬清絶誰使琶聲到耳輕賦荻花楓葉露脚斜飛河隂低轉香篆環三傑莫辭終夕舞腰重看廻雪憶東坡追和黄魯直雪霽栁舒容日薄梅揺影新嵗换符來天工初見頒桃梗試問我酬君唱何如慱塞歡娛百萬呼盧勝投珠報玉湏放騷人遣春興詩成談笑寫出無窮景不妨時作顛草馳騁張芝聖誰念杜陵野老心同流水必東與世初無競公侯寧有種哉傾否由天命虛堂響應聲皎月形和影春到也湏還長紅多紫歸條梗况有光風麗日能銷積雪繁霜青女休言勝扶揺借便請看天池發鵬興人言強漢治道誇文景誰能堯舜其君逺繼阿衡聖富貴吾所自有宰相時來則為自不煩趨競欲尋文㑹詩盟得酒且相命木蘭花慢對春光淡沲晴煙苒苒日遲遲漸紅入桃蹊青廻栁陌鶯刷金衣差池競求友去惱佳人幽恨上蛾眉應念年時追逐粧餘為帶交枝芳菲誰共賞嬉遊何處馬如飛不道新來牽腸惹肚暗减腰支湏知乍寒乍暖褪朱唇又過海棠時已約姚黄魏紫留花等待伊歸鳳簫吟和彦時兄重九雨溟濛年年今日農夫共卜新豐登髙隨處好銀瓶突兀南峙對三公真珠漙露菊更芙蓉照水勻紅但華髪衰顔不堪頻鑑青鏡相逢行藏休借問且徘徊目送飛鴻十年湖海千里雲山幾畨殘照凄風蟹螯麤似臂金英碎琥珀香濃請細讀離騷為君一飲千鍾銀瓶三公皆山名歸朝歡對雪追和東坡詞透隙敲窻風槭槭坐見廣庭霜縞白長安道上正騎驢蔡州城裏誰堅壁表表風塵物瑶林瓊樹生豪客對揮毫連珠唱玉競把詩牋擲草草杯盤還促席痛飲狂歌話胷臆前村昨夜放梅花東鄰休更誇容色清歡那易得明朝烏轡陞南極帶隨車黄壚咫尺莫作山河隔望海潮重九和彦時兄寳山烟霽金湖波渺珠簾髙捲清霜楓葉露痕荻花風色人言今日重陽芳菊裊秋香更榴房鬭紫柑實傳黄觀閣凌空杯盤照座獨醒狂良辰樂事難忘正少年遊冶人在任莊銅鉢探題金釵當酒一時綠鬢紅粧故國黯凄凉漫情隨流水逺興與雲長要是致君堯舜千古繼垂裳風流子和桐城魏宰扁舟南浦岸分携處鳴珮憶珊珊見十里長堤數聲啼鴂至今清淚衿袖斕斑誰信道沈腰成瘦减潘鬢就衰殘漫把酒臨風看花對月不言拄笏無緒憑欄相逢還相感但凝情秋水送恨春山應念馬催行色泥濺征衫况芳菲將過紅英婉娩追隨正樂黄鳥間關爭得此心無着渾似雲閒沁園春和彦時兄城郭蕭條風雨霏㣲醖造客愁况鷙羣鵰鶚末諧薦禰棘叢鸞鳯猶歎栖仇世路如碁人情似紙厚薄髙低何日休逢殷浩㑹披雲對月同賦南樓堪嗟日月如流甚首夏朅來今半秋縱荻花楓葉強撩歸思有蓴羮菰飯歸更何憂三板松舟一篙溪水百里淮山無滯留何湏問蘧蘧栩栩孰是莊周賀新郎送鄭宗丞又是春殘去倚東風寒雲淡日墮紅飄絮燕社鴻秋人不問儘管吳笙越鼔但短髪星星無數萬事惟消彭澤醉也何妨袖巻長沙舞身與世只如許䦨干拍手閒情緒便明朝蒼煙白鷺北山南浦笑指午橋橋畔路簾幕深深院宇尚趁得栁烟花霧我亦故山猿鶴怨問何時歸棹雙溪渚歌一曲恨千縷
