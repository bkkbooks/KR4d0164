body:
  text: 相山集卷一宋王之道撰五言古詩和呂叔恭題和州香林湯是時趨郡苦滛雨獨坐精舍中賈邵周出示和倅呂叔恭詩頓忘逆旅之態輙繼其韻新詩等絺繡文采照座右尤憐繼絶唱峥嶸競髙秀詞源眉山長句法杜陵舊相從今老矣豈獨歌邂逅香林在何許湓沸發巖竇其流漸清温脉助草木茂嵗旱添苗槁一溉十倍收追㳺記疇昔我僕苦痛疚别來隔兵火荆榛挂猿􅎜温温自然湯蠲痾古非謬我聞泉所發江海遠相透其温本硫黄氣味自同臭大哉無礙浴天地不輕授嚴霜與烈日冬夏特異候人生困凌薄往往少中夀飄飄澡雪力狴犴忽䝉宥春寒不喜出塊坐撥殘槱晦隂又連朔夜雨屢通晝誰能慰窮愁邵州有賢守開箧出大軸令我和其後此意重虚辱勉彊忘固陋呂侯卿相家博學靡不究㑹當似前人嘉猷日告后君㸔華清宮誨滛似招冦當年從千官車馬所犇輳漁陽一炬火曾不半錢售争如寄僧房泠泠灔苔甃常遂塵土濯永免脂粉潄和富公權送行詩韻公權提刑年兄與之道有四十年雁塔題名之舊備員湖北始得見君子聨王事相從二年所以眷予之意何翅骨肉今之道罷官以歸於分擕燕餞之餘特出長篇寵光行色令人戀戀不能自巳輙勉彊次韻叨塵四十年静計所得禄十分才二三清餓似飢鵠中昨守義陽一時苦窮促忽聞栢䑓長表薦徹聰目不惟免罪戾英㳺許追逐接武憲漕間寒庖見粱肉從兄逮兩載種種荷推轂容我數百􅀢大矣空洞腹為憐昔同升相㸔日不足芳時木芙蓉唱酬動成軸燒香每開奩惠茗屢傾簏青青閲冬夏髙視松栢獨顧我如碔砆詎敢比良玉而兄不我鄙歩驟俾繼躅是行集霰候霜威日增肅解維在朝夕離緒可堪觸戀戀重摻袪移庖過吾屋紫嚢出巨編還我海陵録全家被燕衎日盡繼以燭何人鱠紅鮮想見鯿項縮腹腴愧偏勸佐此一杯緑實筐出越羅幣帛更加束酒闌兒女曹起舞應歌曲殷勤藥石誨美疢肯滋毒新詩追古作髙義激頽俗臨岐沐寵貺固陋敢虚辱但慚水底蛙勉趂絲與竹正爾無足道聊用資報復謙謙古君子厚徳卑自牧請歌伐木篇敬謝釃藇速有薦胡仁叔為歴陽令者仁叔以詩送知已暇日楊徳潤録以示予因次其韻四海皆兄弟三界是道塲果且無彼我安用分封疆胡公厯陽來氣熖何可當威嚴走邸吏不露太守章錦衣榮㑹稽暮雨成髙唐觀望改儕􅀢鷄羣鶴昻昻斯民苦兵火有意哀勞傷豈無九轉丹為助千金方古來記循吏不稱茍道將殺弟自取酷防人人所防子潛去少室淵明戀柴桑出處雖異事一夢歸黄粱昔日骨已朽傷哉今也亡􅆁國歌栢舟曹風賦鵜梁秋來河伯喜未覩若與洋大小自有見一笑還兩忘我生分每越泉石成膏肓棄遺等麟角空虚漫龜腸常欲埋車輪除姦繼張綱召此人氣和致彼天時康語之有暇矣未窺夫子墻理所不可及馬腹徒鞭長詎知王者師異日韓張良願言三顧廬卧龍起南陽和張詠老三公與刺史秩等二千石人生不知足犇馳竟朝夕誰能話名理尊酒時促席賢愚大相逺叢玕映叢荻多謝張南巢詩筒肯予覓琅琅若明珠其來自靈壁僧房聊解鞍當暑得偃息挽回清微風筆有萬鈞力彦嘉通守當今之俊偉人也余心向慕之常以未獲識君為恨玆因孔純老遂有邂逅之適其何幸如此將歸純老置酒餞别僕實預坐酒數行純老丐詩於彥嘉以記坐上笑談之樂頃刻掃數百言揮毫落紙雲烟飛動永叔所謂盈前盡珠璣一一難簡汰者殆謂是邪索鄙句不敢以固陋辭輙和北莊二詩奉呈春寒不肯去榖雨猶裌衣溪流灔池塘逺㸔緑生漪識君恨不早語離我心悲行行欲何往丞郡金房西顚風送飛雨日日吼東北簷聲決江河傾瀉不成滴朝來喜新霽晨光透雲隙垂楊翠幄開逺岫青葢立孔君公事暇侯子歸期逼開樽且精設論文萃清集顧我老無能分甘口挂壁行矣不可挽思君浩無極送無為倅張南仲歸吉州吾友李粹老少也㳺膠庠六年得一第自謂貴且昌衽席不知戒飛黄中道僵三閲大淵獻嵗月亦已長嗟嗟死非所至今未能忘忠言類良藥苦口不見嘗那知兵火餘獲見同舍郎來丞濡湏郡兩嵗依餘光邂逅偶及此為之淚淋浪髙義藉激薄美政稱扶傷康沂富邦國何獨歌王祥江城四月盡麥熟梅子黄歸歟佐吾君談笑躋羲皇遥應不可留船頭鼔其鏜次韻因上人晚菊簡魏定父荆棘困松栢風雨亂昏曉干戈幾時息年來費天討孤芳如謝安端恐非小草此意誰人知伊余相自保不學桃與李芬芳競春時天公豈多情清露為君遲榮悴休問命冷暖當自知青熒夜窗燈相對哦新詩離索自可笑衰遲誰見憐亭亭揺落中一枝小窗前正色有家法細㸔清且妍浮觴未云晚松醪吾所便經年混蒿艾藴藏應待時清香宻漬沉微風助紛披宋玉昧秋意乃作兒女悲君子有所養因君觀解頥道人如青松孤髙不成叢愛此黄金花蕭然有淳風新詩皎秋月警我野性慵佳意不在酒此身今醉翁介夀誠有取無問人所宜君㸔菊花潭事見桃源詩東坡百世士敢比流俗知相逢勿相失不醉欲何時黄花如故人别乆喜復面澆泥一杯酒安用較深淺清霜開浮雲黄落信風捲巖巖幽素姿秋來不多見鑑止亭揚波欲澄濁孰若波暫停止波濁自澄萬象無逃形世人競馳騖方寸不得寧投閒幸一來先生常獨醒燈下讀魏彦成諸公詩因次其韻呈曾子修諸君距春尚旬月春信已回栁時來芝與菌往往出糞朽流俗不自重困窮變操守貴賤等人耳未易遽薄厚桃李何敢輕所報必瑶玖一笑置勿論㫖有君子酒見山堂淮西提幹章序臣即其官舎逺亭之西為屋數楹命名曰見山堂盖繁昌諸山一舉頭則隠然見於簷外也浮雲開西風落木下夕陽誰人步東籬采菊哦秋光悠然若有思此意何可量南山適當前翠色摩穹蒼我心不期見我眼偶相望咄哉逐獸夫泰山空在旁西靈鷲我聞西靈鷲幽竒冠龍舒山神知我來夜雨自滌除籃舁犯霏㣲敢惮石徑紆清風偃林柯征衣盡霑濡樵人向我言君行欲何如松杉已在望尚有七里餘﨑嶇雨過水蹊雲上天衢飛樓及湧殿崢嶸映浮屠幽鳥若相喜好音弄笙竽為言一宿覺何妨更踟蹰憩靈鷲道院黎明發龍門亭午憩西院冒雨且不辭寧能避泥濺是行良不惡此處殊可戀從今山中人何獨識吾靣追和老杜種萵苣詩并序春晚雨過行蔬畦見園夫栽萵苣謂予曰苣有二種其色青而味苦者曰牛耳其色白而味甘者曰銀條今方得銀條一束於隣翁將栽以作種予顧園畦纔十數菘已過韭且老矣惟牛耳青青可愛而園夫以苦鄙之傷時惡直醜正不見容於君子因和老杜種萵苣云我有數畝園荒穢索鋤理干戈何許久生意困屠燬道也其興與時哉亦甚矣去年失短吕培植乏驅使今年得老楊衰病更臨起晚菘巳蕪没早韭就茅靡菁菁何所有萵苣獨牛耳縱苦可自珍供盤况瀟洒銀條直且甘風味胡伯始其視李太尉小人與君子明明如古鑑不慮纎塵止廓廓若太清强欲浮雲滓老氏有遺訓重去彼取此方今向太平臯䕫正端委臺省登碩徳要荒竄誣毁擊冦豈無人蕃將來黒齒破齊在不日逆以誅正己停觀勞還役杕杜顒采芑萬邦遇有道貧賤古人耻文王來呂夷漢祖致園綺異時免溝坑願附織貝篚種田庵古人即耒耜自有中田廬㸔君種田庵名異實則如滌場歸去來宮功不容紓亷餘堂髙堂面山水境與動靜兼惟動故能樂惟靜故能亷樂也知有餘亷也笑無饜次韻魏定文半年去城府寤寐溪東扉有時得君書想像抉石猊豈知紀渻子養氣如養鷄應響與疾視一洗三旬非我生坐窮困哆侈傷南箕鼷鼠亦何物焉用千鈞機封侯絣澼絖藥等手不龜所用有異耳此言寓非巵梅蕾良可人如椒綴南枝芬芳想不晩太皥方執䂓次韻沈次韓見贈我狂衆所易頼有君見容十年卧巖壑百念付一空新詩似流泉涓涓江漢供人言鷄羣鶴我目霜中松相距無兩舍㑹見何溟濛誰能寫離索正藉詩思工次韻許志仁我技類族庖用刀常月更君才妙天下逰刄得我驚前年獲相值因憶吳中行一别忽兩載依然舊交情新詩璧夜光厥價輕連城相思不可見把玩我願盈筆札擅南州文章動西京行矣秋風髙更聽賔鴻聲盆池剜苔得古鑑湛湛清不渾大哉壺中天勿與俗子言誰能時汲井注兹老瓦盆欲觀從容鯈無羡横海鯤秋晩采菊和徐伯逺少皥司肅殺於渠獨留情一枝黄金花照眼增雙明香清露溥溥秀色雲英英㑹當飲潭水使我病骨輕題徳章山郭養源墨竹胷次富盤錯筆端妙蒼翠霜枝豈人為煙葉有生意與可骨已朽此法誰復嗣偉哉尋丈姿綽有萬尺勢追和東坡雨中睡熟至晩春睡酣帶酒晩食美當肉細觀東坡詩萬事貴精熟一隂七十日雨意猶未足山雲開復合簷溜斷還續東隣嬌癡兒索飯恣啼哭驚廻夢中蝶重把君詩讀㑹河道中㑹河村店西沙水清練練我行獨帶月滉漾掣金線凝寒逼征衣霜華重如霰至此懐僧彌老淚幾欲泫㑹河光州境也建炎初家弟甞尉浮光故有是句和龔聖任即事新詩似霜月諦玩清且好欲見勢未能思君令人老啟蟄在朝夕雷雨發枯槁願言從杖屨髙吟備搜討月臺低迷委徑栁氛氲被池蓮亭前秋雨餘明月來婵娟髙臺甃蒼玉清風夜周旋舉杯屬姮娥醉舞還蹁蹮小橋芳榭遶流水春餘半篙緑登臨賞幽花兹亦我所欲小橋果何往長堤正相屬朝㸔龜魚逰晩聽鷗鷺浴次韻朱元順食萱草羮衰年因羈旅百念日縈繞蓍龜亦何知憂來又將老出處稍不慎逺志成小草堂隂有孤芳紛葩照人好誰將忘憂姿擷芼等蘋藻充腸固甚慰入鼎可堪擾糠籺貧者事甚矣兄逐嫂異時饜粱肉記此一羮飽贈術士羅世忠春秋有羅國之子豈其後家傳錦嚢書相地走淮右為問何所宗此法古所授卜瀍與卜宅周孔語非謬用能㳺公卿所至術輙售有時過吾廬乗間得頻扣談詩涉坡谷說卦本爻繇是名隂陽家未可容易詬歸歟春雨霽飛花撲襟袖遥憐玉笥峯巋然挿天秀送無為宰趙渙氷仲百里寄一令於民為最親休戚咳唾間詎可非其人趙侯古循吏當世無等倫朅來宰濡須舊政俱更新雖無赫赫名吏戢民稱仁善良仰若父姦欺畏如神幸哉百里地兩載銷顰呻果膺君相知賛書下楓宸不終三年淹徑作帥幕賔秋風散炎酷夜雨清埃塵寜容卧轍留髙檣艤江濵君㸔眉間黄華近兹其因映雪亭蕭然數株梅皓與雪相映臨池鍳踈影影落大圓鏡不煩粉塗株寒光助嚴靚題宿雲軒朝來怯秋霜生撇甕裏清我老顏已衰一杯聊發赬村尨恠我醉忽吠三兩聲蜀月不可見宿雲有新行酬朱元順參議予與元順分擕十有六年當公出守安陸賛畫荆南予以踈愚自投閒放聲跡乆相絶向者汎江之役獲邂逅於湖隂語不終晷而篙師催解舟悵恨無窮今乃得相從於都城之東其何慰如之䝉示新詩輙用韻書呈因以自警云舟來自金沙敢避江路繞計程踰五月書勞比三考湖隂見君處取别殊草草因思㑹面難相從意彌好新詩何所似繪繡錯華藻賡酬愧空疎秪益我心攪亨否有時命恭倨任妻嫂行矣無忘飢俗諺戒一飽送張仲甫赴江西㕘議仲甫㕘議與予昧平生臨安一見傾葢如舊是行將赴江西余竊快之輙成古風奉送行色我生坐疎拙逢人輙傾倒語言無淺深出口被伊惱為孽匪天作受攻本誰造懲非每嚼舌事巳復自蹈可憐愚不靈蹭蹬到今老識君無幾時底裏見襟抱古人重傾葢相從恨不早是行若登仙江山為君好無繇挽畫鷁此意增戀嫪何當寄相思臨風慰衰槁曽欽道家山圖曽判官式古出按郵傳來歸自濠示予所賦曽倅欽道家山圖古風予雖未果識欽道而披其圖然獲於式古詩中窺見一斑恨不即命駕以償願見之素因漫成二十韻寄欽道尚冀異日逰桐廬訪子陵之遺跡而謁欽道於家山親見家山之勝而賦焉紹興庚午六月壬申永叔愛清潁明仲樂陽羡投老獲所歸為計亦良便何如强健時從官山水縣升虚得吉卜怳若地祗薦曽侯卿相種才業固邦彥而况盛徳後世祀乃天眷式古吾畏友被命按郵傳來歸自濠梁訪我出詩巻為言有華宗疇昔無半面相逢遂相喜笑語至舞忭其家負家山山水家可戀松篁逓森列岡巒互縈轉䑓池及花草髙下爛明絢粲然圖一幅規橅坐中見予嘗賦此詩好事敢獨擅縱横一千字把玩不知倦桐廬在何許東望眼欲眩子陵亦徃矣釣瀨清練練家山亘今昔昔隠今始現彼美曽侯賢何當覩巖電題李夢發揺碧堂羣仙俯平湖氷壺浸蒲璧奫淪五千頃岝峉一萬尺蒼松偃旌蓋翠竹森劔㦸纎塵不可到湛湛見沙磧詩人嗜好異方寸富泉石堂成欲臨賦牋管羅几席偶然對漣漪微風緩揺碧髙吟寓動静真賞廢晨夕璇題壯簷楹玉軸走賔客清商入葱蒨積雨洗炎赫翺翔下幽鷺從容出圓鯽穿荷過獨舸傍柳倚輕䇿此興復不淺何日當有獲君方事閒放佳處勿輕擲明年谷鳴騶金閨遂通籍和陳阜卿為湯與立夀次韻我聞無量夀世作天人師有禱必應感如形影隨之吾見盛徳士吏隠江之湄巖巖棟梁材為桷豈所宜守道心自適怡然見雙眉何當日千里整頓黄金羈嗟予拙無用正坐千林姿荷兄獨青眼少雪羣兒欺蘭菊雖異芳春秋莫予遺相逢一尊酒駐馬聊共持偶觀香霧欝彷彿初生時願兄夀無量登庸侍彤墀年年遇今日酌酒共瑶巵
