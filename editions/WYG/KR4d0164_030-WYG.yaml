body:
  text: 相山集巻三十宋王之道撰附錄加贈少師王之道勑士有抱負器業砥名勵行自見於世而用之未盡者乃秉義方以訓其子今登元樞重我本兵之地則褒崇之典追報其親盖亦理之宜而事之稱也大中大夫知樞宻院事兼參知政事廬江郡開國侯食邑一千二百户食實封三百户王藺故父任朝奉大夫贈太子太師之道學博而文贍材全而識明蚤收儒科寖階膴仕兩持使節風采猶存孰遏長塗位不配徳克生賢佐始大爾門進亞公師爰頒命綍官品増峻用詔無窮可特贈少師贈故太師王公神道碑淳熙十有六年正月夀皇聖帝将遜于位以今端眀殿學士通奉大夫提舉臨安府洞霄宫王公藺自禮部尚贈衛國夫人妣施氏累贈福國夫人公㓜頴悟八嵗通一經弱冠貢辟雍與兄之義弟之深同登宣和六年進士第搢紳榮之榜其所居堂曰三桂時太平久用事者開邊隙公知必亂對䇿極言考官惡其直寘之下列靖康初調和州歴陽丞縣有大圩積雨将敗皆豪家所占請於官欲増埂郡檄公督役公呼諸豪諭之曰爾圩爾修将責之誰鞭其不率者皆争出夫得數千人捍水而圩全嵗乃大熟郡以為能俾攝令烏江甫視事御營使劉光世檄言大軍且至令具芻糧視倉庫無銖粒里豪素服恩信不移晷得錢七十萬米三千斛事定悉以償之或謂軍興科借不必償公曰信不可去也民相信何憂匱乏宣撫司檄清野期以三日責軍令状公曰敵未至而先困吾民可乎譴吾自當之即書以授使者令民安堵如故不踰旬清野之議亦寝以循資丐罷奉二親還鄉率族黨保胡避山使其弟之深守之公以兵法部其丁壮轉戰於外且誘鄉民運粟於山能致一石者與其半故糧不乏山西有毛公寨李伸圍之急公以精卒從間道出不意大破之寨人徳公㧞寨與公合伸恥其敗攻益力㑹伸破張琪據濡須城遣鍾乂以十餘萬衆來攻語寨人曰為我請王縣丞來否則必屠爾寨公料衆寡不敵将挺身説賊諭其衆曰彼圍益急吾勢益孤生路絶矣伸雖麤悍聞頗知書可以誠動幸而聴則免禍縱見殺猶愈於束手待斃也衆感泣争止公公曰吾以一身救數萬老㓜何畏死即以數十騎出見乂乂與衆賊大驚曰公何勇耶我來無他葢以公得衆心欲以郡城相委而去爾公辭不可乂以矛擁公馬而東日且暮遂入城而張琪復振與伸戰伸敗走琪刼公過荻港令招誘胡避之衆公以計脱歸時所在盜賊蠭起殺人如麻獨在胡避者皆得免未㡬丁母憂鎮撫使趙霖以便宜起公攝鄉郡公拊摩瘡痍招集流冗境内帖然有偽為皇姪奉徽宗詔領大元帥者移檄州郡公引雋不疑辨戾園事抵鎮撫司擒送行在所果得其姦霖以公守胡避功聞於朝改承奉郎就差充鎮撫司㕘謀官都督府築滁州瓦梁堰為小北海以備敵委公徃視公言捨江淮天設之險而積水於敵所不經之地徒擾民費財爾遂不復築含山當合肥徃來之衝有狼為害又委公驅除公齋戒入境悉屏迹人以比宋均渡虎韓愈徙鱷云丁父憂服除通判滁州時方議和公移書吏部魏公矼諌議曽公統言辱國非便又上䟽陳敵有可勝者五且繳所與二公書大忤宰相秦檜意責監南雄州溪塘鎮鹽税㑹赦不果行異議者率得重譴公遂絶意仕進卜居相山之下自號相山居士以詩酒自娛凡二十年檜死起知信陽軍紹興三十一年至郡眀年北亮敗盟詔沿邊為守備公䟽言應敵之䇿不報建康都統乞拘沿江舟船毋泊北岸轉運司以朝㫖移郡公奏拘老小則失人心禁商旅則走官課大将措置乖謬貽敵笑侮鄂州都統乞團結西湖北保甲遇征行許充本軍鄉道公復言統帥所謂鄉道是欲驅百姓為先鋒耳朝廷是公言事俱寝除就湖北提舉常平茶鹽或言辰沅靖三州洞丁習武藝宜募二千人順流赴建康詔提刑司具舟楫公時兼憲事得符驚曰敵未平豈可復揺逺人心奏罷之湖北十四郡常平積粟三十八萬而在鼎州者十五萬陳腐㡬半詔以餉荆鄂軍公曰徒費輦運而愈耗折乞留以為旱備未㡬鼎州大旱公遂發廪以平糴價取腐壊欠折之數請於朝而蠲除之嵗稔和糴以補其舊而官吏得逃責百姓免流殍二十年積弊悉去前提舉張公震語人曰王公所為是吾前日睥睨而不敢為者攝鼎州有僧崇一居桃源以妖惑衆公召致獄民争言僧有神術治之将不利公弗聴獄具流筠州卒無能為乃大詘服荆帥乞調鼎澧岳鄉兵之半同守禦公遺帥書言鄉兵本以䕶鄉井豈堪裹甲赴敵况三郡水旱相仍安可騷動帥服其言而止除湖南轉運判官郴冦李金竊發諸司蒙蔽不以聞公至攝帥事乞兵於朝賊偶歸巢穴憲遽奏賊就招撫朝廷信之追還所遣兵人情憂懼公檄憲賊若果降當詣郴公参若自去自來後必為患檄未至郴而賊作憲懼罪即報當路以賊之再發檄於公参之一語言者不察劾公罷已而朝廷知其非憲與二郡守俱鐫責公前枉盡白而竟不復出矣遂以朝奉大夫致仕公為人質直剛勁尚風節平居恂恂氣和而色温至臨大事區處剖决多出人意表遇人患難雖讎隙亦極力拯之不顧家有無壮嵗入仕遭時多故慨然欲以功名自奮數上書陳利害忠義激烈聴者竦然又以䇿干丞相趙公鼎張公浚吕公頥浩參政李公光盖以數公可與共功業者其在歴陽料杜充之必敗和州之必變皆如其言和議既成而公廢脱守邊郡持使節當壽皇厲精之初可以有為而公已老亦命也夫以乾道五年六月朔日終於家公之将終也忽語其子曰吾衰久無夢疇昔之夜夢帝召我而命之曰以爾有功當禄其後吾年七十七死何憾捐館數日有白氣如練止舍中人以為異云以其年十月甲申𦵏於郡城北三十里長岡之原胡避遺民存者尚衆扶老携㓜遮哭於道喪車至不得前配魯國夫人孫氏先公四十二年卒子十人蘩奉議郎簽書武岡郡判官蘧廸功郎郢州長壽尉皆後公卒邁承直郎監蘄州蘄口鎮著廸功郎監西京嶽廟􅣫朝奉郎通判廬州次即樞宻使也茹承務郎萊承議郎前知池州貴池縣芾荀未仕女六人適承議郎趙善治承議郎徐一䕫文林郎許棟從事郎張漢卿通直郎万俟侃㓜疾廢孫男二十人孫女十九人曽孫七人有文集三十巻蔵於家嗚呼讀其書可以見公之學考其始終大節可以知公之心觀其子孫繁衍盛大又可證天之報施為不誣也銘曰著姓維王出自太原唐季避亂𣲖分河南自河徂淮累世乃顯視彼淮水知其源逺烈烈太師以文起家與其伯仲聨登雋科粤自少年志出人上議論偉然風節豪壮始仕邑佐逢時棘艱父母之邦毁于冦殘鳩集遺黎依險自保耰鋤棘矜以抗羣盗盗環四境莫嬰其鋒稚耋數萬寄命于公誰謂書生有謀有勇云誰厄之弗究其用活人之功上帝所知不耀其躬而後之貽是生樞臣為國碩輔維垣一品以賁其墓長岡之原公墓在焉植碑勒銘垂千萬年
