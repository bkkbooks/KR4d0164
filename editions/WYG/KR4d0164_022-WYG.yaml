body:
  text: 相山集巻二十二宋王之道撰劄子乞將京西淮南逃絶田展免租課劄子契勘京西淮南係官閒田朝廷比縁少人請佃巳於紹興二十六年三月十六日專降指揮令轉運司行下所屬州縣多出文榜招誘不以有無拘礙之人並許踏逐指射請佃不限頃畆給先投狀人其租課依紹興七年十一月二十五日指揮送納自承佃後沿邉州縣與放免十年次邉州縣與放免五年候承佃及三年與充巳業許行典賣其為招誘之法非不勤且至備且善可以見聖君賢相之用心也伏見近年以來請佃者漸衆而其間諸道人吏從而作弊以逃租之重而絶租之輕也遂將係官閒田暗却逃絶名色例行給佃或恣其乞取而輕重其租或俟其給佃既了續改作官員職田之類初年給佃次年即行起催並不依沿邉放免十年次邉放免五年指揮至使朝廷之徳意遂成罔民之虚文甚無謂也欲望詳酌將京西淮南應干已未請佃逃移户絶官田各隨所在州縣見行則例逃重絶輕紐撮租課沿邉放免十年次邉放免五年其逃田納租及三年令其自陳以田畆土色紐作税役别給公據徑改撥為巳業許行典賣其絶田不以年限亦屬常平不得更加租賦及行改撥務在必行如有違戻去處許佃户越訴將官吏重作行遣庶㡬請佃之家不至疑懼安土樂業日加墾闢用躋阜康之域不勝幸甚乞止取佃客劄子伏見淮南諸郡比經兵火所存凋瘵百無二三其間嘗為人佃客而徙鄉易主以就口食幸免溝壑者今既平定富家巨室不復問其如何投牒州縣争相攘奪兵火之後契劵不明州縣既無所慿故一時金多位髙者咸得肆其所欲而貧弱下户莫適赴愬勉從驅使深可痛憫且人一日不再食則饑七日不食則死當建炎之末紹興之初斯民艱食米斗萬錢無貧富貴賤刮木皮屑草子以充食方是時人人救死不贍有能分小絶甘而以糠覈活人於垂盡之際者自非黔婁伯夷孰不轉徙而願為之役哉今距彼時七八年矣以一日不再食則饑七日不食則死論之向非徙鄉易主以就糠覈雖人百其身安得復至今日欲乞自今以徃應嘗為人佃客而艱難之際不見收養至轉徙他處者雖有契劵州縣不得受理當艱難相收逮平定輒無故逃竄者聽其主經所屬自陳收捕所在州縣不得容隐著為甲令庶幾潛銷攘奪之風大變逋逃之俗而有恥且格駸駸乎比屋可封之世不勝幸甚罷山林寨廵檢劄子契勘江北居民頃當羣盜縱横計無所出一時創為寨栅保聚各家老㓜後來稍定朝廷念郡縣乆無官吏以彈壓撫綏相繼敦遣盡令過江既到任其間貪殘不法者徃徃指寨栅以為寳貨淵藪朝遣一人焉括其錢暮遣一人焉捜其粟名為勸借而有不從令與不如數者輒中以軍法而寨栅始禍及於民矣兵火之餘斯民獲存者亦無㡬矣正復緩急守寨栅以自保猶恐力有不贍而中間劉少保宣撫淮西日又盡籍屬郡寨栅之首領與其强壯聽候起發使喚而民始以寨柵為産禍之基矣朝廷比年以來灼見保聚之有利於百姓毎遇防秋輒誡飭郡縣勸誘父老俾令措置寨栅又慮緩急人自為計不能合從以相救援復命郡縣推擇土豪中有官人縣置山林寨廵檢一員郡置都廵檢一員統管下寨栅緩急相救所以加惠凋瘵可謂至矣而斯民終以前項二害懲沸吹虀傷弓驚木或聞邉遽賊警人人寧扶老攜㓜冐犯霜露竄伏草莽莫有肯依寨栅為保聚計者然則廵檢之在今日盖徒設也又况所置廵檢雖號土豪皆異時卒伍之暴横屠沽之桀黠者幸此平定不得騁其志肆其毒今乃借此廵檢之權誠恐一有不虞未必為國家用為鄉里謀而刼所轄之良民以復仇報怨屠郡縣者皆此曹也伏惟都督僕射相公為國長慮而加意焉論賞罰不當劄子臣觀今日天下之大患不在乎邉冦與盜賊而在乎賞罰不當盖賞罰人主之大柄也人主髙居深拱而能使四方萬里鼓舞震動忽然如神日以犇命赴功而天下若不足為者恃有此耳使其不當則賞非特不足以勸能而能者且怠矣罰非特不足以懲惡而為惡者益得以自肆矣然則天下何由而治乎古人善用兵者莫如孫武其言曰主孰有道將孰有能天地孰得法令孰行兵衆孰强士卒孰練賞罰孰明吾已自知勝負矣夫論兵家之勝負而始乎主孰有道終乎賞罰孰明其言有深意也伏望皇帝陛下慨然奮發以賞罰為中興之要務夙寤晨興思所以求其當賞自賤始必欲當其賢罰自貴始必欲當其罪何者為當賢賞一人而千萬人悦曉然咸知為善之利者斯當賢也何者為當罪罪一人而千萬人畏曉然咸知為不善之害者斯當罪也賞當賢罰當罪而天下自治矣天下既治而外敵之不庭盜賊之不㓕未之有也乞移屯沿邉劄子之道竊謂諸路都統制與帥守監司其職不同今日擁重兵䕶諸將可以為國家却敵制勝者都統而已至於總領出納諸路之錢糧轉運斡旋一道之飛輓提刑之經總錢物提舉之鹽井課利若朝廷用兵應副饋餫監司之職盖如此帥則今之安撫使是也守則今之州軍是也且以湖北一路計之安撫使帥荆南大軍之所戍也緩急責以捍禦則固其職分而其一路共十四州唯信陽一軍係沿邉去淮無四十里户口單寡財用窮匱不及近裏州軍一草市雖有戍兵百餘人正復受本軍節制萬一有警亦不足以辦事而况其不受節制乎今欲隨宜應變疾速措置務要不失機㑹莫若計沿邉地界逺近𦂳慢責令諸都統移屯邉上控扼要害去處以防敵人妄動仍責諸路監司計置合用軍需預於無事時於沿邉屯兵所在儲積以備支遣庶使同心協力共濟大功傳曰投機之㑹間不容穟惟參政僕射相公為宗社生靈之故少賜留神天下幸甚戒江北守臣與偽齊崇信義禁侵掠劄子右契勘千里一守休戚所繫江北諸郡昨自敵馬南渡羣冦畢集淮上朝廷從權一時郡守例除武臣以補其闕然失於勇者則務生亊以開邉釁失於貪者則務生財以肆民害徒愛錙銖之小利忘邱山之逺圖得地不可守而所守者反失之遂使疆場不寧元元塗炭深可矜憫昔孟獻營武牢而鄭人懼晏弱城東陽而萊子服羊祜戍荆州而吳人之降者不絶此三子者非有他長修徳信保分界而已今國家與偽齊為隣而不知出此以堅愛戴之心愚未知其可也伏望都督僕射相公鑒前日之所以失取古人之所以得選擇異將有才徳威望之重臣而更之俾到郡之日崇信義禁侵掠有俘其子弟者還其家有刈其榖粟者償其直假以嵗月使人人曉然咸知我専為徳彼専為暴如是而舉北伐之師可使簞食壺漿復見於今日也奏議論收復當自陜西始奏議臣伏聞金人改圖願修舊好遣使叩關將至闕下近陜西偽都統者亦揭牓令其將士毋得交戰以待講解察其上下之意和議甚切盖和議不定則必有内憂不獨懼我師之致討而已國家以生靈為念固應許其自新有如三事所宜審處一正名分二减幣聘三畫疆界竊料金人之議必出兩端一則欲仍用舊議更増嵗賂而以河南故地盡歸本朝一則欲請復侵疆各守舊境而以契丹故事求為敵國二者皆未可遽許也女真本小部貢獻于我海上之盟以契丹之故約為兄弟契丹既滅便尋釁端以宣和為渝盟靖康為失信刼遷二帝淪陷中原聖主中興懐柔備至而狃於常勝必欲兼并凶力既窮始通和好天子不較稱謂屈巳從權者正以疆弱之勢有未敵耳其後東昏正隆屢盟屢變至敢傾國大舉直窺濟江其渝盟失信視我宣和靖康孰輕孰重我可以為辭矣今其立者素非人望以孱庸之故得自全於正隆之朝完顔一宗誅屠畧盡見在近屬惟有葛王僭道之謀起於羣下非有受命之符遏亂之畧也威福大柄必在權强内外乖争覆亡可待故即位未幾已有兄弟之變近傳金主詔書兵部尚書可喜昭武大將軍烏倫延安府同知李老僧武義將軍千户烏古刺統軍司令史斡里朶謀叛被誅觀其累世骨肉自相剪除此豈安固之基靈長之運哉則彊弱之勢與靖康以後事體不侔逺甚若欲通好必㝷海上之盟復敵國之禮然後可許名分既正嵗幣自輕凡此二事彼必不敢固執惟分畫之議恐費商𣙜耳大河以南彼知終非所有或當輕以與我而别有所邀然淮漢之北人稀土曠都無險扼汴都殘破徒有虚名雖或得之未易經理發兵戍守少則不足多則不堪措置一乖腹心罹患此金人反復已試之策而我向來受欺覆車之明戒也豈可保哉厥今天下之勢惟陜西為可復其地去敵最逺控帶關河内有四川為之根本我已得其十餘州若摧散關鳯翔之衆則其餘風靡矣今日之議設以大河為界固中國之福猶當深圖利害以拯後艱若以此外更有邀求豈容墮其姦計彼或降尊損幣自同契丹而靳吝土疆不肯分割則陜西之地决不可失宜以我所得陳蔡唐許潁嵩洛并他路諸州兩相換易如尚不可則寧稍増幣期於必從獨留南陽以通武關我若并梁雍荆揚之區保江漢秦蜀之險平居無事積糧固圉敵雖猖獗亦無能為若有釁可乗知不足圖也此事至重非片言所决必一再徃復而後可了惟少忍之而已陜西既得則置宣撫使司於階成和鳯之間而分布將帥據和尚方山仙人等原以臨制關中各用士人保其郡邑如熈秦京兆要害之處量出蜀兵戍之使以其力自全而不為蜀累邂逅有警則下車而出征萬一不虞則回戈而固守進可逐利退無後憂撫綏數年形勢自壯不煩糧饋不耗金錢惟稍出蜀縑増印錢引以募糴于陜西便足以了辦經費天下之利莫大于此百世之業也昔楚靈王窮兵桀虐民不堪命取陳蔡不羮又將伐呉為乾谿之役楚人立子干以入郢王師潰于訾梁縊于申亥之家子干㣲弱亦不能自立卒為弃疾所圖弃疾既篡未獲所安及盡反陳蔡不羮之封其國始定五年而後能出師金人今日之勢正類於此仰惟朝廷必有成謨狂瞽之言豈足觀採顧大議未定不厭詢謀用敢竭其區區之愚惟陛下裁擇幸甚狀論瓦梁利害申都督孟參政狀右之道所凖前項指揮尋依應躬親前去真州滁州和州接界地名後湖沿河相度迤邐至瓦梁同真州六合縣丞諸葛缶呼集地分父老詢問得瓦梁河東至𤓰歩口出大江一百六十里北接後湖西南至再安二百七十里其水係廬州慎縣滁州來安清流全椒和州烏江等處山水相合流入此河東注大江每遇春夏山水暴漲即沿河低田徃徃淹沒若築合瓦梁口堰住水源壅入後河即南北淹民田及行路十餘里其東西係是上通再安下通瓦梁河道並無利害内所淹地只是斷得自全椒南入綽門至和州路計九十五里其全椒西却有一路徑由六丈再安至和州計二百二十里比綽門路只多一百二十里不甚迂曲况瓦梁堰成即堰上自是一條大路不復似河道有水阻礙須用船筏方可濟渡若徑自滁州界白塔入真州界竹墪過瓦梁堰至宣化渡比之他路更為順便兼瓦梁下口又有六合渡薛家渡滁口山渡三處通宿泗滁濠等州入真揚州路别無阻節之道今相度上件瓦梁若從官員白劄子内所請築合堰口不惟困民力費民財浸民田有此三害其於控扼江左實不見其毫髮之利契勘金人前後兩次侵犯淮南第一次係由泗州入真州路第二次係由廬州入和州路即不曽經由滁州後湖過江若論控扼建康今日天設之險上則莫若阻淮次則莫若阻江今言事者上既不能以阻淮為言次又不能以阻江為言而乃以為建康雖倚江以為固其控扼之勢實在江北欲積水後湖以為北海斷滁之全椒距和之烏江一路而期以控扼制北兵不得徑至江山豈不謬哉之道竊聞之周世宗時李氏苦周兵之南侵其臣何延錫為畫此䇿方輦雷塘石封瓦梁口未及告成而數州之民皆去而歸周故是役罷今國家紹開中興遣兵戍淮乃所以為江南之屏蔽自兹以徃要當日闢千里廓清中原以副四海望霓之心上件官員白劄子所陳實恐未為利便今以沿河父老所言及之道所見謹具狀申都督相公伏乞鈞㫖更賜詳酌施行論廬帥乆任状契勘安撫使繫一道帥臣如淮東之揚州淮西之廬州所以控扼邉防為國屏翰平時猶不可輕以授人而况於今日乎伏見淮西安撫使仇悆沈静有謀剛方不屈當去年冬敵入冦諸將逗留莫肯赴援羣吏睥睨咸欲逃遁而悆乃能死守孤城至統制官張竒刼之以兵曽不少變卒使江北數千里之地賴以保全非選植其才能若是耶徃者朝廷忽以李徤替悆守江州淮西之人莫不危之繼聞報罷道路乃復翕然相慶夫徤之才或過於悆未可知也而人以悆之去為危者才固見於已試也才之不可多得也尚矣選植其才而又不能固之以乆任假之以重權旌之以厚賞而冀其成功則敵何由而定兵何由而偃乎昔李牧之居代前後凡十餘嵗而大破匃奴李勣之治并十六年而突厥不敢南惟僕射相公為朝廷計念之毋忽
