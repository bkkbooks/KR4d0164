body:
  text: 相山集巻十五宋王之道撰七言絶句冬日出郊二首覆塊青青麥欲齊田家籬落柘岡西嵗饑冬暖聊相補抉藕歸來餉萊妻一鞭乘興上山頭雨脚隨風濕破裘冬日有情還可愛忽開雲霧見林丘七夕苦旱望雨田禾吐白將就槁野草垂黄幾欲燃來日天孫嫁河鼓洗車今喜有夤縁游毛公洞六首説詩人去想雲車千古青巖倚碧虚訓詁未容端拜議一言聊復問關雎旋披荆棘入山來洞口晴煙翳不開試問真人竟何處他年相就謁蓬萊湏信桃源路易迷野人遥指過山西由來石室非仙窟漫向雲中覔舊蹊山前踴躍見樵人欲問神仙更問津指㸃長柯向東去不知銀穴又非真徘徊銀穴送斜暉散遣長鬚上翠㣲青鳥似知予意確故傳仙語傍人飛偶因青鳥遂幽尋翠壁蒼崖白日隂三扣石扉人不識滿山松竹自悲吟題太湖驛竹軒粉節儲霜競出籬我來猶及筍生時清風一榻君休問明月半窻予自知過水南題范諫議書室函丈當年貯卧龍笑談曽記一尊同幅巾已起草廬在寂寞溪山空晩風題德章山叢玕潑黛千峰色急雨犇霆萬壑聲莫訝祖師來入夢秖應知我欲山行過含山郵亭和子厚弟壁間韻三首犯暑籃輿趂曉耕東風迎面葛衣輕過山繚繞湖邊路楊柳隂中帶月行透雲斜日影朦朧樹杪依㣲少女風景物重來正無恙為君收拾向詩中開窻如見碧油幢新竹春來過屋長漸近柴桑舊家路清風來報稻花香吳興舟中有作一水濡湏百里間舉頭遥見水西山㣲波不動又終日安得扁舟送我還春日偶成短垣新雨上銀泥柳外幽花咫尺迷獨喜流鶯解人意一聲聲傍緑牕啼春日書事呈歴陽縣蘇仁仲八首籃輿兀醉出東門賴有官舟為解紛流馬木牛今已矣其餘兒軰説三分芳草池塘處處佳竹籬茅屋野人家清明過了桃花盡頗覺春容屬菜花似是東風惱客心淹留行色故相禁扁舟正在江南岸又擾浮雲作暮隂情似長江流不斷亊如芳草剗還生此身何苦浮名絆正擬花時取次行公餘槐柳轉斜日吏散鳥雀來空庭康成書帶可人意坐見茸茸相對青學似卿家宜有法人如我軰豈無情新詩早自推心服幽㑹知誰付目成猛風吹雨暮江頭煙草㣲茫一片愁雙鯉不來無處問欲尋歸路轉悠悠子美不應花解惱次公何必酒而狂知君頗負風流債安得司空慣竊香過叚寨二首隨行知有筆如椽不礙㝠搜借榻眠酒醉詩成還上馬秋蛇春蚓任人傳嫩緑夭紅照眼明物華春事暗相驚提壺不飲勸誰飲正在竹叢深處鳴經過合寨弔孟氏故居二首藤梢棘刺失朱門空想當年載酒樽天色重増行客恨東風吹雨濕黄昏行過春泥沒馬深幾聲幽鳥囀喬林感時恨别愁無那賴有清樽慰此心晩憩聞雷湖外山光入座來水晶宫闕翠屏開纎纎細落催花雨隱隱輕鳴啟蟄雷含山驛中日暖風輕晝睡餘海棠嬌褪玉肌膚楊花也似知人意來趁飛紅入座隅鳴山驛夜雨夜來風雨曉還晴沙路無泥快早行鳥語花容春自好有生何處不安生夜聞風雨狂風横雨忽來鳴半夜長亭客夢驚想見海門春漲急犇軍百萬聴潮聲丘城道中翠巘中間白水邊野梅官栁似當年正看遶樹下殘日便覺前村生晩煙出合肥北門二首淮水東來没踝無只今南北斷修塗東風却與人心别布暖吹生徧八區斷垣甃石新修疊折㦸埋沙舊戰塲闤闠凋零煨燼裏春風生草沒牛羊烏江道中聞杜䳌有感麻葉蓬蓬小麥肥楊花風裏杜䳌啼故園尚阻歸來賦慚愧東坡雨一犁竹城道中一溪清水浸餘霞風裏歸鴻字脚斜今夜不知何處宿路廽山崦兩三家下閣道中小橋流水數家村春入川原日自暾馬上不知嵐氣重誤驚征袖濕啼痕西門道中聞人售田走利奔權幾日休歸來還復郭南游直饒心計姦如鬼終恐輸他善自謀題大泉寺六峯環翠繞金藍下馬初嘗一酌甘久旱喜看雲氣浹晩風吹雨過江南題南巢地藏寺蚊觜生花夜更長睡鄉蝴蝶正悠颺山僧不恤秋眠熟連打鐘聲到枕旁題大龍寺萬松邀我上崔嵬入寺山屏次第開無説欲知真説法松聲還送出山來題宿松薤山寺小驛隳頹不見容著鞭東走梵王宫怪禽落日休相恐五里松篁一徑通題許市接待院壁一簷冬日送清温䟱竹蕭蕭覆短垣來就老僧同曝背不妨危坐黙無言題許市施水坊夢斷蓬窻特地愁卧聞溪水嚙舡頭夜航又逐東風去重歎因人此滯留宿大泉遇雨予每逺適行日不雨歸日雨必作故常苦之是役也以幹徃肥上時秋旱連數月嘉榖盡矣而二麥未得入土民心憂蹙何翅倒懸當曉發月城晩抵大泉山方弛擔與主僧語而山中出雲湏􅁷四合入夜遂雨予聞之喜不自知蓋非為一已設也紹興二十四年秋九月壬子我行常苦雨相隨旱甚民心若倒垂坐久雲容膚寸合願同焦槁被甘滋題苦竹寺海棠洞三首翠袖朱脣一笑開依風無力競相隈陽城豈是僧家物端恐齊奴歩障來隔夜西風為辦嚴掃除氛曀出晴天正逢翠幄張青綺應念朱脣拂紫綿一徑封苔知雨足貳車行縣昔時遷對花啜茗思春日拂拭新詩益悵然題崇因院清軒予政和八年秋九月自冶父還軒車託宿是刹時積雨初霽夜月飛霜溪光炯然如水晶環繞殿閣令人毛髮森竪神思清發乃得一絶書之壁後三十七年復經此覔前所題既就堙滅因主僧乞詩復為書之肥松瘦竹古招提軒檻重逰識舊題清意不曽吟得盡夜來明月浸寒溪法雲寺和湯立賢留題寺占湖邊數畆山杖藜偷得一朝閒昨朝恰别居巢長又喜新詩在壁間題大善寺絮㡌曵絲雲帶雨瓊梳環髻水圍山江村五月黄梅過十里人煙渺莽間題華嚴院澤上人西韻軒用前韻踈簾如霧隱窻紗虹影青紅雨脚斜坐久清風起何處一盆昌歜映葵花和彦立兄贈信上人鼎社年來得志閒一杯聊復效逃禪新詩莫漫驚流俗恐被旁人唤皎然贈浮屠道本二首道本自歴陽廣教與六僧偕來以天申節受具足戒於當塗之萬夀寺戒壇能誦吾兄彦時所題二詩故其歸也用韻以贈之暑雨初晴江上村藕花無數午風温梁山正帖淮南岸到得精藍日未昏一去禪關忽五春異鄉驚見眼終清問師參學今何解雲在青天水在缾和因上人四首拍天湖水亂蛙鳴雨脚隨風潑細塵翠幄不開楊柳晩紅雲初坐海棠春茭葑彌天眼界幽澆愁應辦酒如油坐憐漁父機心勝萬頃春苗不下鷗水雲深處見人煙桑柘鳴鳩似可憐却怪銀泥環四壁由來春雨上蝸涎荼䕷花底照衰顔風送餘香到酒間春色他年尚無恙紅裙來繼謝東山和天衣聰老五首師去無為十五年重來猿鶴亦忻然此生不負今朝祝冀結龍華㑹裏縁老懷歸去幾何年吳越宗風久寂然聞説近來獅子吼應將驢脚問生縁法華靈應著當年今古何曽有間然不見後身房次律却因和璞記前縁達磨東來不記年一燈然處百燈然願從清淨求明了應喜晨齋學省縁緑楊芳草自年年人老逢春重喟然六入儻能除舊習三乘端許結新縁再用韻贈湖塘來上人二首望外荆榛蔽輞川我來何必為逃喧亂餘村疃雞豚盡秋到江湖藻荇繁湖水瀰瀰浸緑苔湖邊衰柳兩三栽游魚得意潜還躍幽鳥多情去復來山西莊舍贈信上人和彦時兄四首十里西疇路半砠短轅無力困瘏痡支笻預作淵明具甕有烏程不用沽四壁蕭然犬自馴年來食粥甑生塵相逢未暇寒温語請效參寥作故人一枝清瘦早梅春風味髙如郭泰巾襟袖歸來香未歇要將佳句屬詩人寒鴉成陣下遥村氷合囬塘鏡一番㶁㶁溪流響何處亂山無數不知源贈道上人道人知我過山來旋掃蓬門對水開惟有温菘薦樽爼一畦踈緑隱蒿萊和道可卧雨春頭到地長清風一榻借㣲凉碁聲驚斷髙僧夢起撥爐中未過香和彦逢弟簡相山古上人二首相山風物似斜川岑寂那知市井喧嵗旱但傷禾穗槁秋饑猶喜栗皺繁蒿艾深迷古徑苔荒凉菊塢與松栽稻田正似人無幾賴有髙僧伴我來送浮屠善慧雲濤霜巘正崢嶸夢裏清游覺尚驚師到西湖如得句不妨頻寄老書生送心上人西城畦稼卧黄雲似説千門許見分驢載馬䭾應不厭一􅓕牙齒正湏君春日訪道上人隴麥如煙水滿塘路邉桃李問柔桑道人不作淵明調笑碾新茶看瑞香贈桐林老僧繞屋青桐碧玉椽坐來巖石起雲煙過門竟日奔馳者應羡山僧去道邊贈林山善相老榮師至哉擇術妙難論邂逅何妨丐一言我已無心求富貴餘生歸命給孤園囬峯寺和浮屠坦然韻晝睡醒來日過中山光入座水函空緑楊堤外荷花富招致清香賴有風和彦時兄贈覺上人化燈江上相逢試問津杖藜來作化燈行欲知照破無明窟佛殿熒熒一㸃明和僧廣實三首曽向髙安見大愚迢迢一路徹天衢而今到處無些事困睡饑餐得自如聞説年來貧更甚生涯和地與錐無通身是手承誰力方信常人實若虛動容俱見古人情千里歸來得我驚七載何曽有離别水中明月本相親題德章山親公塔憑陵風雨上崔嵬一見親公病眼開似是前生師弟子兩年今日入山來過廣德宿開元寺上人房滿城花草鬭欣榮嫩緑夭紅照眼明㑹有禪房通野色解鞍聊復憩予行書來上人房十里清風水拍天老僧齋罷抱頭眠丹楹畫棟看摧壓好為僧伽作勝縁書源上人壁丹楓黄槲壯秋容詰曲僧房一徑通塔似道人飛白筆開窻還見倚晴空題德山涓老無句堂峯頭示衆合如何一棒由來已自多空去空回還信否至今疑殺那人訶送浮屠宗立東逰二首立上人禪林杞梓法窟棟梁數千里徃見天衣十五年坐參庭柏爾來半口吸乾溟渤一拳打破虛空真得和錐也無豈不成大丈夫哉是行來自湖湘訪予相山將復觀潮浙東予聞而快之故作是詩以贈撫掌相逢一笑同自言㕘學百無功蜜甜忘却十年苦雷吼嚇成三日聾西走漫償行脚債南游聊勘坐禪翁不知色力能強健又復觀潮過浙東贈蔡道人寳蓋山前蔡道人十年學佛頗安貧似聞親見天衣老為改今名作惠新贈羽流韓洞章韓生畫馬有家法胷中驊騮不可計酒酣試作姜子牙怳若當年釣清渭
