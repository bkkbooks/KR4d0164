body:
  text: 相山集巻二十七宋王之道撰䟦䟦戶部陳子强守節事好生惡死人情所同故天下莫重於生莫難於死士大夫委質立朝當其廹險臨危誠審所謂事君之義有重於生而不為好惡之所奪移則其奮不顧身以徇國家之急是謂死得其所又何難哉兹陳分寜之所以能截然於潰叛中排羣議抗彊敵保孤城以建功立名而使一時擁貔貅守金湯望道引遁聞檄請降者羞愧駭汗而不能自已也公既被褒賞自邑得郡以至奉使為郎而髙節偉蹟書之太史與唐河北二十四郡中顔平原相為長雄後二十八年嵗在壬寅其子乂實尉無為與予游獲觀其功状如見當時忠憤之氣劘拂穹壤云䟦梅審禮觀徳堂連理詩審禮予鄉人也宣和末始傾蓋於京師中間更兵火犇避相從不為不久而未獲聞觀徳堂之盛事積善之家必有餘慶兹固今昔不易之論審禮其勉之䟦王無邪九華雜詠詩予家濡須郡城之北五十里有山曰銀缾者神仙之窟宅也峯巒髙秀隠若碧玉自非雲煙蔽虧一舉目則見之今行年六十有三欲游之心晝夜不舍而因循未能然後信韓退之所謂洞門無鎻鑰俗客不曽來非虚言也王君無邪番陽人比寓吾里累年數獲過從好論詩志尚不羣一日登九華樓遥望其山悵然恨無羽翼不能飛去建安黄知求罷令廬江無邪附舟以東不踰年知求被命出宰青陽九華實青陽之勝境而江左之名山也無邪既偕來遂能窮搜徧覽形于歌詠俾自有此山以來騷人逋客遺蹤逸跡不得遁而皆存令人竊愧之雖然予方學道而尚友乎廣成子浮丘伯與夫鍾吕之流雖方壺員嶠蓬萊逺在海上隔弱水三萬里猶當乗雲御風翺翔於其間銀缾之遊盖不足道也䟦程元籲手帖元籲與予有甲辰同升之好當其為宰屬偶同彦逢弟赴調獲一再見之甚相親也後十八年嵗在乙亥蔡元徳解濡須幕攜示異時徃還手帖數紙觀其作字遒勁造語警㧞想見風度云代無為守王正仲奉直䟦所賜御劄紹興三年秋臣權将命七閩嵗偶旱饑上軫淵𠂻親灑雲章以賜臣權令措置勸誘賑濟其言至誠惻怛視一時之饑者不翅由己饑之與帝堯文王之用心無以異盖帝堯不虐無告不廢困窮而後世稱其仁如天文王懐保小民恵鮮鰥寡而當時歌仁如騶虞惟仁足以長人惟仁足以得天下之心而不庸釋用能中興宋室上配仁祖而巍巍之功穆穆之徳輝映今古於皇休哉臣權諏度無状幸生聖代恭被丁寜之訓正復殫竭犬馬何以報塞而臣區區之意莫獲表見謹刋諸石昭示無窮非獨以為小臣之光欲俾天下後世知吾君之仁及物如此謹記䟦休糧方予初得此方以為食者民之命人自免乳以上一日不再食則飢非有病七日不食則死而此方之效一食乃可七日不飢再食乃可四十九日不飢三食乃可三百日不飢四食乃可二千四百日不飢嘻欺亦甚矣世豈有此理哉暇日因依方修製将食以騐其方而家人争以為不可余曰老固多病而比尤甚它不可概舉至於齒牙動揺每咀嚼飯蔬輙痛不能堪似非久於世者願試食此幸其效或可延壽命不然死無日家人知不可奪聴其如法服之一杯徑飽曽不滿三合果得七日不飢後七日再服果能四十九日不飢而向之病皆去色力康强如少壮時余覽照不覺擊節稱嘆至於再四曰有是哉朱君之言不我欺也予自束髪讀書入鄉校游國學既壮始登第少不更於世故長遂拙於謀生今年過六十家貧口衆有薄産常計嵗入以制用度猶多苦其不足嵗稍歉則甚故無餘以濟人雖有區區自利利他人之心福尠位下莫獲施設獨念廣此方於無窮則庶㡬焉識者其憐之其詳自有天聖中二公勒石本末見之前後序可攷而知兹不復贅云䟦元祐黨籍事跡君子小人之所以異邪正而已然而邪正未易辨也方其同朝雜處君子既指小人為邪小人亦指君子為邪君子小人相鬨於其前而小人常勝君子常不勝非它惟特立獨行危言覈論上必期於致君下必期於澤民不然則釋位拂衣而去之兹其所以常不勝也而邪則反是惟利之從不顧是非利害茍可以中主之欲為身之謀以售其説而保寵固位無所不用其至兹其所以常勝也邪正之不並立尚矣小人既得志則思所以盡逐君子以快私忿凡挺特不羣剛方不屈平時之議論稍異於己者徃徃指以為朋黨草薙而禽獮之如是而舉世俊傑靡有孑遺矣崇寜用事之臣以元祐羣賢為姦黨殆為是耶雖然天豈可欺也哉後三十年中原多故黄循聖之先公直閣乃得元豐之日歴元祐之時政記於蔡氏家蔵故書中焚焫之餘遂獲上之朝廷書之太史以暴白宣仁聖烈太后之徳音與夫先帝晩年追悔之遺意使天下後世曉然知姦臣賊子之用心雖間能行險僥倖欺世盗名於一時而其終不可掩覆者盖如此嗚呼兹豈人力哉天實為之昔石守道負謗死歐陽文忠公讀徂徠集有詩哭之云讒誣不復辨亦止百年間百年後來者愛憎不相縁是時公議出自然見􅎀妍孔孟固一生毁逐遭百端後世茍不公至今無聖賢所以忠義士恃此死不難信哉斯言紹興二十八年冬十月丁亥䟦李仲覽所蔵東坡滿庭芳法帖東坡先生元豐間以抗議直言忤宰相竟坐罪謫黄岡方是時親戚故舊平日至厚善者徃徃畏咎絶不通問况有能不逺數百里冐犯風濤之險朝夕謦欬於其側以相顧恤者耶吾觀李公仲覽之從先生遊初非有求徒以慕先生之髙風乃至於此想其心亦固斷之天地質之鬼神正復以此獲罪上下無所憾恨者是豈小丈夫之所為哉先生喜公詩至謂氣節剛邁讀之使人肅然自失逮其還朝遇公於富川又書異時黄岡所製長短句以遺公公之於先生亦至矣而先生之所以待公盖不薄也䟦籍田詔石刻代淮西賈曹茂徳臣聞農者天下之大本也而籍田者又勸農之本也周自后稷以農事開國至於文武而有天下籍田之祈播於聲詩迄用康年殆天之所以報也中更板蕩逮宣王乃能内修政事外攘夷狄復文武之境土亦云盛矣而千畆不籍虢公譏之何哉不知所本故也洪惟熈朝若稽古太宗當端拱之改元首講三推之禮以觀稼穡以供粢盛以詒子孫萬世無疆之休徽考祖述憲章振百王之墜典而宣和盛舉輝映今昔肆主上纂承興衰撥亂用再造我有宋爰念食為民命廼追前烈以今年正月戊子躬耕籍田示為農先且復親灑宸翰賜詔中外期與世俗躋于富壽之域而庶㡬於漢文臣雖庸愚不足以窺聖謨之淵懿然歴觀三代盛王敦本務農其蔑以加於此矣而下比漢文盖謙徳也臣寮建議請以前日之詔立石郡邑之㕔事所以儆有位冀使吏知所承民從其化被㫖曰可臣濫将使指敢不祗若以率先所𨽻郡邑而為一路農人之勸乎有實其積萬億及秭臣幸朝夕見之紹興十六年六月甲子具官臣某謹拜手稽首而書於下䟦思古上人華嚴經思古上人飛錫來自湖之何山過圓覺道塲寺有大檀越所開毗盧一大藏教四方以工墨之直來請者如市古出冬裘以示圓覺之衆得錢二萬六千就易此經以歸将以遺宿雲大士為崇因無窮之施經云以一手擎十佛刹能於一刼空中住彼之所作未為難能信此法是為難古臨冬市裘不逺千里能與此經俱來與櫝而蔵之過而不問者豈可同年而語哉後之讀是經者當作是念又䟦所施先塋徳餘菴華嚴經後徳餘菴盖先大夫翠峰居士先宜人施氏之塋奉嚴香火之所中間住菴比邱廣言嘗作僧伽龕其旁設經函十二室曰他日當置大方廣佛華嚴經并李長者合論分十二函以實之為徳餘菴不可稱量不可思議之功徳言之所願未及遂而示寂後十三年嵗在已卯上人思古自崇因來繼領菴事欲踵成之予曰此豈可以累人是夏六月十一日還自臨安乃贖此經以歸授古菴主每十册䕶以五色帕納之函經合論計一百二十册釋音二册謹以蔵之龕中儻見聞讀誦從此悟入譬如一燈然百千燈眀者自眀眀終不盡其功徳豈易言哉紹興二十九年閏六月二十一日壬申
