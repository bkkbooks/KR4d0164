body:
  text: 相山集巻十二宋王之道撰七言律詩邉公式周表卿侍郎同年㑹侍郎邉公式周表卿以紹興十七年夏四月癸丑講甲辰同升之好與諸公把酒湖上為汎舟之集預㑹者余宅仲李景圭王端才何才卿蔡仲平時昌臣李宜仲王彦光及之道共一十一人坐中公式令之道賦詩為唱得東字韻修故事也之道奉命不敢以固陋辭强勉奉呈侍郎修好燕羣公鴈塔題名二紀同談笑静移楊栁日杯盤清泛芰荷風鵬摶競祝三旌貴鯨吸相期百榼空此㑹明年應更好馬周行亦起新豐蘇臺憫農蘇臺五月苦多雨自葑門以東積潦浮天下田所不沉者數寸堤耳農夫以無土沒水取泥培隄防捍湧溢去嵗既遭旱毎食輙不飽今復患水良可矜也作憫農一首稻田髙下欲分畦積潦瀰茫隔寸堤天意未收連夜雨農功良苦半身泥一丸莫救風濤决千頃空憐稼穡低朝滿夕除應可信望晴心緒憶昌黎宣城驛中送建康倅趙純中芍藥飄零雨洗春江城栁色静無塵扁舟未果尋歸路小驛那堪送故人萬里雲天心共逺一龕燈火話相親因風無惜霑餘馥我亦貧兒望富隣和文倅侯彦嘉二首彦嘉與通判孔純老同僚之舊是行來謁知郡鄭深道相遇於無為聫珠唱玉不日成軸僕幸周旋其間縱觀妙句獲所未嘗而彦嘉早晚當赴官西去敢和二詩以為異時撫掌一笑相逢珠玉走佳章顧我無能更老蒼嘗鼎固應從指染衝天行喜見雲翔向來别恨江同逺此去詩情日共長才似二公今二妙山庭淵角繡肝腸暉暉晴日樹頭平望外遥山宿霧輕積潦夜増南浦漲微風朝送北牕清滯留羈客牽歸思陶寫新詩盡物情誰謂春宵常苦短老來無寐厭長更送無為守鄭深道移嚴州世稱儒雅擅青徐今見君侯信不虛報政未容更繡水除書先已易桐廬郡隣帝所旋趨召地切家山勿戀居千乗來迎催去急邦人何計挽行車送錢遜叔出守襲慶賜出身除職賜對金鑾下九天旋聞熊軾為驅前人從芸閣初分直桂折蟾宫乍得仙刺史江山聊復爾翰林風月自依然下車快草東封疏今去祥符正百年次韻蔣守張進彦邂逅傳杯莫放杯七年重見夢初囬休嗟嵗月堂堂去且喜旌麾得得來春至㑹霑新雨露時清應掃舊氛埃如君才業今張鎬憐我棲遲轂屢推送陳南仲守象州熊軾朱轓照野眀知君今赴象山行榮觀共作歎嗟語静念獨傷離别情畏景逼人才數日脩塗計此始三程至時應在中元後好寄雙魚慰友生送秦徳乆守安豐徳乆與僕相别十六年今邂逅宣城其適我願不言可知而徳乆方出守安豐將取道於無為既已涓吉戒塗不容少留僕方自無為來未能遽歸以追驥尾為之悵惘無窮勉效古人贈言五十六字奉呈厯水分擕十六年相逢鬚鬢盡蒼然喜君宦况新來好許我交情老更堅小雨送行春溜急長楊留别午隂圓畫船挿幟澄江逺囬首風帆指繡川喜雨雷聲翻海電光紅濯濯薔薇一夜空雲氣共㸔淵躍蜧雨祥曽驗葉生蟲佇期多稼干箱富先慶來麰百室豐飾喜自慚樽酒薄只將香火向穹窿次韻周漕喜雨十載棲遲畎畆間無聊尤苦屢無年可憐一雨今時若便覺千塍頓鬱然擊壌有期應共慶效顰非分敢争妍正當簷溜江河决想見髙吟夜不眠酬章序臣二首比得江梅數枝於里人因以遺序臣章公既報我以两絶又有唐律因用韻和呈風梢揺落雪飛花誰傳江梅到我家曽把數枝分暗馥要催羣卉助光華髙吟兩絶那容繼勝賞雙清蔑以加春不世情應委曲十年留滯在天涯老懶觀梅喜見花一枝聊復寄君家清香撲袂傳春信䟱影揺牕借日華小小池塘從掩映依依楊栁漫交加和羮風味今猶古囬首青青遂有涯酬李才叔見贈與李才叔契闊凡十一年今相遇於越上大適我願望䝉賦詩送行置酒話别所以眷予之意甚厚謹繼韻篙師且緩莫予催老眼逢君喜暫開相與未成招隠什分携宜盡送行杯誰令急景堂堂去我為佳人得得來萬壑千岩終欲遍歸歟清夢轉幽哉酬周少隠贈行之什我老無知獨夢魚清風一枕午鐘餘忽驚珠玉情相厚便覺山林計不踈酒熟㑹看延客醉詩成還復遣児書何人竟得閒中趣只恐無聊歎索居酬張進彦見寄進彦直閣以僕昔年嘗有惡語書合肥驛中壁間諏度之餘特辱寵和二章見寄至縳虎敢辭山路險斬鯨終見海波澄之句不唯筆力雄健難到亦可以想見其心也皇華應記去年曾六轡馳驅問固陵道路向來荒枳棘隄封從昔錯溝塍烟銷列嶂秋光逺木落長淮霽色澄自笑壯心窮未已欲言言大怕人憎酬吕公季公季昔寓華嚴精舍有半面之舊重來踰三十載殆一世矣得官漢陽未能行以無為孔倅少年庠序之交故自湖隂拏舟至此冀其恵顧前好有以振之而孔倅方攝龍舒郡事正官旦夕且入境公季不欲往謁少留以遲其歸逆旅蕭條厨㸑不煙予還自西郊聞之饟以新粲用救在陳之厄公季有詩見貽因和其韻相逢賓戯快逢場何幸輕投得夜光半面向懐精舍舊一行今整漢陽裝如君俊逸猶沉滯顧我迂踈合退藏别乗未來霜候冷客燈明滅漏聲長酬蘄春王宰公眀僕衰晚不競迫於食貧日乆將有臨安之逸吾宗公眀知縣以言見贈過有褒拂嗣韻報之致身華貫屬華年顧我駑痾乆不前醉被長官輕罵鄭懶從學子競嘲邉功名有日還三傑詩酒何人繼八仙才業似君真獨歩文章政事盡堪傳和趙養正春日逰魏園藜杖芒鞋信脚行宿雲披絮雨初晴溪邉草色青氈合竹外山光翠盖横弱栁㺯閒無限思小桃含笑不勝情清眀此去旬餘日花底能尋載酒盟和孫延夀喜雨述懐韻小雨霏霏夜接朝乍驚和氣入民謡官逋庶為麥秋緩酒價定隨人意饒欲落棗花蠶斷繭半黄梅子稻移苖書生不慣征徭苦牢落僧房不自聊寄别江茂徳赴麻城丞二首此行何處有淹留新得中郎萬斛舟㑹見馬羣空冀野還同鶴駕到揚州鱸魚出網紅翻錦江水浮山緑潑油囬首風檣惜輕别一聲鴻鴈起滄洲次韻周運判彦約芍藥獨殿羣芳占晚春對花猶幸有斯人宓妃正自須曹賦楚女何妨與宋鄰醉著午風濃似酒粧融朝雨細如塵邉城正藉詩書帥爼豆於今識祭遵次韻蔡永叔雙頭芍葯反復新詩對月華䂓模猶及正而葩坐馳芍葯心先醉身老江湖眼欲花夜半已酬連理約風前還見一枝斜灘頭更下雙鸂􅥩併與妖紅作意誇和方正叔芍葯院落青和晝漏長曲欄髙檻倚新粧未饒玉蘂來仙女那羡蓮花似阿郎遣興勉從吾軰在追歡難入少年場開緘忽得驚人句滿紙雲烟翰墨香夜聴劉昭逺彈琴河隂髙轉月光流露脚斜飛夜氣收焦尾冷含三尺水悲風彈破一庭秋廣陵别後多新操子敬亡來絶舊逰欲洗世間筝笛耳為言干斛不湏求和江和仲司理喜雨朝來虹影散青紅旱氣旋隨夜雨空頏頡競㸔飛石燕蠉蠕應快洗桃蟲舊聞人説天心觧今見時和嵗事豐五榖穣穣無幾日敢將豚酒謝穹窿紫薇花過盡紅薇到紫薇廣庭髙檻見芳菲繽紛不逐槐花落拂掠應從燕子飛枝壓畫簷朝露重影揺苔砌午風微何當草詔絲綸閣伴我黄昏坐禁闈春雪一夜春寒夢寐清栁梢梅萼頗闗情山川千里玉為路樓觀半天雲滿城徑醉已從釃酒去稍晴當辦出郊行東君底事偏芳草剗盡依然上砌生立春日雪和趙端質韻春寒有信不踰期肯為衰顔獨見欺白雪已輸梅鬭早緑樽尤與火相宜擷來野蔌和萱草分得江魚貫栁枝刺史憂民民共樂賽牛歸去競褰帷次韻何子應大卿喜雪武昌作雲氣浮江不見邉擁爐吟雪思飄然風將急霰先鳴瓦水剪寒花忽際天才澁敢陪梁苑客興來從泛剡溪船將軍乗夜平淮蔡翻笑元和十二年哀周然明三薦渠能老一儒班超投筆好從吾功名到手身先死詩禮傳家道不孤千里新封從馬鬛百年餘慶萃鵷雛西風哀挽桐川上儻有青芻致奠無魏道弼父挽詞代曽子修徳邵年髙冠里閭慶餘猶及魏公舒似聞白鶴歸華表應有青芻奠故廬帝夢漫驚虞澗築史占空歎渭濱漁泫然東望無從涕莫厠邦人㑹𦵏車次韻元發弟秋日徳餘庵書事二首飽諳世事轉踈慵投老猶能向佛宫危坐遂移桑䕃日清談仍對菊花風凴君為我追歡伯自此㳺山作醉翁聞説秋來足佳句暮歸應念錦囊空十載江湖歎斷蓬夢魂時到帝王宫珠簾髙捲蝦鬚日寳扇斜開雉尾宫勿誚趙堯刀筆吏湏憐竇鞏囁嚅翁児童來告黄花熟可喜樽中酒不空和戴禹功水雲館留題兵火間闗我爾同相逢聊喜話怱怱山長不礙飛雲去江漲應從逺水通白鷺晚潮初浸脚雨花遺址正横空臨風遐想成惆悵千古興亡一局終和秦夀之題天祚宫洞天無際復無旁喬木梢雲十萬章身外軒裳誰繫綰壺中日月自舒長平生塵垢煩三沐投老功名笑五漿白鹿青牛今在否一聲秋磬上寥陽題浮光丘家山寺古寺鐘鳴漏向殘馬嘶人起束征鞍曈曨半弄隂晴日栗烈初迎小大寒溪水斷流寒凍合野田飛燒曉霜乾嗟予老踏浮光路陟岵懐親眼欲酸次韻秦夀之題四祖古木參天翠作堆雲中石棧為誰開樓臺正倚雙峰起香火曽瞻四祖來霜重静聞秋子落風髙愁聽曉猿哀當年松上花何似五葉依然映紫苔四祖常簪花松上松時方拱把今合抱而簪花處皮獨不出其深數尺花猶存焉次韻秦夀之題五祖栽花傳法總吾身生滅無煩取次論一夢儻從今日覺羣峰應許此山尊塔中相好如來具手裏衣盂達磨存若遇小児宜借問性華何處更尋根四祖住雙峯一日黄梅道上問小児姓児曰姓冇不是常姓祖曰是何姓児曰是佛姓児後為五祖遂傳衣有偈云華種有生姓因地華生生大縁與性合當生生不生題四祖山瀑泉亭予紹興二十七年秋七月丁夘至山中登瀑泉亭徧閲先賢留題佳句追和主客楊次公韻雲影曈曨雨弄晴山頭小立聽溪聲不驚赤日雷霆吼但怪青天雪雹鳴氣逼衣裳秋暑薄光揺林藪午風輕法身清浄元無垢何用臨流更濯纓贈五祖山浄老欲知祖意路堂堂滿目湖山自放光林湧亂雲迎馬足峯逥荒磴上羊腸心花肯逐春同老法雨何妨嵗用康試向樵夫問端的白蓮生處是吾鄉贈古若之上人灔潭澄碧見師心我欲窮源何處尋萬壑松風酬夜諷一犁花雨發春吟不妨契濶三年别却得留連數日隂竹外小桃開也未靈雲應已乆披襟送浮屠曇逺歸無為持鉢一笻春色滿郊畿弹指淮南迅若飛丈室正湏香積供孤雲聊作故山歸長安城裏風烟好錦繡溪頭筍蕨肥我有上林桃李約未容隨子赴親闈宿吉祥寺贈應上人窓前脩竹翠摩雲清閟題軒念昔人三紀重來驚隔世一言相契定前因携尊得得紛親友抉藕纍纍萃里民祖意如來煩指似迷舟何幸濟通津雨中宿竹林寺謝尉仁父見訪幽人好客不嫌紆帶水拖泥辱顧予僧舍頓驚樽有酒旅庖那患食無魚敢辭數里來相遇要使它時付特書新竹茂林中掃逕一甌春雪少躊躇示隠静恭老㳺山何敢避泥塗恰值催花夜雨餘杯渡已知無用楫馬行今信不更車數聲幽鳥過庭際一𣲖飛泉赴壑初正欲尋師問心法却驚行色逼鐘魚送懿上人持鉢潜川坐覺青山忽上心着鞭來欲故人尋萬松未放孤雲過一飯共聴幽鳥鳴莫厭﨑嶇窮野徑湏憐料峭結春隂潜川耆舊如相問千里長同月一襟横枝山北别懿上人青山終是慰人心到處相逢不用㝷顧我未能㤀楚些因君聊復效吳吟遥林入眼増雙碧羸馬犇家競寸隂何事横枝送南北他年同此記分襟因上人訪予相山夜聞二子誦書有詩次韻杕錫東來意亦勤寒巖枯木自相親方驚妙論雨侵坐忽喜新詩光照人物外交逰清似水夢中憂患碎如塵児童正欲承礱錯應覺臨文便有神還通上人巻格清詞苦與誰論携繞錢塘給事墳所得豈容人繼和朗吟應被鶴聽聞月輪冷照千巖雪霞片輕裝萬疊雲投向吾廬卜知己擬將詩草為師焚次韻和朗公見贈朗公少年曾逰荆湖識虛中齋已朗公垂老尚吟詩曽泛三湘看九嶷欲問勞生心擾擾强酬佳句思遲遲紅塵策馬殊無味碧杖移僧自合宜共待中條山有雪寺樓吟望更同誰贈省欽師善八分太宗召于殿上書數行賜紫衣舊隠何年别翠㣲瀑泉聲外鏁禪扉御前曽寫八分字天上特宣三事衣燈照夜庵霜後冷鼎烹秋菌雨中肥終歸五老峯邉去杯渡長江一錫飛和因上人三首當塗瑞像因上人有詩欲獻之郡將出以示予予報之三章其一嘉浮屠之能為吾儒之學而欲誘之使至於道也其二寫寂寞幽鬱之思於偕來何子以相慰釋也其三有懐吾親將歸耕相山為終焉之計也知我者幸不我誚非敢言詩也一抨蘭若復誰家坐見羲和下日車燥吻未濡蓮社酒枯腸空攪玉川茶揺風緑竹初飜籜過雨紅葵甚放花得句至今頻示我安能鬱鬱乆兹耶歸騎何時遂到家蒼頭獵獵走風車醜妻終勝長為客薄酒能無更飲茶夢斷北忩凉似水望中南畆雨飛花采蓮逰女應相識早晚扁舟訪若耶白雲飛處是吾家石眼泠泠水一車醉日到來應種竹梅時過盡好蔵茶遥憐壺棗初成實似説占禾半吐花已得伽陀㣲妙句歸歟香火諷囉耶贈朗上人朗公少逰渚宫與齊已相識净剃霜髭展舊真自疑容貌是前身僧中獨守三千戒詩裏閒銷七十春僻寺蘚深人到少故山雲好夢歸頻禪齋近日誰還往祇有西垣放逐臣贈賛寜大師詔修僧史浙江濱萬巻書中老一身赴闕尚留支遁馬援毫應待仲尼麟溟濛雪影松忩曉狼籍苔花竹院春還許幽齋暫相訪却慙陶令滿衣塵朗上人見訪復謁不遇留刺而還有詩見謝依韻和答湯休訪我我重尋獨叩松闗絶好音滿袖塵埃囬俗歩一鑪香火隔禪林偶留刺字情非淺忽枉詩章思更深猶喜謫官無吏役往來從此伴閒吟贈遇公上人卧雲衣服半斕斑吳越烟蘿舊往還幾度看濤羅刹石經年尋藥武夷山剃髭刃澁秋忩冷補衲燈㣲夜榻閒應笑勞生苦多事槐花時節入秦闗寄賛寜上人時上人進新修髙僧傳有詔赴闕支公兼有董狐才史傳修成乙夜開天子逺酬丹詔去髙僧不出白雲來眉毫乆别應垂雪心印休傳本似灰若念重瞳欲相見未妨西上一浮杯和天寜因上人次韻日月漂流一鳥過别來心迹病維摩是非孰辨聊分謗誕信相譏要止訛揺落獨憐松不改澄清嘗見海無波句中有眼勞開警更問諸人㑹得麽和褒山因老二首湖上逢師又到家别來詩句好相誇休嗟晚菊今迷草且喜寒梅欲放花丈室香温巖寳坐將壇風軟擁髙牙相思對雪酬珠玉不覺茅簷送月華島可文章似出家不將言語落浮誇雪中令我思風絮天上因君合雨花一炷飛烟雲天矯數行佳樹玉槎牙山髙殊覺青霄近捫虱南忩向日華次韻因上人謝徐守遺顧渚茶相從聊罷致書郵情寄詩筒早晚休顧我未忘童子好評君還向古人求緗奩啟處雲英馥石鼎煎來雪浪浮多謝徐卿分顧渚報之瓊玖兩相收五言長律送趙端質歸朝聖治中興日宗藩第一流九重資共理三載頼分憂昨日交符虎當時競帶牛咄嗟成藥石談笑獲鋤耰善政稱無擾罷民遂有瘳教風興子弟膏澤被田疇士論髙强漢王功繼屏周外臺書課最禁從表才猷往矣登青𤨏宜哉建碧油瘡痍爭借冦憔悴獨依劉我願攀鱗進人思卧轍留是行端可喜名姓在金甌過富池題澄江閣二首晚日千峯色秋風萬里情望雲雙目眩渇雨寸心傾有客詩方就何人笛正横渚烟縈别浦江月動前楹草木腥猶在生靈痛未平傷哉一杯酒北向酹邉城江山南北限風月古今情舉酒杯還覆逢人盖暫傾目窮飛鳥落心逐斷雲横小市支殘屋嚴祠列畵楹晚烟漁艇逺夏潦荻洲平試問濡湏路歸歟過幾城次韻劉春卿書懐老去宜安分年來强競辰功名雖自許心腹欲誰陳頼有金谿彦相從錦水濵詞華三鳯蔚詩律八音純風月論交舊雲山發興新鄙懐煩澡雪髙義歎傾囷李嶠真才子唐邕實異人感時悲鶴戰憂國賦車轔寤寐思摧敵行蔵冀澤民亷髙辭鄭粟狂笑取韓銀松柏迷荆棘琳琅雜珷珉北㳺觀赤幘西走避黄巾端木謀存魯長沙論過秦江湖雙醉眼天地一閒身遵海嗟黄屋垂衣想紫宸擒王湏李靖抗賊付張巡尚緩三城役方馳六轡詢兩河蜂伴蟻多壘介和鱗烽火青淮隔樓船古汴堙離宫埋茂草禁籞掩荒榛典冊尊諸夏戎羌守四鄰如何來醜類容易破重闉大厦煙焚突長堤蟻潰漘複垣閶闔夜層觀景龍春蔑視排姦魏空聞識反甄傷哉無止鼠甚矣不由鶉天啟中興運時當外侮賓此生那習坎吾道已康屯黄巻何妨對青燈正可親侏儒歸櫽括苦窳入陶鈞夸父勞追日顔囘悵絶塵廟堂資賛輔巖穴忍跧踆炳煥文中虎玲瓏席上珍肯終虞澗築聊滯越山薪君壯勤非勉予衰懶是真㑹看鳴鸑鷟相慶畵麒麟簪紱行當貴虀鹽莫厭貧仲尼憂悄悄揚子惡頻頻守節身何屈移忠道自伸秋吟足佳句飛動筆如神追和韓退之雪韻一時符衆望七尺騐童謡人喜豐穰兆吾知瘴癘銷戱看還撲靣閒試欲齊腰堕絮紛辭萼飛花半惹條松篁低到地溪澗合平橋月牖潜争入風簾静自揺紅金延坐夜緑蟻送行朝暗上歌茵隰輕随舞袖飄千林翻魯縞萬里藉鮫綃燈市堪行樂何妨酒價饒菊有黄花為彦逢弟夀正色憎桃李凌霜見嫩黄有同髙士操常占晚秋芳裊裊金風軟􅄎􅄎玉露光君恩隆一束時令應重陽幸遇桑蓬慶欣逢麴米香敢因難老祝採掇奉瑶觴春雪和袁望囘三首殘嵗連人日同雲暗海涯晨開才曭晃暮集復交加野色鋪霜縞秋光散玉葩老夫僵不掃稚子走争拿皎潔欺梅萼嚴凝禁草芽餓彪迷舊穴驚鴈失圓沙有客方誇酒何人欲鬭茶南山歌禹甸西國想毗耶㺯日烏薪熟圍風翠幙遮豈知春霽好萬物動芳華誰謂過殘臘餘寒遂有涯雪來風益横氷着雨還加萬里隋堤絮千山庾嶺葩袁門晨尚閉剡艇夜應拿百蟄猶含土羣芳敢放芽嬌紅還玉茗新緑借金沙力勝榴花酒功髙雀舌茶人心愁甚矣天意欲何耶好放朝陽出休從宿霧遮青腰誠念我明日變霜華稜稜威正肅浩浩意無涯雨息風還怒霜餘雪更加􅉊毺還席地薝蔔競分葩虎餓豺狼摶烏窮鳥雀拿木氷鳴玉佩簷溜軋蘆芽鶴集疑驚露羊羣憶卧沙晚餐甘當肉夘酒薄勝茶盈尺其多矣踰旬果是耶日車行自駕雲障欲何遮坐想傳柑飲千官從翠華和袁望回春雪白雪嫌春晚縱横布玉霙栁花隨處發瑶砌逐門成旌别寒松茂摧殘凍芋萌飄颻無限思料峭有餘清舞袂朝猶濕吟窻夜自明色疑侵兩鬢光欲眩雙睛曭晃干林曉潺湲萬壑晴江梅含故態山鳥㺯新聲雅與詩情惬應憐病骨輕澆腸一杯酒風力鬭峥嶸對雪和子􅣫用歐陽子韻散漫來天際髙吟正倚門逺山雲母合芳樹栁花繁匝地銀無價冰湖鑑有㾗何人穿敝履有客擁髙軒訪戴從東棹㳺梁快北轅鼎寒香屢撥杯冷酒重温風力千林吼雲容萬騎屯食餘鹽虎卧坐乆炭猊蹲觀舞更三疊論文罄一樽清芬難揜覆端的屬梅園送楊徳潤赴禮部試雨意止還作天容寒未舒無聊懐劇論何幸過窮居舉白夜釃酒剪黄朝薦蔬新詩閒鼔吹舊隠亂丘墟軒冕時何晚山林計亦踈中興屈羣策入告莫躊躇追和東坡立春韻寄彦逢弟荏苒嵗云暮艱難予豈堪闗山懐逺别弓矢廢清談風色霽還暖梅梢春已酣信音驚逺鴈心緒亂游蠺投筆班超近擒戎李靖慙行吟望西北赴難有虞潭六言詩和徐季功墨梅閒想窺池倒影戱成落筆斜枝縱􅄺難淄玉質細看何似當時便是朱唇素面那知緑葉青枝浄几明窻展處㣲風淡月醒時五言絶句題成國仲畵扇奮髯欲何為戢翼應有待畵工妙丹青物狀從變態題馬以道畵扇寒蘆卧踈黄逺水分淡碧秋荷如有情相映兩鸂􅥩追和魯直蠟梅二首一種幽素姿凌寒為誰展似嫌氷雪清故作黄金淺嵗窮壓霜雪春至喜風露一枝蠟梅花清香美無度送道者史寳通作丐昔日山前寺兵餘掃地空汝今能協力真是寳林通又送道者王法圓作丐誓將三寸舌求結萬人縁寳刹成功日當期道法圓送浮屠道廓一宿已先覺四明那更逰去來無所着風日海山秋
