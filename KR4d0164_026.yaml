body:
  text: 相山集卷二十六宋王之道撰啓賀王仲開無為到任啓入奏膚公被綸言而進秩來宣德意憑熊軾以專城光塵開刺史之天膏澤下文昌之雨涓剛視事載歌已浹於四鄰裁書寓心修好敢稽於一介恭惟某官風神高邁幹局明強在朝誰踰仲卿信有家法當世未見夷甫可謂人豪肆王室之中興崇侯邦之外援念甸服久淪於塗炭而月城盡廢於荆榛民苦瘡痍正有資於撫養兵連蜂蠆其可緩於驅攘姦宄招權貪暴專殺兹用輟江東之獨步固宜致淮南之寢謀君子怙焉小人恐矣某邱園斷梗湖海浮萍存魯何功歎干戈之未靖依劉有幸望桑梓之非遙馳驅尚阻於披雲踴躍輒先於賀厦賀宋景陽無為到任啓伏審楓宸錫命銀菟分符千里興謠喜列星之入境兩淮增氣慶偃月之得賢况居是邦獲賴其福既景仰之有素宜舞蹈之不知恭惟某官清廟尊彝碧梧鸞鵠盛德懿範素高二相之風茂實英聲早擅一時之譽眷隆當寧寄重專城淹寧終於三年政將報於五月披雲甚邇幸依桑梓之隂賀厦惟勤敢附鴈魚之信與滁州謝倅交代啓莫為我先孰覩告新之政請從其後敢忘求舊之圖方欲寓心遽先枉教屬有金沙之役尚稽繡段之酬載味過情益知靦面恭惟某官神識沈敏才術疏通譽望攸歸固後來之一器風流未減真吾家之千金雖未見其聳壑昂霄已屢更於蟠根錯節惟淹翔別駕者如此其久故傾動諸公也不謀而同某朴遫無庸蹉跎不競策駑足而追驥何可及哉翦狗尾以續貂代其匱爾儻及瓜之非晚庶披霧之有期尚愼節宣以綏福履賀元旦啓符頒桃梗俾在位之罄無不宜酒進椒花期有家者老而益壯應三陽之交泰與萬物以更新恭惟厚德鎮浮高標激濁半年於此不為赫赫之名千里而觀但見熙熙之俗所謂祁寒之愛日豈惟酷暑之清風民人所歌福祿攸介况對大來之旦宜膺善降之祥某待罪杜門畏讒避地有賢而不能事固慙居於是邦掃軌而無所干豈免譏於同輩但厠稱觴之列徒傾賀厦之心瞻頌益深敷宣奚既代人到鎮江任謝執政啓歸從霅水之遊方欣得計起作丹陽之守良愧非宜况當江淮襟帶之衝實為吳越股肱之郡望雲甚邇宜責任之益隆借寇方濃豈疏庸之敢冀雖皎日無私於照隙亦和風有力於噓枯此蓋伏遇某官名重本朝道嗣前哲蓍龜國論斷然可否之莫移冰鑑人材昭若賢愚之自辨潛消外患力贊中興重憐一介之遺曲借寸長之譽致兹嵬瑣再被搜揚某敢不採問風謡班宣政令務安凋瘵庶無愁恨之聲期使澆漓悉變敦龎之俗不負知己斯為報恩代宋景陽到無為任謝執政啓去江百里舊為魚稻之鄉臨水千區今雜吏民之舍視諸郡猶為勝處在同列可謂誤恩竊以一州得才則十萬户賴其福庶民從化惟二千石用其良漢唐以來率皆愼此兵火之後其可忽諸休養瘡痍驅攘蜂蠆况熙朝方注意於淮甸豈薄才宜備員於月城此蓋伏遇某官股肱一人師表百辟持顚扶危以贊中興之運折衝靖難以成外攘之功謂任賢使能當在所先故刮垢磨光亦或不捨某敢不盡瘁以事強恕而行不為赫赫之名用安流散庶使優優之政將播詠歌報德如何處心若是與無為令李廷吉啓道路興謡喜雙鳧之入境吏民改觀知百里之得人恭惟某官名重當時韻齊先達質如渾金璞玉之莫名其器材似干將莫邪之難與爭鋒悟主片言識封侯之非晚報政三月嗟改秩之未優暫煩卓犖之英來理荒殘之邑九重惻怛重郎官出宰之權一灑煩苛鄙令尹告新之政願同百姓皆出再生既期披霧之瞻當致維桑之敬謝張簿啓負職居多念哦松之弊政接聨何幸對栖枳之新除榮耀一書歡騰百里恭惟碧梧停鵠滄海遺珠標致故自不凡才華尤世所貴家傳三篋知無不讀之書胄出九齡是必致逺之器撞鐘待問翻水成文射策天庭笑却萬人之敵升華桂籍榮題千佛之名凡在見聞孰不歆豔顏亦厚矣愧尺牘之未修德莫加焉辱長箋之首及賀劉無隅除户部侍郎啓代何希淵作伏審寵膺帝制擢二地官九重側席以遄其歸千里攀轅而惜其去簸揚所逮舞抃攸歸恭惟某官風教名卿文章宿老驥稱其德洗萬古而凡馬空嶽極于天臨絶頂而衆山小上方圖於邦計時莫急於軍需當求條奏時政如李元紘庶幾對揚聖問得盧承慶果聞華綍愼付真材食給關中正賴蕭何之畫錢流地上佇觀劉晏之功進位鈞衡加澤寰宇遂益隆於國體用大慰於民瞻某猥以孤蹤出於大造朽株枯木嘗有賴於先容墜履遺簪幸無忘於舊物永言欣頌實倍等倫鎮撫司參謀到任謝趙聖用啓鄉邦半載猶懷衣錦之羞賓幕一時復遂依蓮之幸雖從宦在人情若為可慶而奪喪於子道寧免有慚寵極魂驚感深涕霣竊以觀人固自不易聽言尤其所難方邪正之未分孰明汲直逮是非之既判方驗盧姦然理可知者君子不為面諛而情可察者小人專事容悅儻或樂於軟熟鮮不墮於蔽欺兹古人所以抱忠信獲罪之寃而大雅所以有明哲保身之戒伏念某賦才凡下稟性庸愚居懷隱甫之剛常守展禽之介學惟古是動與時乖疾惡若讎自不知其已甚論心如故人或誚其太疏豈惟鬻漿而得涼常是轉喉而觸諱尚賴覆盆之照少寬擢髮之誅岸側沈舟坐閲千帆之過籠中翦羽旁看百鳥之翔敢謂棄捐更遭收録此蓋伏遇某官惟善能舉其類於人何所不容藏疾納汙大廓山川之度揚清激濁悉歸標鑒之公察其頃守枌榆初本無過憐其久居邱壑不遽遐遺賜以劉公一紙之書置於越府三才之列某敢不秋城夜觀逺追退之談笑之風客禮官曹載味子美接聨之什冀今日碧油之眄為他時黃閣之知謝發解啓十載家聲孰繼三珠之植五州鄉賦今同一鶚之飛豈曰能賢幸而獲選竊以祖宗設科舉以取士最號得人崇觀興學校以育材獨聞稽古惟詩賦之再復與經術而並行因元祐所嘗用以求俊良肆靖康乃率由以變風俗一時韋布方聲律以相先千里干戈遽寇攘之見逼逃虛既久失職可憐如某者湖海浮萍邱園斷梗窮有餘於五鬼文不逮於一錢酒甕飯囊豈免禰衡之誚驢鳴狗吠敢逃庾信之譏屬世道之交興致中外之率俾爰下三年之詔用搜萬國之英抱槧懷鉛數多踰於百輩拔犀擢象名僅登於六人豈謂疏庸亦蒙簡拔此蓋伏遇主文先生用心若鑑持法如衡美惡惟形人莫知其報德低昂順物我亦何所容私樂莫濫於齊竽寶遂珍於鄭臘某敢不加勉所學益堅乃心將期驅羊而取官用酬平昔庶幾指龜而論報上答恩私賀淮西漕韓璉啓芝檢疏恩輶軒出使素妙斡旋之術望重一時遂專飛挽之權惠加九郡况足兵莫先於足食而用衆無急於用賢其兩得之在此舉矣凡預卿雲之庇竊欣愛日之臨恭惟某官器識高宏才猷英逺濟煩治劇如破竹於數節之餘摘伏發姦似穿楊於百步之外允矣澄清之寄卓然華近之階某朴􅈪無庸蹉跎不競青天甚邇會逢雲霧之披滄海雖遙敢借舟航之便稻花過雨梧葉驚秋方炎涼之未調冀啓處之加愼鎮撫司罷參謀謝啓受誣對吏始慙明哲之保身獲譴贖金終坐刻深之為獄尚幸容光之賜僅逃洗垢之誅感涕無從歸恩有自竊以詩歌行露重言聽訟之難史記降霜深悼被囚之屈蓋兩怒既多溢惡則偏聽必至生姦矧夫周陽由心懷愛憎加以伯州犁手持上下謂虛為實俾證龜以成蛇變有作無至鑽皮而出羽刑因不中罰及非辜安得張季之時無寃人固宜于公之後有興者伏念某心如其口愚無他腸忘機而言輒露情好直而動斯疾惡是故論事常若茹物之莫能以下咽至擊邪則猶視讎之不可與戴天自初攝事於鄉邦逮此備員於帥幕力排螟螣休養瘡痍鑑為醜婦之羞分明亦甚鹿被獵夫之逐羅織何多始緣人醉而獨醒遂見我清而衆濁致姦諛之醜正假貪暴以興訛劫異時骨肉之流共為媒孽賂平日指天之輩咸作爪牙因何武之露章訝宗資之畫諾遂成汚衊妄瀆宸聰祗欲淪胥冀逃已禍適蘇章來二天之庇故曾參陷三至之言雀角繆悠虎冠顧望借袖蜂而害尹引跖客以刺由專慿盜璧之讒莫辨償金之誤與禽獸而奚擇又何難焉譬草木之有區焉可誣也兹蓋伏遇某官精神滿腹白黑簡心著戴胄之明強擅王圭之標鑒櫛垢爬癢一時冬日之溫枯蘇弱強千里卿雲之覆是修羔鴈聊寫肺肝其敢不尚友古人益堅素守皇天后土况明仁傑之心伊尹周公尤見元忠之德造次於是死生以之回安豐教授潘元賓賀啓誤膺共理方懷非據之慚猥辱同聲逺致過情之譽對雙魚而拜貺加什襲以珍藏榮幸不資欽佩何已恭惟某官當今潘陸異日班揚言文而真蓋得聖人之忠信學精而博宜為儒者之宗師豈芹泮之能淹將蓬山之是陟念嘗有一日之雅雖鄙拙而愛忘故不逺千里之遙以緘題而贊慶永為好也何以豫之與信陽交代張卿直啓雙魚尺素比慚報謝之弗虔一日三秋方念憂忡之未釋矧及瓜之非晚豈削牘之敢稽恭惟某官盛德圭璋長材杞梓政成五月豈容借寇之留名在九重行遂徵黃之拜某策駑追驥翦狗續貂雖有命以難違顧非材而甚愧荷花過雨桐葉驚秋願加寢餗之調冀獲晤言之慰代張守彥智賀劉宣贊克捷啓禁暴戢兵久恃干城之略獻俘投馘今聞斬將之功息千里之鳴桴致五州之奠枕戎有良翰公乃其人恭惟領軍宣贊喑啞咄嗟足以讋敵嚴毅沈果工於料人刃恢恢乎有餘將多多而益辦究觀細栁若亞夫真將軍哉固宜闔廬知孫武能用兵矣眷言小釁密邇大軍屯戍同安知每勞於外援師民振武誠有藉於中興豈惟萬舉而萬全盍亦七擒而七縱某屬拘茅土阻造轅門裁書寓心姑慶滅烽於淮甸勒銘紀實終期蹀血於龍庭代何希淵謝越守陳汝錫啓撫孤恤難義為熊掌之求殺父取資橫致鼠牙之訟不有片言之折難逃三至之誅感極驚心恩深隕涕竊以獄繫人命不容失之或誣民有爭端尤宜愼於致察蓋兩怒既多溢惡則偏聽必致生姦愛惡相攻是非交戰詞茍忽於三復理斯暗於五聲辨若張儀莫獲明其盜璧孝如曾子猶被謗於殺人此先王所以有取於淑問獻囚而後世所以深譏其忠信獲罪伏念某箕裘衰族蓬蓽寒生纍世括蒼仰少微之在上半生歷水慕張籍之為鄰荏苒歲時棲遲邱壑家徒四壁地僅一廛酒雖乏於賢人車競來於長者嘗欲見危而致命敢憚殺身以成仁肆聖主之東巡適金人之南渡干戈雲擾士庶星奔號寒啼飢者往往衣冠攜幼扶老者紛紛原野哀哉弱女父已陷於孤城去矣扁舟家欲浮於大澤乃孺子將入井之際而仁人當引手之時眷彼友生收此惸獨遑恤每食之不飽但求容膝之易安間關百罹參差萬死方喜將安將樂共獲保全豈知無罪無辜反遭欺衊人嗤德報以怨自嘆害生於恩誰實憐之慨其嘆矣尚幸覆盆之照獲伸刻木之寃此蓋伏遇某官持張廷尉之平振韓京兆之職儒雅飾吏明愼用刑謂鄒衍之降霜以明忠也故召伯之行露每盡心焉斷然三輔之蓍龜昭若萬邦之冰鑑遂令黮暗終被平反某敢不載惟張堪託子之言益堅郗鑒哺甥之志苟交情之有取雖執咎而何憂兹為今日之報恩亦結異時之知己賀黃大受司理致仕啓挂冠法曹還轅鄉社君恩優老俾通籍於朝班士論稱賢振高風於時輩未遑贊慶先沐寵臨病尚阻於登門報敢稽於削牘代張守彥智賀朱勱沈仂及第啓射策楓宸笑却萬人之敵升華桂籍榮題千佛之名朝廷得賢邦國交慶恭惟某官筆走羣象心醉六經翻水成文追異時之大手撞鐘待問號當世之長頭月評既高風鑒加賞摘髭收第雖吏部之相推驅羊取官亦舍人之自許果膺愼簡獲慰欽遴顧桑梓以何功屬竿牘之過禮贈同錦繡當為篋衍之珍報蔑瓊瑤益重心顔之愧回應隆謝解啓作者七人審已被周書之薦成名一日遂將登漢策之科是為瓜葛之榮豈獨枌榆之慶恭惟文工翻水譽重拔犀飽看未見之書森然九經庫歷辨不知之物展也五總龜豈圖老去之殘年獲睹後來之秀士喜與抃會情在文前衰朽何稱猥辱瓊琚之贈繆愆有愧難論錦繡之酬又回許驤謝解啓伏審得雋文場馳聲士藪未果踵門之賀俄承漫刺之臨更辱長箋以華衰老恭惟才猷出類事業軼羣有開必先既遂首一鄉之善不鳴則已又將魁萬國之英用慰月評少伸輿論顧乏瓊琚之報猥蒙繡段之投莫罄欣愈徒增愧感又回張天紀謝解啓伏審較藝文場登名天府光生梓里歡動萱堂顧贊慶之未遑辱緘題之先及恭惟筆走羣象心雄萬夫舊堅鐵硯之盟今中銅錢之選不先不後適居兒姪之間曰寬曰柔仍喜願恭之次可謂州閭之秀堪為蒲栁之榮龍泉太阿雖其光射斗牛隋珠和璧豈宜以暗投人報乏瓊瑰愧兼芒刺又回流寓孫深幾謝解啓伏審興賢能於萬國祗奉詔音推流寓於一時榮登貢籍尚阻踵門之賀俄先漫刺之臨仍辱長箋特形過禮恭以才猷俊邁學術淹通詩攻秦系之城賦入相如之室德懋厥祖昔嘗刺於是邦才高乃公今尚尉於屬邑雖披雲之未久而蒙霧以滋多流水高山自顧非知音者夜光明月胡為以暗投人又回蘇路謝解啓伏審郡國明揚祗奉出綸之詔邱園特起榮膺薦鶚之書歡動庭闈光生里舍恭以少推有造長負不羈李長源之才猷吾嘗呼以小友酈食其之豪放人皆謂之狂生惟藏器以待時故依隱而玩世今中賓興之選是為貴達之階初得傳聞欣喜至於不寐更蒙惠顧感佩為之無涯欲論繡段之酬敢後桂枝之祝答滁州同官啓比蒙誤恩濫授別駕二年待次竊有愧於非才雙魚致書敢復希其過禮望不及此心當謂何恭惟某官善政能官雄文爾雅交友則樂相下無嫌乎自後以先人責己也重以周惟恐其太高而絶物義不遺於一介意何翅於萬金顧無瓊玖之酬徒切巾箱之祕答安豐同官啓永言聞望久懷未見之忡何意宦遊將有同寮之幸事關夙昔情極歡欣方欲裁書少致論交之好遽蒙遺札備形過厚之恭非所敢當祗以為好代人賀淮西趙安撫到任啓伏審升華延閣移鎮名藩一人寬側席之憂九郡效長城之慶中外幸甚恭以某官風神高邁幹局明強自更督府之煩洊歷淮邦之劇發姦擲伏情常得於咄嗟厭難折衝功每成於談笑惟合肥之重寄由當寧之深知行將繼淮隂之數萬以盡取齊城且復同幼度之八千而遂平堅衆力除外侮共濟中興某才乏寸長慮無一得偶緣當路俾攝令於月城以迄今朝獲蒙休於繡節雖望風解命誠為見幾而作念操篲侍庭豈曰無因而前將遂望塵敢輸賀厦藕花過雨梧葉驚秋冀加愼於節宣期亟躋於禁近得宫祠謝宰執啓昨干出位之誅理宜無赦今拜奉祠之命恩實有歸惟捫舌而莫懲其非故隕身而冀效其報伏念某受材凡下賦分奇窮性識不靈學每拘於是古計能無取事仍暗於趨時言輒忤人動斯害己失漫追於奔馬悔何及於噬臍當南譙待次之餘正北征出師之際四郊多壘羣帥異心欲輸螻蟻之忠敢避邱山之罪囊書朝奏綸誥暮頒果示薄懲聊從逺竄省愆念咎俄四閲於歲華湔垢滌瑕遂三經於恩典飢寒共迫疾病交攻伶俜蓬艾之間落拓江湖之上顧此身而自厭諒斯世以誰憐爰有仁賢飾以齒牙之論遂令廢吏足乎升斗之求俾養駑疴用全樗散伏遇望隆當代德配古人藏疾納汙大廓山川之度揚清激濁悉歸標鑒之公惟中養不中而才養不才故小以成小而大以成大曲借吹噓之賜再興沈滯之蹤此而可忘他亦何賴雖成事不説尚當驚木而吹虀然補過有終更冀贈刀而遺帶
