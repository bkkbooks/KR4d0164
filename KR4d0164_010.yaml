body:
  text: 相山集卷十宋王之道撰七言律詩和周少隱實録院對竹三首夫子文章僕命騷髙標寧若嵗寒凋慣看雄辨朝揮麈想見清吟夜度韶老去荷君頻折簡時來容我尚同寮區區長倩何為者不樂平原意本朝老來鬚鬢白刁騷猶喜丹心未遽凋秋賦肯甘同宋玉晝眠聊復繼邉韶翩翩幽鳥隨風屐炯炯寒燈伴夜寮多謝故人珠玉寄水雲堆裏望天朝窗寒踈竹共蕭騷可笑圓荷著露凋實録成書輝日月奉常新樂奏咸韶佳篇千里來青瑣好夢連宵到綺寮湖海固應聊爾耳佇看丹詔下公朝和韻寄董令升舍人曽將燕石報瓊華别後哦詩愧莫涯空腹但看長柄械緩行何用短轅車神馳鄧步彌天葑夢入朋溪夾徑花何日天台尋藥去女仙迎笑飯胡麻和余元明時元明邀余同李次元夜飲坐中强半是同年賴有斯人席更圓跨馬未須貪逺道舉觴聊復望青天枯荷折葦三墩路明月清風百丈船俯仰便成陳迹恨須知此集不論錢避冦糝潭登李彥修延秀閣王師千里下邦畿三月宜新對敵圍江上扁舟隨處是煙中華屋轉頭非逢人借問何時定有客來傳二聖歸已辦笭箵學元結卜鄰猶冀不相違和因上人午睡韻多謝髙人問起居惠然相過共秋蔬栖栖衆且疑夫子碌碌誰知效阿奴老去睡鄉還積缺君來詩社責新逋便便一覺南忩午短簟方牀意不踈歷陽寄定城尉彥逢弟故園鵯鵊久催耕休戀公田秫與粳别恨久隨黃耳去歸心應望白雲生干戈叢裏三書考春夏交來幾閉城我亦藍田負丞者相從何日賦淵明和蕭山臨川亭壁間留題韻水外峯巒碧四環雨多門徑蘚苔斑滯留又及炊新粟歡喜何當見舊山招隱有詩來霅上倦遊無夢到雲間西興十里秋潮晚坐數扁舟帶月還和彥逢弟春日即事楊花如雪菜花黃路出初郊正日長喜對新詩醒病眼㑹逢膏雨沃驕陽過僧竹院茶爭美酌客山堂酒倍香常恨抗塵仍走俗不知身在水雲鄉和陳勉仲春日偶成二首帷幄何人正坐籌胸奴輕漢索懷柔回鑾未覩迎天駟勸穡還驚出土牛雨過池塘新漲緑春歸原野霽煙浮中興自古須羣䇿更願君王慎厥猷江表歸來得自由舊鄉能復到溫柔辭源已見流三峽筆力當期挽萬牛白日忍從黃霧塞青天那復黑雲浮掃除驕冦還强漢㑹有忠良告逺猷春日偶成餘生今赴邇英朝似說䕫龍許續貂枯枿遂承新雨露蒼鷹應識舊雲霄廢興須信關時命勞逸誰能問貫條十載山林勞夢寐五更天仗聽簫韶春日次韻張叔元遲日輕風過雨天草青南陌欲生烟江湖節物登王鮪村落歸心起杜鵑已辦尋芳游野寺何當修褉泛溪船路逢少婦携籠去為說蠶兒向雨眠和秦夀之中秋玩月三首一樽芳酒起沉烟絶勝紅裙擁後前山色水光相上下月華秋氣共清圓佳時令我思韓愈好夢逢君想惠連老大不知追逐樂却因妍唱惜流年湖光無際接雲烟舉酒登臨夕照前坐送落霞還杳靄倚看明月上髙圎清談浩渺河源注麗句縱橫繡假連歸去鳳池知不日山城岑寂記今年腸斷江城斂暮烟一聲清笛短亭前揚舲共喜風初轉戲綵當期月正圓水落雙溪和石出霜餘疊嶂與雲連令人暗想昭亭路屈指歸來又四年和張彥智中秋對月萬里青天霽色開嫦娥駕玉上雲來樓中勝飲八仙聚物外清談三語該空翠水光爭滉漾漏聲鐘韻共徘徊秋盤應愛金櫻好紅抹佳人醉裏腮和髙守無隱官閒即事老去空悲樂事稀百年渾醉幾多巵雖貧賴有舊栽竹縱懶未容全廢詩碧草望迷烟漠漠黃梅看熟雨垂垂莫嫌蕪纇晚相凂欲換邦君白雪詞誰憐村落笑歌稀全把茶甌當酒巵枯槁又經三月雨窮愁聊付一篇詩窗間逺岫青千疊樓外長天碧四垂何日獲陪文字飲欲翻妍唱入新詞和胡德輝增明軒釣魚聊復效詹何肯向青山較少多身世自憐巢幕燕利名誰鑒撲燈蛾風前逸氣舒長笛酒裏清愁到短歌安得梧桐來鸑鷟一鳴千古繼卷阿寄奉符大有叔血氣侵凌不復豪往來欹倒似乘濤寧知懶過嵇中散亦有詩如謝法曹舊藁只堪供醬瓿故人相贈有綈袍兖州賓主同風味惡句煩公更一薅和曽式古式古省幹當髙使君守濡須日實為幕中之賓罷既踰年而兵餉有積下供給錢數百千未請欲以為歸資情見乎詞成唐律三章以示同寮僕偶獲觀焉韻險不能盡和姑和首章以當贈言白雲飛處見層巔回首風檣去若仙舊隱已鋤三徑菊新吟聊訴一囊錢春歸沂水還相樂秋到盱江盛有年更著綵衣歌且舞髙堂侍瀝奉周旋和何希淵韻敢負交遊素所期自憐衰滯使君疑向來兵火亦何久此去功名應未遲詩似清風宜我慰心如白水欲誰欺扁舟儻赴相從約江北江南笑有辭和孔純老歸自屬邑三首純老通判歸自外邑聞守將宿有擕妓郊勞之約途中以詩督之且䝉不鄙示豫謹次韻一笑行縣歸來賦陟岡青梅應快一樽嘗詩成妙墨揮張聖酒到髙歌發楚狂夾道野花圍步障兩行官妓簇橋梁嗟豫貧悴跧蓬蓽不及郊迎笑舉觴往來隂雨恰彌旬滑滑那堪鳥語頻行色可無三日霽旅懷應付萬家春欣聞郊勞開瑶席想見車旋入錦茵何幸詩筒時寄我慰懷須信有詩人詩濤難放筆頭乾歸及初晴素魄圓善譽敢論當世比佳萹應任老夫傳凌雲列岫堆螺髻出水新荷㸃翠鈿報政還朝知不晚追隨能復記當年和梁宏父二首時來談笑取侯封清曠寧容雅志從上聖急賢齊舜禹羣公引類邁䕫龍非材似我十圍櫟有用如君千丈松邂逅相逢辱傾蓋能令瓦釜配黃鐘功名須向壯年收顧我摧頽已白頭節晚獨存松柏徑嵗寒還見雪霜浮老將耄及從人笑醉欲眠時遣客休眼力尚能觀細字詩筒經卷且優遊走筆和孔純老催詩債次韻閉門對客總言詩淹速由人敢預期思若湧泉誇往哲文如翻水擅當時年成定見爭稱善月鍊懸知鬭出竒疾似枚臯何足道漢朝終貴長卿遲魯直云閉門索句陳無已對客吟詩秦少逰年成見左思月鍊乃許洞避冦姥山山前湖水抱烟村湖外山光隱若存泛宅浮家聊自託䕃松藉草欲誰論物情魚沫真堪笑世事槐安不在言回首故園煨燼裏歸歟猶勝傍人門和鄒進士望外青山便到家馮歡何患出無車坐逢石鼎應聯句篋有龍潭敢鬭茶樽酒幾時同竹葉功名終日鑒菱花君看一雨蘇羣槁所至人心樂否耶和丁景仁三叉河留題贈李仲山飄零雙鬢已星星萬里江湖寄此身山擁青螺初洗雨水浮蒼壁似圍春别來興廢同千古此去榮枯㑹一新葭薍彌天草如積寬豫猶賴有斯人弟子厚自相山徙居湖塘又復一月矣距外除只數日間光景漂流徒成感慨讀新詩興不能已輒和韻相逢休訪楚江萍我老無能一壯丁卜宅又驚三浹日御琴空感再周星新愁卯酒心先醉氣怯春寒夢易醒却喜故山遙在眼舉頭時見竹青青和李難老半生場屋㺯朱衣猶喜春來破白歸同輩交遊惟我拙一時人物似君稀風神要在山庭峻辭吐初疑鋸屑飛州縣未應淹驥足釣名誰羡子陵磯和張公儀醉中行草綰秋蛇十載風櫺憶舊家朋舊亂多從鬼録詩書閒益富生涯稻塍緑合迷秧馬沙嘴潮回下釣車歸去西疇新雨足飯粳應不羡胡麻和趙積中入室芝蘭氣不殊逢君還憶見君初梅花正喜春懸鳯藿葉俄同夏鱠魚下榻舊聞看孺子負荆誰復謝相如艱難正詘平戎䇿及早東遊叩帝居和江和仲把讀新詩憶舊家深村羸犢短轅車年豐野老常携酒客至幽禽自喚茶亂後所存惟五栁老來無意約山花相逢何必曽相識乘興時來過此耶和張元禮元禮以蘧著􅀢三子下第未歸有詩寬豫因用韻勉諸子非獨為下第者設也庚辰清明後一日力學三年看有成龍蛇蟠蟄冀存身一杯餞别初迎臘千里歸來欲送春愛日光隂宜共惜及時德業要爭新吾家叢桂風流在速取髙科慰老親和閭必志見寄韻老矣詩才缺壯觀羡君閒燕富清歡染羮早厭誇黿指食肉應宜謝馬肝送客篇章堪寄逺論文杯勺自驅寒扁舟近過池頭否百丈西南水欲乾和陳勉仲二首人似平原字亦顔詩成長在笑談間試看落筆雲烟疾難放搖春草木閒美俗未容窺製錦勸耕聊得伴行山慚將鄭臘酬荆璞無怪年時債未還相逢憐我太衰顔氷雪精神照座間霽日有情茶乳合春風無力栁絲閒肯從逋客來三徑秪恐佳人賦二山舊說毛公今見否似聞新向玉京還和魏定父被檄還無為定父通判被檄來歸旦夕當還安豐距重陽不數日方兹戲綵而遽爾言去想不能無戀戀因觀所和因格非佳句歎服别來詩格超邁不能自已次韻雨腳亷纎日腳微秋隂猶暗北山陲莫言巖壑都無用須信風雲㑹有期邂逅醉鄊還自適周旋詩社好相規黃華又報重陽近想見遲遲去魯時和孔純老按屬邑二首髙車西去忽踰旬坐想登臨得句頻楊栁隂交山徑晚酴醾香滿驛亭春吟餘掃壁時揮翰醉裏投牀任吐茵聞說歸來歡喜甚故人相遇是詩人楊栁依依半掩扉新晴踈影㺯斜睴好花覔句忍輕負幽鳥勸沽良重違閒愛青苔緣砌上靜看蝴蝶撲忩飛雨多不覺蕪菁過又喜盤中筍蕨肥和許端夫兄弟二首時端夫出守當塗燈火當年記馬行一時人物玩垂裳舊遊亂後半蕪沒新貴邇來多罪亡我有塤箎相應和君同蘭玉競芬芳高文已見含元賦不用研思古戰場相喜何須日寄聲如君無處不知名縱觀妙墨雲烟動想見新詩咳唾成帶雪山川增綺麗向春梅栁自欣榮好將十詠圖歸去穩步花甎繼李程和袁望回千古風流憶孔明老龍髙卧志存身强陪簮紱更三聖安坐江湖又四春便合癡狂稱逹者誰能窮悴作騷人一杯聊復從公醉要見豫言總是真過鄧步和張叔元見贈韻獨舸東來夏日長歸裝從此益生光卧雲禾穗珠成實傾露荷花麝被囊逸世才猷金騕裊逼人風味木蘭堂常疑正始遺音絶把讀新詩逺壇場夜泊官牌夾口大風追和陳去非嵗晚感懷咿喔鄰雞夜向闌曉風驕挾曉霜寒吹燈强取殘書讀撥火重尋逺信看緑蟻已應浮臘甕青絲行復送春盤旅懷欲倩髙鴻寄慿仗新詩付筆端和張序臣合肥驛中詩槖臯何處合肥東知有詩翁杖履中魯㑹一時歸寂寞吳吟千載發清雄湖山照碧朦朧日鞍馬欺寒料峭風春入花梢人易感莫教房闥歎飛蓬長至和魏公逹半夜迎長坐候明眼看初日屋山平詩豪不共年俱長鬢雪惟應老自生得酒人情何太喜犯寒春色不多爭老農相慶無它語盡道冬晴好趂耕和孔純老送司法吳德聲舞腰回雪奏伊凉餞設鈴齊舉别觴如子固宜傾坐客顧豫何計挽征艎交情舊喜推東道歸夢先應到北堂花栁枝頭春已閙佇觀超擢置周行和方景南參議見贈向來踈率任天真此去扶持護善鄰只恐磨磚難作鏡已知行水戒推輪簞瓢本是吾家物軒冕寧容我輩人多謝諸公共推轂欣欣寒谷暗生春和彥時兄韻立馬山前問酒家山峯森列兩溪斜扶踈新竹聽流水天矯古松看霽霞逺目自能供覔句枯腸終不奈搜茶一杯湯餅東窗晚危坐清吟對月華用李夢發韻夢回詩思不勝清卧聽幽禽兩囀更窗角界金分月色山腰鳴玉潄溪聲欲行且住心還適久雨新晴眼倍明莫為浮名廢真賞較來何重亦何輕梅隱亭無慮無營得自如亂紅狼籍緑隂初莫貪視盜誅鋤術輕換齊民種蒔書風物最憐清且好賓朋那患數斯踈髙談亹亹還終晷坐覺庭花影上裾麗澤堂焚香讀易欲何求只恐西鄰未識丘千里交逰思命駕一龕燈火喜逢秋胸中雲夢應無算天上風雷得遍搜莫向明時老巖壑伊周元不羡巢由能賦臺萬頃玻瓈水浸空臺前佳色詠難窮倚欄人在烟霞外落筆詩成笑語中屬句畏慚非孟子供歡端合有車公解將能否分優劣過眼昭然向與雄代人上假拂參政玉牒書成已六年東遊曽記此周旋千齡令慶亨嘉㑹二府新分造化權咫尺雲天依日月斯須霖雨浹山川應憐汨沒塵埃者白髮青衫走道邉
