body:
  text: 相山集卷十九宋王之道撰制擬宏詞試觀文殿學士提舉醴泉觀兼侍讀特授護國軍節度使開府儀同三司江淮荆襄路安撫大使制圖舊德以分顧憂爰及祠庭之邃總元戎而任經略具膺帥閫之崇肆舉徽章式昭異數近輟論思之益往勞鎮撫之良視儀三槐宣威四路誕揚出綍咸告在庭具官某道大格天才周補衮作股肱耳目備見其有翼有馮敷心腹腎腸灼知其惟和惟一頃解政機之劇暫從真館之遊謂德行可用切磋故得通班於書殿謂言謀宜資啓沃故令兼秩於經筵雖愜豫心猶違衆望惟江淮扼青徐之走集而荆襄制川陜之奔衝素號通津舊為近甸欲藉折衝而却敵宜即連衡而合從是用大纛髙牙肅齋旄於蒲坂桓圭衮冕參禮節於鼎司冀效藩宣規恢疆宇於戲李靖總軍西海有賴於文武之兼資裴度護國北門無踰乎始終之全德勉祗厥命茂隆乃勳可擬宏詞試少保鎮南軍節度使充兩浙東路安撫大使兼知紹興軍府事授少傅鎮南靜江軍節度使充江南東路安撫大使兼知建康軍府事兼管內營田大使兼行宫留守加食邑實封制分帥閫以蔽江莫易蕃宣之舊守留都而司鑰尤髙撫御之良眷我孤卿為時屏翰肆升華於亞傅爰徙鎮於大邦載加節鉞之權用壯藩維之勢誕揚顯册孚告治朝具官某器逺而識明道隆而德博開物成務素髙經世之才尊主庇民果大格天之業久服勞於百揆逮均逸於十連經營四方昭若召公之洪烈頥指諸將赫然郭令之遺風惟建業之繁雄實臨流之都會股肱淮海襟帶荆襄自觀省以南巡念嘗駐蹕寬憂勤之西顧宜重陪京嘉豫寅亮之英倬彼威懷之績是用進升棘位增益齋旄仍專洪井之征誅兼制桂林之師旅併領兵屯之蓄申敦圭食之豐付爾保釐張吾經略於戲信謹有託茲蕭何專屬於關中文武足稱故冦恂可任於河內往欽乃事無愧前人可擬除趙參政制國以任賢使能為盛尤急於中外艱難之時士以尊主庇民為功當見於上下因循之日肆朕嗣服遭家靡寧險阻八年若涉大水而罔知攸濟焦勞庶事如措積薪而姑以為安念得扶顛持危之材助成興衰撥亂之志我有耆德今告治朝俾參決於萬幾冀作孚於四海具官某聲猷卓犖器識沉深至大至剛浩然孟子之氣令儀令色翼乎山甫之心入踐樞庭出更帥閫藜藿為之不採草木亦皆知名謂當補闕拾遺不可一日而去朝是用濟繁治劇期以二公而宏化於戲惟爾進退繫於重輕爾其同德同心致豫於治豫亦作威作福與爾咸休往告逺猷勉追前哲擬宏詞試觀文殿學士江南西路安撫大使授永興軍節度使開府儀同三司都督川陜荆襄軍馬事制門下敷求賢哲協濟艱虞式是南邦既懋蕃宣之績寬豫西顧方圖保定之功爰因祕殿之華用拜齋壇之峻權分帥閫像視鼎司往無憚於一行佇有聞於數路誕揚渙號孚告治朝具官某器識髙眀才猷俊偉時惟輕重強者畏而忠者懷身任安危上不疑而朝不忌確乎社稷之衛美矣邦家之光自解鈞衡遂臨藩屏一日不見已勤當寧之思四國是皇良切折衝之望是用寵錫六旌於殽函之奧壤榮參三事於衮繡之巨公川陜以東荆襄而北頥指諸將張皇六師俾大振於國威期永清於冦略於戲會同有繹朕當內修而外攘文武兼資爾其出將而入相勉服厥命益隆乃勳可表擬范相免明堂陪位謝表詔命待祠禮敢稽於俟駕恩從告病義良愧於執籩顧螻蟻以何知致乾坤而介意中謝伏念臣早以樗散待罪鈞衡晚緣駑痾乞身圭蓽間散既久懶慢相成端委何能素甘心於一壑支離未死猶竊食於三鍾屬當宗祀之期獲預辟公之召念采薪而不給奚薦牡以能勝奏逹九重方懼防風之戮詞頒一札豈意孟軻之容此蓋伏遇皇帝陛下德厚寬仁道宏忠恕去苛解撓躋四海於平康利物愛人憐一夫之疹疾且父兄之於子弟施既如此則股肱之於元首報當若何喘息餘生或未先於朝露馳驅晚節期少報於春暉擬宰相賀眀堂禮成表孝逹諸侯舉饗親之盛典歡均四表廣宥罪之深仁允為宗社之休宜效臣鄰之慶中謝臣聞魚麗備禮斯可告於神明鳬鷖守成遂獲安於祖考重惟今日之艱棘不若當時之治平自非天實相之物其多矣攘夷狄以去外侮之患任賢能以成中興之功亦當能崇黃帝之合宫講周公之宗祀俾我將我享不專美於前王致來燕來寧益紹隆於丕祚恭惟皇帝陛下常德立武深略緯文時敏厥修雖夙興夜寐而匪懈日新其德使吏稱民安而不知永言維則之思莫重因嚴之教精意以享爰修配帝之誠至神遂通果見得天之效臣等職當輔弼德乏肅雍駿奔以執豆籩有慚顯相作解而施雷雨實賴熙成代趙聖用鎮撫謝放罪表按屬郡之姦違本期除害因故人之營救翻謂復讎獄用折於片言罪方虞於萬坐拜恩知幸感涕無從中謝竊以事孰重於欺君刑莫加於謀上一之為甚猶當置於斧鉞之誅二者而兼豈能逃其汙瀦之罪是故在朝廷有上下之分法禁告論也而涉乎此則得言在閨門有父子之親法當容隱也而至於兹則聽告豈容誣偽妄瀆宸聰姑欲淪胥冀逃已禍伏念臣千無一得尺乏寸長肆法駕之東巡逮金人之南渡偶緣分鎮遂𨽻兩州間道之官僅脫虎狼之口瀕湖抗賊屢流蛟鱷之涎間關百罹參差九死馘餔肝之巨冦執問鼎之凶酋血氣既衰精神已敝力小任重因嘗乞身而再三志大心勞尚意立功之萬一是貪眷遇不即退歸屬承寬恤之文用按貪殘之政竊希何武庶幾服罪而露章已愧范滂能使望風而解印豈圖怙勢大肆興訛笞榜吏民劫持上下造謗書之一篋投訟牒於九重譛訴既行凶邪得騁適蘇章來二天之庇致曽參陷三至之辜雖雷霆忽震則驚併付虎冠之治而日月容光必照終明雀角之寃獲從縲紲之餘復齒縉紳之列兹蓋伏遇皇帝陛下用心若鑑施仁如天與四海而為春重一夫之獨泣望霓得雨將稿頓蘇謂臣戚乃自貽方責以激薄律貪理宜無赦察臣情為可憫逮論其寧僣無濫忍及非辜臣敢不仰佩至仁益堅晚節死而後已冀有得於桑榆敏以行之庶不慚於犬馬代秦德久峽州到任謝表分符東蓼往嘗竊於一行紆紱西陵今復叨於再命望實踰於愚分感彌激於懦𠂻榮幸已多愧慚並積中謝伏念臣鄧林朴遫冀野駑駘材無取於寸長力不勝於十駕偶緣世賞濫厠官聯當兹綜核名實之朝乃臣投置間散之日蓋以承流宣化方資師帥之良豈容竊祿備員獲在子男之列此蓋伏遇皇帝陛下道大亦大德明惟明不顯亦臨同周文之所以聖無為而治得虞舜之急親賢遂令菅蒯之微得備樵薪之末臣敢不欽承德意撫育黎元肯徒耗於太倉冀酬造化儻未煩於司敗誓竭麋捐信陽到任謝表為官擇吏尤髙共理之良揣分量能實冒分符之寵已諧入境遂視章程向以報君奉行德意臣中謝竊以申為小郡地號極邊人物荒殘山川蕭索曩接中都之奧壤分𨽻京西今為並塞之孤城割歸湖北邑雖有二户不盈千顧綿薄以無堪誤膺委寄何設施之可效庶盡拊綏伏念臣起自犁鋤進由庠序當政和之樂育𨽻業賢關屬季孟之同升聯名仕籍周旋三紀齟齬百罹蓋由疏拙失於周身加以愚直動至忤物攙説利害逆料是非方得倅於南譙固嘗妄言而取降官之貶繼員丞於東蓼又復因人而為對吏之行積其愆尤久合誅殛尚賴聖恩之寬大未即棄捐敢期晚景之侵尋更叨拭擢茲蓋伏遇皇帝陛下道大亦大德眀惟眀乃聖乃神本帝堯之獨智克勤克儉兼夏禹之成能知人則能官人救物故無棄物致兹朴􅈪獲備薪蒸臣敢不思致其身冀行所學但使政平訟理何敢求名庶幾近悅逺來自然樂業代賈漕茂德賀表天啓升平之運長發其祥時歌降永之年誕彌厥月華夷增氣嶽瀆效歡中賀竊以聖王修之國修之家修之身以致海寓之寧大德得其名得其祿得其夀以慰生靈之望審龜圖之罔極驗鳯歷之無窮恭惟皇帝陛下道邁湯文仁齊堯舜省刑薄稅躋萬姓於春臺偃武修文措八荒於夀域由中及外若臣與民對流虹繞電之辰注拱極望雲之日臣濫將使指阻繫淮堧獸舞無從徒想鈞天之奏葵傾有幸欣逢化日之長代王亦顔江東轉運判官謝表持節西淮罪止虞於瘝曠飛騶江左恩復冒於寵榮德薄位高感深涕隕中謝伏念臣鹽車下駟社櫟散才曽無十駕之可稱豈有寸長之足取誤蒙拭擢洊被使令言逺有光敢憚載馳而咨度見知則説遽先四牡之來歸自北而南去間就劇夫何易地濫及非才此蓋伏遇皇帝陛下聖邁周文功躋夏禹照同日月見思齊之不顯亦臨治格平成得虞書之無逺弗屆常善救物因能任官遂令棫朴之微獲備槱薪之末臣敢不永懷靡及專意肅將致一道之澄清雖其所短布九重之德澤則或庶幾提舉湖北常平茶鹽到任謝表分憂顧於邊城方虞汰斥遣諏詬於本路曷副使令命朝出於巖廊光夕生於原隰退量綿力從激懦𠂻竊臣賦性不靈謀身更拙決科入仕垂及四十年行法涖官僅書六七考皆由愚蠢自取悔尤投間置散分之宜久矣山林之適承流宣化民之帥幸哉州縣之勞黽勉一期拊摩千里效蔑聞於共理寵忽拜於皇華矧國家斂散之權與山海懋遷之利視飢穰而為出入賑濟吾民排商賈而制低昻阜通邦貨欲膺是選必擇其人夫何妄庸有此僥幸兹蓋伏遇皇帝陛下常德立武深略緯文功邁宣王攘戎狄而復境土治符世祖眀政體而攬權綱方並建於羣材以共圖於大業憐臣嘗廢放兩紀而不改其操付臣以澄清一道而俾效其愚自憐草芥之微乃辱乾坤之造戴恩若此圖報謂何臣敢不祗服訓詞肅將使事周爰咨度寧辭六轡之馳驅功如見知願奉三年之計最湖南運判謝到任表司倉湖北責僅免於曠瘝將漕湘南恩復叨於委寄任非所稱懼弗克堪臣中謝伏念臣學術迂踈人材冗散自獻書於眀主因獲罪於權臣久安丘壑之間念絶軒裳之望晚從拂拭洊被使令分符何補於邊城攬轡就乘於使驛食君之祿敢言避事以偷安當官而行必欲去姦而革弊常恐怨憎之積毁而遂致罪戾豈期禮樂之加寵而逺有光華矧此湘江下臨鄂渚九州數十縣悉𨽻按澄三軍百萬屯咸資餽餉非刺舉不回則何以率吏治非幹施有術則何以贍邊儲遴簡通才庶堪煩使不圖僥幸猥及孱庸兹蓋伏遇皇帝陛下因能任官循名責實內而公卿侍從之選儒必用真外而帥守監司之除功須已試憐臣雖窮且老而益堅益壯知臣既愚且直而守道守官特渙綸言俾更龍節臣敢不黽勉從事夙夜在公歌載馳載驅之篇俯究使臣之諏度去不均不安之患仰遵聖訓之丁寧積毫髮之微勞答乾坤之大施擬沈必先尚書鎮江到任謝表江湖逺去方安置散之宜綸綍下頒忽被分憂之寄恩踰涯分愧溢心顔中謝伏念臣才不逮人性多忤物蓋平日素疾姦佞故當職輒忘權豪所言患不知豈敢為妻子之計若死誠有補是甘報君父之恩犬馬一心鷹鸇纍嵗獨賴容光之照獲全屈軼之生俾從麋鹿之羣乃其所志付以股肱之寄豈曰當然兹蓋伏遇皇帝陛下湯德日新堯仁天覆任賢使能以濟中興之治選徒差馬以成外攘之功念臣固嘗效忠於補闕拾遺謂臣必能盡力於承流宣化一夫不獲庶臻鴻鴈之安四征弗庭方起雲霓之望代葉少藴左丞謝建康府安撫并廬夀宣撫使表竄身藪澤方念咎於桑榆授鉞江淮忽拜恩於綸綍功難補過愧不勝榮中謝竊以刺史之奉六條首除強暴漢安之遣八使專選威名或持斧以戢姦或埋輪以懲惡或褰帷而人為之震栗或攬轡而志在於澄清悉能致盜賊詣營而乞降豈但使守令望風而解去眷兹新命創自本朝望欲重於列城故非前世浩穰之地則不置聲欲先於羣冦故非近時輔弼之臣則不除惟建業之繁雄實臨流之都會靣橫赤壁背負烏江州分淮海之區星直斗牛之次肇三方之鼎峙更六代之龍興舟車所通衣冠攸集在宣池寄股肱之郡於廬夀亦唇齒之邦肆法駕之東巡逮金人之南渡川原遍赤草木皆腥今將舉郡邑而一新且復扶邦家於再造驅攘蜂蠆撫養瘡痍興仆植僵折衝厭難授以一方之巨屏俾為萬里之長城必能慰安民情庶幾稱職誠欲布宣德意要在任賢伏念臣智不足以周身才未至于聞道衆人欲殺事難辨於竊鈇纍聖優容理或伸於伏劔常恐鑠金之謗積成銷骨之寃豈圖眷知擢置樞近當姦臣之跋扈有乖明哲以自全洎元惡之殱夷遂至糾彈而共棄尚幸覆盆之照偶逃擢髮之誅丘壑三年干戈九死僅存餘息獲見中興十國為連敢希元帥一麾出守遂鎮名藩此蓋伏遇皇帝陛下與物為春配天其澤赦過宥罪盡從雷雨之施藏疾納汙大廓山川之度用人惟已因能任官起臣於寂寞之濱處臣以繁劇之職責其後效以蓋前愆臣敢不夙夜在公黽勉從事願同猛獸保藜藿於深山不使眀時致豺狼於當道擬張德逺謝大資宫觀表五年分閫功無尺寸之微一日還朝罪有丘山之重恩實踰於始望榮莫蓋於前羞感涕無從捐軀曷報中謝臣聞臣子有二不擇之戒在愛親與事君春秋有五不韙之誅貴度德與量力有戾斯語不逃常刑伏念臣起身布韋致位樞管豈有蚍蜉之援先為紹介特由乾坤之造所自陶鎔頃緣驕敵之南侵上軫淵𠂻而西顧載惟川陜截然參井之隅其在國家隱若股肱之勢宜為外援共弭內陵知臣於梁益當念鄉枌謂臣在朝廷正司兵柄爾其振軍聲於萬里之外無憚一行豫亦措邦本於九鼎之安有聞再造承命奮發擁麾載馳自忘力小任重之虞孰恤意廣材疏之誚俄淹嵗月靡效涓塵臂雖怒於螳蜋技已窮於鼯鼠積其誤國久合殺身敢意眷憐尚從寬貸畀內祠之真祿升祕殿之崇資俾養駑痾用安樗散此蓋伏遇皇帝陛下至仁天覆大德海涵原其初心取一日用力之善以兹異數掩九載弗成之愆正復自謀無以踰此枕流潄石儻未泯於明時誓水指松庶有期於來效擬張德逺落大資依舊宫觀表恩隆寵極罪大謫輕雖鐫祕殿之華尚假內祠之逸省窮心痗拜命涕零中謝伏念臣頃以謬庸誤膺委寄徇一時之急義當勇於捨生督萬里之征事莫難於料敵顧在當日敢辭此行徒以智小謀大不能推賢遜能以吝權至於日往月來遂成屈力殫貨而誤國死有餘責生之在君此蓋伏遇皇帝陛下推成湯之寬仁體仲尼之忠恕方務風雷其號令而與天下更始謂宜雨露其膏澤以致帝命惟新聊示小懲用彰至德震風忽及方知厦屋之休寸草何知願效春暉之報擬賈眀叔復顯謨閣待制表盛德有容盡釋積年之譴微生何幸更叨三字之榮服寶訓乎裕陵躐華資於延閣拜恩涕隕省過魂驚中謝伏念臣智不足以周身心但知於愛國謂邦有司直不可持祿養交以同衆人而地當敢言自宜眀目張膽以報天子性既疾惡志務去邪故其論駮糾彈不復畏忌顧望出於狂瞽既無獻可之謀責以愆違斯有黜幽之典三危兩竄萬死一生交遊為下石之擠賓客競引繩之逐屬彗星之告異獲湔除於姦黨之中逮元圭之霈恩遂敘復於散官之列四十年之畎畝一萬里之朝廷蕭條蟠木之容零落蚍蜉之援分甘丘壑望絶雲天何期斷梗之殘年有此登瀛之異數枌榆改觀蒲柳增輝此蓋伏遇皇帝陛下聖無常心天從人欲鋭意社稷中興之業敷求祖宗近侍之臣方將與四海而為春豈復忍一夫之失所念父有爭子猶或保於令名則國有忠賢必能禆於至治忘其犯顔攖鱗之大罪録其輸心露情之小忠寵之綸綍之恩還以圖書之府臣敢不勉追老馬冀問路於將來竊比翳桑誓扶輪於未死代和州天申節賀表五百嵗而聖人出長發其祥十二年而嵗星周誕彌厥月適際流虹之旦用修拊髀之歡恭惟皇帝陛下睿知有臨神武不殺允矣中興之主卓然上夀之資月之恆而日之升克眀其德雷不一而風不再耆定爾功治基太平福熙純嘏天所助者僕景命於萬年人皆仰之得歡心於四海某職縻守土目極望雲獻夀九重莫厠儀韶之鳯輸誠千里徒傾向日之葵擬辛侍御遷中丞謝表備位雜端曽微報稱進官獨坐更冒寵榮豈容不諱之朝久玷敢言之地莫聞一得少補四聰中謝伏以朝廷之所賴以治者在官僚官僚之所由以肅者在綱紀唐分三院漢置一臺中丞則專佐大夫以糾正百官御史則更直朝堂以推彈雜事在龍朔嘗有司憲之號至文眀復更肅政之名茍非其人為不任職必得剛正如狄仁傑以眀王立本之罪蹇諤若韋思謙以直張仁禕之寃庶能抨劾姦邪掃清朋比使善人勸而淫人懼致強者畏而忠者懷伏念臣心固暗於是非職莫分於賢否平日素乏特立獨行之操當職又無揚清激濁之稱僅同羝羊之觸藩籬敢比猛獸之保藜藿楊㻛之不屈於恐脅實賴神明溫造之遂獲於甄升敢期眷奬此蓋伏遇皇帝陛下追法上古紹開中興欲來骨鯁之言共濟艱難之業每寬風憲為霽天威聽無憚於攖鱗報亦思於張膽臣敢不仕以行義進思盡忠知無不為當效鷹鸇之奮直者先禍更全螻蟻之生擬沈必先除吏部尚書謝表方從散地起為千里之師敢冀誤恩復作六官之長省躬有靦拜命靡遑中謝伏念臣受才凡庸稟性疏直夙荷聖神之眷久汙清切之班昨長銓衡竊有晞於裴馬逮糜嵗月曽無補於絲毫旋遂劾歸獲逃罪戾方切前羞之負豈膺舊物之還此蓋伏遇皇帝陛下躬上聖聰明之資開中興熙洽之運虛心俊傑鋭意事功嘉與芻蕘力致萬邦之治欲令凋瘵獲比三代之隆致一介以不遺豈寸長而可取臣敢不循名責實推賢逹能勉遵毛玠之公庶幾報政敢比山濤之職自作品題擬翟巽謝除內翰表蔭松藉草方安琳館之間曳組鳴珂復拜玉堂之命遂使桑榆之景再瞻日月之光榮幸天多愧慚山積中謝伏念臣賦才凡下稟性庸愚居懷隱甫之剛常守展禽之介言惟古是動與時乖半世宦遊二十年之持槖一時行輩六七人之秉鈞固知汰礫不容於在前敢謂積薪或得而居上肆樗散之無用屬駑痾之有加抗疏歸來恰值干戈之擾杖藜逃去重增丘壑之迂間關百罹參差萬死幸危惙之少間喜廢壞之將興誓畢此生請歌再造申君臣之善頌快江湖之鄙心野興何濃正欲和風於南郭宸恩未替更令視草於北門此蓋伏遇皇帝陛下並建英豪明揚側陋期大來於儒雅以同濟於艱難謂王之言也如絲臣之和也若響欲得封敖痛在朕躬之語當求陸贄號為內相之才念臣嘗在翰林初本無過憐臣久居畎畝不遽遐遺特寵新除俾還舊物臣敢不強勉學問以冀淹該發為訓辭庶臻深厚粉飾一王之法追還三代之風蓮燭夜歸密奉不傳之旨金鑾晝掩遍觀未見之書內竭疏庸仰酬眷倚擬趙元鎮參政辭新除第一表臣聞任重大者不可使小力持謀險艱者慎無與淺識計或用失其當則上何以副仰成之望若處非其宜則下豈能逃曠廢之譏為責匪輕所繫不淺故君必度德以授之位而臣當量力以效其官豈容謏聞獲預大政中謝伏念臣智僅同於爝火才不越於斗筲自知甚眀位早踰於涯分人言可畏勢莫幸於寵榮况當外侮之侵陵方務中興而克復盍求張仲以成吉甫之憲邦自有姚崇安用懷慎之伴食此蓋伏遇皇帝陛下勵精圖治至誠與賢謂臣往在樞庭雖無尺寸功而不見其過念臣來自藩屏固嘗二三任而遂憫其勞致兹誤恩出於獨斷茍貪眷遇理必至於顛隮冀遂保全命特從於追寢所有恩命未敢祗受擬趙元鎮參政辭新除第二表屭贔任隆乃俾蚊虻之負穹窿聽邇當聞蠅蚋之聲顧帝意之云吁亦愚誠之未至茍幸從私於萬一安能避瀆於再三中謝臣聞德進則朝廷尊而臣無素德賢用則邦家立而臣實非賢徒以駑痾久膺器使念主憂臣辱艱難非避事之時致日往月來倥傯積罔功之罪謂宜誅殛更冒寵榮雖聖眷之有加奈師言之不厭伏望皇帝陛下重憐舊物特寢新除任賢使能允濟周室之美投間置散俾從韓愈之宜儻未泯於餘生冀有酬於異日擬趙元鎮謝新除表綸言下逮俾贊洪鈞鷃願上陳莫回渙汗且方以效一官為過分豈敢期超八座以疏恩固避無從兢惶曷處中謝臣聞濟一時之務者要須一時之勝為千嵗之計者斯有千嵗之傳况今日參知政事之名乃前代左右丞轄之任實同令僕獲在倚毗當得不撓不回如魏元成庶能矯拂趨競盍求之才之烈若劉思道期以明振綱維可使疏庸亦蒙識擢此蓋伏遇皇帝陛下鼎新庶政圖任舊人禮重築臺姑欲先於郭隗功成補衮冀遂得於樊侯不由紹介之一言必欲斷遷於三事智小謀大何禆日月之明責重命輕願殫犬馬之力
