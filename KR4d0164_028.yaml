body:
  text: 相山集巻二十八宋王之道撰雜文勸學文古有家塾黨庠以待父兄之教近世書㑹似之兵火十年人廢斆學正復有良子弟幸免屠掠願就訓飭者徃徃孤陋寡聞觸事墻面深可歎息楊丈八行鄉里耆哲詩賦宗匠今習殿課闢數楹於胡避山之東欲得天下英才而教育之諸公為人父兄有子弟而不教教而不擇其師誰任其咎之道故敢以此聞下執事傳道受業其為子弟加意焉毋怠謁王歐二公祠文故太守翰林學士王公故太子少師歐陽公之祠惟二公以直道佐眀主為時大儒屈臨是邦閲嵗滋久而流風善政雅歌雄文播在人口莫可彌忘之道以晩生常恨不獲執鞭以從公遊今者之來庶㡬因縁職事訪遐躅紀遺事而霑丐餘波以起枯槁莅政之始敢以禮見謁安豐軍遺愛侯孫叔敖文惟侯以芍陂有功於民載在祀典粤自春秋至於我宋其遺愛實無窮焉之道奉天子命來為郡丞涖事之初敢以禮見信陽軍祭風師文惟神位亞六子氣撓萬物吹嘘所及枯者以榮甲者以拆實佐天地不長之化不産之育維孟之春雨潤日烜草木萌動斯民将即來於田野播厥百榖鼔之舞之俾咸遂其發生秀實則不能無望焉尚饗祈晴文維神聰眀依人而行眷言此方再罹冦兵既毁既掠莫蠶莫耕人皆有言不如無生芃芃其麥指日望成淫雨害之豈人之情青天白日庶㡬此誠神其聴之無愛厥晴祈雪文雪為五榖之精雪不時降則五榖不實而民無以為生重惟夏大旱斯民每食不飽惟麥是蓺以冀來嵗之成其勢誠可廹其情誠可矜矣三分其冬今過其二而愆陽若此麥何望焉民将何所仰焉上天同雲雨雪雰雰以沃此麥而慰此民非神之難神其格思祭先農壇文維太皥乗震執規司春而神實佐之神之有功於發生眀矣今陽氣方升土膏其動斯民将有事乎播植刺史於民茍可以身先而勸相者罔敢不勉若曰勾者畢出萌者盡逹俾萬物之生各得其宜則惟神實制之東作之始敢不以告祭家神文伏以祖父以來三年一祭内外家神謂之還口之道寄居於此闔門二百指實藉神貺以生活安樂不敢廢兹禮謹涓日命僧致潔家庭誦經巻作佛事仰祈昭格伏惟本家内外尊神鑒此誠悃來享來寜代何希淵到廬江謁諸廟文某以天子命為是邑宰其所守法奉公為國愛民固當自盡然聰眀之所不逮思慮之所不及惟境内之神實隂隲而顯相之視事之始敢不以告代和州連守端夫罷任謝諸廟文頃以君命來守此邦時屬艱難事益紛擾畏首畏尾隨補隨失常恐掇怒於民被罪於朝而不獲休歸今乃微疴獲丐琳宇将遂婆娑於江漢之上三年於此䝉神之貺厚矣今日之幸豈敢昧徳短棹扁舟請從此辭奉安竈神文惟神位列七祀載在禮經職主一家傳聞俗諺比縁革故兹獲鼎新烹餁之初敢不以告奉安之後其或來寜祭井神文惟神功徳滂被一方受賜不汲不盈愈汲愈出自我先君實發斯閟三紀于兹再大水利波濤舂撞穢惡漸漬冽或用汙甃因以墜視而不問為我之愧蠲吉僝工載渫載治羃之三日敢慢厥事神其格思食萬斯世胡避山祭井文源泉混混行於地中有神司之非感莫通嵗在庚戌首卜南峯石不我穿遂已厥功東北之隅庶㡬决洪有石鑿鑿人不倦終二年于兹我心忡忡念欲改圖誰當誘衷爰相山形乃得行龍乃問龜筮龜筮是從乃告山祗山祗是容泉既有在人意僉同日吉時良今當僝工神其格思報不敢空祭白虹山神文惟神以興雲出泉之功嘉恵此方民物受賜舊矣而嵗或大旱雲雖時興而不能作霖雨泉雖日出而不能滋稼穡則神之功或㡬乎虧今度兩山之間截然為埧以瀦蓄積潦待其嵗旱泄而放之用沃山下之田使焦槁者蘇榮茂者實永永為萬世利是功也豈易量哉興役之始敢不以告遷𦵏告皇考文嵗在甲寅維暮之冬時以不孝獲罪昊穹官軍始擾邊警繼至逺邇震動不克襄事三日而殯忽焉二週眷言遺令涕泗滂流軒居之原肇修新阡歸𦵏有期敬以告遷遷𦵏告皇妣文徃遭閔凶嵗在閹茂日月漂流七年以久方當歸𦵏郡冦滿路曽不旬浹有伐其墓皇天祐善賊遂中止幸不及棺慚痛何已哀哀先君後兹五載奄棄諸孤欲養不逮死則同穴王詩所言先君有命豈敢憚煩軒車之原卜云其吉祔于先君萬事永畢童孫冡婦夾侍其壙肝心若裂莫寫悲愴遷𦵏告先妻文汝以盛年棄諸子事厥姑於地下在汝亦云幸矣而諸子癡且頑男及冠而忽於詩禮之學女已笄而昧於箕箒之奉啓廸扶持獨能無意耶先妣之死汝實送之先考之殂汝其知之今将遷先妣於祖塋之東舉先考於相山之西而合𦵏於軒車之南檀林之麓以汝侍先妣而居於右以亡姪童兒侍先考而居於左汝其有知庶鑒此心改𦵏告亡考宣教祝文自初襄事以迄於今十有六年兩見於夢始侍杖屨立於冡旁指顧其前俾整治之覺而茫然莫得其處昨也宵驚恍如改卜百里之内奠賻日至神之告人决非偶然天誘其衷聿來孫公相其隂陽曠若發矇趨全避缺得地西南稽之夢寐實契我心将以八月蠲吉謀良原起乗止萬年其蔵和州含山縣驅狼文人君以斯民付之吏譬猶上帝以斯人付之神其責實相似民有病苦而吏不能救亦猶人有禍患而神不能去其罪實相等夫人君之愛民與上帝之愛人不異也其視元元之災害不翅自我招之自我受之也若吏不汝省神不汝顧以為時數實當然而不聞於君請於帝使民人之情不能上逹則已若獲上逹為吏與神者其被譴宜何如哉和抱江負山當賔客軍旅徃來之衝而含山又為通道自强敵入冦迨今八年更戎馬賊兵之變無慮數十次所至荆棘爨無盛烟幸而未血斧鑕者又以齕草茹木為命今豺狼成羣白晝入市與飢羸格鬭力不勝則恣殘噬如驅羣羊而向之齕草茹木者且復有畏塗之戒徃徃束手啼飢坐以待盡吏奉天子命牧養小民使民至此吏亦安所逃罪神以功在國徳在民實受命于天作庇此方正使吏不以聲于帝而帝不以咎于神為神之職當如何耶昔宋均為九江守初境多暴虎檻穽所不能制下車自責去檻穽而虎為之渡江今太守趙公賢且仁不减宋均其不以長刀大劒强弓勁弩有事於狼而遣屬吏同縣官有請於神盖與宋均之去檻穽不謀而同官吏誠不徳有以致之冀神力請於帝俾殃及於厥身勿使百姓無辜同此濫罰不然神為不職某當聞之州俾含山之民毁像撤廟以為神羞神其聴之毋爽譴瘧鬼文予嵗在甲寅夏五月病瘧踰十日良已而兒女軰自是多苦此疾至丙辰夏而不能去其熱焦火其寒凝氷呻吟無虚日毒之以萬金之葯炙之以三年之艾驅之以首楞嚴之秘呪譴之以孫思邈之靈符終莫見其毫髪之效予因以為兹誠星官歴翁所謂厄㑹者置不復問姑使之調節其飢飽順適其燥濕以俟其愈逮秋七月為孽益甚自少以至長由内以及外一日而卧床者八人家人環視醫者拱手莫知所措如是者凡兩浹八月丙午予來自軒車越三日己酉夜夢羣盜在予家矛㦸森然結束行李其状若将去者中有一人姿表極偉伺羣盗之間宻謂予曰吾儕奉擾久矣今當去然尚有欲抵公之隙者詰朝恐一來公其避之是行也丐公九月九日於軒車山頭祀我數日而病者相繼愈九月初吉予復苦寒熱危與死隣因念夢中語曰兹殆所謂要之者耶三發而止夫祠有辭之意彼請辭也我不可以不送今日重九謹以巵酒彘肩登軒車而送之我非太公乃苦十盜鬻漿天凉誰為此耗我非韓愈復苦五窮轉喉觸諱徃徃造攻莫酷如冦兩䧟其間莫寃如獄證璧成環三年於兹為病所毒熱兮火燎寒兮氷沃甚至兒女下逮妾御朝呻暮吟守而不去今汝請辭良慰我心酬此一杯載驟駸駸
