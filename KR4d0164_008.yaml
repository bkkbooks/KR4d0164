body:
  text: 相山集卷八宋王之道撰五言律詩秋日即事三首晚來何所喜急雨洗新秋幸遂登髙賦應容遇勝留藕花明逺近鷗鳥任沉浮不用揮紈扇何妨醉玉舟今日知何日西風正得秋天心方祚漢人物合師留才略煩威敵聲名賴鎮浮不妨臨賦樂泛泛有楊舟俯仰黃花集澄清九月秋預愁新任迫難為故人留風去山光合江回水氣浮何當脫羈絆同辦五湖舟雪晴三首雪壓千山淨雲披萬里晴木氷爭霽色簷雨碎寒聲靜映吟窗冷輕浮茗碗清最宜今夜月來借短檠明湖山開宿靄院落快新晴滉漾溶銀色潺湲過雨聲味增茶品勝光奪月華清放出東墻角梅花數㸃明氣暾寒日曉光照逺山晴鄒谷有春意袁門聞履聲映書何自苦炙背不妨清邂逅逢詩將髙吟眼倍明和余時中元夕二首今夕知何夕熙熙萬室春歌樓醒醉客燈市往來人勸酒行杯促聫詩得句新銅壺休見迫歡笑正相親羅綺行歌夜杯盤坐笑春舞衫催急管步障擁佳人燈火珠星粲樓臺璧月新傳柑良可樂黼座玉音親次韻魯如晦七夕今夕知何夕相逢莫漫愁凉颸開北牖新月挂西樓重惜經年别貪延數刻秋明朝河漢隔西向望牽牛秋日郊行斷橋臨野水疏屋見人家嫩緑幾畦菜深黃三徑花斷雲行自逐征鴈望還賖好訪韓湘去山林養白鴉閒眠二首乍暖經行久新凉出浴初酒酣春晝永食飽午鐘餘我懶喜聊復君閒應樂胥年來苦奔走此味竟何如秋懷一事無暑盡晝凉初竹户靜長閉藜牀安有餘逍遙化蝴蝶容易入華胥天上多官府神仙恐不如閒居五斗不爾競一區聊自營閒看探花信靜坐聽松聲約客酒初熟訪僧詩漫成有時過閭里往往競邀迎獨步飽餘惟欲睡散睡步東園雨足富蓮子年豐多稻孫﨑嶇窮竹徑詰曲遍花源何必冠童輩偕來笑語喧逍遙堂二首獨坐虛堂寂煙銷瓦博山出遊魚自樂飛倦鳥知還花氣清風逺槐隂白晝閒逍遙入詩思落筆笑談間娜婀風前竹空濛雨外山孤雲心共逺短艇興俱還酒有雙蓮勝詩無一字閒因君成悵想時到夢魂間飽食豫亦屬厭耳女寬何嘆三一簞儻知足八珍自忘貪駝峯擅西北瑶柱誇東南但願無是餒藜羮非我慚放船和子薳韻冬溫寒日好嵗晚早梅開帆腳隨風轉江流與岸回坐憐青嶂逺靜見白鷗來水驛三千里斯遊亦壯哉追和東坡倦夜一首風閣開還閉龕燈暗復明竹間聽露滴庭際看雲行皎月千門靜微風一座清只今廷諍者誰復繼元成和子薳泛江送客用老杜韻北風還入夜波怒未能平江氣雲煙重山光水墨輕熒熒漁火亂慘慘暮寒生咫尺淮鄉路淹留繫此情久客和子薳用老杜韻舟解風還順江神亦世情滯留三月過攀送一帆輕行止關吾道窮通任此生梅梢春已動氷雪漫縱橫歷陽倅䝉菴鄭公卒於位記嵗在丁丑與僕有交承之契方來自鎮西而㒒亦自安豐往邂逅於合肥驛中獲為三日之欵所談無非周易太𤣥老莊之書開警䝉昧多矣公平生學佛行一著端的不昧所謂毫髮無遺恨者僕老矣請從其後而為淨土之遊似不晚也作是詩以弔之我倅安豐日君來自厯陽交承分彼此邂逅及行藏精義通𤣥易微言妙老莊剎那今十稔歎仰未能忘東晉陶元亮西京董仲舒髙風敦薄俗妙論見遺書水石傷新窆松篁慘舊廬楞伽今在否此道發眀初楞伽逹磨以授二祖東坡謂讀者或不能句而公嘗注是經想見公於此有得云恨未之見哭韓積中二首命矣窮張籍歸哉病長卿焦湖家自逺畏日我同行想像分攜處依稀謦咳聲仙踪向西路回首淚縱橫多能傾相府髙義著房州脫略通侯貴追隨逐客逰敢論當世比曽向古人求怊悵今樓護黃泉已再秋哀陳夫子不見陳夫子依稀四載餘云亡前日信報葬幾時書玉軸千篇在牙籖萬卷儲九原應有恨新第落成初去矣君何速聞之我重悲席塵埋古鼎書蠧入新詩鴻鴈嗟安仰枌揄痛莫追木瓜慚未報臨紙涕漣洏哀湯與立父薄俗久不競丘園多逸民聞君輕去世令我重沾巾一夢苕溪曉千年石堵春人情不能已南望哭江濱一門今七世誰復似君家盛事追公藝髙風映伯華板輿方就養玉樹遽興嗟叔子今何在魂應到馬牙尚記宣和末賢科擢阿戎義方傳輦下士譽走江東賀厦心雖切披雲意自忡思君想眉目悲咽對西風哀徐朝義恭人潘氏愛子心惟一宜家語不煩雨添南澗藻風偃北堂萱鬱鬱今同穴詵詵正滿門善哉摩頂記歸奉大慈尊城見三千嵗人終八十春從夫安樂近拜佛率陀新婉孌書彤管凄凉歎棘薪中郎有賢子遺澤擢平津和秦夀之題靖安棲霞觀飛觀臨無地江天在目中晚霞工射日秋水欲浮空蓼岸深迷緑楓林逺映紅歸歟還可喜千里一帆風夏日歸自寶林二首十里招提路﨑嶇祝聖歸青黃原上麥紅白草間薇正看雲容合俄驚雨腳飛餘花被霑濕芳氣襲人衣逺岫升初日長林靄曙煙峯回遙見塔溪轉靜鳴泉竹籜新披錦茅花欲擘綿清和多美䕃歸路得蹁蹮和詹德秀出南汰二首曉出東郊路春霖數尺泥湖山供勝賞花草覔新題坐聽鳴鴻北歸看落日西乍晴何所喜芳樹早鶯啼小沼鳴蛙吹虛堂墮燕泥對花容命酒書事喜分題僧舍喬林北田家古道西鵓鳩晴喚婦榖榖傍人啼題香巖與何希淵陳勉仲聫轡市井三墩北招提百丈東晴雲披靉靆寒日㺯曈曨滴瀝林梢雨凄凉蓋影風我慚追驥足䇿蹇走巴僮東靈鷲松蓋雨還偃雲扉風自關縱橫兩溪水髙下萬重山入室三彈指臨淵一㸃顔懸知少來往石笋緑苔斑題石磧明因院用李端叔韻楚漢干戈地巋然見此山艱難思帝業牢落漫禪關野鳥驚人散江湖到岸邉明朝又東去空羡阿師閒題法輪寺孤塔雲烟外荒蹊草莽間蓼花紅糝碎楓葉絳綃殷送客三溪逺逢僧半日閒功名休覽鏡淪落鬢毛斑題宣州書堂山寺書堂形勝好山轉與江拋泉古應黃蘖亭新換白茅雨餘蒼蘚合春晚緑隂交欲問香巖旨風林竹自敲秋日逰南汰二首小雨霑秋旱清曦霽曉氛山留歸壑水風送過江雲碧瓦觚稜出黃茅兔徑分髙僧似相喜茗飲話殷勤松篁團野色葭薍接江氛芳菊開新雨晴天掃片雲村醪過寺共風袂轉山分邂逅梅夫子清談得致勤次因上人韻一從潜水别三見菊花黃舊好論交篤新詩引興長勞生閒自笑道術淡相忘蝴蝶秋來懶時應到睡鄉送浮屠善慧東遊西去方祈榖東來適佩萸凄風梧脫葉積雨稻生蚨詩骨寒巖木禪心古廟爐莫將明月句容易謁姑蘇送浮屠道郭雲遊何必袁州去塵塵小釋迦一笻非外物四海即吾家曉色霜還重秋容菊正華此行良不惡冬笋已排牙和鞏興宗題回峯寺贈明山主江共煙雲逺山連藪澤長日從三伏烈風借九秋凉休作桃花觀聊同柏子香相逢無一事不必下禪牀寧公新拜首座因贈著書新奏御上詔承旨蘇公道士韓德純與公集三教聖賢事跡各五十卷故有首座之命優詔及禪扉首座名雖貴家山老未歸磬聲寒繞枕塔影靜侵衣終憶西湖上秋風白鳥飛春日逰西塔示本上人暇日搜竒勝羸驂適莽蒼幽花撩醉眼早麥慰飢腸佛屋幾間在村墟三里長亷纎晚來雨未覺客心傷
