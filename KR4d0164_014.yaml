  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0164_WYG_014-1a, image: WYG1132/WYG1132-0621a.png}
body:
  text: 相山集卷十四宋王之道撰七言絶句追和東坡梅花十絶春到梅梢日自和動人芳氣不須多清肌瘦骨如氷玉瘴霧那能奈子何盈盈終日對粧臺一樹臨溪欲半開吟賞不須期爛漫恐隨春雨㸃蒼苔一池春水緑縈回池上梅花暖自開想見溫泉初出浴六宫遙指太真來問言何處是前村萬木號寒雪障昏安得夢為蝴蝶去花間栩栩適吟魂真香暗逐微風逺踈影低隨淡日斜好在黃昏清淺意一時收拾付詩家醉眼昏昏午倦開不堪詩債苦相催清香自是蠲煩藥為折霜蕤一朵來莫怪風前玉斚飛飲酣初喜傳花枝正當北雪消殘後恰直東風料峭時絳跗檀口映氷肌踏雪來看帶雪枝一見遂能消鄙吝汝南誰敢忽牛醫步入芳叢腳自輕看來羣卉眼偏明和羮有實休疑晚况是東君舊著情山下溪頭賣酒家為誰低入屋簷斜蔬腸不奈村酤澀笑挽長條沃井花梅花十絶追和張文潛韻額黃肌粉鬭新粧春入園林度暗香留滯江南歸未得一枝聊復沃愁腸曉來飛雪綴林端氷玉肌膚巧耐寒折得一枝紅半吐自挼香蘂當朝飱年年常是犯凝寒換骨曽憑九轉丹結實和羮知不晚試嘗花蘂味應酸竹外山前見嫩黃水沉清漬雪肌香應嫌桃李風姿俗故作尋常淡淡粧簷花厭浥細如塵渡口舟橫不見人獨喜霜蕤清照坐旅懷雖惡未孤春凌霜冒雪報花期大小羣芳例是兒屈指春風無十日東君元是舊相知素艷忽從江上見清香還向雪中聞誰能送酒來相勞為爾開嘗對馬軍冬溫開遍向東枝映日含風萬玉姬何必霓裳掩前古清癯端不羡豐肥别後開園日就荒對花還憶少年狂東榮幾樹應無恙待得豫歸破嫩黃花前傾步濺狂瀾花外扶踈竹數竿帶雪精神清更好氷肌元慣朔風寒梅花和黃覺民四首淨几閒窗小小瓶一枝春色為誰清吾今老去心如水銷得詩人與證明蕭然清映水邉枝似向溫泉見玉肌被惱詩人應不徹怪來言語總成詩依倚春風雨淨瓶暮林搖落避真清暗香似與常娥約來借黃昏淡淡明夜來春信到南枝姑射神人逞雪肌多謝長鬚解豫意送將羈客換新詩和王元渤留題松夀巖白雲庵寄鄭顧道二首流水泠泠浸稻田巖耕應費買山錢風梢雨蓋摩霄漢箇裏髙人即地仙日影曈曨霽曉氛幾聲幽鳥隔忩聞謝安盍為蒼生起休戀青山卧白雲追和賈眀叔侯陟眀二侍郎瑞香二首睡香始生廬山中世未有識者一日有髙人方白晝睡恍然若聞異香忽神思清發覺而尋之得此花於蒼崖翠壁之上故因以命名今乃以為瑞香非也雖然無害香譜中未有以瑞名者而此香獨得之花譜中未有以香名者而此花獨得之吾知子弟蕙蘭㒒奴龍麝綽綽有餘裕也因追和無為先生韻庶幾當世知音者為我擊節日午髙人睡正濃幽香初破碧山紅忽然夢覺尋無處㑹有東來一陳風深院重簾數尺墻對花何必竟燒香九齡風度髙難挹舉世紛紛漫笏囊和富公權宗丞十首門外傳來一軸詩爛然蓬蓽頓增輝匹夫不敢貪懷璧什襲今從故府歸展讀新詩次第看管中文豹喜窺斑不知筆力能豪放落紙雲烟咳唾間閒想當年嘯詠聲一時人物鬭峥嶸江山清壯今猶昔誰謂丹青畫不成後來模楷復何人千載風流郭泰巾欲睹詩豪兼草聖一尊聊發洞庭春行草應曽閲鬭蛇世情無識笑東家君看橫雨隨風勢紙紙清新字字斜昻昂野鶴在雞羣一見人分濁與清吟對紅葵朝雨細坐臨緑竹午風輕舍北湖山千疊翠街南溪水一篙深黃鸝也似快晴日楊栁隂中訴好音惡客未嘗知酒聖髙人何止擅文豪三司自揣非吾事敢覬徐州解佩刀嗟豫少也戇無竒才力而今老更衰文陳異時逢大敵猶能斬將復搴旗我慚思澀同司馬君患才多繼士衡今日相從非偶耳挂冠淮浙好尋盟觀梅和陳天豫韻斷橋踈竹帶山幽裝㸃詩人覔句愁多謝雙魚傳尺素絶勝斗酒得凉州春風草木初萌動夜雨池塘正拍浮玉骨檀心清更好對花何惜醉扶頭和厯陽守張仲智觀梅五首一霎輕風過雨稀滿庭春色碎珠璣使君載酒花前醉更有新詩為發揮萬事當從酒到休子山那得許多愁緑樽翠杓梅花夕不醉翻令惡客羞誰似樊侯哲且明解將勳業佐中興自憐汨沒毛錐子空對東風詠使能夜燒紅燭照梅花刺史風流自一家待得殘英上丹臉韶華端復到山茶出車何日勞師還二聖歸來喜見顔乞得此身終芰製亂山茅屋兩三間和徐季功舒蘄道中二十首春隂連日竟何如逐婦應憐拙勃姑習習晚風來更急欲吹時雨助虛枯一聲何處呌提壺楊栁隂中駐犢車笑語誰家騃兒女浣沙溪上數逰魚溪流灔灔草凄凄春日農郊麥穗齊捲地東風還作惡片雲隨馬渡溪低拍溪春水鴨頭青溪上哦詩醉眼醒不見梅花寒蘸影野桃山杏自娉婷三日春霖發土毛道傍芳草半人髙馬頭問是棠梨市一片梨花映小桃野鳥關關督駕犁及時新雨土膏肥知君有意農夫勸故故穿林傍馬飛草滿池塘水滿川雨餘溪溜正濺濺黃梅恰在山多處披霧時看一握天山下溪邉阿母家春雷初過茗生芽馬頭睡思濃無那一碗何妨泛乳花一夜西風作曉晴紛然花草鬭欣榮蒼松巧與夭桃並漫使詩人意不平春雲漠漠雨纎纎花栁叢邉見酒帘心為惜春無處著可堪啼鳥更般添曉光晴影正曈曨轉眼還驚日過中芳草岸頭人渡水洛陽影裏鳥呼風草色青青入燒㾗登臨何處暗銷魂應憐野老無拘縛種竹栽花教子孫欲識吾君聖與仁澤流寰海衆熙春兩淮飢饉方移粟六轡馳驅不憚勤日遲風細午隂微栁外青驄去若飛過得水村聞笑語幾家扶得醉人歸庭閒人靜鳥窺簾坐對文書亦倦拈春旱正須三尺雨江湖寧放老蛟潜帶雨酴醿不自持短垣髙榭倚斜枝野人莫覓丹青手摹寫春容一絶詩下馬郵亭忽喟然數間茅屋起孤煙山花狼籍餘無幾斷送歸心起杜鵑怪石形模老牯同漫將名字責農功得來正與齊田類誰敢言耕望嵗豐灊𤾂歸來麥已秋相從時說白雲遊八年不踐同安境夢裏山溪記舊由光風習習日暉暉墮絮飛紅積漸稀芍藥酴醿看正好一尊能共送春歸和陳勉仲大寧院見寄使驛馳驅賦陟岡等閒詩戲况逢場清和在序芳菲歇草色連天水滿塘和徐伯逺無為道中江南五月稻抽芒想見含花帶露香底事淮鄉太遲晚一犁新雨正開荒和徐伯逺見寄三首我家湖上面九華無錢買山山見賖待栽北牖一坡竹追配東門千載瓜新炊香軟桃花紅蘄州竹簟初出筒老翁易飽更甘寢便便一覺南窗風三詩自可當尺書得書何必須雙魚黃花强把酬雪白丐君捧腹聊軒渠和陳勉仲四首清風為我曉開關風外浮雲過雨還湛湛可憐清上下一篙溪水水邉山何日清遊繼大蘇扁舟東去泛西湖欲將景物和詩句寫作錢塘偉觀圖拍天湖水注東關水外漁舟破浪還誰似老僧閒有味清風一榻面佳山雨過山前草木蘇開窗澄碧渺金湖近來翰墨君為絶喜見詩中有畫圖和孔純老按屬邑六首野雲和雨渡金湖山色微風恍有無不慣扁舟浮浩渺且驅羸馬上﨑嶇雲濤雪浪渺無邉一簇溪橋客聚船輿衛欲休紅日下幾家茅舍起炊烟行並焦湖試問塗何如震澤占姑蘇提壺聒聒勸誰飲我不知君渠自呼客裏宵寒夢易醒起看殘月照忩眀招提正在山多處過雨流泉碎玉鳴石竇泠泠注竹溪溪光浮動軟琉璃幽人愛玩不忍去覓句坐驚紅日西榛莽無邉沒盡頭當年禾稼壓田疇流亡復業知何日九叙宜先戒用休和戴禹功幕府歸來三首抖擻空腸一字無下邳能復異時書中興正欲平驕冦莫若相如賦子虛客裏詩成付漫書清風一榻黑甜餘相山舊隱今分定却是歸來計不踈臨淮終日鑑修眉水外遙山尺五低我欲騎雲呌閶闔請將捕冦付平西和由字韻當年相望見無由千里荆襄隔數州時得新詩夸好句服膺何止釣槎頭僕頃在湖北聞巨源詩名和趙積中日下髙城月入扉蒲葵不動晚風微幽人信步如相過買酒黃公一醉歸秋日即事二首潮退菰蒲風自倒秋深菱芡雨應添怪來病眼雙明甚喜見遙山寸碧纎枕緣睡熟來魂夢衣為酣頻帶酒㾗多事長紅兼短白雨餘相倚映江村秋日野步和王覺民十六首芡觜靜緘秋水碧梨腮深抹夕陽紅近來詩社爭相勝幽討冥搜字字工桑林閒覺踈黃减菜隴貧憐嫩緑添秋水接潮還㶑灔晚風吹雨乍亷纎窮愁長怕詩撩撥幽憤須憑酒破除對酒更遭詩債窘可堪毛頴不中書揉藍拍岸秋濤信列炬緣山夜燒㾗楓葉經霜紅更好晚來扶杖過前村荷葉倚風搖敗緑蓼花霑雨卧衰紅物華雖逐窮秋老詩句翻從壯嵗工迂愚長與懶相兼嵗晚空餘白髮添坐送夕陽還黯黯倚看新月露纎纎五窮韓愈煩驅逐一室陳蕃倦掃除我有塤箎舊詩集當令阿買為君書雨晴庭户生秋意潮落溪橋見水㾗稻熟人家得相向兵餘眼底兩三村酒嫩細斟浮蟻緑芡柔輕剝汗衫紅搜羅物象嗟豫拙揮掃詞章放子工孤燈閃閃風還暗清漏沉沉夜向添案上數枝漙露菊可憐踈落嫩纎纎簞瓢不失生涯在詩酒何當習氣除欲倩雕弧落新鴈足間尋覓子卿書雨開繁菊金無價風皺平池鑑有㾗日暮客帆何處落柿林西畔荻花村烟裏山光陳水墨雲邉日影亂青紅新詩有畫人難到髙壓澄江五字工更窮詩債應難缺縱懶書淫亦自添水外修眉橫翠巘試憑張敞畫濃纎人言㑹飲辰嫌酉我為求醫日問除老去誰能遵百忌秋來只欲上三書病怯酒杯微過量瘦憐衣帶頗寬㾗傷心故國迷煙草秋日荒凉處處村和卞養直見示三絶簡聖書看君落筆走雲烟想見新豐醉少年龍脊舊堆騏驥種義方今服乃翁賢楊栁隂中乳燕飛馬頭寒峭怯單衣胡麻知有誰人種應怪東逰未即歸遲日輕風過雨天笑聲何處送鞦韆清明已逼長安近寄語先生快著鞭朝晴朝來霽色快行人嫩緑妖紅照眼眀去去諒無留滯歎不妨寒食半隂晴晚晴飛霰飄飄墮晚風亂山無數暮雲同天工却似憐羈旅又變霜華見碧空一舍麻城指顧中逺山橫翠慰吾悰勞生艱險今嘗遍休把狂言嚇老翁北去安豐問言何處是安豐人指湖光栁影東欲識淮西真使者一鞭追驥有詩翁安豐道中水滿陂塘草滿川望中茅屋起孤烟十年不踏安豐路遂與清淮作次邉給散告帖曽隨驍將逺追奔勇冠諸軍繼虎賁聖主念功知有自一時髙下拜新恩早發槖臯春秋遺跡舊山川魯破吳亡久寂然恰到前年征戰處數間茅屋起炊煙集英殿賜第出馬上口占鞭絲曵雪繚官槐緑陳中間一道開髙下未勞輕喜愠相公曽作榜梢來合寨陪諸公觀月一樽相對夜厭厭風捲浮雲見玉蟾凌亂請看矛作舞清光炯炯已窺簷永豐道上阻水路窮得水欲何為立馬逢人問所之十里歸來同小愒一鞭南去不踰時獨步雨晴烟渚白鷗亂風過霜林紅葉稀獨步幽吟心正苦却憐明月照人歸嶽陽樓雲開層觀切髙寒三面江湖一面山眼界不知多少逺望中幽鳥暮飛還書子萊丙戌登科題名小録後屈指宣和嵗在辰於今四十有三春吾家又得萊追繼叢桂從兹不乏人寄二兒老懶誰能教子孫靜中猶喜讀書聲有如雙鳯傳家學令我聞風畏後生次韻趙積中慈湖即事江南七月旱不雨捲地風霾翳寰宇夷門先生有底忙車馬東逰亦良苦干戈九載豫心哀亂離誰復歌南陔喜君父母老相守調官仍逐金陵來入室兒童隘函丈想見綵衣還謔浪掛冠如欲賦田園一水淮鄉足閒曠嗟豫留滯行當歸秋雨夜寒聞搗衣短檠眀滅淚眼暗誰令不寐心如飛山色湖光過雨清江邉歸騎净無塵先生有酒快吾取相逢少見如斯人平生可慣償詩債追驥疲駑况加怠不妨對客自揮毫文社於今有淮海
