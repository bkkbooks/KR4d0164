body:
  text: 相山集卷九宋王之道撰七言律詩春日書懷野桃經雨爛爭華似促畦丁種早瓜不見少年間信馬空憐寒士出無車泥融近水芹抽葉地暖依墻薺放花偶憶惠連春草句夜來魂夢到天涯髙文知已動天庭昨日春雷下六丁濟旱會施惟肖雨舉賢先應少微星行趨北闕形神健坐對東風醉夢醒連日暖煙隨處好吳山應勝越山青立春小酌呈諸兄共喜春隨曉色來東郊歡踴賽牛回破寒青轉蕪菁葉抵日紅抽芍藥荄嵗換未勞驚我壯酒封聊復為君開上林不負遷喬約百蟄同驚此夜雷和伯父仲球立春即事二首怪得青腰稍霽威却應緹室報飛灰搖風栁帶緣氷重破凍溪流與岸回羣盜傳聞湖外去愁雲凖擬嵗前開玉盤絲菜今蕭索賴有詩筒日往來對雪酬春付酒杯兵餘真似復然灰路通千里傳書去人喜三軍破賊回梅萼封檀香未徹湖聲撞玉凍初開踈籬敗屋休興歎幸事羣凶不再來春日有感示魏定父聚散時來不自由相逢相别欲何尤韋臯况有三年約陶榖端非一日謀殘角為誰驚曉夢逺山多事惹春愁故園又作驪駒賦尚幸持觴為勸留清明即事栁徑桃溪碧草芳故園遙寄水雲鄉老來轉使宦情薄春思頗增詩興長教子文書容自勉逢人尊酒為誰忙海棠却似憐衰朽依倚東風試晚粧追和東坡送春和陳德夫栁外風檣迅莫追栁間遲日㺯晴暉青春已作堂堂去烏轡何由緩緩飛入户呢喃輕語燕隔林咿軋靜鳴機誰言四月芳菲盡萱草葵花覺昨非鹿鳴宴乾道乙酉無為太守吕公以冬十一月庚戌舉送進士循舊典開鹿鳴之宴部使者梁公以建臺於此而與焉吕公不鄙謂之道於是邦年齒最髙實為鄉老俾從觀禮之道自念頃在宣和甲申獲同弟兄聫中科第迄今未見有繼之者士風不振甚矣因作是詩記今日之集且以勉諸君是行聫名春闈為時盛事大慰州閭之望蒼顔華髮老書生來赴公堂宴食蘋曽預宣和聞喜集重觀乾道計偕行繡衣勸駕追前哲熊軾賓賢繼列城久矣邦人虛桂籍正須公等振英聲秋日書懷斷虹收盡晚風涼撲鼻誰家社酒香門外山橫青玉案屋頭榴綻紫羅囊對吟已覺輸新俊遇酒還能發老狂坐想西園梨棗熟昔年猶記拉君嘗一别成均十九秋斷腸千里致書郵可憐率土民心固端為當年聖澤流此去會看還北狩夜來先夢到東州尊君正是吾儕事可但南冠學楚囚到齊何日醉青州久矣平原困督郵避地未容行信步泛江聊得卧安流望窮落鶩千山晚夢斷驚颷萬壑秋安得尚方三尺劒掃除驕冦獻俘囚對雪和馬大卿投分江梅亦太清尋盟風絮却多情勢先澤腹歸氷鑑氣迫毫尖入管城吏部夢踰秦嶺去將軍來作蔡州行擁爐令我思前躅䇿蹇髙吟愧孟生對雪和因老韻諌陛何人正伏蒲將壇無事且投壺因觀雪曲詞爭勝便覺詩鄰勢不孤警鴈王師方入蔡贈梅邉使欲離吳可憐鼠輩殊輕敵乃敢堂堂捋虎鬚和張彥智對雪雪山何處覓瞿曇壓盡江南瘴與嵐待伴可堪風作黨交光應喜月成三濯巾漉酒供杯勺涉筆聫詩尚笑談栁絮自今輕謝句使君才氣擅東南苦寒風屑瓊寒透薄帷擁裘端與火相宜暖回熾熖身成直撥到殘灰手欲龜贈炭尚誰憐正曜授薪還自愧支離不甘力請從緇侣苦調寒窗強作詩題合肥驛豫癸亥春三月嘗至此時兵火初過頽垣斷塹逺望若荒阡破嶺所餘人亦無幾傍徨不忍舉目後八年復來繞城秋草離離其青四合而市井舊通闤帶闠處亦漸可觀為之感歎因用壁間季延仲韻以識嵗月紹興二年秋七月丁酉重來嵗月恍如飛但怪蕪城壁四圍千里漫推新政善幾人能遂故園歸雲蒸殘暑催登榖風作新涼戒授衣小驛滯留朋舊絶何妨白晝掩朱扉題元發弟竹軒竹林深處敞軒楹分我西園一半清蒼玉幾番披夏籜老龍長此戰秋聲寒侵虛幌詩增爽緑浸踈醽醉不醒應許七賢追盛集煩君書入鄙夫名題時軒圖書堆裏席凝塵聊與時軒作主人自恐謝安行不免誰言陶侃困無津東榮曉色髙迎日南圃花光得占春想見戴侯風味勝輕彈珠玉到江濱題許公塞驛遐想清遊意欲飛巢湖西畔碧山圍髙城别後騷人到小驛春回燕子歸壁上新詩留醉墨庭前飛絮點征衣窮愁勿用頻惆悵來嵗而今在北扉題無為秀溪亭畫橋雕檻接招提新有幽人榜秀溪十頃淨明天上下兩奩光映水東西飛樓湧殿參差見古木修篁咫尺迷此景此時君信否緑楊隂裏囀黃鸝憫旱食貧那識小槽紅回也簞瓢久屢空翹候載芟歌濟濟忍看雲漢嘆爞爞困窮轉覺蓬心隘憔悴猶憐菜頰豐坐對驕陽思霈澤日占鳴鸛望穹窿為興國周少隱題紫翠森攢面面山箇中佳致為君還慿闌人在風塵表落紙詩成咳唾間良夜幸陪紅袖醉清時聊伴白鷗間籠紗歸去髙城晚凝翠堂東月滿灣為彭積甫題熙春堂似聞伐石旋誅茅己見髙堂蔭樂郊百里湖山供眼界滿城桃李動春梢寒梅過盡看成實乳燕飛來欲定巢何日登臨間信馬路邉人復少年嘲田間夜歸有作示王覺民二首風雲蹤迹付扁舟水竹生涯寄一丘世故舉同雞抱鴨物情無怪馬生牛百年半向愁中老萬事常從酒到休莫愛得官輕得句爭如飽食對吟搜江上秋來憶少牢龜腸尤覺病詩叨調和索似三分醬澒洞看如八斗糟水怪重增風勢惡湘靈難禁鴈聲髙何當一雨洗煙月為放清光歸我曹寄題峽州楚塞樓西陵舊有楚塞樓太史黃公魯直命名兵火之餘掃地盡矣秦德久至而新之頓還舊親羣賢爭出佳製爛然成編德久不鄙示豫且索鄙句江向西陵勢漸平萬山環合翠峥嶸須知楚國嘗為塞不為涪翁浪得名人若此賢真俊傑樓還舊觀煥神明臨風每聽灘聲咽似怨張儀作暮橫和陶尉喜雨呈張文伯賀客休辭酒盞深使君心是老農心精誠已致當時雨膏澤將為異嵗霖得水稿苖俱競秀乘秋髙鳥自能吟宣風宜有中和作戞玉鏘金播八音和王沖之喜雨呈張文伯指點邦人著眼看魯侯雩祭正玄端望來已見千山雨此去那憂百榖乾髙廪有期從穧斂奔霆何處起龍蟠新詩得得書靈應傳與羣公好縱觀和應資深九日遊康樂園二首村落瀟瀟晚吹生斜陽天際與林平黃花照眼吟肩聳紅袖扶頭醉帽輕可慣探題仍擊鉢敢辭償令獨浮觥相逢又復驚相别樽酒何妨意氣傾里社安間得久生金華端不羡初平山林應有清修重軒冕還將道義輕詩捷口占那復藁酒豪盆酌不論觥一斑已幸窺秋句囷廪他時冀倒傾春日郊行和郭希魯二首縈風楊栁緑絲長過雨桑麻沃以光聫騎不妨多載酒看花無用更燒香望窮巖電搜詩眼愁轉車輪感别腸勝集清遊定何處它年曲水記流觴坐對煙江疊嶂圖何如門外翠屏紆尋芳敢擅擕笻去命友應從折簡呼酒裏光隂間活計詩餘情思靜功夫浪吟痛飲真難遇休問西山日欲晡和吳子美香林湯韻泉沸雞籠山下林潯陽曽記尺餘深濯鮮瀹卵非豫事清暑攘寒蓋我心物態漫勞私曖曖靈源當信匪今今簿書汨沒塵埃久附驥何時遂滌襟上已日阻雨和王沖之韻袚除聊復對江亭樽酒相從一笑傾那得此時仍此樂况逢難弟與難兄潺潺暮雨簷間溜滑滑春泥栁外聲好在海棠紅閣淚向人悽愴益多情和竇又勇秋日見訪阻雨見贈風雨蕭蕭暮不休頓添寒色送窮秋已荒深院菊猶在欲去短亭人強留千里書遲空噪鵲四鄰砧亂混鳴鳩相逢棊戰宜終日卧稻從他爛不收和石守道喜雨夏旱逼小暑種入土者十才四五而原隰龜坼秧亦就稿太守張仲交為民請禱翼日片雲作環城獲一溉之潤而大雨繼之逺邇霑足因觀石徂徠喜雨之什勉用其韻且俾兒曹同賦庚辰夏五月庚子坐聽簷雨快髙吟酒到從斟不厭深酣戰遂符占蟻信鬱興良慰望霓心一時與被堯天澤四海同蘇傅野霖霑足豈惟秋有嵗麥田猶及趂犁金俗諺謂五月犁金六月犁銀七月犁土今尚五月故云伏蒙知縣縣尉二寮友以夏旱得雨賡石徂徠喜雨韻見貺不可虛辱復嗣其韻書謝仍命兒曹同賦緑槐隂外聽蟬吟節過分龍夏已深千里亢陽憂嵗旱一時甘雨快人心養禾不害連朝曀沃暑應容數日霖多謝同寮憐老拙雙南佳句競鏗金追和東坡張昌言喜雨呈同官旱魃正須三尺雨飛亷旋布四天雲詩成采筆揮瓊玖酒到酡顔散纈紋蓮沼灔翻宵溜急槐庭清送午風薰欣欣千里農夫慶衰病空慚老使君和董令升舍人雨餘沙路潤無泥瀲灔溪流與岸齊苒苒年華催我老酣酣春意得人迷聫珠便覺新詩富浮玉還聽雅唱低楊栁緩搖隂正午誰家籬落一聲雞和董令升舍人夢中得句早晚天書下紫泥如今人物擅三齊才華好自鑾坡進詩思休從蝶夢迷深院日遲黃鳥囀長橋風軟緑楊低春容不用相撩撥老去心情似木雞和張安國舍人判花西掖妙當年曽見聲華振日邉文翰共推唐李嶠功名將踵漢韋賢江山到處供詩笥風月多情付酒船琳館正應聊爾耳會看鵬擊水三千和張文紀詠雪二首萬境沉沉夜氣嚴廣寒初下水晶簾三杯強沃澆腸酒一捻聊分暖硯鹽已恨梅梢遭挫折可堪風物為般添才髙栁絮雖難到此語於今亦惡拈朝來經閣課楞嚴撩亂飛花競擈簾似是青腰誇黑帝故教姑射混無鹽地爐無奈貂裘薄斗酒難供座客添詩債惱人眠不得夜寒殘管亦須拈再和董令升雪二首春雪初融作燕泥梅花零落杏花齊遙山掃翠雲初斂芳草鋪青路欲迷别恨每憂兒輩覺老懷終為世情低新詩價重連城壁敢比靈犀獨駭雞欲下間庭不踏泥但驚飛絮與階齊一枝誤失禽棲穩三窟遙應兔迹迷填塞澗溪還地厚壅培山阜覺天低寒光照應東忩白咿喔應先報曉雞追和東坡嚴車二雪詩公詩有意拂亷纎令似歐陽韻更嚴犬子亦應慚賦縞癡兒端合愧誇鹽飛綿勃窣爭平塹凍笋槎牙欲墮簷胡避只今何處是玉屏森映一峯尖雪滿江城酒不賖閉門那患出無車未容踏凍尋梅萼應喜臨風見栁花炭重烏銀爭曉市蔬挑翠羽荷鄰家何人正下紅蓮幕大嚼蒸羊手更義
