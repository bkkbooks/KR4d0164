body:
  text: 相山集卷五宋王之道撰七言古詩送趙仲達仲達比在蘄州教授彥逢弟處訓猶子􅀢去年來赴運屬徐季功之請朝夕與兒輩薳蕸相討論老拙間得奉談麈今當東還來索鄙句窮愁無好語勉强塞其請成古詩十四韻奉送且簡莫德裕人生邂逅非偶耳一面豈容輕愠喜白首如新傾蓋歡誰解乘閒究斯理君家江南我江北南北相望殆千里惠寵顧我端有由衰滯不應能致此為言前歲在金沙幽討窮探遍山水論文獲與阿逢遊賸馥殘膏丐猶子是行來赴徐卿召昨日扁舟方戾止阿逢聞是公僧彌豫乃阿逢門下士知公閒放今杜門所舍與公殊密邇何妨旦夕侍杖屨執經仍與諸郎齒過從彈指見周星入室芝蘭被蕸薳須知四海皆兄弟髙義似君誰可比徐卿報政趣歸朝畫鷁髙檣艤江涘明朝車騎遂東還有便時時遺雙鯉贈李廷吉知縣慶源王公所至視吏民如家人人安樂之東坡先生有詩云青衫半作霜葉枯視民如兒吏如奴吏民莫作長官看我是識字耕田夫蓋為慶源作也李無為與豫昧平生方到官之初境內大旱曽不三日而雨逺邇霑足豫固疑其有以致之已而訪之民間盡能言其拊循矜恤之政咸以為當世未見其比者故因求之古人得王慶源于東坡詩中輒次其韻奉寄庶幾異時以備史官之採擇云紹興壬子李侯入境憐焦枯指麾屏翳如家奴坐令大旱變霖雨一時凋瘵歌巖夫我思東坡不可見夜諷新詩還撚鬚慶源老人骨巳朽愛民似子當今無稻田上下水聲接農家凖擬相攜壺南鄰敗屋欹欲倒君來往往人爭扶流離復合燕相賀向人競欲嘲解襦吏民莫怪吾面瘠耄倪艱食方饑癯政聲不必家置喙自然和氣成歡呼何當相聚飲一斗髙吟大笑臨卭壚次韻秦壽之雷江阻風君之是行亦不惡到處名山得佳作江神好事欲援例橫起狂風捲帆腳要求詩句須少駐故戲舟師令暫泊雷江正在淮南岸萬頃黃蘆映青廓不知眼界濶多少但見炊煙耿墟落歸心浩浩孰撩動歸夢忡忡豫忖度怒濤底事强留滯清夜無眠屢驚愕遡游初冀日千里今比驅車反成錯人生離合自有數誰謂江神能見謔新詩入筆走驊騮奔逸絶塵那可却何妨有酒發妙思坐對陶泓自斟酌韻嚴語險屬和難顧我才慳子非虐曉解糝潭追和張文潜白沙阻風江上驚風夜穿屋扁舟正艤沙頭宿燈寒屢剔短檠青酒暖孤斟老盆緑更闌艇子催人起泥汊而今趂朝市披衣踉蹡出馬門凌波逐浪來江豚鳴櫓嘔啞濺飛雨靜聽依稀似人語月城百里指顧中只好張帆使風去和李似矩馬圖歌次韻畫工妙處稱毛羽我欲論功第先兔不知心手㑹天機象管紛紛誰比數寥寥千載一曹霸墨妙于今傳二馬龔生重馬輕尺璧蔑視韓韋復何者爾來一顧遇孫陽奔走侯門日無暇一匹騰驤一匹嘶先生愛駿非愛竒有如霓裳第三疊按圖知拍逢王維新詩邁絶今老杜作經未必多馬蹄先生馳騁金馬裏口角雌黃即公是欲知早晚定登庸步武風雲起平地偉哉驊騮世英物一日早行三萬里應資深康樂園四詠溪頭栁色春無際溪水浮天一張紙東君戲草康樂園旋入夭桃與繁李亂花無數不知名往往倚檻窺前楹有時酒惡吐欲死先生來約花間行露梢戞戞敲鳴玉雲葉差差傳新緑亭前十頃碧琉璃過雨荷花淨如浴客來不迎君莫嗔我有清風如故人先生午醉睡正熟長須倒盡床頭春不知眼界幾多濶隱隱青山在天末湖光釀就琥珀濃應助先生恣澆潑西風搖落黃花秋江城有蟹供拍浮人如淵明亦不惡肯使臨賦成悠悠誰人獨釣江南雪雪滿江南鳥飛絶先生對雪望江南嗅認梅花忍寒折癡雲捲盡清月流小舟橫卧南池頭子猷乘興欲何往歸歟莫為伊人留華亭風月堂避暑豫自無為來獲與趙應之市舶親友相從於海上而吳伯和司理素昧平生一見䝉傾蓋暇日三人避暑風月堂邂逅王壽茂主簿并鍾幹二公碁酒終晷樂可知也輒成古風以丐撫掌一笑大哉天休何穹窿惟王配天居域中東西南北乃四裔盛德可使車書同吾皇中興繼商武小雅不復歌車攻年來幽障滅烽燧梯航萬里來夷戎華亭瀕海古巖邑商民填委百貨通雕題交趾在何許但見巨艦浮蒼龍國家懷逺固有道緩征薄稅垂無窮名官市舶司置長往往所任多名公洪侯才望在人右暫此出使良忡忡使臺雄勝壓湖水飛橋百尺如垂虹作堂枕水傍風月想見浩氣盤髙空我來五月過淫雨炎雲烈日方爞爞登臨不獨眼界豁一洗煩暑清心胸偕行相遇二三子吳趙與我并王鍾髙談亹亹到莫逆圍碁把酒還從容輕風拂拂動襟袖明月炯炯窺簾櫳湖光十頃碧上下身世恍在玻瓈宫何人倚檻正橫笛數聲裂石開雲峯忽然琵琶又繼作罄此百榼誰能供夜闌歸去不成寢卧聽湖外鳴豐隆次韻因老胡避遊新詩滚滚江流東一瀉萬里誰能窮平生清峭不近俗雪山突兀江頭峯相逢一笑莫相避自古髙人苦難致涪翁骨冷喚不醒且向新詩求筆勢君於涪翁真後身有同次律前身僧語言直下見理窟何須辛苦從張憑對君令我思秋菊三月褒山如一宿君看玉局感秋吟嘆息流光豈豫獨送管養正長歌餞别宜有酒我無一杯潄君口送行當以贐我無一物藉我手與君意氣真相知君嘗謂豫可言詩獨有詩句堪送别欲賦復止空嗟咨送君胡為三歎息文酒從今失三益干戈日尋雅道衰吾徒一别真可惜問君四海無家歸飄然此去將何之答云南陽善城守屢以孤壘攘重圍我今欲往誠有以主帥好賢同邑里輜車儻許載病翁長䇿猶能靖多壘騏驥君看伏櫪姿髮雖種種心不衰胸中之竒老未吐忍死山谷甘寒飢君不見元龍豪氣真磊落卧見許生自旁若時危康濟乃丈夫問舍求田匪餘樂又不見越石夜半聞雞鳴披衣起舞賀友生風塵澒洞四海亂英雄攘臂收功名古人相期蓋如此豈效世間兒女子出門惘惘色可憐君亦為之殊可鄙壯君此語膽忽張羣憂散盡增激昻西風獵獵天落霜千山凋林松檜蒼寒菊始花黃且香髙空無雲老鵰翔登山臨水秋興長行人欲行送者傷我獨不復傷知君壯志殊未央為君援筆寫長句一洗古今離别腸冬不雪春苦雨外臺為民心惻檄郡請禱於法輪應感尊者悉獲靈貺曽不終日教授有詩以發揚盛美郡人相山居士聞而悅之勉次其韻誰令一日如三秋仁人方念淮南州斯民忍饑望牟麥積雨又有傷殘憂冬溫土燥生春瘴半夜風聲來枕上曉看飛雪欲堆簷白馬參差攢玉嶂白馬山名年饑髙下藝麥多暴如山阜汸如河那知雪欲苦淫潦兩岐半吐翻隨波欣聞萬事一言了使者勤民坐待曉指麾郡將率官僚出郭共迎羅漢禱由來天意每因人況自至誠宜感神明朝披霧走烏轡晴光杲杲清無塵回頭菽粟賤如水醉飽田間摩腹觜周行四海不齎糧可但攜壺餉鄰里出遊遂繼文昌謡追鋒行赴公車招快將劉晏幹排手衮衣入相禆唐堯廣文才氣邁燕許分教芹宫從少駐政德穩步玉筍班好尾輶軒上天去次韻孫興宗秋懷秋山赫赫明丹楓秋天隱隱分𤣥鴻不知眼界濶多少九華突兀撑晴空嗟豫老病百事懶誰能强勉追兒童讀書既苦齒多豁屬文益覺心如蓬年來衰甚更齟齬乘舟賣麵皆遭風茫茫有類墮雲海躊躇四顧迷西東感君賦秋肯寄我開緘反覆歌三終如痿忽起盲忽視角力未易分雌雄寒鄉冰雪正凝沍暖回愛日何烘烘驚濤巨浸浩無際安流利涉輸艨艟蓽門圭竇僅容膝規模敢擬阿房宫生平未慣新斧鑿斫削便許從共工偉哉歐梅兩黃鵠逃名詩酒俱稱翁余生顧後八十載賢愚雖異襟期同知君尚友取前哲言之聊復輸丹衷何為規規事騷雅乃欲索我章句中舂容大軸爛錦繡令人一覩情融融清新嫵麗似鮑謝豈徒奧學稱淹通人能平地覆一簣不輟㑹致邱山崇披雲俯仰三百日相逢底事常匆匆去年江上識君處鑿冰初見陽冲冲分攜不覺秋又晚向來旱氣方藴隆君如鎮西我淝水我往無事還何功而君被檄試多士考核曲盡權衡公作詩惡用求好語好語正自添詩窮有時嗣響姑趂韻兹意祇欲安微躬爭如閉門絶慶弔著書逺繼吾家充靜言培塿亦何罪不韙正坐睎衡嵩茅齊雨過風露肅青燈夜諷賡秋蟲更闌耿耿不成寐卧聽江城鳴畫筒上元後漕幕同僚二十八人㑹飲於西湖登千佛閣運幹趙漁樵希聖以坡詩七言絶句分韻得陌字福星臺畔依紅客厭踏紅塵穿紫陌湧金門外泛蘭舟兩岸融融春水拍隔浦笙歌寄幽思向陽花栁饒春色六橋突兀披丹青千佛森羅眩金碧登臨肯作懷古愁志在雲臺書竹帛須㬰飲散晚風號却掃陰霾生桂魄含山令尹章邦基即其所居剜山得石嵌空乃作堂於其上而目之曰玉璧窟求詩諸公豫不識邦基而與其姪無為簿濟之遊濟之索詩故為賦之我聞美玉地所祕出為世用自有時譬猶景星與慶雲千載往往一見之君家玉璧豈無說鑿山得石夸瑰竒豈惟蒼翠實相似溫潤清越璠璵姿細看髙廣類墻壁以璧名之故其宜剜劖不巳石無盡此窟未易窺藩籬作堂正在佳絶處下視海嶽如城池錢塘雪浪湧澎湃天竺煙岫紛參差君于其間日成趣長篇短句揮蛟螭乃知地靈不愛寶要令景物求新詩顧我與君無半面牽帥阿咸難固辭沽哉沽哉吾與玉它年相見期相知
