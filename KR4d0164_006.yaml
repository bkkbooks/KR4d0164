body:
  text: 相山集卷六宋王之道撰七言古詩送神童胡元弼元英從其父胡庭俊歸秋浦西湖清麗春雨餘子今欲去其焉如九華插天逺在望三月不見愁容舒二兒奔逸汗血駒輩視長離與鵷雛去年冒雪來其俱一鳴上國驚羣儒書不負人人負書公卿豈應終犁鋤惠然過我騎甚都蕭蕭晚吹飄襟裾借問能留旬月無吾亦理棹其歸夫為言與君不同塗藹峯松竹鳴笙竽竒童小友良不誣異哉老蚌生雙珠君之是行亦榮歟三胡盛事喧州閭和王覺民松軒詩蒼髯緑髮三四椽茅齋髙下輕且軒清風入夜可人意來與夫子調朱絃連日秋陰蕩殘暑抖擻煩襟欲輕舉簡編燈火置勿論且快蛟龍得雲雨追和東坡郭熙秋山示王覺民平生最愛煙水間不知歲月磨江山干戈七載厭奔走清霜夜入飛蓬間我家山水擅平逺未向郭熙見秋晚驚鴻斷處抹微雲野水盡頭橫翠巘林塘緑淨明拒霜似與楓葉驕秋陽東坡山谷妙言語珠玉倍增山水光亂離記得承平日政出多門事如髮傷心北猗歸何時園苑荒涼萬年石次韻袁望回見贈兼簡楊德潤長堤十里荷花雨隱約塵頭南去路故人戀戀不能忘又遣長須寄新語錦囊玉軸纒朱絲開緘恍覺雲煙飛青山未許松柏老緑野會致牛羊肥嗟豫衰滯煩訾相十年相對江湖上苦吟猛省爆鴨腳劇論旋驚爛熊掌分攜令我重回首日月漂流易成久因風頻寄數行書毋蹈從前作詩瘦比鄰先生倦不出德齒俱尊時第一何妨杖屨日過逢白酒黃雞醉秋色按麥行和魏定父韻號啼莫怪妻兒疏麥秋恰了償官租噓嚅濕沫魚在陸傷時令我思唐虞平生學易有何説大要豐財貴知節相扶相吊來流亡問言豆葉何時黃逺哉天道所不曉人比前年孰多少清江引用蘇養直韻示王覺民荷葉亭亭緑滿塘秋炎深得蓋鴛鴦晚來江上西風急收拾蓮紅付拒霜萬山搖落見森樾翠影蕭蕭冷梳髮請君無作宋玉悲來賦江樓望明月清江曲追和魯直韻鬢邊殘雪幾春秋自説生來不解憂晚食得魚吹荻火秋盤尋筍艤松舟布裙斗酒不須惡明月清風且相樂紫宸朝去醉眠時初日寒林正搖落追和蘇養直飯牛歌時來富貴非所憂公卿何必皆黑頭力田孰若逢有秋異哉寧戚親飯牛商歌未絶驚齊侯遂從仲父盟葵丘勳業無聞死不休磻溪有叟垂直鈎次韻陶監丞茂安見贈三年重見須川湄捨舟東去何驅馳王事靡盬莫遑息人生所貴心相知經從往返兩過我一言意厚何多為向來江夏傾蓋日翕然譽望推麟儀才猷伏火丹九轉用之功效堪扶衰重陽初過雨新霽乾坤六合方平夷邊城殘冦何足滅廟堂勝算那容窺相逢問我出世法嗟我茅塞同荒陂因君扣擊發深省沉迷可笑羣昏隨我聞摩詰老居士後身樓至今王維忽然惠顧有緣契恍若宿霧青天披願君為我取妙善此界示現無邊慈和成都張通叔韻簡范偉明髙樓半天夸奕奕一室蕭然再經昔君今盤礴知幾時邂逅相逢俱是客襟懷磊落我輩人傾蓋便覺情相親欲知富貴未乾沒岷山錦水鍾精神范侯國學同舍友聞與吾人最親厚别來不寄一行書有便何妨為豫取贈蓑衣道人蓑衣道人七年凡兩見於西湖之上是行謂豫會當晚達且遇異人則豫心之所庶幾而不敢必者道人丐豫數語故兹及之咄哉彼以妄言之我以妄聽之識者能無誚乎已卯三月二十五日七年兩見西湖濵似向賤貧求貴人安民扶世在豪傑貴人何必皆巖莘嗟豫坎壈今老矣糊口相煎未能已願君莫作貴人看歲晚庶幾長不死寄白香巖縣丞香山譽望不可攀香山之後傳香巖香巖硉矹聳人目香巖秀氣超塵凡香巖之風清可掬終日哦松適幽獨愧我無能老杜門何時一笑披青雲題魏吉老若水軒世情孔甘似醇酒沾沾未必應心口覆手為雨翻手雲餘耳安能保長久魏侯風味真可人汪汪萬頃江湖春相從丱歲今白髮坐對小軒聊欠伸和沈次韓王覺民韻二公才致同清壯顧我無能但蘄向只今連璧復有誰伯仲未可輕第行小人老矣病且衰目光近在牛背上何當䇿蹇擬髙談歲晚寒雲連雪障教授顔端行出示所和老杜曲江章因次韻浮雲捲盡秋天髙月光照水翻金濤臨溪酌月羞溪毛舉杯未飲欲誰酬兹非沈謝須劉曹清夜無眠想千古一字茫然墮沙莽賢否紛紛固難數樓頭漏聲寂不聞䇿䇿寒窗葉鳴雨富貴從今信在天君看黍稌多秋田金風玉宇秋無邊白屋青雲朝暮耳正如農父須逢年定慧院海棠追和東坡呈虞季然陳德夫春來何處無花木偶向招提見君獨一枝著雨濕紅粧便覺羣芳自塵俗嚶嚶幽鳥競遷喬皎皎縶駒聊在谷人生富貴會有日莫以青雲輕白屋固應遺䇿暫駐馬況復過屠宜得肉無心杜老吟不到半醉楊妃睡難足態濃意逺誰得似空想當年麗人淑嗟豫坎壈世所鄙正坐甲壬無背腹少甘粳籺老葵藿自笑清癯類霜竹看花把酒發浩歎反復新詩三過目仇池老人已仙去千載東坡與西蜀思之展轉不可見夜夢乘風跨黃鵠朱唇翠袖妙今古我欲宫商歌作曲翻愁刻鵠難復工唐突西施却成觸次韻寄荀晉仲簡陳夫子二老亭亭雙屬玉交映霜餘半溪緑才髙一世妙言語落筆珠璣爛盈掬時來釣叟為三公傅巖莘野誰雌雄紛紛俗態任冷暖風雲早晚騰蛟龍中興復見宣和盛須信人心協天命真從僵仆正邦基更向膏肓起民病尺書寄我三長篇管中窺豹非其全墨渝紙敝未釋手晴窗飛盡沉香煙嗟豫留滯濡須塢夢寐斯文屬燕許何當單騎造齋榻遂使髙軒出城府春風回首歸萌芽又促畦丁種早瓜我心傾寫會有日為言已辦浮江槎再用奴字韻寄李廷吉廷吉行縣過敝廬出其里人項君佳句屬豫俾和將以寄項君豫雖不識君面觀其詞意字畫必修謹樂善之君子也勉賦一章卒簡項君為異時相見撫掌一笑云霜餘菊暗荷葉枯千頭喜見君家奴離離丹實照緑葉不減五松官大夫邇來萬木凍欲死東君信到梅花鬚一枝亞竹斜照水便覺清香無處無李君江南我江北正如員嶠鄰方壺操修逈與世俗異政事賴有神明扶文書甚簡民甚喜老吏往往寒無襦項侯秀發西楚後作詩語帶山仙癯願因徐辟見孟子折簡未敢先招呼異時鼎社遂酣暢會使王衍悲黃壚酬秦壽之見贈三首人言韓孟才相髙欲將詩骨追詩濤可憐寒谷瘦不毛青蒿倚松亦浪語遂令後世稱同曹誰能胸次澆今古老去蓬茅雜榛莽朴遫已甘無足數品題忽及乃君餘頓覺焦枯得時雨靜中真樂全吾天勿輕捨已藝人田甜均食蜜無中邊濁醪粗飯自不惡那能問命推行年江天暮雪凍雲垂地風栗冽萬里江天暮飛雪九華何處正嶙峋瓊樹瑶林鬭明潔扁舟突兀依寒蘆朝來殘酒猶半壺夜寒獨酌不成醉卧聽宿鴈鳴相呼瀟湘夜雨短篷暮艤湘江宿坐見江豚起還伏忽然氣作浪山來一夜雨聲如決瀆淒淒寒氣欲相侵燈火青熒更向深床頭有酒且徑醉免使萬慮縈吾心洞庭秋月扁舟夜泊蒹葭側湖外雲間見明月月光搖水掣金蛇坐想騷人賦秋色舉杯向天屬姮娥君當照坐吾當歌全勝送客九江上荻花楓葉如渠何漁村落照寒蘆萬頃迷西東夕陽上下江天紅炊煙幾處裊輕碧知是漁家收釣筒老翁長鬚更廣顙路逢百錢挂藜杖三杯酒罷月已髙短棹扁舟還獨往平沙鴈落雨餘湖水吞遙空前山宿霧開溟濛坐看鴈陳落沙觜欲下復起摩蒼穹寒蘆飛花秋色老亂撲客衣紛不掃肅肅驚風忽破行却似張芝作顛草和笑庵送麵深堂傑閣松風鳴黃梅已過雙溪晴不知城市乃有此六月表裏冰壺清我來蒙師炷香鼎旋汲溪泉為煎茗明朝又送不托材大慰枯腸怯龍餅贈堅上人堅上人以竹齋居士所贈岷峩圖詩來求鄙句為賦之繼其韻也岷峩何處在目前恍惚萬里惟心田道人遐想對縑素毫端亹亹生雲煙不煩捫參更厯井坐見紫翠摩蒼天崔嵬絶頂明積雪﨑嶇幽澗縈流泉當時神禹導江處隨山刋木知何年竹齋言語妙天下山情水思何綿綿想當落筆快揮掃精神如到岷峨巔師誠乞詩我丐畫不然無用徒相煎寄古上人若之用東坡徑山韻寄語山中好看客待與諸郎醉秋色諸郎作詩學東坡筆力駸駸清到骨由來習氣相薰蒸千古勾吳張季鷹鱸魚斫鱠飲入夜哦詩坐對風窗燈好向少陵賡客至樽酒盤餐正相似請師淨掃壁上塵凖擬臨時醉題字送道覺逰天童山小雨新晴接重九獵獵西風振衰栁二禪過我欲東遊為説偕行得良友天童老人笑垂手應問師來欲何取相逢莫作一日留袖取鄞江過淮右四祖山黃梅西去一舍許奔走龍天瞻四祖師今何往昔何來占斷金沙長作主須知至道本不滅豈獨髙名固非取偶傳衣鉢繼三世遂配雲中詔千古寺藏巖腹蟠地軸塔據峯巔立天柱稜層石棧斜甕玉繚繞溪流緩縈組月明飛瀑百虹挂風撼長松萬蛟舞路通澗谷橫略彴樹靄煙霞團縷數清陰掃徑初入夏蒼蘚封庭新過雨留連歸客獲聨轡邂逅主僧還接武請觀異事花五葉願結勝緣香一縷何人為作錦雞夢此意他年銘肺腑
