body:
  text: 相山集巻十三宋王之道撰七言絶句送賈教授偉滿罷東歸赤城賈之竒頃聞馳聲賢闗逺追其先洛陽年少予願見之乆矣是行分教武陵予偶將命本路遂獲相從於此首尾三年而児軰因得朝夕承教可謂幸矣今報政還朝予亦早晚當罷去語離江濱令人悵然因成二十八字奉送行色隆興改元冬十月戊辰妙年才氣擅超羣試吏來司泮水芹行矣玉堂應召直忍將風袂與君分重陽示二三友龍山何處暮雲黄坐想前賢落㡌狂茰實菊花良不惡為君沽酒作重陽秋日憫旱題香山莊舍千里驕陽稼穡枯人心窮極但天呼湏煩巖壑為霖手下澤蒼生慰海隅寄梅花與曽子修待船聊復駐征驂手撚梅花望翠嵐花似若人清絶俗故從江北寄江南送曽式古歸建昌兩年説歸明日歸江頭草軟花芬菲風調江浄船行駛好看芳草懐春暉酬孔純老送海錯三首海錯東來自四明感君憐我故分珍拜嘉何必湏豪飲大嚼姑從得句新螺頭已荷兼三和鳯髓何須貴八珍多謝邦君憐不飲只將詩句巧争新惡語豈堪酬妙句麤餐曽不饜常珍得君海錯俱竒絶從此鄞江發興新和子厚弟春日見寄三首睡起晴牕正憶渠老兵聲喏到前除新詩價重連城璧便覺貧家富不虛一鞭春色去迢迢溪上紅粧笑語嬌酒醉不知行客避競眠芳草鬭裙腰十里西疇馬送曛晚風依約度溪雲懸知今夜桃花雨一洗焦枯慰使君謝潘夀卿恵牋并詩餉厚東陽一萬畨從今難放筆頭閒新詩正與花牋似文彩縱横咳唾間道上雜花盛開涓涓流水雨晴初夾道山花簇綵輿千騎不辭迎候逺物情春意竟何如風雨損花雨多南國惜春歸多謝詩人賦采菲堕白殘紅無處着漫隨風絮作團飛落梅入硯池玉佩翻然下帝傍墨池照影妬新粧時人莫作飄零看收拾毫端無盡香玉樹花幾年埋沒亂荆榛軒檻移來特地新何事臨風忍相對傷心一曲舊亡陳芭蕉秋風鳴玉雨踈踈嫩綠臨牕半巻舒似是相知慰牢落朝來肯寄一緘書菊千林揺落見孤芳色映青松破嫩黄玉露凄凉三逕晚金英芬馥幾叢香山茶開花不與衆芳期先得江梅破白時犀甲鶴頭㣲帶雪畫屏曽見两三枝荷花亭亭青盖倚宫粧新浴温泉體自香暫借青風來一霎欲披雲錦見蜂房紅梅穠華不與衆芳同偏愛施朱立曉風莫道春來無酒病臉霞猶帶夜來紅題烏江官舍木芙蓉桃葉蕭踈栁葉黄清寒應怯夜來霜芙蓉雅與秋相好獨對層臺試曉粧青梅踈白欺人侵短鬢老紅乗酒駐衰顔食梅已判非吾事把讀清詩憶故山和魏定父早春十首早從子美追懶真近向長康得癡絶相逢可笑復可憐君看稀踈鬢邉雪安得都䕶胡青驄與君並轡揺玲瓏南溪今日凍初觧好㸔㳺魚翻鬛紅依依楊栁繞溪斜黒白溪頭鵠伴鴉雨過蕪菁自春色一叢茅屋野人家晚來天意欲晴寒幽鳥争春到舌端詩骨自憐山様瘦酒腸君似海能寛門前溪水緑縈逥風縠無邉費剪裁待與東君寫春色好教紅紫一時開春到花梢一㸃紅吹嘘應謝曉來風南園繚繞城邉路無限詩情杖履中㶁㶁溪流碎玉鳴野梅隨處伴行人歸歟路出臨卭市凖擬沉浮麴米春怪來庭砌堕寒梅風笛數聲清以哀兩日枯腸饜蔬筍不堪茗椀發輕雷辰𤓰醉竹定何如試問君家種蒔書坐乆幽牕轉斜日恰憐梅影上衣裾南禪相望無多地深謝髙軒日見過歸去山林遂閒放却尋農圃問誰何和秦夀之春晚偶成八絶相從輙莫太怱怱賭酒分茶自有功誰謂春歸無處覔栁蹊飛絮亂因風照眼酴醿正及時鞓紅相映似相知天公應也憐芳意一霎輕風宿霧披花外霏㣲雨㺯晴亂紅狼藉過清明傷春正苦無聊甚接接欣聞噪鵲聲官閒時醉秀溪春醉裏吟詩字字新欲報自慚無好語年來胸次亦埃塵欲下荒庭意已闌一枝紅藥坐中看東風不息成何事又醖春隂作夜寒輕隂還傍麥秋天病怯春寒獨衣綿老境不知行樂好坐來芳樹㸔鶯遷春來談笑數追陪多謝傳杯不放杯醉裏狂言應可笑問春歸去幾時囬帶雨飛來燕一雙問伊何事為春忙野人不觧呢喃意勉强搜吟對麥光和王圜中道上初見梅花二首馬頭驚見一枝新夾道歡呼擁吏民咫尺招提鷄黍約不妨同醉萬家春安養瘡痍過所親野人何幸預斯民自憐枯槁無生意遂與寒梅競得春和沈次韓春日郊行二首楊花落地鸊鵜飛百里湖山碧四圍信歩不知行幾逺却憐芳草伴人歸山色新晴一蘸青隔溪無數野花明杞苖荻筍肥應美採掇何妨趂晚烹和張文伯春日勸農奉詔歡均草莽臣郊原風日自温温欲知太守催耕意重榖劭農本聖恩和劉春卿秋夜對月天宇澄清桂影秋騷人乗興欲登樓樓前白水三千頃滉滉鎔銀爛不收和章序臣梅花二首之道比因諸公以職事多出無復有以詩相牽帥者筆硯遂埃沒今日偶得早梅數枝不敢獨有漫送序臣迺辱妙句輙嗣元韻奉謝三月詩筒絶往來有時談麈許追陪梅花雅欲撩佳句犯雪凌霜為我開多謝蒼頭語我來恍如相見笑相陪新詩髙妙梅清絶展讀花前病眼開和孔純老江上避風題酒肆對酒應從暮吹號酒行還喜薦溪毛若將物象評詩思須向江頭看怒濤和張文伯黄悦之席上賦雪功成三白到春逥好放雲天萬里開今夜子猷方對客却煩安道過溪來和張文伯先梅後雪六花無怪索詩催正恐清寒勒早梅待得江頭千樹暗故争明潔逐風來和子厚弟冬至即事天容如鑑地無塵陽氣依稀動紫荆日晷漸長端可愛霜華増重不勝清和王覺民雙泉道中白雲深處是吾家山市歸來日影斜獨立前村聊送目孤村流水鬧寒鴉和魯如晦七夕乞巧誰家綺席開夜闌簫鼓趂虚催啟明不為牽牛計又放朝陽送曙來和陳天予經過南巢邑人迎舊尹君來井邑笑烘烘君去蕭條逈不同似説攀轅如昨日可憐身老長兒童和孔純老别鄰居錢進之醉寢留題不敢搘笻問起居慮煩炰膾破兵厨杜門終日無人顧新竹墻頭出萬夫和張文伯洞庭柑金苞照爼出雙柑想見和枝映筍籃欲倩玉纎分玉液要濡燥吻發清談和劉春卿曉起讀書夢斷幽禽恰轉更窺忩殘月淡孤燈孜孜讀誦如吾子指日菁莪看錫朋偶書萬事秋來只信縁為誰清嚏晚風前斷虹收盡亷纎雨喜見江南八月天和吕子梅題陳倅牕前新栽竹二首封殖要當同種玉翺翔端復見停鸞此君不是塵中物豈減樊川十萬竿自是清隂能借潤不應積雨尚流寒先生端的磻溪裔乞與滄溟作釣竿和陳勉仲贈淮西漕吳介之二首威嚴霜肅徳春陽民感澄清涕泗滂畏壘大穣知不晚三年端可笑庚桑九郡瘡痍頼拊存年來和氣浹江村此恩未易論天報請看于公大里門和趙積中白蓮三首翠盖亭亭水滿塘六銖新製帶天香晚來扶洗嬌無力盡鬭冰肌不鬭粧清風習習晚香㣲坐使詩人賦采菲想見温泉初濯玉侍兒嬌擁太真妃耻同流軰㺯胭脂一様新裁雪白衣何日與君携酒去兩般分取載將歸和張元禮水仙花二首素頰黄心破曉寒葉如諼草臭如蘭一樽坐對東風軟敢比江梅取次㸔沉水香濃畫不煙賦花誰是飲中仙顧予老拙辭源澁空想東坡萬斛泉和秦夀之銅陵江上二首楓葉霜餘霞燦爛葦花風起雪縱横銅陵江上秋容好兩絶新詩取次成烟銷逺水分帆影木落踈林出斧㾗嘯詠不知紅日下九華何處望中昏和子厚弟九日登魏文振亭園七首瀟洒湖東小小亭一時酬唱有三明亭前澄練無邉際應助詩人冩物情亂挿黄花趂節宜年華休向鏡中悲已知和氣囬春谷横管臨風更一吹一龕燈火夜凄清壁下秋蟲斷續聲細把新詩等風味易牙元不亂淄澠疎懶常嫌束帶勞年來見客强垂條不知此病容醫否瀝瀝真珠出小槽雨餘東北望銀屏一帶寒山映骨清誰道西風能換物染紅楓樹亦多情宿雨飛花阻擷芳寄題端欲為増光何時登攬快晴日㵸茗揮毫看瑞香官道千秋坐小車仙隨阮肇飯胡麻男兒正患無津耳千古留侯事可嘉時雨二絶和趙積中韻稻花時候一犂雨天意從人無間然我亦摧頽窮甚矣煩君試考小行年白江州熟人炊玉競説前年斗萬錢何事農夫太庸鄙欲將豚酒謝蒼天緑萼梅天然膩玉細生香斜倚東風竚淡粧可是春寒猶料峭曉窻猶試緑羅裳榴花看花令我憶金明五月尊罍竹葉青窈窕寳津樓下路斷腸千里四周星送顧渚茶與孔純老曉來飛雪似欺春盡把羣芳㸃綴勻莫訝兩旗分顧渚要令佳句鬭清新
