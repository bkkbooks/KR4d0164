body:
  text: 相山集卷十七宋王之道撰詩餘折丹桂送蘧著􅣫三子赴省試照人何處雙瞳碧欲去江城北過江風順莫遲留快雁序飛聨翼西湖花柳傳消息知是東君客家書須辦寫泥金報科名題淡墨用前韻送彥開弟省試風漪欲皺春江碧豫寄江城北子今東去赴春官挽不住摶風翼修程應過天池息何處堪留客預知仙籍桂香浮語祝史休占墨又用前韻送趙彥翺省試雪晴山色分遙碧輝映江南北君今東去步蟾宫看少展垂天翼晚來江上西風息不是新豐客明年三月見君時慶章綬紆銅墨南歌子端午角簟橫龜枕蘭房挂艾人一尊菖歜泛清醇好在佳人如玉映長春氷徹杯盤瑩香和笑語薰蓮花衫子入時新挂起南窗一榻晚風清玉斚浮菖虎金盤饋線魚研丹聊作厭兵符何必城頭一女當千夫雨過山如洗風來草自梳佳人不慣手談輸却道如今重賭選官圗南歌子趙叔全生日扇裏薰風細壺中化日長梅花髙下照紅粧花外飛雲芬馥水沉香新竹輕儲粉流鶯巧弄簧不知何處是華陽應有千年白李薦霞觴南歌子和陳勉仲老懶詩才退春融醉眼昏青山終日對柴門柳外斷橋流水幾家村桃李添新意池塘失舊痕一尊聊復為君溫傾倒來年酬唱細重論南歌子戊午重九朱實盈盈露黃華細細風龍山勝集古今同斷送一年秋色酒杯中鴨腳供柔白雞頭薦嫩紅量吞雲夢正能容試問具區何處浙江東南歌子書所見露竹舒新緑風荷遞暗香誰家池館睡鴛鴦還有玉人相對坐傳觴角簟清氷滑紗厨薄霧涼晚來行雨過巫陽強整羅衣臨鏡學宫粧南歌子安豐守章彥輔生日玉露澄天宇金風淨月華滿庭秋色木犀花記得謫仙初下五雲車才業追前輩人門屬當家夀觴無惜醉流霞聞説姓名潛護有籠紗浪淘沙和魯如晦髙髻墮香鬟送恨眉山老年花似夢中看厭浥一枝溥曉露珠淚闌干巵酒發酡顔休更留殘滿城風雨麥秋寒餘馥尚能銷酒惡誰敢包彈好事近彥逢弟生日詞秋色到東籬金散菊團香馥預借浮觴高會為作長年祝蟹螯如臂酒如澠橙橘半黃緑唱我新詞一釂聽樽前絲竹好事近何希淵生日春色到梅梢人在東風清嚏曽見少微初降藹龍泉佳氣功名富貴屬多才如子世無幾造物恰同豫意放驊騮千里好事近程繼誠生日霞影入瑶觴酒與餘霞同色人共昌期方永過觥籌三百一枝紅皺石榴裙簾捲篆煙碧約我他年湖上看九華終日好事近王照美生日花影到酴醿風過玉巵搖碧坐上酒豪詩敵盡騎鯨仙客主人名姓在金甌歸去定前席要見碧桃千嵗看壺中春日好事近董令升生日春色到酴醿人在酴醿花底花撲金罍香透逺勝燒沉水一杯聊復對東風為祝千千嵗作楫和羮事了歸去騎箕尾南鄉子追和東坡重九風急斷虹收孤鶩搖搖下荻洲醉帽儘從吹落去颼颼幸有黃花插滿頭君唱我當酬千里湖山照眼秋不見故人思故國休休一闋清歌聽解愁南鄉子贈何彥道侍兒翠袖尉沉香黛拂修蛾淡淡粧銷得多情鍾傅粉何郎風動珠簾月半床素手捧瑶觴誰念蘇州已斷腸夜雨不隨歌扇歇浪浪歸去無心賦海棠南鄉子陳南仲生日遺愛滿南州千騎曾為萬里遊琳館歸來無責更無憂坐聽清歌醉玉舟香霧鬱金虬春入梅花助獻酬請祝遐年長笑挹浮丘何止莘君一百籌有人夢莘彭年遺公九十六籌故及之南鄉子寄和潘教授元賔喜晴天際彩虹垂風起癡雲快一吹原隰畇畇春水更瀰瀰布榖因從野鳥知初霽捲簾時巷陌泥融燕子飛午醉醒來紅日欲平西一碗新茶乳面肥南鄉子春霽柳花垂嬌軟輕狂不待吹圎欲成毬還復碎誰為習習和風即舊知深院日長時亂撲珠簾入坐飛試問荻芽生也未偏宜出網河魨美更肥南鄉子和張元助通判詠雪詞出户繡簾垂拂面從他細細吹乘興有誰招訪戴難為暖帳薰爐醉不知間看逐風時欲著梅花又却飛雅與佳人回舞袂相宜試比氷肌可煞肥玉樓春和李宜仲少年心性銷磨盡三斗爛腸渾是悶看書聊復強尋行屬句不妨間趁韻此生自斷天休問富貴時來還有分一巵芳酒送清歌樓下玉人相去近玉樓春和董令升正月五日會客年來六十增三嵗却憶去年趨盛會風流人物勝斜川灼灼有同前日事不知絃管催新水但見飄飄縈舞袂主人情厚酒行頻酩酊莫辭今夕醉鵲橋仙七夕斷虹霽雨餘霞送日簾捲西樓月上銀河風靜夜無波天亦為雲軿相訪蛛絲有恨鵲橋何處回首又成惆悵長江衮衮向東流寫不盡别雜情狀小重山占德秀生日要識長生輩赤松朱顔和緑髮正丰茸當年今日墮仙宫佳氣鬱香藹菊花風一飲判千鍾小槽新釀美玉泉醲酒酣詩思浩無窮雲煙爛題破錦箋紅小重山彥逢弟生日花艷嫣然照坐紅池光髙下見木芙蓉相從欵欵莫匆匆新釀熟浮甕碧香濃倚檻送飛鴻登髙時節近菊披風笑談今喜一杯同揉金蘂和露入杯中蝶戀花和張文伯上已雨簷溜潺潺朝復暮燕子銜泥穿幕來還去素錦青袍知有處花光草色迷汀渚春不負人人自負君看流觴只憑良辰度厭浥小桃如泣訴東風莫漫飄紅雨城上青旗催日暮柳絮沾泥花蘂隨流去記得前時行樂處小橋新緑初平渚玉子文楸誰勝負不道光隂暗向間中度天若有情容我訴春來底事多隂雨蝶戀花和王沖之木犀庭院雨餘秋意晚一陳風來到處清香遍把酒對花情不淺花前敢避金杯滿薝蔔酴醿雖慣見常恨攙先不是君徒伴莫把龍涎輕鬭逺流芳肯逐爐煙斷蝶戀花和張文伯魏園行春春入花梢紅欲半水外緑楊掩映笙歌院霽日遲遲風扇暖天光上下青浮岸歸去畫樓煙瞑晚自拾梅英點綴宫粧面美目碧長眉翠淺銷魂正值回頭看蝶戀花和張文伯海棠碧霧暗銷香篆半花影穿簾厭浥蒼苔院鸂鶒一雙塘水暖浮沉時近垂楊岸雨過不知春事晚但怪朱唇得酒紅潮面野䔩山殽三四盞移尊更向花前看蝶戀花追和東坡時留滯富池寒雨霏霏江上路不見書郵病目空凝注沙觜盡頭飛白鷺篙師指似人來處自笑自憐還自語鈍滯如君只合歸田去竹屋數間環甽畝箇中自有無窮趣臨江仙和陳德公紅樓縹眇光風裏熙熙和氣歡聲遏雲餘韻最關情春山間淡淡秋水正盈盈老去自憐心尚在相逢殊慰勞生紋楸聊復戲同抨試煩歌一曲須借酒三行臨江仙和劉南伯怪得舉頭聞鵲喜果然都騎相過柳隂乘月倒金荷踈星明炯炯銀漢靜無波總角追隨今老矣相逢無惜婆娑夜闌餘興到狂歌長鯨方正渴應不厭傾河臨江仙追和東坡送李公恕入浙鼓棹正逢江雪霽是行應快吳吟透雲寒日半晴隂煙風凝翠重霜樹濺紅深案上文書間展讀聖賢蹤迹重尋不堪華髮故駸駸雙旌還有日萬事付無心一剪梅和董令升贈魏定甫侍妾風揭珠簾夜氣清香撲樽罍初見雲英藍橋何處舊知名今夕相逢此恨銷停勸客嫣然一笑傾細意端詳無限娉婷曲終猶帶繞梁聲不辭沉醉為覆金觥漁家傲和余子美對雪詞風揭珠簾寒乍透青娥不住添香獸火暖畫簷鳴線溜人醉後錦堂絲竹烘殘晝勢合湖山增地厚孤髙但覺修篁瘦回策如縈全在手驕馬驟吾家金埒新編就漁家傲和董舍人令升三首繫國安危還故老鶴書赴壠行當到多謝不遺敦雅好應信道年髙德邵如公少尊酒論文聊一笑肯將苦語誇危了落筆君房天下妙環窈窕清歌一闋漁家傲海岱惟青遺一老禁垣清切親曽到獨直固勞非此好誰信道才如權相從來少把酒自歌還自笑醉中萬事都齊了絶唱清歌仍敏妙聲窈窕行雲初遏漁家傲禁垣清切並獨直權德輿事爵齒俱尊惟此老詩詞筆力誰能到竒字古文仍篤好須信道如公寧復憂才少剩費黃金因買笑窮通得喪都忘了坐對瑶觴看舞妙携窈窕南窗聊繼淵明傲漁家傲和孔純老三首巖電晶熒君未老看看門外風車到一點眉間黃色好人盡道從今次第登三少左右青娥來巧笑朱唇塗額新粧了斜插梅花仍鬭妙歌窈窕醉來容我相嘲傲嵗月漂流人易老東郊又報春來到梅靨栁眉還鬭好君信道衰顔得酒重年少對景邀賔同宴笑莫教虛過芳菲了咳唾珠璣誇筆妙人窈窕新聲傾作漁家傲燈火熙熙來稚老喜逢燈夕都齊到花市綺樓隨處好人競道今年天氣常年少五馬行遊還坐笑公堂繡捲東風了簫鼓喧闐歌舞妙人窈窕也應引動南窗傲感皇恩彥逢弟生日宿霧霽晨霜江山明秀照眼黃花亂晴晝當年今日正是懸弧時候一杯聊獻祝同親舊莫問窮通休論貧富且趁良辰醉醇酎揚珠搗玉况值西成多收飽餐歌至治天垂祐青玉案有懷軒車山舊隱半年不踏軒車路倣佛過長橋去貼水行雲風送度兩行髙柳一坡修竹是我嘗遊處黃鸝休歎青春暮出谷遷喬舊家句天意從人還許許凝寒和氣沈隂霽色大旱雱􅀢雨青玉案對雪追和謝幼樂金尊照坐紅裙繞怪一晌歌聲悄亂撲珠簾風絮曉香薰笑語酒烘顔色莫逐年華老詩濤入筆懸河倒快萬里雲天為君掃檢點春容何處早栁條青眼梅梢粉面得恁於人好青玉案送無為守張文伯還朝逢人借問錢塘路我亦欲西湖去目送蘭橈知幾度鼇峰浮玉鯨波飛雪正是潮來處海棠花下春將暮緩唱新詞味佳句見説東皇曽夢許柏臺冠豸金鑾視草更作商巖雨
