body:
  text: 相山集卷二十三宋王之道撰序擬宏詞太初厯序漢自髙祖開基迄孝武元封七年蓋百有二歲矣而循常習故至于稽古創立法制粉飾治功之事猶多闕焉於時厯法壞廢晦朔分至往往失度帝入公孫卿壺遂司馬遷之言慨然嘆曰厯者天地之大紀先王所以仰觀天時俯授民事者也奈何漫不問因詔御史大夫兒寬與博士共議寬等乃言曰帝王之有天下必改正朔易服色不相沿襲所以明受命於天也其議造漢厯以為萬世則初漢襲秦言厯者宗張蒼至是乃得鄧平及唐都洛下閎等二十餘人以律起厯而罷其尤踈濶者十七家始用夏正以正月為歲首改元太初且以名其厯焉惟律本於黃鍾之管其長九寸其圍九分得積八十一寸而厯所繇作是為八十一分以太初之元年十一月甲子朔旦冬至日月如合璧五星如連珠應無毫髮之差茲誠炎帝之分八節黃帝之紀三綱唐堯之命羲和虞舜之在璣衡之事也猗歟那歟生民之道其在茲乎送因覺上人遊天童序上人因覺與其弟思古從余遊十年更兵火艱難義等手足今年春不余告杖錫東去令人恍然若有亡也是行自湖之道場來過余相山入門笑啞啞不止徐謂余曰聞君以三至之言致疑於上或者以為恐陷不測之禍故不辭逺道而來持一甌茗以勞苦雖然吾心以為不應有是入其境乃知君以好直為罪人所誣今見公面吾是以笑昔人所謂富貴不能淫貧賤不能移威武不能屈者非君其誰哉君在建炎之末當金人長驅中原列郡不守而能與里人鋤耰棘矜力芘一方更十數劇賊殺人如刈草菅所當輒破終不能伺其間隙晚雖以援衆之難兩陷賊營君皆談笑處之賊莫君辱君亦不少降今又遭此橫逆吾意君當憔悴不堪其憂而君固自若以此而處富貴吾知其不淫無疑也上人又將為天童之游挽而留之莫得豫來年亦當求官四明見上人於林下然未敢必也故書此以為異時一笑云紹興三年冬十月贈孫明逺序建昌孫明逺妙於地理言吉凶禍福若相人然期以歲月若神今之管公明郭景純也豫昔葬先君之明年夢持杖履立冢前若指顧狀俾令修之覺而忘其處十五年間或培或濬雖屢修終不滿人意今年春復夢更葬豫竊怪之後兩月而明逺至自廣昌因豫同年曽子修獲有請於明逺蒙不鄙過豫往視松楸而觀其形勢一覽而得其地於西南二十步外正與夢符使豫若醉而醒且悲且喜勢止形昻前澗後岡真葬書所謂龍首之藏者以秋八月壬午更葬獲克襄事豫老且拙百不逮人何敢徼福於先君然而明逺術數之精不可以默而不書因其歸也作是文以送之紹興二十年冬十月應資深康樂園四詠詩序謝安石晋家第一等人方隱居髙卧東山與支許輩事漁弋其誰敢以功名纍之一旦從征西役卒能救危顛於將亡而副蒼生之望其誰不以功名歸之應丈承事即其第之東園斬茅伐石治臺觀以資觴詠之歡葺卉木以助江山之勝蕭然有謝東山之髙風正恐鳴騶入谷鶴書赴隴而康樂之樂非公所能獨有而與蒼生共之也四詠少見主人與客四時臨覽之萬一要當捧腹疾讀傳之藥籠醬瓿不爾識者以豫為佞且鄙也沈次韓詩序次韓妙年秀頴讀書為古學不作舉子事業故能以詩名家而一時儒宗先生翕然稱之僕去年春始得邂逅於南巢當稠人廣衆中識其小異已而探其源索其流有如長河巨川渺不見其津涯孔子曰後生可畏焉知來者之不如今况今規模已若此敢易言其來邪次韓名愈仲姑蘇人常從吳勛不伐韓駒子蒼游僉許其可嗣東坡一派云擬宏詞黃帝律本序夫樂先王所以致鬼神和邦國諧萬民安賓客說逺人作動物無所不用者也而其作也本乎六律六吕謂之十二律陽六為律律以統氣辦物一曰黃鍾二曰太簇三曰姑洗四曰蕤賓五曰夷則六曰無射隂六為吕吕以旅陽宣氣一曰林鍾二曰南吕三曰應鍾四曰大吕五曰夾鍾六曰中吕六律所以合陽聲也六吕所以合隂聲也陽為天隂為地天氣下降地氣上齊隂陽相摩天地相蕩而樂在其中焉然則律吕者隂陽之聲隂陽者天地之氣是樂為天地之和明矣宜其幽足以感鬼神明足以諧民人微而至於百獸率舞六馬仰秣有不期然而然者且律始乎黃帝取竹於大夏之西崑崙之隂地曰嶰谷竹生而竅厚乃命伶倫斷兩節而吹之以聽鳳鳴雄鳴為六雌鳴亦六故製筒一十有二起於黃鍾之管九寸轉而相生各因而三分之上生者益一下生者去一而十二律備焉茲雲門大卷之所由作也自時厥後如堯之咸舜之韶禹之夏湯之濩武王之武未見其捨是而能有作者嗚呼律之妙一至於斯耶班固既巳推明其功以為律本載之漢志故愚輒復撫其事實而系之以序記和州重開新河記曲阜孔公純老倅濡須之後年以嘗連攝郡事無為及龍舒二郡之民鼓舞政化歌頌惠愛故其治狀聞於當路諸司交薦未及終更而歷陽闕守天子用周漢進律增秩之典俾往治之無為吾鄉里也命下之日備見耄倪歡踴萬口稱贊已而咨嗟太息曰何為奪我賢别駕至挽留不能去公既至歷陽下車未幾已而其吏民安於清靜不擾且復服習二郡之先聲不煩告戒申令自砥于治乃恤民隱乃訪民病茍可以為人除害興利者無不為之新河東西橫截郡城而過在郡治之南百步外上徹麻湖下徹當利河瀕河南北皆民居自更兵火逮今三十年失浚治瓦礫糞壤日填月壅幾與岸平舊含山歷陽竹木薪芻稻麥菽粟凡可以為民食用者咸自麻湖入新河直抵郡城新河既湮塞舟止歷湖門外數百步人始知有般挈負擔之勞而歷湖南西北三面羣山森羅衆水所瀦下流既阻新河之淤積潦無所泄並湖之田歲稍多雨則成巨浸民甚苦之公既受訴暇日按視河濬審度利害得其要領以紹興二十九年冬十一月已亥乘農之隙用民力而浚之千里之民欣欣然而來當隆冬沍寒舉鍤成雲揮汗如雨曽不踰月土功告畢而河流湯湯導麻湖而東之害於焉除利由以興漁舠粲舸輻凑闤闠賈謡商謳鼎沸市井瀕河居民就滌濯資灌溉得爽塏之樂去底滯之苦其耕於麻湖之濱者自今以始歲其有而無復水溢之患豈曰小補之哉於是賓僚吏屬庠序之士畎畝之民填溢公門願紀實建碑垂示無窮且謂豫往者嘗官歷陽熟知斯民利病來丐豫文以記其事豫竊聞之薛大鼎在唐為滄州刺史先是無渠淤塞大鼎浚而屬之海商賈流行里民歌之曰新河得通舟楫利直逹滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被今公之浚新河殆與大鼎異世同功而能使麻湖夏潦有所從泄並湖數千百頃之田歲豐而無饑算課見效則似過之然天下之理有開斯有閉有通斯有塞是河行於郡中其濶不踰四丈其深不滿八尋而居於其傍者茍於自便投瓦礫堆糞壤日加益而人不知然則後二十年積而至於閉塞可以前料開而通之必有與公同志者焉通濟渠記唐有天下因隋之舊都長安以關中地狹所出不足以給京師備水旱故常轉漕東南之粟然自江淮距汴洛以逹于關中除其間陸運略計水行無慮數千里動有風濤覆溺之患自李傑裴耀卿常堅相繼領漕事當時稱其舉職後不復有繼者盜起天寶陵夷至于代宗漕路幾絶不通京師米斗千錢天子為之宵旰於是元載當國而劉晏實主東都河淮西江南東西租庸鹽鐡轉輸有意事功乃抵書元載條具運之四利四病載乃盡以漕事委晏故晏得竭其才因自淮泗泝汴入河究觀三門遺迹至河隂鞏洛見宇文愷梁公堰厮河為通濟渠且隨江汴河渭所宜江船不入渭而江南之運積於揚州汴船不入河而汴河之運積於河隂河船不入渭而河隂之運積於渭口自渭口而易船然後逹於太倉而漕以無壅歲致四十萬斛由是關中雖水旱物不翔貴矣初渠成時禁膳無兼時之儲甸農方挼穗以供而歲輸適至天子大悅特遣衛士以鼓吹迓東渭橋馳使勞曰卿朕之酇侯也若晏者可謂有功於國者歟觀夫陳諫推為管蕭之亞而當時不以為過有能循其法者往往至於富國而以才聞於世其規模宏逺是可書也故略其興建日月而記其事之本末云無為軍淮西道院記兩淮之俗從昔號淳厚故其民重犯法而少鬬訟為長吏者誠能因其俗以布政施教而不擾焉家家可使和協輯睦人人可使敦龎純固而乖爭凌犯之訴不至於庭得以暇日嘯詠湖山之勝從容賓僚之樂把酒賦詩圍棊鼓琴以度朝夕而民惟恐其去不然敝精神竭智力以從事于簿書刑獄非特身不得須㬰寧而民亦困以病且貧恨其去之不速無為在淮右地最僻左蓋大江注乎東南漅湖瀦其西北羣山環之緯之川流自太平興國三年創建軍壘以來部使者以職事按臨屬部雖過境上亦往往憚其紆而罕至民既淳朴畏事二稅之外間有催科初不煩鞭朴率先期告辦故前後郡太守茍不自為異而與斯民安于清净者類皆談笑治之因目之曰淮西道院紹興二十二年春二月趙侯若虛以帝室之英被命出鎮天性豈弟濟以明敏故其吏事一切務簡肅以便民而向之煩苛凡近于擾人者率皆革去不數月而民樂其政服其教囹圄為之空虛日以無事於是喟然嘆曰無為之舊稱道院以今觀之名不虛得矣而道院未建殆闕典乎乃度厥材乃鳩厥工乃即郡治之西秋香亭壯其基址宏其規模為堂五間于其後而前翼以修廡三旬而成不陋不侈上下逺近不知其有是役也本路運使華原鄭公政尚清净嘉侯之能因其俗而不擾也為書其額榜以淮西道院落成之日民之來觀者莫不歡踊稱贊於其下曰使君之意是殆無事而使吾富乎無欲而使吾朴乎將昭示於無窮而使後來者知所遵乎俾爾昌而大俾爾耆而艾斯言非矯誣也所以報使君愛我之賜也豫獲寓是邦竊聞其言喜而書之廬州天慶觀物産記世以儒釋道為三教名雖不同其實無二以迹求之但見其殊耳豫嘗觀夫習為儒釋道之學者較其力於所事不顧軀命以極其嚴飾奉其祭祀而為無窮之供罔極之傳者往往儒不如道道不如釋或者以為善惡因果報應之說莫如釋氏深切著明故能竦動羣聽如此雖然為儒者之說者曰作善降之百祥作不善降之百殃為道者之說者曰為不善乎顯明之中者人得而誅之為不善乎幽暗之中者鬼得而誅之茲非明其善惡之報也哉言至於此殆未可輕議也今之士大夫未有不學乎詩書禮樂而能入官者若是則無非儒家者流也以浮屠氏之不愛頭目髓腦國城妻子而惟佛之從為吾儒者當何如哉而世乃有侵學宫之地以廣其居占學糧之田以厚其生者良可太息道士任致明豫之里人廬為淮西帥府而管內道正久闕紹興二十六年桐廬姜侯祕監被命出牧下車未幾令其徒推擇有道行可以為衆所服者逺邇莫如任賢牒無為以禮敦遣至則領道正事為之植僵興仆茍可以出力為觀門利者無不至廬有兩觀一曰天慶一曰報恩凡兩觀舊有物産籍更兵火不存至是詢究始末悉以狀上所屬勘驗得實前後給者凡四將以劖之石而貽後人暇日攜以示豫曰吾於合肥其去來猶傳舍也而兩觀舊籍之物産不可以吾去來有時漫不加問噫任之用心如此豈非豫前所謂盡於其教而能為無窮之供罔極之傳者哉是可喜也乃為之書後二年歲在戊寅夏六月紹興府法華山維衛像記按西南維衛無量夀佛像記云阿育王第四公主以姿貌寢陋冀其端嚴捨金銀銅冶鑄斯像四十九軀首飾火焰足飾蓮花布四天下為衆生植福之本此山得四十九軀之一而居其冠初晋成咸和四年有婆羅門僧寶奉斯像泛海東來比至齊祖兵亂倣徨無所向因穴地而藏之大河之側頃之發藏無見夜夢神人告曰爾其往江左謁丹陽尹髙公悝當自知之婆羅門僧如其言詣悝悝曰某年月日偶以職事至張侯橋逺望橋下有五色光輪囷覆水命左右視之得斯像於遡流因聞於朝有㫖致之闕下闢瓦官寺以居之輦入金陵抵長岸坊口牛不肯進鞭之若與人競徑入長干寺中有司以聞上歎異久之賜內府錢數百萬為殿以奉香火婆羅門僧聞悝言悲喜交集因辭悝走長干瞻禮以終其身更宋齊迄梁大同中昭明太子統親自長干輦送斯像奉安山中至山之日頂放白毫相光宛如組練縈繞十峯明年山發洪水墜石崩崖摧壓澗谷寺成巨浸而像設中立塊然獨存肆唐㑹昌之變欲毁為錢以不能碎故存之始在長干當宋齊之代嘗失火焰金蓮所在宋人董琮因採珠于交州覩物觸舟之祥而遂獲火焰齊人張世係因捕魚于臨海覩蟹相附之異而遂獲金蓮嗚呼變化不常去來自在地祗所不能祕王命所不能拘火所不能燒水所不能溺非天下之至神其孰能與於此哉故書之以告來者
