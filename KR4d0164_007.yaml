body:
  text: 相山集卷七宋王之道撰五言律詩和荀晉仲題法隆韻去來何所喜一雨應澄清憔悴有生理嘆嗟成頌聲酒壚從客醉村畽問農耕深得諏詢意誰能繼此行和沈進可檢法秋夜飲客待月欲雨雲容合瀕江水氣浮笑談初入夜燈火適逢秋巧借三豪便還成一醉謀投瓊酬木李秪使老夫羞冬夜對月懷彥逢弟荒庭寒有月窮巷靜無聲坐想積年别遙同今夕明蹉跎前進士憔悴老書生短棹歸來好邉城久偃兵和沈次韓歷陽歸來見寄臘近梅爭白冬溫栁漸黃强吟詩思澀幽步野情長别去嗟何濶歸來肯遽忘開緘得佳句和氣溢寒鄊和魏定父十里南溪路思君一望間黃花秋色老紅葉露㾗殷似說親朋集遙知杖屨閒徘徊松徑晚踏破紫苔斑和子薳官牌夾口韻是日聞官軍破䖍賊滯留嗟是役艱險笑吾生此去和風順朝來䖍賊平湖山爭喜氣鴈鶩送歡聲千里前塘路應知客念輕和劉與可二首老來無奈懶春至不勝情萬石嗟遺迹雙魚謝寄聲壓花朝雨重釃酒夜泉鳴細把君詩讀氷壺表裏清野塘春草遍芳樹老藤纒逺信占黃耳清遊任白顛山光晴抹黛湖氣暖騰烟我有邉韶癖何妨晝日眠和厯陽李簿見寄短鬢紛垂白衰顔悴帶黃多寒冬更甚少睡夜能長舊學長荒廢新知感愛忘何時一樽酒談詠帶江鄉和因格非見寄二首青山如我約終日對柴門學道未忘念懷君空斷魂時來當有用事往置無論反覆新詩讀誰知老眼昏兀坐時看屋閒居晝掩門吳吟聊遣興楚些欲招魂否泰宜周易行藏付魯論不須傷老大眠食度朝昏和程德逺二首寓問發函舊論交傾蓋新幾年瞻翰墨今日侍光塵禦侮煩驍將扶顛倚大臣相逢更可恨對酒漉陶巾未盡通宵話猶如一日秋壯懷天共逺歸意雨同留燈燼何明滅蛩聲靜應酬十年為客夢應不負瀛洲追和老杜江上獨坐日將夕凄凄風雨秋寒燈照孤屋欹榻擁䟱裘身世槐安國功名蜃化樓歸歟老居士蹤跡繼浮休和彥時兄贈王廣濟往矣古循吏賢哉今長民牛羊歸落日桑柘殿餘春共學知名久相逢見面新瘡痍賴休養猶喜見斯人和王覺民簡褒山因上人棗嶺魏欣然二首七行才業在寧久困無津秋到搏風翼春回縱壑鱗褒山方競秀棗嶺益爭新珍重二三子詩騷追古人君來踰半月未果一尊同湖水寒應碧山梨雨自紅何時過北牗今日轉西風相去無他地孤城杖屨中酬陳勉仲勉仲寄示諸公所和黃字韻詩軸且責其歸重念匹夫懷璧之罪不敢靳因復和其韻反之失梳蓬鬢結缺洗垢衣黃我欲齊榮辱誰能較短長賤貧猶不去富貴慎無忘豈敢貪懷璧春秋戒越鄉和秦夀之題蘄春驛浸月軒千山初過雨萬籟不鳴風寶鑑沉寒水氷輪上太空竹梢低蘸碧楓葉冷浮紅終欲金沙去經營一畝宫吳興舟中有作大澤知何處扁舟快此行綺羅紛勝賞歌吹溢歡聲茭葑春還合波濤暮自平臨風一披拂誰識未歸情遣興長沙漕治步屧隨兒輩臨池得憑欄久隂東虹斷小滿北風寒㸃水荷三疊依墻竹數竿乍晴何所喜雲際逺山攢和龔聖任冬日即事老怯繁霜徑閒憐愛日溫禦寒朝强酒防冦夜撑門採薺籬根地觀梅郭外春餘生何所託歸命大慈尊和秦夀之題黃州郡樓西北張霞綺東南漾月波登臨笻作馬吟詠筆翻河思與蒼霞逺情同白水多新詩清且麗標致壓隂何和子薳春江用老杜韻欲去未成去朔風鳴怒濤片帆洲外舉列岫霧中髙竹屋雨沾被紙窗寒透袍遙應望歸艇向夕走兒曹送彥逢弟赴西興鹽場聞道西興去全家共小舟别離江北岸懷抱海東頭閃閃風帆逺滔滔雪浪浮苕溪在何許應為故人留送安豐判官江叔夜用菊花韻冬溫行色好江上菊花黃鄊味蓴羮美皇恩誥墨香招延從北海吟咏繼東陽别後如相憶時應問草堂秋日喜雨題周材老壁大旱彌千里羣心迫望霓簷聲聞夜溜山氣見朝隮處暑餘三日髙原滿一犂我來何所喜焦槁免無泥立春和孫子紹二首老窮推不去湖海又逢春懶復論三甲空驚薦五辛栁梢寒已動萱草暖還新我亦寰中物因君試問津南浦初開凍東郊未去寒芳華歸草木生意入門闌緑蟻供瑶甕青絲送玉盤新詩妙當世賦答敢辭難題許公寨驛畏景還迎日追凉偶遡風泉聲山上下松影路西東逺覽心猶壯清吟語自工雨多何所喜郡國慶年豐和魯如晦春日過定逺山口雨足塍塍水春晴處處花畏塗雙隻堠荒戍兩三家心折朝鳴鹿魂驚暮集鴉想君行役苦愁蹙不成嗟丹陽湖阻風二首水濶風還怒舟輕浪更顛雲容初過雨湖勢欲吞天沙觜青楓外魚罾白鳥邉夕陽應到岸沉醉酒家眠老去心猶壯詩成喜欲顛時危思報主窮極待呼天歸夢先湖外離情到酒邉晚來風更惡舟卧不成眠和潘澤之沈元吉泛舟湖上散騎真前輩休文即當家泛舟成麗句散綺見餘霞驚去沙鷗沒招來酒斾斜春歸何處覔籬角見金沙贈嚴彥醇一别三年久重來兩鬢蒼瘦笻扶蹇步新茗攪枯腸得句情還適逢人話頗長湖山元不改喪亂我心傷中秋靜院三更雨樓臺一㸃風新詩愁恨裏故國夢魂中節物它鄉異交情我輩同眼前多怪事咄咄强書空出户喜折屐江天來翠岑看雲忘久立待月動微吟關塞重回首簡編勞繫心琴中有山水應解遇知音題北莊用陳勉仲韻幽亭臨水竹云是使君莊秋霽來觀稼春融賦採桑納凉供芡實載酒摘蓮房坐得牧民術也應如牧羊用陳阜卿勸農韻呈宣城太守何處催耕早宣城刺史先旗麾明曉市耒耜遍晴川道路歡聲接樽罍麗景鮮似聞携百榼分餉及髙年欲知人意喜萬户鬱爐煙紗帽花垂額金巵酒到蓮嵗豐端可卜農勸競相傳往矣南陽政今追召父賢燒火用陳西麓韻燒火驅寒去銜杯待暖回家書萬金值懷抱一時開臘雪猶棲樹風光已著梅相過隨處好未怪損梅苔題黃梅驛舍壁間石潤占梅雨山寒應麥秋清風鳴翠篠踈雨濕紅榴古驛苔封砌荒城栁映樓髙吟一甌茗聊為故人留太湖呈邵公晉沈元吉半月江湖上晚來方得風掛帆誰共快到岸偶相逢可是過從舊都緣臭味同長亭一樽茗親厚意何窮秋夜對月青廓經新雨扶疏桂影秋夜凉山色靜風細水光浮坐久因忘寐詩成得散愁願言乘此興同賦庾公樓春日無為道中旱甚山光暗風顛日色微桑芽虻翅小荻筍彘肩肥野寺看題壁村壚問典衣春容良不惡楊栁正依依歸自合肥于四頂山絶湖呈孫仁叔抑之逹岸三時頃瞻山四頂賖喬林知馬尾亂石見麞牙水腳浮青靛湖脣滉白沙漁人收輳網歸去日西斜呈蔡元德二首别來閒計日一日似三秋顧我無能老逢君始欲愁詩情今轉勝交契久還稠學問神龜似當年繼踐猷一葉黃梅雨潺潺過麥秋昏沉渾似醉憔悴不禁愁渠溢門庭淖園荒草樹稠乍晴酬絶唱何幸對風猷䝉城早行殘月千家閉荒城萬竅號舉頭華蓋近回睇啓明髙野逈霜迎面風清冷透袍十年河上路從此步金鼇固陵道中道路榛菅合裝齎咫尺迷陟岡還見塔下阪忽逢溪逈野鳴朝麂踈茨撼午雞固陵何處是弛擔日應西廣濟道中曉日掛林麓秋風入澗阿野禽飛自語田父笑相過村畽倉箱富山蹊芋栗多一鞭聊䇿蹇馳上小羅坡沙窩道中十里沙窩路晴雲向暮開褰裳九過水駐馬一觀梅嵗晚松篁茂山寒虎豹哀不因王事迫誰肯此間來舟過三丫河搖落蒹葭浦荒凉鴈鶩村吳柑迎齒冷魯酒著顔溫水澀風還逆天寒日自暾不堪歸思亂鳥鵲閙黃昏過白羊市小市環農畝長橋接佛宫扁舟帆影日幽鳥栁隂風沙觜淺深水樹梢紅白茸乍聞秋糴賤吾亦慶年豐立春示兒二首雪盡適霑雨臘窮初得春上氷魚意樂出谷鳥聲新便覺風光好何憂活計貧一樽聊共醉䟱率見吾真朝來何所喜人唱玉樓春酒著心還壯詩成思轉新士衡寧久困曲逆豈長貧千載風雲㑹欣逢聖主真追和李義山賦菊二首嫩萼猶封緑繁英已醉黃雨餘三徑晚秋到一枝香滴滴盈朝露暉暉映夕陽何妨浮玉斚共醉木蘭堂團團青蓋小拂拂御袍黃翠葉凌霜秀繁英浥露香浮觴追北牖飲水記南陽采采東籬下行歌對草堂和沈次韓秋日雨後督子厚報江檻連朝雨山齊昨夜凉不知新稻熟深怪晚炊香得句君應喜聞風我漫狂繡溪行樂處雲水幾千章
