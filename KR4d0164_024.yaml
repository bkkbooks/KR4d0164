body:
  text: 相山集卷二十四宋王之道撰書論增稅利害代許敦詩上無為守趙若虛書愚嘗讀西漢書至曹參傳未嘗不反復玩味而想見其人恨不獲同時雖為之執鞭而無悔焉初蕭何既死參自齊相被召代何將行屬其後相曰敢以齊之獄市為寄愼勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之嗟乎君子之所為是豈衆人所能測識也哉雖然蓋有授之者矣參之為齊相也當天下初定思所以安集百姓因召齊之諸儒使各述其所見而言者以百數率皆不侔未知所以適從聞膠西有蓋公善治黄帝老子之書參乃使人厚幣致之蓋公為言治道貴清靜而民自定參於是避正室以舍蓋公而師用其言故相齊九年齊以安集大稱賢相夫治道貴清靜而民自定此語未有大過人者而參行之不變其效乃至於是然後知昔人所謂天下本無事庸人擾之為煩爾殆與蓋公之言不謀而合也由是觀之參之不欲擾獄市其源蓋出於此淮南在今日為國家咽喉脣齒之地軍興以來淮南所以受兵最重者蓋以大江實控扼於前也曹操之於吳苻堅之於晉所以睥睨江左而至於狼狽者蓋以長淮實牽制於後也誠欲屏蔽江左則不可不實淮南欲實淮南而不務撫養休息使其富足以圖緩急之用欲重其稅斂而自竭其力無乃不可乎前後建議之臣非不乞括田增稅朝廷非不從其所請而下監司守令施行之然卒不聞立賞罰以為監司守令之勸沮者無他亦可以見主上不忍人之政與相國不擾獄市之至意也又况淮南累年以來常苦水旱相半所入既薄而米賤如土直不滿百斯民艱於得錢而私債官逋督責既嚴不敢不償故日就貧窶秋成之日場未及滌而百室已告竭矣萬一州縣不容從告訐之俗而行履畝之稅莫之顧恤其流亡可立而待也不知流亡之後何時而能使復業耶蓋盗賊之警流亡可復也凶荒之變流亡可復也有大於此而父子不相見兄弟妻子離散尚可冀其復業耶惟是苦於賦重而至於流亡一復業則前日之積欠將紛至沓來欲去而不能欲留而不可故不若流亡之愈也稅其可驟增乎然則終不可增耶户口之增衆而墾闢之不增廣者未之有也墾闢之增廣而賦稅之不增多者亦未之有也今閒曠連阡亘陌斯民不復問其耕之鹵莽耘之滅裂而其實有鹵莽滅裂之報為佃客者又貪多務得正使所收不償所種亦當取其十分之四往往倒持太阿以陵其主人故主人常姑息而聽之且有田於此前年固常耕矣既耕而力或不能種者有之既種而秋成或無所收者有之去年之與今年雖或不耕不種而前日墾闢之迹猶在也因其有墾闢之迹官司遂得以括之村鄰遂得以糾之平時素所不快者遂得以告之而加其罪責焉可不悲哉嘗以周官考之大司徒之制其地域不易之地家百畝一易之地家二百畝再易之地家三百畝說者曰不易之地以其地美而歲種之也故家百畝一易之地以其地薄休一歲乃可復種也故家二百畝再易之地以其地又薄休二歲乃可復種也故家三百畝遂人頒其田里上地田百畝萊五十畝中地田百畝萊百畝下地田百畝萊二百畝說者曰萊謂休而不耕者夫井田之法方里而井井九百畝其中百畝為公田八家之所同種也其外八百畝分給八家家各百畝八家之所自種也其自種者得而私之其同種者則以輸於公上所以代稅斂且既曰八家皆私百畝而大司徒之所制乃有家百畝家二百畝家三百畝之不同何也以其田有美惡有可歲種者有休一歲然後可復種者有休二歲然後可復種者是則休二歲而復種者三百畝止可當不易之地百畝今不問其田之美惡凡耕而不種種而不收者悉欲責其賦斂可乎且既曰八家皆私百畝而遂人之所頒自田百畝之外或萊五十畝或萊百畝或萊二百畝之不同何也以其田有當休而不耕者故雖上地百畝猶給萊五十畝是為百五十畝所以寛其上地之賦也至於中地百畝則倍以萊百畝是為二百畝所以補其中地之賦也下地之與上地相去逺矣故下地百畝則萊至於再倍而給之二百畝焉是為三百畝所以足其下地之賦也今不問其有當休而不耕者凡耕而不種種而不收者悉欲責其賦斂可乎敦詩常以此語人而或者難之曰今之法與古之法豈可同日而語也敦詩獨以為不然何者君相所以寛恤斯民與成王周公之用心蓋不殊也特行法者之過也何以知其行法者之過比有言者嘗請於朝曰守令能於任内勸誘民户歸業增墾田五百頃當陞秩一等為守令者利於陞秩也不問其户口增不增徒開告訐之路以來頑狡不逞之人因其條禁之有罪賞又從而嚴刑峻法以行之而民始無所措其手足矣且安集流散墾闢汙萊守令之職也而何以增秩為乎使守令萌僥倖茍且之心而害及斯民者此實啓之也夫告訐不可長也尚矣為此者要非所以美教化厚風俗使人有士君子之行而上副吾君躋民仁夀之意也於傳有之哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足且徹者什一之法也什一者周之法也什一之謂徹者徹通也什而取一實為天下之通法也方哀公時其取於民者什之二而猶苦其不足故問於有若有若之以徹為對蓋譏其取於民者過重非周之法也大抵國家之富當藏之於民世豈有百姓足而君不足乎仁人之言其利溥哉如有若誠可為天下後世言聚斂者之誡也敦詩多幸得為閣下部民閣下開府未及一月而政事無小大到則剖決犁然有當於人心豈弟循良之稱洋溢乎逺邇敦詩聞之喜而不寐復念無為小壘戸不盈萬兹何足以煩游刃而數年來未見有賢且明如閣下者雖然人非堯舜安能每事盡善聽訟非易事也而喜怒相疑愚智相欺善否相非誕信相譏日雜進於其庭乃欲以一耳目智慮聽其詞而盡其情敦詩恐小人挾詐懐姦乘間抵隙得以誤其聰明而為政事之累也昔人謂愚者千慮必有一得愚無他腸是行也敢以野人之見取曹參不擾獄市之說裒綴成書求見於閣下庶幾一得之愚或可裨備聰明之所不逮噫姦人為政者之所當先去也而曹參以姦人無所容至戒後相無擾獄市而况於齊民乎其不可擾也明矣抑又聞之君子之於政也不獨為國計且為民計不獨為民計且為身計不獨為身計且為子孫無窮之計能為子孫無窮之計而利不及乎身者無有也能為身計而利不及乎民者無有也能為民計而利不及乎國者無有也而昧者反此為子孫計而不顧其身遂至於貪以害其民民受害而國益病矣豈能福及於其身哉又豈能福及於其子孫哉當太宗時錢氏既納土朝廷遣王方贄使兩浙以均稅始畝稅三斗方贄至則為減三分之二以聞於上而不復請使還太宗詰其擅減之由方贄曰畝稅一斗天下之通法也兩浙今既為王民矣至於租稅豈容尚循偽國之制哉太宗善之而兩浙之民至今畝輸一斗今萬乘駐蹕兩浙中外廓然無事而方贄之子準實生丞相珪珪之子孫布在仕版大而為公卿小而為郡邑與國咸休永世無窮若方贄可謂善為民計而利及乎國者初亦曷嘗為身與子孫之計哉身享顯榮而子孫昌熾如此職有由矣不識閣下然之否乎上江東宣撫李端明書之道觀今日天下安危存亡之機間不容髪如王彥充據夀春窺合肥一事最不可忽夫彥充慿驕寇偽齊之勢擁衆數千攻陷夀春方且蠲煩去苛矜老慈幼勸播植通貿易修城浚隍誓與斯民同死生此其志正恐不在夀春而在合肥蓋合肥在淮南最為重城西北距淮二百里有奇而夀春實在淮上東南距江亦二百里有奇而建康實在江左江淮相距不踰五百里而三郡在焉其勢猶脣齒股肱不可以相無也國家誠欲都建康則宜緊守淮南以為藩籬欲守淮南而不能保有夀春合肥雖守猶不守也昔史思明乘汴滑之勝欲窺洛李臨淮以洛無見糧厄偪難守問於韋陟陟請益陜兵退保潼關為持久計臨淮曰兩軍相敵尺寸地必爭今委五百里而守關賊得地勢益張不如移軍河陽北阻澤潞勝則出敗則守表裏相應賊不得西北此猿臂勢也今欲守淮南而失夀春既有脣亡肱折之患矣奈何復委合肥於虎口而不問邪使彥充茍出上計攻其無備出其不意其取合肥猶破竹也失合肥則失淮南失淮南則天下事去矣建康且得高枕而臥邪蓋古者帝王之居必在中原吳越斥鹵菰蒲之墟地傾兵弱固不足以號令天下建康雖舟車所會更六朝之建國然自古及今未有不資淮南以為屏蔽者方金人南渡之歲杜充守建康而委淮甸有識者咸知其無能為前軍已覆不可不戒也之道不肖亦嘗謀為國家之計莫若選擇賢將戍重兵於合肥務令一切如羊叔子之在荆州崇信義禁侵掠使敵人曉然知朝廷之意以候士卒可用然後乘其敝而攻之庶幾可以得志兵法有致人而不致於人兹其大略也苟不出此而聽其所為以失其機後將噬臍其可及乎之道淮人也而請戍淮雖有類乎私已竊惟宣撫端明以伊傅為心恥一夫之失所使之道誠私己猶當惻然念之况大纛高牙實為合肥夀春滁和無為主帥其宜軫慮無可疑者今夀春既陷合肥危若累卵滁和無為數千里所存刀鋸之餘民朝夕惟隣火傷葵之是憂之道代匱鎭屬於閣下亦僚宷也乃不於此而望將誰望耶之道今月初六日自歴陽來拜謁者且將浹日矣固嘗披肝瀝膽具以鎭守之懇淮人之情間諜之言以瀆於下執事雖䝉閣下矜其危急憐其無告略去等夷俾得盡其所見奬之以語言勞之以飲食下逮奴馬之賤飯芻無所不問於人之觀聽則可謂榮矣然於之道之初心所以為淮人之計者則未也且宣撫端明受九重之寄託來鎭建康以兼領於淮甸今大駕指日幸臨而營繕之命不絶於道是役也之道固不敢期端明之必行而幕中之賓如參議宗公實一時之英傑忠誠憂國不愧古人其沈默有謀人咸以為有乃父留守之遺風而留守之徳在國家如周人之思召公焉愛其甘棠而况其子乎聞之道路劇賊劉超願以所部聽命立功補過而都督前軍統制崔公增自鎭江來拜宗公於堂下感泣嗚咽久不能起蓋留守所至有以固結人心如此之道聞叛亡之徒如王善李成今為賊用欲乞兵南來以抗我師而留守之於二人亦有生死肉骨之施昔僕固懐恩誘回紇結吐蕃擁衆三十萬來寇中原郭子儀以衆寡非敵單騎謁回紇壓以至誠卒能使倒戈以乘吐蕃而破其衆惟宣撫端明威聲所加固有以褫姦雄之魄而奪之氣今合肥之行誠得參議公授以成算俾之董師臨敵庸詎知王善李成之不背賊而向我耶若與朝廷當一面以作士氣以張國勢以寛吾君西顧之憂則有餘矣之道忠義所激不自知其狂僭伏惟鈞慈哀其誠而貸其罪且無以文采蕪穢而遂簡其說幸甚上宣諭汪中丞書之道竊聞之易曰惟幾也故能成天下之務又曰幾者動之微吉之先見者也君子見幾而作不俟終日蓋幾之為物藏於眇忽不可以期待不能以巧致其至也誠能因之而不失所以能成天下之務而獲不終日之貞吉其去也疾不容瞬茍惟失之後將噬臍悔可及乎是故智者不先幾而起不後幾而發先幾而起是為妄動後幾而發是為失應昔者越王勾踐以會稽之棲逮其反國焦心嘗膽思有以報吳後七年而民求奮其臣種蠡之徒止之以為未睹其可乘之幾於是乎斂形匿迹以伺其隙者凡十八年一旦夫差空國北從黄池之㑹遂一舉而敗吳再舉而亡之竊惟主上歲在丁未以徽廟之子淵聖之弟兵馬之元帥乘父兄北狩入繼大統於今蓋三十有五年其所以含垢忍恥屈己講和歲以金繒餉遺敵人其為禮惟恐不至而未嘗厭怠者無他上念二聖之播遷而冀其復還下憐四海九州生靈之塗炭而冀與一世同其休息也今二聖相繼升遐雖徽考之弓劒歸葬固陵而淵聖之梓宫未知何在前日使來所奏敵人語言大肆嫚辱意在窺併淮地之道指江為界古人所謂多行無禮必自斃者正謂此爾以愚觀之敵人之危不朝則夕然未知所以危之者果誰也何則敵危有三無故而去其巢穴徙都燕山則固有可危之理今乃自燕徙汝自汝徙汴所過居民丁壯婦女室廬器用牛馬稼穡為之一空所與偕來之人莫非素所扈從不堪久役之苦而叛亡者過半所存餘黨見其勢敗事去因起而危之此其一也淮北之民懐祖宗二百年涵養之徳朝夕延頸以俟王師之來願為前驅萬一王師或緩其期勢亦不容自已因起而危之此其二也契丹有不共戴天之讎今聞敵人追兵本國非獨抗拒不來且立契丹之子以為主彼或乘上下之憤而釋憾除嫌因起而危之此其三也三者雖皆足以危敵然度其勢皆因其叛盟於我故得以投間抵隙而乘其幾若是則我所當乘之幾而彼或得之要其亡敵雖均然論其投幾之會間不容髪則在我不能無失應之悔蓋其黨得而危之則是殺一賊生一賊羊祜所謂孫皓暴虐已甚於今可不戰而克若皓不幸而沒吳人更立令主雖有百萬之衆未可窺也其為後患豈不大哉此幾之不可失者一也彼民得而危之則恐姦雄得志而勝廣之徒出焉雖若無足慮亦須煩其征討此幾之不可失者二也契丹得而危之則河北之地恐非吾有雖若無足慮亦當圖其恢復此其幾之不可失者三也今敵窟在大梁無異於夫差黄池之會國家蒐兵講武以俟敵人之隙者何翅勾踐之十有八年今乃先叛盟干我王略而彼民之望我師不翅大旱之雨我師之思奮以刷數十年之恥恨不朝發夕至斬其首以獻所謂不可以期待不能以巧致者卒然而會於目前惟此機會自與敵人用兵以來歲周三紀今乃適至其不易得蓋如此又豈可緩而失之也哉昔苻堅以小酋之種擁秦雍百萬之衆欲吞東晉而併天下於一統師次淮淝晉用謝𤣥以兵八千走之堅遂滅亡方堅恃衆自謂投鞭於江足斷其流亦何壯也逮淝水之敗聞風聲鶴唳皆以為晉師至又何弱也觀敵人之驕侈殘虐堅之為國蓋不至此然其輕侮中國則甚於堅天之亡敵在此時矣恭惟宣諭中丞以直言勁論正色立朝為時王魏凡有識有知者莫不想望其風采兹緣敵人窺伺漢淮而主上奮厥武赫斯怒仰稽天時俯察人事分命諸將移屯江北要害之地以備捍禦重念湖北京西控扼上流特遣閤下將使事奉密旨撫勞將士體訪事宜其與裴度以中丞之視征討淮蔡之師異代同符是時考功郎中知制誥韓愈上言以淮西三小州殘敝困極之餘而當天下之全力其破敗可立而待然所未可知者在陛下斷與不斷耳今敵人犯此三忌而是行叛盟殆與苻堅之寇晉略不少異而况所有兵民往往背叛其視苻堅之衆百不二三重惟國家養兵數十年斯民之勞敝極矣必欲息民莫如休兵今乃當應而不應當動而不動當起而不起則恐一失機會而兵休無時民亦何從而息也哉不識閤下自出國門以至於鄂千有餘里之逺亦嘗詢及芻蕘之言乎士卒之論乎聞而思奮者臣而思報其君之讎乎子而思報其父之讎乎弟而思報其兄之讎乎民至愚也合而聽之則聖抑亦以退避為是與非乎以進討為可與否乎范蠡所謂從時者猶救火天與不取反為之災贏縮轉化後將悔之愚願採斯言以告於上庶幾休兵息民之有日也干冒台嚴下情無任紹興八年六月十二日上侍郎魏矼書之道竊聞之先民有言詢於芻蕘以謂人有所長不可以其微賤故忽之也之道比緣赴調居於臨安之隘巷者八十餘日朝夕獲聞閭閻之言似有可取者輒敢以其所聞上瀆聽覽惟執事擇焉其言曰王倫使金還金遣使隨倫報聘國家自靖康以來失於議和致兩君北狩萬乘東巡百姓墜於塗炭迨今十有四年尚不覺悟又復縱倫賣國引盜入家以闖我虚實排辦館待之具所至騷然夫金人之為此也利得子女玉帛爾不以吾之所以館待者過禮而遂已也今有被盜者家徒四壁立復不自量又從而東借西乞以其所有而夸於盜其不為盜之招者幾希頃年章誼孫近使金餘人盡留南京惟誼與近得至軍前稟議今金使之來自合引用此例留餘人於韓世忠軍中令其使副造朝不惟有以褫其魄而奪其氣亦足以示朝廷之尊乃若議和則有九不可而一可之道聞此言如醉而醒如夢而覺因謂同舍郎曰智者千慮必有一失愚者千慮必有一得兹殆所謂一得者乎請試為執事陳之父母之讎不與同戴天兄弟之讎不與同國金人昨犯京師自徽宗皇帝明徳皇后以下悉從播越今兹仙去雖云厭世其實殺之又况淵聖之與六宫尚囚沙漠四海共憤恨為人子弟者義當何如此其不可和者一也當唐徳宗時吐蕃因沙堡之敗懼而求和宰相張延賞入馬燧之言請於徳宗從之當時諸將獨李晟以為不可諸相獨柳渾所言與晟意合曰豺狼之性非盟誓可結已而吐蕃果刼盟如晟渾言此其不可和者二也和戎所以息民也斯民厭亂久矣孰不欲其通和而幸其休息哉今輿議乃爾蓋傷弓之心猶思靖康覆車之轍而懼其復蹈也必欲議和是咈民心民心則天意也天可違乎此其不可和者三也頃自車駕南幸金立劉豫於濟南以有中原之地歲責幣三百六十萬緡豫奉之未嘗少有墜失一旦以計廢豫盡豫所藏擔囊掲篋倒廪傾囷而去若取諸懐不煩顧指而我師以君伐臣睥睨累年終不敢進非金勇而豫怯我弱而豫强也蓋豫已臣事金人則金猶父也豫猶子也為人子者固不虞其父之見逐惟不虞其見逐故金得以逐豫如反手之易為豫計者亦初不謂豫曰汝於金非有父子之親徒以我之廢吏故立汝以為得志必將與我抗而為己之捍蔽也抗我則所以事己者不敢不至豫既挾金以抗我則其於我也不復若金之不虞其見逐也且日夜求所以勝我惟恐其不勝而見擒是則我之所以不能取豫者以豫視我若讎而豫之所以見執於金者以其待金者過於親也今金欲和是以劉豫畜我此其不可和者四也當寳元康定間契丹以重兵壓境遣蕭劉六符來聘意在刼取關南十縣朝廷命右正言富弼為報聘之行仁祖重念兩國生靈之故許其屈已增幣而契丹平逮卒事弼不肯受賞曰此非臣之本志也嗚呼忠臣之謀國一至此耶今金無約請和非出於謀則是厭兵而欲結好於我以邀歲貢從之而遂罷兵則非特不能保其不叛盟而乘我之間又恐朱克融輩變生不測從之而兵不可罷則不能不於養兵之外横賦重斂歲供溪壑無厭之求其勢必至陳勝吳廣之起於秦青犢黄巾之起於漢為禍殆有甚於此者此其不可和者五也頃年以來諸將非不進討終不能取淮北尺寸之地或暫得之復旋失之正使舉大河以南盡還朝廷度其力果能保有之乎與其隨得隨失不若置之度外以俟其力足以制金徐為進築之計此其不可和者六也自古中興之主未嘗不因於險阻艱難惟其履險阻艱難而益挫益堅因能興衰撥亂而光祖宗之業刷父兄之恥而見稱於天下後世若周宣復文武之境土漢光之恢復疆宇是也今得河南之地不足以立國金藉此求和則必天地以要我自此以往雖使王靈日張軍聲日振尚敢議恢復之圖哉此其不可和者七也漢唐以來中國之待外夷不過征伐之與和親征伐則將帥任其責和親則廟堂主其議今天下之權不在廟堂而在諸將諸將擁重兵據要地偃蹇自肆視國家之安危存亡如越人視秦人之肥瘠漫不加意遇緩急則雖請援者駢肩於庭督戰者接武於塗方且傲睨而不顧逗留而不發曰將在軍君命有所不受儻從金盟而不與諸將議使金誠和猶恐自疑而至於潰叛萬一挾詐如尚結贊之意在窺窬是使諸將得以有詞而不復出兵矣此其不可和者八也李義琰嘗曰大國之使可當小國之君今主上以休兵息民為重固不憚臣事金人且以其主為君則其使蓋同列也若金使援此為言倨慢無禮不知朝廷何以待之此其不可和者九也然則所謂一可者孰可哉韓原之戰秦伯獲晉惠公晉遣隂飴甥使於秦秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉曰必報讎君子愛其君而知其罪不憚征繕以待秦命曰必報徳以此不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君貳而執之服而舍之徳莫厚焉刑莫威焉納而不定廢而不立以徳為怨秦不其然於是秦伯說隂詒甥之對改館晉侯而歸之初不聞其以賄盟也今金誠欲還二帝六宫與祖宗之故地而為徳於我以要我盟曰既盟之後言歸於好各守封疆世世子孫愼勿相犯有渝此盟明神殛之而無所事賄夫誰曰不可同舍郎曰子之所言九不可理固然矣所謂一可乃服而舍之如秦伯之歸晉侯也夫晉侯以三施不報有負於秦之君民秦伯尚且歸之我徽宗皇帝初不聞有負於金而生不得反其國死又且要其盟豈服而舍之道哉使金無所要但以有負我遂歸梓宫之與天眷猶當愧於秦伯况不如是耶為今日計當以此意明告使者而俾復命茍惟不從是金無意於盟我何罪也大抵主和者徒茍目前之安遂忘父子君臣之義他日儻修先帝之怨亦不過臨時失信敗盟而已夫信者國之寳民之庇言之瑞善之主也茍信不繼盟何益哉且自古失信敗盟未有不身罹其禍而殃及後世者不可不戒也不可不愼也之道今月初四日已嘗具稟目少見野人區區之意明日遂有無為之行不果再詣屏著跧伏小舟中念古人身在畎畝心不忘君將次宜興復紬繹前日臨安之有得於街談巷議者為之書以獻庶幾有聞於吾君吾相而使敵計無所施焉轉禍為福實在侍郎一言干冒威嚴無任皇懼之至
