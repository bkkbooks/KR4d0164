body:
  text: 相山集卷十六宋王之道撰詩餘宴桃源烏江道中二首黃落聲遲風歇龕火夜寒明滅殘月却多情來照先生歸轍清絶清絶透隙風霜如雪遙指湯泉西路隱約碧雲天暮宿鳥擇深枝兩兩相呼如語凝佇凝佇今夜夢魂何處宴桃源和張文伯雪詞飛雪乍稀還驟髙閣下臨羣岫獨立遂移時歸去黃昏前後知否知否落筆騷人賦就風急柳花飛驟白盡千林萬岫樵擔晚來歸正在栖鴉啼後知否知否語到謝娘詩就宴桃源和張文伯海棠水外浸山桃李那得箇中風味一種最憐渠酒著佳人半醉還似還似驚起午窗春睡如夢令和張文伯芍藥綽約一枝紅怨踈雨淡煙池館梅子欲黃時日倚朱闌幾遍爭看爭看人在沉香亭畔如夢令江上對雨一晌凝情無語手撚梅花何處倚竹不勝愁暗想江頭歸路東去東去短艇淡煙踈雨如夢令和張文伯木犀葉底芳蕤如綴坐對廣庭忘味嬌騃最憐伊亂糝舞餘風袂貪喜貪喜不覺寶叉斜墜長相思美人桃花春杏花春桃杏妖嬈如箇人歌聲清遏雲酒醺醺燭熒熒眼尾微紅無限情相逢堪斷魂長相思恨别雨濛濛日曨曨洗出逺山三四重分明眉黛濃野橋西官路東小驛夜凉風入松夢魂誰與同花一枝酒一巵舉酒對花君莫辭人生多别離行相隨坐相隨更有何人得似伊春融蝴蝶飛天四垂山四圍山色天容入坐帷清風吹我衣湖水東江水西東去西來無盡期不如君共伊吳江楓吳江風索索秋聲飛亂紅曉來歸意濃淮山西淮山東明月今宵何處同相尋魂夢中風淒淒雨霏霏風雨夜寒人别離夢回還自疑蛩聲悲漏聲遲一㸃青燈明更微照人雙淚垂㸃絳唇和朱希真短棹西來追隨不及桃花宴薰風庭院明月裁紈扇睡起嬌慵相見雲鬟亂雙魚逺欲憑春喚一見韋娘面㸃絳唇和張文伯竹外梅花檀心玉頰春初透一池風皺妙語天生就有箇人人嫋娜靈和柳君知否目成心授何日同携手㸃絳唇和張文伯除夜雪詞透幕穿簾回風舞態真輕妙不煩相惱江上春來了一闋清歌唱徹瓊樓曉春工巧柳顰梅笑㸃綴芳菲早㸃絳唇冬日江上古屋垂楊淡煙踈雨江南岸幾家村疃酒斾還相喚短棹扁舟風橫河頻轉柔腸斷亂鴉晚噪天共蒹葭逺㸃絳唇社日雨春意催花片雲又作朝來雨淡勻深注紅紫知無數社日人家凖擬行春去癡兒女倚門凝竚借問東郊路浣溪沙和張文伯長至寒透珠簾怯曉霜灰飛緹室驗回陽坐看紅日上修廊泉瀉龍頭深泛酒煙凝象口暖吹香及時歌舞意何長浣溪沙春日水外山光淡欲無堤邊草色翠如鋪緑楊風軟鳥相呼牛蒡葉齊羅翠扇鹿梨花小隘真珠一聲何處呌提壺浣溪沙贈妓玉骨氷肌軟更香一枝丹棘映青裳相逢歸去未須忙曲裏春山情不淺樽前秋水意何長醺醺顔色粉生光浣溪沙和張文伯海棠過雨花容雜笑啼淡粧深注半開時嬌嬈情態自天姿新浴太真增艷麗微風飛燕鬭清竒緑窗朱户雅相宜浣溪沙和張文伯木犀曉日暉暉玉露光枝頭一樣鬭宫粧可憐嬌額半塗黃衣與酴醿新借色肌同薝蔔更薰香風流荀令雅相當浣溪沙賦春雪詞追和東坡韻陽氣初升土脉蘇東郊人散欲廽車一時春雪十年無魚枕蕉深浮酒蟻鹿胎冠小粲歌珠題詩不覺燭燃鬚體粟須頻酒力蘇流涎正值麴盈車坐來獸炭撥還無一闋可能酬一絶雙銀端不换雙珠松毛粉白老翁鬚春到衡門病滯蘇力強猶可駕柴車少年狂妄一時無清坐不堪膚起粟髙談還喜唾成珠紅裾癡笑雪如鬚凍卧袁安已復蘇閉門那患出無車似渠人物到今無可笑崑山誇片玉須憐滄海歎遺珠時來應許捋君鬚浣溪沙阻風銅陵追和東坡游泗洲南山韻殘雪籠晴作沍寒北風吹浪過前灘逺山雲氣尚漫漫睡起陽烏窺破牖坐憐香霧藹雕盤一樽聊佐旅中歡採桑子孫中益集於西齊題侍兒作第一流因以詞謝之竒花不比尋常艷獨步南州往事悠悠遼鶴重來憶舊逰仙翁不改青青眼一醉遲留妙墨銀鈎題作人間第一流菩薩蠻和趙見獨佳人睡起香鬟倭墮蘭膏膩睡起搔頭紅玉墜秋水不勝情盈盈橫沁人朱欄頻徙倚笑與花爭媚眉黛索重添春酲意未忺菩薩蠻採蓮女藕絲衫剪猩紅窄衫輕不礙瓊膚白縵鬢小橫波花樓東是家上湖閒蕩槳粉艷芙蓉榜湖水亦多情照粧天底清减字木蘭花和孔純老送鄭深道移守嚴州金尊頻倒照座梅花清更好春到長楊寵拜三公入鄭莊月城兩載千里生靈䝉惠愛舞徹歌詞並立新粧緑帶垂减字木蘭花贈孫興宗侍兒回首修眉山逺嬌抹烏雲秋水畔酒裏花前坐擁斯人怎得寒醁􅙩浮滿須索空缸仍覆盞正恐相妨歸去如聞笑語香江梅清逺瀟灑一枝樽爼畔雪後風前照水窺簷巧耐寒多情美滿共飲自應渠釂盞醉賞何妨傾國天教抵死香笑中聲逺走向曲房花樹畔擁在樽前頓覺春溫却夜寒願酬心滿只得教伊頻勸盞緩唱何妨貼體衫兒撲鼻香仙姿凝逺半出新粧瓊户畔緩步來前正值東風料峭寒叉頭花滿舞罷梅英飛入盞一釂何妨花與佳人巧鬭香减字木蘭花和張文伯對雪詞四首詩成呵手欲寫已輸君賦就寒粟生膚一盞澆腸可得無回風弄巧比似婆娑尤敏妙似箇人人嗅認梅花孰是真尊前放手銅鉢聲窮詩已就姑射肌膚舞罷纒頭怎得無青腰更巧擔粉團酥來鬭妙不敢方人容色依稀似太真玉奴招手來看前山瓊琢就透骨侵膚似恁清寒更有無春工縱巧只許梅花稱獨妙花底逢人逐馬銀杯誤認真鱉頭龜手孤坐書生能意就暖體溫膚繡被春寒想見無雪詞工巧髙壓君房天下妙白髮欺人甚矣吾衰懶是真减字木蘭花和孔純老別離筵暫住君在龍舒曽是主今作行人卧轍何妨借冦恂清歌妙舞斷送吟鞭乘醉去一釂休辭捧爵佳人玉筯垂减字木蘭花立春綵幡金勝一笑酬春聊適性騃女癡兒半挽梅花半柳枝追歡何計幸對緑尊環皂髻欲舞還羞美盼嬌回碧水秋减字木蘭花和董令升正月五日㑹客蛾眉螓首舞雪嬌回開凍候盡道今年千里風光萃綺筵坐來新月照我蒼顔并白髮酒到休辭自有黃芽介夀祺卜算子和興國守周少隱餞别萬山堂拄頰看西湖屢對綸巾岸江上相從醉萬山六見年華换君唱我當酬我醉君休管明日醒時小艇東莫負傳書雁堂下水浮天人指山為岸水落寒沙只見山暗被天偷换堂上老詩翁客至勞相管風喘溪頭客自東日送雲中雁今日富川濵後夜溢江岸千里西湖指顧間未怕新年换再見復何時此意憑吟管應有新詩當尺書日望南來雁醜奴兒對雪和彥逢弟詞青腰似詫天公富奔走風雲銀界無垠委巷窮山草木春玉樓不怕歌茵濕語笑紛紛須放他門醉裏氷姿光照人謁金門進和馮延巳春睡起金鴨暖銷沉水笑比梅花鸞鑑裏嗅香還嚼蘂瓊户倚來重倚又見夕陽墜門外馬嘶郎且至失驚心暗喜秦樓月和張文伯雪詞雲不捲澆愁莫放金杯淺金杯淺新詞麗句要人裁剪酒酣思致天同逺臨風捉筆綸巾岸綸巾岸詩成歸去寒光照晚阮郎歸和廣濟王宰二首玉繩低轉斗闌干缺溫春酒寒夜長風徑怯衣單有人哦二山蟾欲滿雁初還桃花微破顔枕痕猶帶斷虹殘無言心自閒長楊風暖弄腰枝日長蝴蝶飛雨餘新緑細通池玉鈎懸芰衣鴻雁逺子規啼此情誰得知一尊聊與故人持醉來悲别離桃源憶故人追和東坡韻呈曺倅子修三首逢人借問春歸處遙指蕪城煙樹收盡柳梢殘雨月闖西南户游絲不解留伊住漫惹閒愁無數燕子為誰來去似說江頭路不知春色歸何處但見茂林芳樹庭巷落花如雨鬭亂穿窗户晚行溪上東風住荷㸃青錢無數蛺蝶飛來還去錯認花間路南園最是花多處門掩緑楊千樹别後幾畨風雨碧蘚侵苔户儂家舊在郊西住門外逺山無數誰道不如歸去咫尺長安路朝中措和張文伯清明日開霽朝陽淡淡宿雲輕風入管絃聲十里碧蕪幽步一枝丹杏柔情佳人何處酒紅沁眼秋水盈盈詩曲羡君三絶湖山增我雙明朝中措孔倅郡齊新栽竹愛君節直更心虛移植並庭除好在紅蕖相映捲簾如見吳姝清風明月君無我棄我不君踈况有騷人墨客時來同醉兵厨朝中措和張文伯海棠暖風遲日透香肌春到柳邉枝曽見酒紅潮頰玉人初出羅幃東坡何處朱唇翠袖空想芳姿爭似濡須太守看花仍賦佳詞朝中措和張文伯逺亭晴煙漠漠日暉暉天際逺山低檻外碧蕪千里坐來目送鷗飛詩箋談麈珠盤落落玉屑霏霏更把登臨餘興翻成白雪歌詞朝中措魏倅定甫生日州閭庠序少追隨俯仰鬢成絲仕宦孰踰君逹恩袍遍及庭芝溪頭春日歡聲和氣如見生時好對髙堂夀母獻酬同醉金巵朝中措王守正仲生日滿庭巖桂藹香風人在畫堂中欲驗魯侯難老歡聲千里攸同臺分金石源鍾淮水流慶無窮好繼漢朝循吏從茲入拜三公朝中措和張文伯寒食日雨從來寒食半隂晴花底聽歌聲昨夜滿城風雨惜花還繫心情海棠枝上朱唇翠袖欲鬭輕盈須藉嫣然一笑醉吟同過清明朝中措和張文伯元夕江城春霽雪初融樓觀瑞煙中向晚金蓮無數一時開遍東風多情太守行携紅袖坐引金鍾時出陽春絶唱才名不减詩翁朝中措董令升待制生日天庭丹熟在何時鉛汞適投機四海方思霖雨未容駕鶴先飛當年今日謫仙初降庭露馡馡願對良辰好景稱觴為醉芳菲西江月和張文伯臘日席上北陸藏氷欲竟東風解凍非遙一時芳意巧相撩入眼緑嬌紅小柳色輕搖弱線梅英紛綴枯梢觥籌醉裏賴君饒歸去斜陽尚早西江月別思一霎輕雲過雨半篙新渌橫舟梅花池館暗香浮酒入朱唇紅透有恨尤憐别恨多愁不慣春愁舞餘何惜更遲留腸斷斷腸更後一别清風北牖幾畨明月西樓斷腸千里致書郵借問近來安否歸路淮山雨過歸舟江水澄秋佳人應已數程頭凖擬到家時候西江月賞梅雪後千林尚凍城邊一徑微通柳梢搖曵轉東風來看梅花應夢酒面初潮蟻緑歌唇半啓櫻紅氷肌綽約月朦朧髣佛暗香浮動西江月張文伯謝曾子修送酒黃菊正懷彭澤白衣俄致江州登髙餘醉快扶頭此貺義兼情厚痛飲還須酒對清吟况值詩流輕投無惜萬金酬木李舊先瓊玖西江月試茶磨急鋸霏瓊屑湯鳴車轉羊腸一杯聊解水仙漿七日酲襟頓爽指㸃紅裙勸坐招呼巖桂分香看花不覺酒浮觴醉倒寧辭鼠量西江月春歸春日荒荒别浦春潮灧灧長堤緑楊風喘客帆遲腸斷江南雙鯉短夢當年楚雨扁舟後夜秦溪一聲啼鳥怨春歸人在酴醿花底
