body:
  text: 相山集卷二十宋王之道撰劄子王師所至秋毫不犯劄子契勘今來用兵當預有以固結民心而所以固結民心者莫大於秋毫無所犯是以成湯之伐桀不過於歸市者不止耕者不變宣王之平淮夷不過於不留不處三事就緒漢髙之勝項羽不過於財物無所取婦女無所御此無他得天下有道得其民者所以得天下也得其民有道得其心者所以得民也夫斯民簞食壺漿以迎王師者豈樂於戰伐哉為其有以慰雲霓之望而脫水火之厄也若屠戮其父兄係纍其子弟掠其金帛淫其婦女如之何其可也伏惟都督僕射相公上體九重所以眷倚之意下慰億萬生靈所以屬望之心無使市不易㕓宗廟不震長安之人不識旗鼓專為李晟美實中外幸甚又與汪中丞畫一利害劄子畫一之道聞有兵無將與無兵同有將而非其人與無將同然則今日膺閫外之寄運掌上之竒者尤不可不選擇而使之也究自古用兵初不以衆寡為勝負但患乎將帥之非其人耳何則尋邑百萬而光武以三千敗之苻堅百萬而謝𤣥以八千敗之曹操以八十萬而敗於周瑜袁紹以四十萬而敗於曹操至於本朝太祖之定天下用兵亦不過十五萬東征西討無不如意其伐蜀也止用精兵七千人耳愚謂今日之兵本自足用誠得人而將之亦何患乎不濟蓋吾之宿將比自講和以來初無尺寸之勞毫髮之功二十年間享其富貴尊榮甚者位師保太傅以至開府儀同三司其次類為太尉節度使如承宣觀察防禦團練使蓋不足道黃金白璧歌童舞女充牣私室朝游暮宴其奉養僣侈有非言之所能盡者孰肯擐甲胄冒鋒鏑奮不顧身以徇國家之急哉當金亮之死止得人如往時之張韓其恢復中原亦已久矣傳曰疆埸不寧拔卒為將為今日計要當責諸軍都統制統領官於行伍中推舉其才能武勇而為衆所稱者或一二人或四五人明言所長如趙軍之許歷齊軍之田單上其姓名於朝然後詰之以詭道以觀其謀試之以危事以觀其勇謀且勇矣然後任之以職付之以事而較其能否優劣而拔用之俟其立到功效次第加賞如其所舉不當其所舉官必罰無赦而軍中見充統制領將佐或有老怯無用者令其自陳願休致者從之如此則有材武而陸沉者得以表見於世而老怯者得以退休於時亦各遂其志矣昔蕭何薦韓信於髙帝餘人未之知也惟何知之而帝信之方其擇日設壇諸將皆喜人人自以為得大將既拜乃信也一軍皆驚已而佐帝取三秦定天下者信之功為多由是以觀擇將真今日之急務不可忽也不可不慎也一兵法曰千里饋糧士有饑色樵蘇後㸑師不宿飽故趙充國云積穀三百萬斛於塞下則羌人不敢動然則當今足食之策莫如營田而營田之策非將帥身以率之未見其可也昔郭子儀以河中軍食常乏乃自耕百畝將校以是為差於是士卒皆不勸而耕是嵗河中野無曠土兵有餘糧也羊祜之鎮襄陽也與吳人開布大信降者欲去皆聽之減石城戍邏之卒以墾田八百頃其始至也軍無百日之糧及其季年乃有十年之積此將帥營田之眀效也其次則莫如韓重華之為振武水隆轉運使出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所負釋其粟之在吏者四十萬斛不追吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授耕法故連二嵗大熟吏得盡償其所亡四十萬斛而私其贏餘得以休息軍不復饑一今日之用兵患在於規模不素定而或進或退或攻或守皆取决於朝廷朝廷初無一定之策以授於將帥故將帥幸其朝廷之遙制有當進而不進者有當攻而不攻者且如成閔除荆襄制置兼招討方自鄂渚移屯德安而召援采石正當隆冬盛寒千里奔命士卒數萬人疲於道路死者不可勝數其於赴援初不聞其有折衝却敵之功兵法曰百里而趨利者蹶上將五十里而趨利者軍半至而况於千里乎此規模不先定之過也一今日之用兵患在於賞不當罰不行何謂賞不當蓋以無功而肆為誕謾謂如偶獲一人則圖其戰鬭之狀張其掩殺之衆走旗入報以為大獲勝捷而其賞有至於轉十數官者何謂罰不行如王權以都統擁數萬之衆遇敵不戰而走非獨大喪其師且使兩淮之民悉為魚肉既不能正其典刑籍其家産逮至臺諌論列僅能除名逺竄而已兵法以賞罰素明為足以知勝負然則軍聲之不振亦理所當然也復何怪哉一自金人入冦我師進討士卒以將帥望風退避一時奔潰初未嘗交鋒而自相蹂踐死亡銷折者十之五六曽不聞逐軍申其死亡之數謂如前軍原一萬人今死亡過半而所請舊額不减一萬之數後軍原八千人今死亡過半而所請舊額不減八千之數是也若以所請虛數依舊給與死亡之家則猶可以養其父母妻子以慰旁觀士卒之心亦庶幾焉儻或統轄等人取之以為已有則其為公私之蠧可勝計哉傳曰山林不能給野火江海不能實漏巵今日之患正在於此不可不深究其弊而痛革之也一道路之言以為用兵以來人馬死傷過半而諸將方且申乞招軍買馬朝廷不問其財用之無所自出悉從其請盡下諸道總領所應副而總領之所有皆自朝廷支降非於支降之外别有生財之道也陸贄有言益兵以生事加賦以殄人無紓目前之虞或興意外之患在今日不可不以是為慮也一晉武帝時鮮卑木機能為邊患攻陷凉州帝臨朝嘆曰誰為我討此者馬隆進曰陛下能任臣臣請任之臣願募勇士三千人無問所從來帥之以西冦不足平也帝許之隆募能引弓四鈞挽弩九石者取之立標簡試自旦至日中得三千五百人隆曰足矣請自武庫選仗帝命惟隆所取仍給三年軍資而遣之隆西渡溫水木機能等以衆數萬據險拒之隆以山路狹隘乃作偏箱車為木屋於車上轉戰而前行千餘里殺傷甚衆隆至武威鮮卑大人猝跋韓且萬能等帥萬餘落來降隆與木機能大戰斬之凉州遂平今日之招軍每效用一名日支食錢三百米三斗而又不刺靣不涅手夫人得而充焉可謂優且厚矣使為將帥者誠能體國一一如馬隆之用心而所招效用又盡得如馬隆所募之人則一夫可當十夫之用不然十夫不足以當一夫是徒為虛名以蠧其民爾雖得百萬亦何用哉一唐陸贄之言曰人者邦之本財者人之心其心傷則本傷其本傷則枝幹顛瘁而根柢蹶矣議者咸謂今日之計莫急於理財以愚觀之理財在今日為無術但當行其革弊之政則財用斯足矣夫奉祠給祿朝廷所以示優賢之意也今不問官之髙卑類以家貧仰祿婚嫁未畢為言陳乞宫觀動至三五任坐縻帑廪下至初出官人欲得家居纍考無吏績請官俸往往乞監廟十之七八其僥幸亦云甚矣當此國家多難為士大夫者正宜君爾忘身國爾忘家豈容背公營私自為溫飽之計哉今欲將宫祠嶽廟請給並行住罷其以故丐閒者皆與其名而奪其實候事定日徐議復舊可乎古之仕者必有圭田蓋養亷之意也今或彼有而此無甲厚而乙薄夫貪婪無厭之人正使有且厚猶恐未必能亷則其無且薄者又何以責其亷哉今欲例取職租之入以濟軍需候事定日徐議均一可乎今之仕宦文臣承務以上武臣下班祗應以上閒居待闕皆有月俸且文臣自選人以至改官自改官以至顯官能以亷儉自將綿歷既久生計粗足不猶愈於韋布之時哉而又加之俸贅莫甚焉今欲將文武閒居待闕月俸不問髙卑例行住罷候事定日徐議給否可乎諸軍揀放使臣將校以其陳乞或老或病不足以被堅執鋭而無用於軍也故揀而放之使得自便遂其閒逸以終天年正如士大夫之引年致仕不聞致仕之後復有俸給而終其老死也今朝廷以此輩嘗有從軍之勞則當考其戰多之功而等第之使臣上者不過再任其次一任而止將校上者不過三年其次二年而止亦已過厚矣今乃不問其等第而一槩分送州軍給祿養老至於死而後已其與當時陳乞老病减放之意豈不相悖戾乎耗蠧財用未有如此之甚者今欲將校除一任或再任三年或二年外並行住罷可乎此四者實當今之大弊如能住罷乞行下逐路漕臣籍所管州縣所罷錢穀令逐項樁管不得妄有支動專責餽餉以佐軍需其所得之多豈不過於豪民獻助坊渡預借之數乎兹蓋有利於國無傷於民但患其不能斷以行之耳申三省樞密利害劄子一湖北荆西兩路所屯重兵分𨽻四將而不置主帥雖廟算固有定議令其互相策應然至於緩急之際不知先登陷陳者果誰也正使有先登陷陳之人又恐旁觀策應者畏忌顧望莫肯奮不顧身以徇國家之急如賀蘭進明之不救張巡許逺將何法以加之正使事定誅不救之罪若張鎬之杖殺閭丘曉亦何能救其失哉昔九節度使之師以郭子儀李光弼皆一時元功難相臨攝遂不置帥師次鄴南未及戰而潰兹不可不鑒也一自古邊防未嘗不戍重兵以備敵人今國家既都江浙必藉淮漢以為屏蔽自合戍重兵於沿邊控扼去處今諸大將並屯江南去邊動五七百里沿邊州郡所戍多者不過三二百人少者才百有餘人萬一敵人夤夜以鐵騎兼程入冦則數百里之地不過朝發夕至所謂沿邊戍兵何能為哉使沿邊戍兵無所能為則所謂大將者逺在數百里外亦將驚惶失措豈不大可慮哉兵法曰先處戰地而待敵者佚後處戰地而趨敵者勞又曰百里而爭利則擒上將軍徑者先疲者後其法十一而至五十里而爭利則蹶上將軍其法半至三十里而爭利則三分之二至倍日併行此孫臏所以敗龎涓也今由都統下所遣戍兵或在德安或在應城且如信陽係沿邊隘口止有兵一百五十人而除擺鋪差出外在寨者止七八十人設若有驚求援於德安往來計六百里求援於應城往來計七百餘里不知統兵者亦嘗思及此乎俗諺謂逺水不救近火此言雖小可以喻大今欲便乞戍兵則恐有不通水運去處或山路險阻艱於饋餉愚願應沿邊州郡各乞分戍步兵三二千人馬三五百匹可乎如從所請只乞命諸軍推擇有才略善撫御士卒者令其統帥前來庶幾緩急可以倚仗兹正疆埸不寧拔卒為將之時不可忽也一訪聞淮北州郡往往多有糧草師行恐非所憂兵法曰食敵一鍾當吾二十鍾􅠇稈一石當吾二十石注曰􅠇豆秸也稈禾藁也又曰取用於國因糧於敵故軍食可足也注曰兵甲戰具取用於國中糧食則因敵也且說彼民朝夕延頸跂踵以望王師之來至有一户而磨麥七十石養猪數十口造酒三二十甕以備壺漿之迎者又有朝夕沿淮探伺及請旗榜者以恨王師之來不早彼民云但得天兵三二萬人則自淮以北便有數十萬衆為之鄉道矣八月初五六間蔡州上蔡縣百姓數十人傳聞我師分屯德安遂欣躍鼓舞棄其資産擕其老幼與牛馬而南行數十里而唐州桐柏縣巡尉利其財畜㑹合弓兵追逐凡十數戰弓兵死傷過半而老幼纍日不得食疲困就擒亦有竄至本軍界者以此觀之可以相見彼民徯后之意但使我師所至秋毫不犯當見彼民爭為前驅其恢復疆宇蓋反手也乞擇縣令以三事賞罰劄子契勘百里一令實生民休戚利害所繫而纍年以來聖君賢相重憐凋瘵頃罹干戈塗炭之苦日夜講求思所以選擇縣令以當百里之寄而終未聞有以循良見稱於時者其失有三焉一曰循法而其所差不問人之能否二曰能否無别而人無所勸沮三曰勸沮不行而貪暴者不知所警庸懦者不知所勉昔鄭子皮欲使尹何為邑子産曰學而後入政未聞以政學今欲行李唐書判拔萃之科應初改官人合入知縣者並試其中者則進之使作邑其不中者則扼之使監當而其最優者上則升擢差遣次則進秩又其次則減年以别能否可乎卓茂為密令政號忠厚光武一旦擢為太傅封侯史臣稱其克復舊物享祚長久蓋由知所先務而得其本原所致今欲責逐路監司核其循良嵗舉一人上治狀於朝廷參較優劣擇其尤異者取㫖內則用而為郎官外則用而為監司郡守以是勸沮可乎漢孝宣信賞必罰總核名實而當時美其吏稱其職民安其業今欲責郡守監司應屬縣令凡貪暴害民庸懦任吏者按劾無貸否則不以去官事發並連坐使其貪暴知所警庸懦知所勉可乎是三失若去而縣令之不得人者未之有也論和糴利害劄子之道竊聞古者三年耕必有一年之食九年耕必有三年之食以三十年之通雖有旱乾水溢民無菜色是故國無九年之蓄則曰不足無六年之蓄則曰急無三年之蓄則曰國非其國恭惟國家乍更兵火比自平定以來殆二十年號稱中興而官兵之冗所費不資逐嵗調度嘗苦其不給若以三年之蓄較之豈不大可慮哉之道於紹興二十九年夏調官日固嘗具劄子請於時相乞賣僧道度牒五千道每道價錢一千貫可得錢五百萬貫其錢盡以糴糧於沿江州軍貯積以備緩急軍需當時雖不䝉施行今朝廷已降指揮出賣度牒二千道每道錢五百貫共計錢一百萬貫其錢令諸路附綱起發解赴行在交納內三總領所錢另項樁管如此竊恐所得百萬遲之數月復成烏有愚願閣下眀言今日國用匱乏乞以此錢專用糴糧尋常不得妄有支動緩急以供饋餉不亦可乎所有和糴利便令具畫一下項一今來如糴糧乞於所糴州縣設場每場置斗十靣差監官二員一員掌交量一員掌支錢其糧米入倉聽令百姓自量並不須用斗給蓋百姓至愚而神聖人所謂上好信則民莫敢不用情今若聽從自量决無以九升半作一斗之理而所支錢又無邀阻想見歡呼鼓舞而樂中於官也且百姓尋常入市糶賣其鋪户於糶糴名下每斗各收牙錢一二十文今聞官中收糴乃無種種之費民情之喜不問可知也一和糴場合差專支官一名手分二名斗給庫子各一名專支官兼掌出納手分一名斗給一名司納以給慿由手分一名庫子一名司出以給價值其百姓既交量所糶米入倉訖交糧官即時令當行人出給慿由即時令當行人支錢不得少有阻節如違令州郡或監司覺察將官吏量行責罰一和糶場所差監官二員交量官居其東支錢官居其西其監官日支食錢五百文專支官并手分斗給庫子日各支食錢三百文其監官手分斗給庫子食錢候糴糧足日罷支如此庶幾可以責其養亷若有乞取聽人告即時决罰一和糴有二利蓋民間艱於得錢若官中於米賤時收糴則民樂於得錢而官獲其利然今之和糴遂成彊糴民之被害不可勝言無他且如轉運司行下一郡令糴一萬石不惟本司要取額外升合而所糴州縣亦然至於專斗每斗又取使用錢一二十文方始交量不爾則一斗只可量七八升若百姓稍有語言其監官必繩以法解赴州郡或監司究治緣是更無所控告一今來和糴謂如州郡市價每斗一百文足即量增十數錢明量一升作耗百姓見官中更無阻節而價值比市井稍有所增自然不勞而辦一和糴之弊不患乎吏之為姦而常患乎監官之不得其人不患乎監官之不得其人而常患乎監司守倅知縣之不得其人使監司守倅知縣誠得其人則監官有所畏憚而不敢犯過監官有所畏憚不敢犯過則吏之得肆其奸欺者亦鮮以類推之今日天下事往往如是豈特和糴而已哉且監司一路之風憲也所至要當使奸贓退聽善良受賜乃為稱職今則不然凡置司所在主者或不得人則本司官吏往往開其作弊之端而州縣官吏乘之公肆橫取其為害比他郡尤甚有不可勝言者此又不可不念也
