body:
  text: 提要相山集三十卷别集類三宋臣等謹案相山集三十卷宋王之道撰之道字彥猷廬州人宣和六年與兄之義弟之深同登進士第調歷陽丞南渡後纍官湖南轉運判官以朝奉大夫致仕後以其子藺官樞密使追贈太師宋史為藺立傳而不及之道故其事迹不詳惟尢袤所撰神道碑尚在永樂大典中可以考見大略之道嘗自號相山居士其集即以為名宋史藝文志作二十五卷書録解題作二十六卷寶祐濡須志及濡須續志俱作四十卷尤袤碑文作三十卷彼此乖互不合今原集既亡無可復證然袤碑乃據其子家狀所書似當得其實也初金兵南伐廬州盜起之道率鄉人據險共保城賴以全幹略頗有足稱又其登第對䇿時即極言燕雲用兵之非以切直抑置下列及紹興和議初成之道方通判滁州移吏部侍郎魏矼司諫曽統書力陳辱國非便尋又上疏論之並以前書繳進大忤秦檜意謫監南雄鹽稅坐是淪廢者二十年今原疏雖佚不存而所與矼統二書具在集中其所論九不可和之説慷慨激烈足與胡銓封事相匹氣節尢不可及其他論事諸劄子亦多明白曉暢可以見諸施行韻語雖非所長而抒寫性情具有真朴之致蓋有體有用之言固不徒以文章工拙論矣謹就永樂大典各韻中搜輯編次仍可得三十卷疑明初纂修諸臣重其為人全部收入故雖偶有脫遺而仍去原數不逺歟乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:af92a609b57b5930805b0aefbb325d2df7ca60a328cbec0b48d7792d4a8ac1f8
