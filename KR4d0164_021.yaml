body:
  text: 相山集卷二十一宋王之道撰劄子乞賣度牒糴軍糧劄子竊聞之趙充國之制先零嘗謂耿壽昌曰糴三百萬斛穀於塞下則羌人不敢動壽昌所糴止得四十萬斛義渠再使且費其半致羌人敢為逆由是以觀為國家者豈容外有强敵而不為足食足兵之長慮乎朝廷自軍興以至於今三十有五年矣諸司所統無慮數十萬兵亦不可謂不足矣而終未聞有嵗月之儲則食之不足槩可知也嘗試以今兵食計之大率不過三百萬斛略論中平之直為錢不過五百萬緡異時國家常慮暗失丁壯禁賣僧道度牒矣而游惰之徒利於不耕而食不蠺而衣雖不披剃披帶例以參頭道者為名所至雲集往往三兩倍見存僧道之數其與暗失丁壯均也今欲乞權造綾紙度牒五千道每道立價錢一千貫俾自今以往度為僧道者依職員例預免私罪杖公罪徒逐嵗等第分降諸路轉運使出賣書填不惟可使此徒知度牒之艱得悉自顧惜互相勉勵遵釋老之遺訓報君父之大德且復嵗得數百萬緡若行封樁不得别有支動於秋成日於米賤州軍趂時每斗量增數錢收糴除水腳糜費外可得三百萬斛仍於瀕江州軍儲積緩急以備軍頒亦今日足食之䇿也乞將犯盜罪不至死人配𨽻諸軍重役劄子契勘殺人者死傷人及盜抵罪惟兹三章非特漢髙入關所約之法當然自唐虞三代以來未有能易此而致治者也恭惟主上明慎刑憲詔令之下罔不以施生戮死為念但推而行之往往未盡得人州縣之吏上而守令下而巡尉間有坐視盜賊肆為良民之害而不復問者設或有能督責土兵弓手保甲擒獲一二至於解赴所屬則當行人吏又以為竒貨重有乞取然後受之既付囹圄而未獲徒黨而行賕於鞫勘官司互相表裏借詞出罪無所不至由是自死降而入流流降而入徒者十常八九其尤甚者既謂之流曽不出境三二百里又以其徒伺候資送曲意奉承管押之人既賂以金復醉以酒弛而縱之逸者多矣此曹既返巢穴稔惡不悛其勢與向來捉事人誓不俱生而為害有不勝言者矣今欲乞將犯盜罪不至死之人配𨽻諸軍蓋此曹類多驍勇趫捷豈惟緩急可以備驅役其防間之密約束之嚴庶幾有悛心而椎埋剽劫之流亦少畏懼用不犯於有司而百姓䝉實惠上廣明主好生之德顧不偉哉預置大軍馬草劄子契勘大軍見戍淮上將來合用馬草理宜預行計置之道竊覩紹興六年秋劉少保宣撫淮西日其他措置乖謬固不可毛舉縷數而最為擾民者馬草一事宣撫司行下安撫司安撫司行下諸州州行下縣縣行下保正長文移聨函繼踵催督起發而不言其受納去處州縣既已責辦保正長更不肯為申明保正長迫於程限且畏軍法正當穫稻蓻麥之際盡起保內丁壯人負草四束自朝至暮倣徨道塗東西南北莫知所向如是者幾一月後來冦退既就廬州置場受納而其受納官吏務在請賕競為阻節斯民既苦一月無處交納幸有其交納處不復計較所費由是每草一束㑹計水運亦不下四百金其負擔者往往至七倍深可憐憫乞欲朝廷明降指揮自今民間所科馬草除情願般赴軍前交納人戶外餘聽束納錢二百文省當夏秋間暇時官為召募老弱不堪出戰之兵於淞淮及安豐塘并廬夀界有塘礫去處採斫堆垜准備緩急應副大軍支遣庶得不奪民時不煩民力而軍儲預辦緩急不致誤事豈曰小補哉選將戍合肥劄子契勘合肥西北距淮二百四十里東南距江亦二百四十里在今最為控扼敵人要害之地然而城大兵弱不能獨守今年春僞齊來冦偶朝廷所遣嶽節使兵至敵與冦㑹賊駭不意遂却不然合肥之民與河梁等無噍類矣兹亦幸而成功非孫武所謂以近待逺以佚待勞以飽待饑其勝固前定也何謂以近待逺兵法曰百里而趨利者蹶上將五十里而趨利者軍半至倍日并行此孫臏所以敗龎涓也何謂以佚待勞兵法曰先處戰地而待敵者佚後處戰地而趨敵者勞投石超距此王剪所以殺項燕也何謂以飽待饑兵法曰千里饋糧士有饑色樵蘇後㸑師不宿飽齕木煮紙此張巡所以陷睢陽也今以淮西安撫而戍兵江東一旦境上有變往五百里來五百里而中有大江之阻其勢非旬日不能赴援而城已破賊已遁矣竊觀去冬逮今宣撫司遣兵過江槩不下二十次少者五六百人多者三四千人初無聞於折衝厭難而一往一來徒困我師徒敝我民徒壞我州縣其害有不可勝言者比聞宣撫劉太傅至合肥之明日有詔趣歸而器甲糧餉之舟將次合肥而返被溺者十之三四焦湖南北數百里凋瘵之民當此耕蠺驅之於風濤萬死一生之地俾令救其所失而償其所捐深可矜憫伏望僕射相公以伊傅為心恥一夫之不被如宣武劉太傅國之重臣不可輕動即乞於諸將中選其武勇有謀者俾統兵屯戍合肥使得古人所以待逺待勞待饑之道然後責以成功庶幾乎其可也乞罷無額上供錢减年賞劄子臣聞聖人無常心以百姓心為心惟以百姓心為心故無常好也百姓之所好吾則與之聚之無常惡也百姓之所惡吾則與之去之恭惟陛下自即位以來因民心之好惡而興利除害用能紹開中興而措天下於太平比罷免行錢百有餘萬貫及放丁鹽錢而以內庫錢充之數不可槩舉兹非以百姓心為心詎能至於此哉然尚有可議者如經總制司無額上供錢增及五千貫者守倅减二年磨勘一事為害不細訪聞近來所在州郡前此無上項錢去處守倅利得减年之賞往往非理剗奪縣道及場務常賦等錢以充無額上供僥冒賞典其初只緣守倅一時幸賞至使無額立為定額嵗嵗百色誅求侵削無所不至而公私受弊有不可勝言者矣蓋縣道應干所入錢悉出之民間場務應干所入錢悉出之酒稅况茲年豐如淮東西湖南北米賤而不售民間難於得錢所至場務酒稅額往往例皆虧損今守倅以利一時之賞而奪其縣道場務常賦等錢增作無額上供正使逐郡不問大小例增及五千貫通天下計其數亦未必及今來所罷免行錢之多而况所增曽不及萬分之一耶伏望聖慈憐其所取之微而流弊至甚特罷守倅逐嵗無額上供减年之賞仍將二十三年以後創立無額上供並行免放不為永額以寬民力實天下幸甚論諸將不為捍禦計劄子契勘自張韓罷兵以來殿帥之楊存中鎮江之劉寶建康之王權鄂州之田師中皆擁重兵享髙爵厚祿極其富貴安榮於今二十餘年矣近楊存中以丐祠封王劉寶以跋扈被斥所存者惟王權田師中二人當此多事之時朝廷曽不責以捍禦之事而二人亦宴然坐視初不聞其有所措置為彼之計則善矣而吾之所以平日養兵謀帥之意至此亦何所賴也雖然帝王之兵以全取勝是以貴謀而賤戰而百戰百勝非善之善者也故先為不可勝以待敵之可勝所以然者朝廷必有深謀至計所謂先為不可勝緩急可使折衝却敵而非天下所能窺其萬一者不然願於間暇時密諭諸將使為之備若髙崇文之屯長武城訓練士卒常若冦至卯時受命辰時引道器械糗糧一無所闕而破敵人於談笑顧不善乎然而萬一有警使所謂探報者正如飛鳥之疾諸將盡如髙崇文之受命不踰晷刻出師禦敵然往五百里來五百里且有大江之阻風濤之患尚恐敵人先據要害欲進不能欲退不可機㑹一失噬臍無及其念之哉乞重命令無使朝行夕改劄子竊聞古者以命令譬汗其言曰渙汗其大號以明如汗一出而不可復反也是以成王之訓有官君子則曰謹乃出令令出惟行弗惟反而劉向之上封事於漢元則曰今出善令未能踰時而反是反汗也如此而望隂陽之調不亦難乎然則命令之數變易非治世之所欲聞也國家崇觀以來其弊在此今主上若稽古昔紹開中興要當盡革前日之弊而朝行夕改尚或因仍舊習亦豈其所宜哉且以近時减官併縣二事言之减官所以省費併縣所以省事在今實當務之急也而减官未幾旋又增置如减司戶一員而增兵馬都監與指揮十數員是也併縣未幾旋又復置如舒州之併宿松無為之併巢縣曽不一年再復是也若以為官不可减縣不可併不當以一人之言一已之意而遽行之若以為官在所减縣在所併不當以一人之言一已之意而遽改也一减而十增適所以重費昨併而今復適所以多事不識漢光武之减吏十九併縣四百其在當時亦聞增復者有幾耶乞自今以往朝廷發號施令當深思聖人渙汗之言上以成王為法下以漢元為戒近則謀之卿士逺則稽之衆庶可則因否則革無以古今而妄生是非無以彼我而妄為憎愛使生靈䝉實惠國家銷實禍而天下後世仰望其治績而不可跂及實中外幸甚乞兵戍巢劄子契勘今來金人入冦江北之地悉為賊區尚賴將帥協心士卒用命天戈所指諸路一清可為朝廷大幸然夀春距合肥才二百里有竒今夀春既巳陷賊而合肥又為賊所平填不可復守若不明設斥堠申嚴備禦使賊乘我之間長驅南來則自淮以南數百里蕩然無有亭障不復留礙豈不大可慮為今日計必欲屏蔽江表莫若屯萬人於南巢以據要害可則進否則退使賊不合摶食東南實天下幸甚乞賞營田官吏之不擾者而罰其擾者劄子伏見近年州縣營田之始諸事草創佃客既不可遽招則多勸誘而取之民田器既不可立辦則多和買而取之民或借其力以耕或配其種以種兹固所不免者今舉行既久自宜人人體朝廷之德意遵畫一之成法務令有補於國無擾於民猶老農之治田嵗入常多於人而比鄰族黨初無毫髮之犯庶幾播殖日廣蓄積日富邦計以羡軍食以豐而坐制敵人之命於股掌之上且親民莫如令尉而營田之職又當朝夕巡行阡陌檢察種蒔於民尤獲相親其擾不擾與有勞無勞不於令尉是責而誰責之欲乞因今年之再稔時行考課問去年之買牛糴種與夫佃客之貸借官吏之請給其費幾何所收子利幾何較其所收比其所費果有數倍之獲則其有勞宜在所賞也而一或擾民斯無足取要當訪其擾與不擾而後加賞焉較其所收比其所費若才足以相償則其無勞宜在所罰也而茍能不擾猶或可恕要當訪其擾與不擾而後加罰焉誠能以一路計擇其有勞而最不擾者一人旌賞之雖超遷數官而不以為僭擇其無勞而最擾者一人黜罰之雖廢錮終身而不為濫則人知勸沮矣人知勸沮則吏稱其職矣吏稱其職而民不安業者未之有也昔漢宣以信賞必罰總核名實而吏稱其職民安其業號稱中興願復見於今日戍兵營田安豐芍陂劄子契勘無為軍近承安撫劉大傅劄子差官前來撿括逃戶曠土謀為營田夫營田非適今也趙充國之制先零嘗屯金城羊叔子之制孫皓嘗屯荆襄皆在邊徼未嘗與農雜處而無為自兵火以來比江北諸郡粗有農作若又籍其逃亡與其閒曠而分屯以耕豈惟兵雜於農農擾於兵居者不得安而去之徙者不敢歸而避之有失勞來還定安集之意亦恐無為距淮往復千里緩急不能相救有失且耕且戰之意竊嘗求古人之用心蓋為帝王之兵以全取勝嘗先為不可勝以待可勝而所謂不可勝者莫如營田塞下以俟其間而往取之此漢之所以破先零晉之所以擒孫皓蓋兩軍相敵尺寸地必爭今既為營田以制敵人奈何委五百里乃不於夀春而於無為也昔張仁願代沙吒忠義為朔方總管於河北築三受降城絶敵南冦路唐休璟以為兩漢以來皆北守河今築城敵腹中終為所有而仁願卒奏築之斥地三百里自是突厥不敢踰山牧馬朔方益無冦其建三城也初不置壅門曲敵戰格或曰邊城無守備可乎仁願曰兵貴攻取賤退守冦至當併力出拒敢回望城者斬何事守備退忸其心哉誠欲營田而於淮上其去敵人尚逺復有長淮為之限制此張仁願築城敵腹中似未足深慮也今去夀春而就無為諸將之意亦可見矣之道竊嘗為宣撫大傅計膏腴可以足食而無水旱之憂險阻可以戍兵而無掩襲之患進不失攻退不失守者惟夀春之安豐為勝蓋安豐之田受芍陂之利者不下數百萬頃而其陂之長濶各六十里東西如和州之麻湖而南北與深過之異時雖嘗建置水寨兵餘所存黎民亦無幾矣其或未能營田淮上兹庶幾其可也伏惟僕射都督相公忠誠憂國而加意焉慰安淮南使自捍禦劄子契勘江北自王彥充攻陷夀春以來人心動搖日夕延頸跂踵仰望王師之來不翅大旱之雨逮今纍月杳無所聞乃於八月初四日承七月二十三日括船禁渡聖㫖指揮截自十月一日巳後大江更不得通行官私舟船候過防秋依舊且盡括江北舟船不能禁金人之必渡而逆料金人遽絶江北之民且曰過防秋而依舊是猶人父兄急難不能保其子弟逐而去之且戒之曰他日安平汝當歸四方聞之其誰不解體兹正與前日之棄河北淮北無以異也今既不能遣兵戍淮以安其心伏望宣撫端明重以屬郡矜憐數千里之民無所依歸備以之道之言申奏朝廷乞特發德音下明詔慰安淮南使人自保守如有能扞蔽一方不陷於敵候過防秋必行信賞要使中外感動至羸老癃疾扶杖往聽願少須㬰無死以觀中興庶幾可以上回天聽下協人望
