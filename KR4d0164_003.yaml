body:
  text: 相山集卷三宋王之道撰五言古詩癸酉閠十二月朔旦入夜雪復作静言嵗歉斯人艱食展轉不能寐强沃一杯徑醉因成此詩宿雁驚江渚餓彪嘯林丘不知雪如許但怪風颼飀起㸔堂前柳枯梢戞鳴球安得萬家春解我飢寒憂旋支折脚鐺移燈視床頭發䝉餘半缾聊温三四甌鳴腸時一沃曲身漸和柔遥應原野間錦衾覆釐麰農夫庤錢鎛指日望有秋願言開同雲東郊從春㳺再用前韻謝潘夀卿見和二首小人南郭綦君子東家丘相從濡湏塢雪案風颼飀眼界眩兠綿耳根鬨鳴球何妨具杯酌一笑寛百憂不見劉帶花逢愁但揺頭時來㸔崔盧姓名覆金甌我願霽晨霜栗烈還温柔黄金著髙柳緑浪翻來麰要令扶犁兒力田遂逢秋飽食奚所湏鼓腹同天㳺新詩清絶俗想見胷中丘飛泉落髙峰風聲助颼飀又如清廟中河圖見天球不惟竦觀瞻玩之可忘憂是行何處來楚尾連吳頭一杯聊效芹大似勝茶甌賡我喜雪章詞情和且柔乆旱民苦飢重憐來與麰勃焉來争春富哉麰向秋吾君徳無邊今與和氣㳺再用前韻謝張濟之見和我欲訪蓬萊長笑挹浮丘此身挿兩翼泠然御颼飀樓臺聳瓊瑶草木叢珠球周旋於其間不知塵世憂願言乆未遂俛仰今白頭茅齋夜飛雪碎玉敲風甌平生鐡石腸化作繞指柔年飢百無贏接新待來麰君才似鵰鶚脩翎正横秋沖天在不日入侍巖廊㳺四面山午飯澡雪塵土往太湖二首白沙浥夜雨蒼松弄朝日清風滿行路駸駸馬蹄疾溪聲静如潄嵐翠濃欲滴我豈山中僧前身飽㳺厯重門掩松篁傑閣戞霄漢溪流水晶軟石棧雲母粲清㳺不可失微勞敢言憚斜陽無相催我欲濯塵汗次韻徐伯源九日閒居追和淵明閒居遇重九對酒懐陶生陶生不可見愛此重九名清霜肅時令天宇増髙明依依逺山色隠隠賔鴻聲泛酒黄金花人言可延齡嗟予不解飲酒到從之傾嫣然木芙蓉揺風倚東榮雖無窈窕歌自足娛吾情鼓琴復何為年來泯虧成追和東坡喜雪用王覿韻長安一夜雪酒價湧朝市何人獨耐寒翛然立庭砌盈盈竹間梅靚粧欲誰媚氷肌與玉骨似不勝風袂豐年貴三白麟鳳敢稱瑞要令輿論協庶遂我心慰春囬在朝夕枯荄動和氣尤憐麥葢錦秀發功必倍憂葵亦何為度日同度嵗不如擁百城陶然六經醉對雪二首再用前韻同雲晝暗空孤城早休市行人失道路賀客擁堦砌翻縞語亦工飛絮思争媚飄飄何所似想見六銖袂盈尺信為大三白乃成瑞梅花不畏寒㸃綴若相慰髙吟撚凍鬚詩社頗増氣薫然一杯酒神速功力倍來麰被餘潤預可占有嵗便當呼老農潑醅取沉醉我笑袁司徒閉戸雪中市髙眠罷炊㸑氷榻對瑶砌豈如王孝伯鶴氅鬬清媚隨風楊柳花縱横撲襟袂冬温犯春令破白已為瑞何妨盈地尺萬井共歡慰草木含餘滋山川欝佳氣清寒入詩骨敢問酒價倍日月同過鳥燔烈又興嵗老大不足悲吾今但心醉書懐示周少隠右司我生動多艱一笑不易得朅來坐逆旅俯仰空太息吾人當代秀文章擅華國分擕十四載復此見顏色怱怱未及欵歸程忽云逼願君因索塗為我指南北金門與玉堂努力事登陟閒將咫尺書因風寄相憶因納上人寄題望江張氏春暉亭詩青青原上草初生殆毫芒邇來没蓬蒿似有三尺强春暉主發生萬物資餘光遲遲雖不暴萋萋自能長條風與糓雨其功固難量予嘗優劣之豈得相軰行大哉發生恩欲報不可償東野古純孝作詩本肝腸懐親感春暉義見逰子章凱風亦逺矣此道何茫茫惟餘東野詩千古遥相望張公雷江人鷄羣鶴昂昂氷魚與冬笋志慕孟與王結廬守松楸至行稱淮鄉我不識君面因詩得其詳一經堂為王亦顔題我生非我有天地暫委形諦觀子若孫相值如浮萍崔昭與李兼甚矣愚不靈積錢遺芸窟轉手還星星何如散籯金人遺以一經韋賢不可作髙風㸔典型公家世植徳蘭玉滋芳馨三鱣偶墮砌伯魚初過庭明明有聖訓言之爾其聽退而學詩禮齋扉晝長扄矻矻對月牖孜孜守風櫺冬映孫子雪夜聚車公螢有時聞誦詩流泉韻泠泠懸知睟見面巖電仍雙熒行當擢賢科發䇿驚天廷致君此其術何獨取紫青苦雨呈蘄守徐次公涉春苦滛雨連綿過梅夏西來二十日終朝走泥溠林霏欲開戸簷溜又淙夜勢如黄河翻聲若滄海㵼頽垣就崩摧敗屋遂傾卸垂成麥傷潦將老蠶病柘那知困羈旅正恐害耕稼痛哉兵火餘人物乆凋謝瘡痍索撫養嵬𤨏煩教化方推中牟恭復獲潁川覇是行良不惡漸美同噉蔗况承雙魚書敢緩千里駕平生慕山水尋勝每偷暇何妨見君子大厭顧榮炙一舉欣兩得重趼輕百舍登臨興何窮吟詠樂無價猿鶴互酬對雲煙競邀迓巖松升龍矯溪橋斷虹跨尚恨阻豐隆未果訪姑射湏煩叚文昌一出補天罅告春亭詩為江寜令荀晉仲作淵明晉髙士從官非所好當時令彭澤為米聊寄傲公田三百畆一稔足炊䤖明年春二月農以仲春告為言當舉趾西疇雨如膏雨後春日遲不寒亦不暴欣欣木争榮民析肯居隩感此萬物時吾年廹衰眊餘生復幾許遑遑近顛倒翩然賦歸去豈為折腰躁兄也今淵明强盛當逺到學問窮古始文章配盤誥十年宰兩邑五月政三報去冬得兄書憐我加慰勞仁言暖於帛失喜至舞蹈其間何所云作亭縣之奥為農榜告春此意在勸導我欲求子詩併以示倪耄春作茍盡力秋成可無禱先當起疲瘵次用振凋耗别來忽九載觸緒増戀嫪塞命敢不勉一笑一杯犒次韻同年蔡仲平察院遊西湖朝日不受霧晴光似暉暉忽然快我心清風為解圍坐見九里松旌幢碧相依天竺了在望上有祥雲微西湖一千頃圓荷覆青衣輕舟競遊覽往往俗客稀幸及新雨霽欣逢露初晞水光與山色髙低映郊畿佳哉氣葱鬰觀闕何巍巍誰云門庭逺咫尺永天威諸公萃俊傑髙論玉麈揮載酒㫖且多不醉無庸歸餘歡到獻酢灔灔雙鴛飛新詩爛錦段想見勞心機顧我雖百拙續貂重相違明年若重來種種當如幾和秦夀之喜雨雲峰擁稜層不動若頑石追凉困無所何當日云夕揮箑汗如流欲卧莫安席雲頭從北來微風動䟱荻滂沱一尺雨旱魃驚辟易巾屨獲暫御尊酒容復覔誰憐貧長卿空洞家四壁熬熬爐炭中萬物同一息明朝槁苗興農畆歌帝力秋日訪程元明喜雨而作去年夏六月我來自臨安滂沲一夜雨原隰俱瀰漫俛仰忽再秋秋旱畎澮亁嘉榖槁垂盡萬口空長歎我從相山來朝雲起㠝岏油然遍寰宇半道濡征鞍亭午至君家簷聲落驚湍詰旦視大田青青巳堪㸔㑹見百室盈陋巷飽一簞何獨解君憂我心其少寛襲芳富卉木秋炎苦摧殘柯葉頓欣榮秀色良可餐速宜置尊酒一洗儒生酸我雖不解飲醒狂佐君歡和天寧因上人韻送僧用懿住桐城金繩山老松如蛟龍秋來露鱗甲雷霆昨夜雨奮迅以時發道人粲可流出世雨相法至今獅子吼狐兎尚驚怛金繩小金山突兀一峰拔桐城舊知音相招遺書札世情强輕重祖道無廣狹天寧有佳句鐘磬鬭鏗戞嗟予丘壑姿晩嵗麋鹿狎屬和良不工前詩萬鈞壓送延上人歸雲峰去年出山時飛雪正撩亂慇懃大洪老呵筆寫真賛為言化菩薩持鉢江北岸欲將說禪相醒彼瞌睡漢别來能幾日漚滅氷且泮似聞妙湛師接踵還舊觀公歸勿惆悵生死同夜旦幸有囊中金了此一重案送遵禪者阿遵我輩人相從十年舊行肥形愈瘠身貧道常富厥初為天衣持鉢化淮右袖擕維衛録訪我過蓬陋若言法華山有象金所就其來自西土隠現不可究我時嘗記之爾耳亦聊復誰令慈悲師鏤板播踈謬向來天衣逰追隨遍巖竇髙談屢絶倒寢食廢宵晝歸歟又同舟半道過濠夀是行寄先塋一再獲邂逅清霜殞羣木凄勁搗衣候翩然不我留雲山挺髙秀次韻慧上人見寄别來六改嵗想遍江南山江南二百州雲水相往還秦望冠吳越嵯峨俯塵寰法華在其側參差擁髙鬟幽花自芬芳好鳥時緍蠻傳聞發夢寐登覽忘劬艱去年謁老聰黙坐焚金顏忽然獅子吼頓覺醒㝠頑子今從之㳺舊習湏夷刪人人自有分既悟不我慳請㸔釣魚翁滿船載魴鰥用東坡三峽橋韻贈源上人解衣振林霏欹枕聽簷溜飢腸欲雷鳴病耳忽牛鬭自嗟兵火餘十載困淮右﨑嶇窮水石邂逅遍巖竇山逰雜麋鹿野處狎猿􅀈那知膏粱肥但覺蔬筍瘦寶林吾北鄰晨夕鐘鼓奏疎篁玉森列樛木弓半彀來為聖人祝歌唄發清晝歸餘雨脚稀溪流静如潄和韋蘇州逰靈岩山寺韻呈言上人我老懶成癖貪此林泉幽誰令吳中來兩月乗江流闔門十日雨不得厯虎丘讀子靈岩詩還復令我愁想見韋左司擁騎當年逰山中雨新霽緑樹鳴鶯稠乗興自不惡金風颯清秋㳺白雲山海㑹寺龍舒富山水白雲又其角七峰互回環仰見天一握古木森建幢蒼藤大張幄初疑翠黛掃頗類青玉琢飛泉何處來其勢自天落舂撞吼雷霆激射紛雪雹田家承下流伐石競耕鑿揺風麥初齊泛水秧尚弱怳若桃花源誤入不容却況有古道塲碧瓦照丹雘樓臺鎻煙霞松杉聚猿鶴我來孟夏初征衫汗如濯行行不知勞梯雲上青廓入門寂無人幽鳥自相樂登堂趙州出此意亦不惡徐徐叩其端善巧萬金藥銷除愛欲惱澡浣塵土濁山神似相留入夜雨還作明朝出山去欲去更盤礴何當賦歸來寄傲酬素約題三祖山觀山不憚逺有癖老増劇是行廹王事所過飛鳥疾路傍四五祖不得着脚厯朝來所幹集我願容自適衝寒走海㑹嘯吟遂終日眷言三祖山經從阻良覿僧果知我意飯僕濟行色﨑嶇五十里入山及未昃山頭殘雪在青瑶㸃微白殷勤承老禪傾葢同莫逆為言住此山予寶始今日欲以扶我衰不鄙昔輕䇿捫蘿助探討躡石共登陟羣峰聳遥翠一水漲深碧行行何所喜兩脚有餘力歸來飽香積清淡更過昔五祖山我生事幽討塵埃良獨難朅來舒蘄㳺登臨每長歎如何勝絶境佛屋多所安大哉慈悲力神功助劖刓住處未易言小道亦可觀五祖古名刹樓臺倚㠝岏﨑嶇六七里縈紆三百盤懸崖擢青士夾道羅蒼官飛泉響環玦幽芳馥沉檀我來及新霽千峰碧玉攅忽聞杞犬吠旋覺壺天寛水聲擢午暑嵐氣生晚寒心目快開豁腰脚嗟蹣跚㸔雲更搘笻披風少凭欄欲營五畆宮它年寄衰殘試煩問祖師莫作非意干贈浮屠有則我老不能詩其窮類詩人多謝二三子强以窮相親師從何方來過聽誤失真袖擕諸公詩丐我踵後塵顧我雖不能欲辭恐師嗔勉作數句偈拙惡慚無倫題澄上人頥庵我生困語言老大猶棲遲咄哉一言失雖悔何能追常欲說向人到口還忸怩不如静中坐此理吾所知春風入城郭古寺花開時廣庭積雨過紅紫初紛披偶逢頥庵人强丐頥庵詩是庵清而虚底事名為頥南陵有徐子頃嘗吏於斯作字妙羲獻學易深坎離慎言與節飲卦象不可欺君㸔命名意往往只在兹追和㳺謝氏山亭贈賢上人春旱乆不雨既雨風日清桑麻被膏潤往往争欣榮花鳥發詩思湖山歡野情駕言南畆逰遂有西塔行雲光欝在望地僻路亦生賢公方外交别來鶯再鳴相逢話疇昔茗椀喜屢傾多謝二三子壺漿競邀迎黄梅東禪寺南晉今黄梅東禪舊青蓮曹溪竟何許龍朔知幾年我聞二祖師屬袂兹褊􅝆片言道有契千古衣相傳栽松與舂磑為此一大縁朝追固若廹夜度亦大遄邇来五百載兵火數變遷惟餘墜腰石繩竅徒空穿堂堂吳生畫筆法世所賢絹素雖朽蠧丹青尚依然嗟予二三子平生慕真詮來㳺獲瞻仰投老當周旋獨恨走俗狀明朝又加鞭臨池更徘徊圓荷汎漪漣題智果寺呂侯妙章句珠玉走隣境想當落筆時豪邁不淹頃智果古精舍松篁轉岡嶺幽人所盤礴俗客作逺屏春雲忽解剥林日光炯炯門迎有髙僧烏用賦渴井開緘讀數過令我發深省老來習懶放萬事廢不整猶憐閒中趣日月頗増永何當遂浮家百口具舴艋不見六一翁夢寐在清潁人生㑹如意嵗晚果得請菩提院菩提古精舍兵餘但茅茨我行勌午暑少憩容奴炊山僧老無子養蠶如養兒奈何煮白蠒廼欲繅青絲燕泥固可惡覆巢似非宜不聞兩足尊頂鵲安無隳我亦學佛者言之為興悲作詩書壁間以為浮屠規黄頓琅玕山永福院我從明光來十里得永福山中何所有離離見疎竹前人目琅玕用意良不俗誰能對此君蔬飯賤粱肉成相院山前羅萬松邀我行數里不知幽人居但愛亂峰峙新晴翠似潑乍熱汗如洗幸獲聽潺湲何妨濯清泚弔魏敏功贈住庵通老一别異生死三年能幾時埋玉不可見拱木徒興悲通老奉香火坐閲嵗月移圓顱㸃飛霜夷曠真吾師和因老㳺水寨府治東軒二首市井從東州水竹自西府我來與公偕槃礴日欹午從容河底魚樂哉得其所此意與誰論相㸔黙無語買山荷疊錢照天水開府幽花有餘香誰復為賈午勝句湏斯人清逰更何所臨深未能還我欲作危語題崇因院信上人宿雲軒秋聲入髙梧暝色上疎竹南山攏青螺過巳淨如沐悠然孤飛雲窈窕轉林麓自疑歸去晩意欲窓下宿道人等虚空去來斷追逐雲來不吾拒雲去不吾速相從一息頃便覺静縁熟何以照我心老蟾掛枯木宿彰教寺過市欲投宿穢隘非所安人言五里餘有寺潔且寛驅駑犯泥淖敢憚風雨寒稻塍與兎逕縈紆度千盤衣裘被沾濕脚膝加蹣跚因思聖人語後獲當先難壯哉古道塲翬飛映層巒秀色藹松檜清香馥芝蘭我心大有得豈惟厭逰觀行行勿躊躇霽日升雲端贈六安文殊亮老予是行按蓼館於文殊獲與亮老欵坐上邂逅㑹勝葆公請談三夕而二師苦於病惱皆有髙舉逺引之興故作是詩勉之丁丑夏四月辛亥我從東蓼來水竹遂幽討﨑嶇至於六獲見文殊老文殊方外友僧門素稱寶平生首肯處可嗣布禪皓寤寐思棒喝邂逅得傾倒何妨萃髙人坐上識吾葆㑹勝索枝撑得師恨不早勉為雲山留未可止中道贈僧辨端南僧如竹􅓗在處即成林雖去常人髮不異常人心邈哉端上人所得趣向深雲泉香火裏日夕長苦吟為我有時名踏雪來相尋相尋縁底事論詩復鳴琴我是折腰吏衣帶塵土侵何以謝吾師恨無虞師金送尚老之江西豫章翠巖因老以書來招前無為報恩尚老於其行也作詩送之道人野鶴姿昂昂在鷄羣誰能戀場粟俯仰勞骸筋飄然欲何之駐目西山雲西山甲南昌雄勝天下聞翠巖為之冠有客許見分旋酌秀溪月煮茗特勸君寄言翠巖老吾將謝紛紜尚有鼻端堊湏煩為揮斤贈浮屠勤上人灋勤道人吾畏友也作别十二年為國清持鉢來歸過敝廬見其坐禪窮晝夜至廢寢食歎其不可跂及故作是讃隔宿不問道此語㓜所聞汨没塵土中嵗晩方得君學道戒怠惰成功在精勤勤哉勤道者取名不徒云别來十二秋東逰遍温鄞持呪動至暮坐禪常達昕寸隂古所惜君今惜餘分兢兢窮晝夜直欲忘齋薫軒昻冲天鶴那容混鷄羣我老懶成癖見君但歡欣茅齋無一物坐對栢子焚忽然捨我去翩若風中雲龍門呈心老千山倚天髙一徑穿雲斜忽然見樓閣知是佛子家蒼松老不死夭矯如龍蛇霜皮自鱗皴風梢互槎牙幽花似薝蔔清絶不可加過庭送好音異哉碧鴒伽我來不忍去一步三咨嗟終當解冠裳從師卧煙霞國清化人示寒山師從天台來示我一集詩開編未及讀涕淚巳交頥紛紛世間人迷妄覺者誰浮沉苦海中欲出無端涯寒山與拾得旁觀為興悲作詩三百篇勸戒仍嘲嗤覺此未覺者當下成牟尼此意亦良厚柰何人罕知師持國清鉢欲救雲堂飢贈言亦安用聊以報所貽奉送果上人住開先寺我昔逰成均年少心猶童倒床即甘寢寜問達與窮精爽忽飛越夢到廬山中廬山最佳處二林占西東開先在其間泉石清而雄分明我所記古刹磨碑豐長銜似持節覺來夢還空俛仰殆三絶蹭蹬老更癃貴賤等夢爾覺夢一理同持節何足道得時可三公說夢乃夢語笑殺懶散翁翁今往開先憑何警盲聾將此一轉語截斷雙石谼源源自何來其去何所終次韻因老見贈扁舟厯陽來訪君得少息登堂黙無語見者稱目擊去年糝江上羣盜羅劔㦸君時濡湏㳺入山笑相揖肩擔祖師禪問答揮即栗豈惟警聾瞶亦足慰岑寂春容褪丹青雨意鋪水墨定將儻赴感澄霽自端的麥秋數日間飢腸頗貪得兵餘敝廬盡何獨空四壁維摩幸無恙胡避有新室白雲夲無心能歸定能出巋然三傑峰況是舊相識我有半仙丹和劑等菖术為言山中人蟠桃已成實
